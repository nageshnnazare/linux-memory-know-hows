name: Manual make run and annotate

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-and-annotate:
    runs-on: ubuntu-latest
    env:
      RUN_TIMEOUT_SECONDS: 600
      DEMO_TIMEOUT_SECONDS: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Make helper script executable
        run: chmod +x scripts/annotate_c_run_output.sh

      - name: Run make and annotate C sources
        run: ./scripts/annotate_c_run_output.sh

      - name: Commit updated source files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          make clean >/dev/null 2>&1 || true
          find . -type f \( -perm -111 -o -name '*.o' -o -name '*.dSYM' \) -delete 2>/dev/null || true
          git add -- '*.c' '*.h' 'README.md' 'CHEATSHEET.md' 'index.html' '.github/workflows/*.yml' 'scripts/*'
          git add -u
          if git diff --cached --quiet; then
            echo "No source annotations were updated."
          else
            git commit -m "Annotate C demos with run output"
            git push
          fi
