  { name: `60. Process Syscalls / Fork`, path: `08_process_syscalls/01_fork.c`, dir: `08_process_syscalls`, words: 179, mins: 1, body: `<h1 id="01_forkc">01_fork.c</h1>
<pre><code class="language-c">/*
 * 01_fork.c
 * ----------
 * The canonical hello-world for fork().
 *
 *   parent                         child
 *     |                              |
 *     | fork() returns child pid     | fork() returns 0
 *     |                              |
 *     | print PARENT line            | print CHILD line
 *     |                              | _exit(0)
 *     | waitpid()                    |
 *     |                              X
 *     | print &quot;child exited&quot;
 *     |
 *     | exit(0)
 *
 * Note: the heap variable \`counter\` was 0 before fork; both processes
 * have an independent copy thereafter (CoW until either writes it).
 */
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;unistd.h&gt;
#include &lt;sys/wait.h&gt;

int main(void)
{
    int counter = 0;
    printf(&quot;[parent before fork] pid=%d counter=%d (&amp;counter=%p)\\n&quot;,
           getpid(), counter, (void *)&amp;counter);

    pid_t pid = fork();
    if (pid &lt; 0) { perror(&quot;fork&quot;); return 1; }

    if (pid == 0) {
        counter = 100;
        printf(&quot;[child ]  pid=%d ppid=%d counter=%d (&amp;counter=%p)\\n&quot;,
               getpid(), getppid(), counter, (void *)&amp;counter);
        _exit(0);
    }

    counter = 1;
    int status;
    waitpid(pid, &amp;status, 0);
    printf(&quot;[parent after wait ]  pid=%d counter=%d (&amp;counter=%p)\\n&quot;,
           getpid(), counter, (void *)&amp;counter);
    printf(&quot;[parent] child exit status = %d\\n&quot;,
           WIFEXITED(status) ? WEXITSTATUS(status) : -1);
    return 0;
}

</code></pre>` },
  { name: `61. Process Syscalls / Fork Exec Wait`, path: `08_process_syscalls/02_fork_exec_wait.c`, dir: `08_process_syscalls`, words: 133, mins: 1, body: `<h1 id="02_fork_exec_waitc">02_fork_exec_wait.c</h1>
<pre><code class="language-c">/*
 * 02_fork_exec_wait.c
 * --------------------
 * The bread-and-butter way to run a program from C:
 *
 *   parent ----fork----&gt; child
 *                          |
 *                          | execve(&quot;/bin/echo&quot;, ...)
 *                          v
 *                       echo runs (parent's address space is REPLACED)
 *                          |
 *                          | exits
 *                          v
 *   parent &lt;----wait--- exit status
 */
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;unistd.h&gt;
#include &lt;sys/wait.h&gt;

int main(void)
{
    pid_t pid = fork();
    if (pid &lt; 0) { perror(&quot;fork&quot;); return 1; }

    if (pid == 0) {
        char *argv[] = { &quot;/bin/echo&quot;, &quot;hello&quot;, &quot;from&quot;, &quot;child&quot;, NULL };
        char *envp[] = { &quot;LANG=C&quot;, NULL };
        execve(argv[0], argv, envp);
        perror(&quot;execve&quot;);      /* only reached if execve fails */
        _exit(127);
    }

    int status;
    waitpid(pid, &amp;status, 0);
    if (WIFEXITED(status))
        printf(&quot;child exited with %d\\n&quot;, WEXITSTATUS(status));
    else if (WIFSIGNALED(status))
        printf(&quot;child killed by signal %d\\n&quot;, WTERMSIG(status));
    return 0;
}

</code></pre>` },
  { name: `62. Process Syscalls / Vfork`, path: `08_process_syscalls/03_vfork.c`, dir: `08_process_syscalls`, words: 141, mins: 1, body: `<h1 id="03_vforkc">03_vfork.c</h1>
<pre><code class="language-c">/*
 * 03_vfork.c
 * -----------
 * vfork() shares the parent's address space and suspends the parent until
 * the child execve's or _exit's.  The child must NOT touch any variables
 * (other than the local PID returned by vfork).
 *
 * The classic safe pattern is:  vfork(); execve(...); _exit(...);
 *
 * Use case: very cheap &quot;spawn&quot; when you can't spare the CoW cost.
 */
#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;unistd.h&gt;
#include &lt;sys/wait.h&gt;

int main(void)
{
    printf(&quot;[parent] before vfork, pid=%d\\n&quot;, getpid());

    pid_t pid = vfork();
    if (pid &lt; 0) { perror(&quot;vfork&quot;); return 1; }
    if (pid == 0) {
        /* child: ONLY exec or _exit; nothing else */
        execlp(&quot;/bin/echo&quot;, &quot;echo&quot;, &quot;child ran via vfork&quot;, NULL);
        _exit(127);
    }

    /* parent resumes only after child execve/_exit */
    int s; waitpid(pid, &amp;s, 0);
    printf(&quot;[parent] child exit = %d\\n&quot;, WEXITSTATUS(s));
    return 0;
}

</code></pre>` },
  { name: `63. Process Syscalls / Clone Raw`, path: `08_process_syscalls/04_clone_raw.c`, dir: `08_process_syscalls`, words: 193, mins: 1, body: `<h1 id="04_clone_rawc">04_clone_raw.c</h1>
<pre><code class="language-c">/*
 * 04_clone_raw.c
 * ---------------
 * Call clone(2) directly to make a new process (no shared address space).
 * Equivalent to fork() but lets us explicitly pass flags.
 *
 *   clone(child_fn, child_stack + STACK_SZ, SIGCHLD, arg)
 *
 *     - SIGCHLD          -&gt; notify the parent on exit (just like fork)
 *     - no CLONE_VM      -&gt; address spaces are separate
 *     - we must give it a stack ourselves
 */
#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;unistd.h&gt;
#include &lt;sched.h&gt;
#include &lt;sys/wait.h&gt;
#include &lt;sys/mman.h&gt;
#include &lt;signal.h&gt;

#define STK (64 * 1024)

static int child_fn(void *arg)
{
    int n = *(int *)arg;
    printf(&quot;[child ] hello from clone'd process; got arg=%d ppid=%d\\n&quot;,
           n, getppid());
    return 42;        /* becomes exit status */
}

int main(void)
{
    /* allocate a stack for the child; mark MAP_GROWSDOWN/STACK */
    char *stk = mmap(NULL, STK, PROT_READ | PROT_WRITE,
                     MAP_PRIVATE | MAP_ANONYMOUS | MAP_STACK, -1, 0);
    if (stk == MAP_FAILED) { perror(&quot;mmap&quot;); return 1; }

    int arg = 7;
    pid_t pid = clone(child_fn, stk + STK, SIGCHLD, &amp;arg);
    if (pid &lt; 0) { perror(&quot;clone&quot;); return 1; }

    int s; waitpid(pid, &amp;s, 0);
    printf(&quot;[parent] child returned %d\\n&quot;, WEXITSTATUS(s));

    munmap(stk, STK);
    return 0;
}

</code></pre>` },
  { name: `64. Process Syscalls / Clone Thread`, path: `08_process_syscalls/05_clone_thread.c`, dir: `08_process_syscalls`, words: 277, mins: 1, body: `<h1 id="05_clone_threadc">05_clone_thread.c</h1>
<pre><code class="language-c">/*
 * 05_clone_thread.c
 * ------------------
 * Use clone() to make a &quot;thread&quot; -- a child task that SHARES our address
 * space, fd table, and signal handlers.  This is what pthread_create()
 * does under the hood.
 *
 *   flags:
 *     CLONE_VM      -- share the entire address space
 *     CLONE_FS      -- share cwd, umask, root
 *     CLONE_FILES   -- share fd table
 *     CLONE_SIGHAND -- share signal handlers
 *     CLONE_THREAD  -- same TGID -&gt; ps will see one process
 *     CLONE_SYSVSEM -- share SysV semadj
 *     CLONE_PARENT  -- new task's parent = caller's parent
 *
 * NOTE: this does NOT give us the niceties of pthreads (TLS, errno, etc.)
 * It's purely a demo of what's under pthread_create.
 */
#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;unistd.h&gt;
#include &lt;sched.h&gt;
#include &lt;sys/mman.h&gt;
#include &lt;sys/syscall.h&gt;
#include &lt;sys/wait.h&gt;
#include &lt;linux/futex.h&gt;
#include &lt;stdatomic.h&gt;

#define STK (256 * 1024)

static int shared_counter = 0;

static int child_fn(void *arg)
{
    (void)arg;
    for (int i = 0; i &lt; 1000; ++i)
        atomic_fetch_add((_Atomic int *)&amp;shared_counter, 1);
    printf(&quot;[thread] tid=%ld counter=%d\\n&quot;,
           syscall(SYS_gettid), shared_counter);
    return 0;
}

int main(void)
{
    char *stk = mmap(NULL, STK, PROT_READ | PROT_WRITE,
                     MAP_PRIVATE | MAP_ANONYMOUS | MAP_STACK, -1, 0);

    int flags = CLONE_VM | CLONE_FS | CLONE_FILES | CLONE_SIGHAND
              | CLONE_THREAD | CLONE_SYSVSEM | CLONE_PARENT;
    pid_t tid = clone(child_fn, stk + STK, flags, NULL);
    if (tid &lt; 0) { perror(&quot;clone&quot;); return 1; }

    for (int i = 0; i &lt; 1000; ++i)
        atomic_fetch_add((_Atomic int *)&amp;shared_counter, 1);

    /* poor-man's join: just spin until counter reaches 2000.
       Real pthreads uses CLONE_CHILD_CLEARTID + futex_wake on the TID. */
    while (atomic_load((_Atomic int *)&amp;shared_counter) &lt; 2000) usleep(1000);

    printf(&quot;[main  ] tid=%ld counter=%d (expected 2000)\\n&quot;,
           syscall(SYS_gettid), shared_counter);
    return 0;
}

</code></pre>` },
  { name: `65. Process Syscalls / Signal Handler`, path: `08_process_syscalls/06_signal_handler.c`, dir: `08_process_syscalls`, words: 225, mins: 1, body: `<h1 id="06_signal_handlerc">06_signal_handler.c</h1>
<pre><code class="language-c">/*
 * 06_signal_handler.c
 * --------------------
 * Catch SIGINT and SIGTERM using sigaction (the right way; signal(3) is
 * legacy).
 *
 *   Run this:    ./06_signal_handler
 *   Press Ctrl-C; the handler will set a flag; main loop notices and exits.
 *   Or from another shell:  kill -TERM &lt;pid&gt;
 *
 *   Why a flag instead of doing work in the handler?
 *     Because most libc functions are NOT async-signal-safe.  See
 *     \`signal-safety(7)\`.  Safe inside a handler: write(), _exit(),
 *     sig_atomic_t flag reads/writes, and a tiny list of others.
 */
#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;unistd.h&gt;
#include &lt;signal.h&gt;
#include &lt;string.h&gt;
#include &lt;errno.h&gt;

static volatile sig_atomic_t g_stop = 0;
static volatile sig_atomic_t g_lastsig = 0;

static void handler(int sig, siginfo_t *si, void *uc)
{
    (void)uc;
    g_stop = 1;
    g_lastsig = sig;
    /* write is async-signal-safe; printf is NOT */
    const char *m = (sig == SIGINT) ? &quot;got SIGINT\\n&quot; : &quot;got SIGTERM\\n&quot;;
    int unused = write(2, m, strlen(m));
    (void)unused; (void)si;
}

int main(void)
{
    struct sigaction sa = {0};
    sa.sa_sigaction = handler;
    sa.sa_flags     = SA_SIGINFO | SA_RESTART;
    sigemptyset(&amp;sa.sa_mask);
    sigaction(SIGINT,  &amp;sa, NULL);
    sigaction(SIGTERM, &amp;sa, NULL);

    printf(&quot;pid=%d  press Ctrl-C or kill -TERM %d ...\\n&quot;, getpid(), getpid());

    /* Block in a syscall, wait for the signal */
    while (!g_stop) {
        /* pause() returns when ANY signal handler runs */
        pause();
    }
    printf(&quot;exiting; last sig = %d\\n&quot;, g_lastsig);
    return 0;
}

</code></pre>` },
  { name: `66. Process Syscalls / Daemonise`, path: `08_process_syscalls/07_daemonise.c`, dir: `08_process_syscalls`, words: 181, mins: 1, body: `<h1 id="07_daemonisec">07_daemonise.c</h1>
<pre><code class="language-c">/*
 * 07_daemonise.c
 * ---------------
 * The textbook double-fork daemon recipe:
 *
 *   parent
 *     |
 *     fork() -&gt; child1
 *     exit(0)             child1 lives; parent is now /init's child
 *                            |
 *                            setsid()           // new session, no tty
 *                            fork() -&gt; child2
 *                            exit(0)            // child1 done
 *                                                  |
 *                                                  chdir(&quot;/&quot;)
 *                                                  umask(0)
 *                                                  close stdin/out/err
 *                                                  ...do the daemon stuff...
 *
 *   After this, ps -ef shows ppid=1 and no controlling tty.
 */
#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;unistd.h&gt;
#include &lt;fcntl.h&gt;
#include &lt;sys/types.h&gt;
#include &lt;sys/stat.h&gt;
#include &lt;syslog.h&gt;

static void daemonise(void)
{
    pid_t pid = fork();
    if (pid &lt; 0) exit(1);
    if (pid &gt; 0) exit(0);          /* original parent leaves */

    if (setsid() &lt; 0) exit(1);     /* become session leader */

    pid = fork();
    if (pid &lt; 0) exit(1);
    if (pid &gt; 0) exit(0);          /* session leader leaves */

    chdir(&quot;/&quot;);
    umask(0);

    int fd = open(&quot;/dev/null&quot;, O_RDWR);
    dup2(fd, 0); dup2(fd, 1); dup2(fd, 2);
    if (fd &gt; 2) close(fd);
}

int main(void)
{
    daemonise();

    openlog(&quot;daemonise-demo&quot;, LOG_PID, LOG_DAEMON);
    syslog(LOG_INFO, &quot;alive: pid=%d ppid=%d&quot;, getpid(), getppid());
    sleep(30);
    syslog(LOG_INFO, &quot;exiting&quot;);
    closelog();
    return 0;
}

</code></pre>` },
  { name: `67. Process Syscalls / Pipe Fork`, path: `08_process_syscalls/08_pipe_fork.c`, dir: `08_process_syscalls`, words: 185, mins: 1, body: `<h1 id="08_pipe_forkc">08_pipe_fork.c</h1>
<pre><code class="language-c">/*
 * 08_pipe_fork.c
 * ---------------
 * Classic pipe-then-fork: parent writes, child reads.
 *
 *   pipe(fds):
 *     fds[0] = read end
 *     fds[1] = write end
 *
 *   parent: closes [0], writes to [1], closes [1]    -&gt; EOF in child
 *   child : closes [1], reads from [0] until EOF
 *
 *   Pipes have a small in-kernel circular buffer (default 64 KiB on Linux).
 *   write() blocks (or returns EAGAIN if O_NONBLOCK) when full.
 *   read()  returns 0 (EOF) once all write ends are closed.
 */
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;unistd.h&gt;
#include &lt;sys/wait.h&gt;
#include &lt;string.h&gt;

int main(void)
{
    int fd[2];
    if (pipe(fd) &lt; 0) { perror(&quot;pipe&quot;); return 1; }

    pid_t pid = fork();
    if (pid &lt; 0) { perror(&quot;fork&quot;); return 1; }

    if (pid == 0) {
        close(fd[1]);
        char buf[64];
        ssize_t n;
        while ((n = read(fd[0], buf, sizeof buf)) &gt; 0)
            write(1, buf, n);
        close(fd[0]);
        _exit(0);
    }
    close(fd[0]);
    const char *msgs[] = { &quot;hello\\n&quot;, &quot;from\\n&quot;, &quot;parent\\n&quot; };
    for (int i = 0; i &lt; 3; ++i) {
        write(fd[1], msgs[i], strlen(msgs[i]));
        usleep(100000);
    }
    close(fd[1]);   /* tells child: EOF */
    waitpid(pid, NULL, 0);
    return 0;
}

</code></pre>` },
  { name: `68. Process Syscalls / Zombie Orphan`, path: `08_process_syscalls/09_zombie_orphan.c`, dir: `08_process_syscalls`, words: 188, mins: 1, body: `<h1 id="09_zombie_orphanc">09_zombie_orphan.c</h1>
<pre><code class="language-c">/*
 * 09_zombie_orphan.c
 * -------------------
 * Demonstrate the two life-after-death scenarios.
 *
 *   ZOMBIE  : child exits before parent waits.
 *             Visible as state Z in ps; ppid is still us.
 *
 *   ORPHAN  : parent exits before child.
 *             init/systemd adopts the child (ppid=1).
 *
 * Run:        ./09_zombie_orphan zombie   then   ps -e -o pid,ppid,stat,cmd | grep 09
 *             ./09_zombie_orphan orphan
 */
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;unistd.h&gt;
#include &lt;sys/wait.h&gt;
#include &lt;string.h&gt;

int main(int argc, char **argv)
{
    if (argc &lt; 2) { fprintf(stderr, &quot;usage: %s zombie|orphan\\n&quot;, argv[0]); return 1; }

    if (!strcmp(argv[1], &quot;zombie&quot;)) {
        pid_t c = fork();
        if (c == 0) _exit(0);
        printf(&quot;parent pid=%d  child pid=%d (now a zombie, not waited)\\n&quot;,
               getpid(), c);
        printf(&quot;look: ps -o pid,ppid,stat,cmd -p %d\\n&quot;, c);
        sleep(20);
        waitpid(c, NULL, 0);
    } else if (!strcmp(argv[1], &quot;orphan&quot;)) {
        pid_t c = fork();
        if (c == 0) {
            printf(&quot;[child] ppid=%d  -- I'm about to be orphaned in 1 sec\\n&quot;, getppid());
            sleep(2);
            printf(&quot;[child] now ppid=%d (re-parented to init)\\n&quot;, getppid());
            _exit(0);
        }
        printf(&quot;[parent] pid=%d  exiting now to orphan %d\\n&quot;, getpid(), c);
        _exit(0);
    } else {
        fprintf(stderr, &quot;unknown mode '%s'\\n&quot;, argv[1]);
        return 1;
    }
    return 0;
}

  { name: `69. Process Syscalls / Sigchld`, path: `08_process_syscalls/10_sigchld.c`, dir: `08_process_syscalls`, words: 198, mins: 1, body: `<h1 id="10_sigchldc">10_sigchld.c</h1>
<pre><code class="language-c">/*
 * 10_sigchld.c
 * -------------
 * Reap any number of children asynchronously by handling SIGCHLD with a
 * WNOHANG-looping waitpid.
 *
 *   The classic mistake:  do \`waitpid(-1, &amp;s, 0)\` in the handler and only
 *   reap one child per SIGCHLD.  SIGCHLD is NOT queued; if two children
 *   exit in quick succession, you get ONE signal -- the second zombie
 *   stays.  Always loop with WNOHANG until ECHILD or 0.
 */
#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;unistd.h&gt;
#include &lt;signal.h&gt;
#include &lt;string.h&gt;
#include &lt;errno.h&gt;
#include &lt;sys/wait.h&gt;

static volatile sig_atomic_t reaped = 0;

static void on_chld(int s, siginfo_t *si, void *uc)
{
    (void)s; (void)si; (void)uc;
    int saved = errno;
    pid_t pid;
    while ((pid = waitpid(-1, NULL, WNOHANG)) &gt; 0) reaped++;
    errno = saved;
}

int main(void)
{
    struct sigaction sa = {0};
    sa.sa_sigaction = on_chld;
    sa.sa_flags = SA_SIGINFO | SA_RESTART | SA_NOCLDSTOP;
    sigemptyset(&amp;sa.sa_mask);
    sigaction(SIGCHLD, &amp;sa, NULL);

    for (int i = 0; i &lt; 5; ++i) {
        pid_t c = fork();
        if (c == 0) {
            usleep((i + 1) * 100000);
            _exit(0);
        }
        printf(&quot;[parent] spawned %d\\n&quot;, c);
    }

    /* sleep generously so SIGCHLDs land */
    while (reaped &lt; 5) pause();
    printf(&quot;[parent] reaped %d children\\n&quot;, reaped);
    return 0;
}

</code></pre>` },
  { name: `70. Process Syscalls`, path: `08_process_syscalls/README.md`, dir: `08_process_syscalls`, words: 1276, mins: 6, body: `<h1 id="08--process-syscalls-fork--exec--wait--clone--signals">08 — Process Syscalls (fork / exec / wait / clone / signals)</h1>
<p>A <em>process</em> is the kernel-side data structure (<code>struct task_struct</code>) wrapping
&ldquo;one address space + one or more threads + one set of fds + &hellip;&rdquo;. This
section is how you create, control, and tear down processes from C.</p>
<h2 id="1-the-life-of-a-process">1. The life of a process</h2>
<pre><code>   fork() / clone()        execve()                 _exit()
       |                       |                      |
       v                       v                      v
   +------------+    +-------------------+   +-----------------+
   |  newborn   |---&gt;|  running          |--&gt;|  zombie (Z)     |--&gt; reaped by
   |  child     |    |  R / S / D / T    |   |  exit_code held |    parent's
   +------------+    +-------------------+   +-----------------+    wait()
                          ^                       ^
                          |                       |
                       signals,                  parent must call
                       scheduling                wait/waitpid/waitid
                                                 (or pre-set SA_NOCLDWAIT)
</code></pre>
<p>Process states (visible in <code>ps -o pid,stat</code>):</p>
<pre><code>   R   running / runnable
   S   interruptible sleep    (most blocking I/O)
   D   uninterruptible sleep  (I/O that ignores signals; can't kill)
   T   stopped (Ctrl-Z)
   t   traced (gdb attached)
   Z   zombie (exited, parent hasn't waited)
   X   dead (just removed)
</code></pre>
<h2 id="2-fork">2. <code>fork()</code></h2>
<pre><code class="language-c">pid_t pid = fork();
if (pid &lt; 0)        perror(&quot;fork&quot;), exit(1);
else if (pid == 0)  /* child  -- runs in a copy of the parent */
else                /* parent -- pid is the child's PID       */
</code></pre>
<p>What gets duplicated:</p>
<pre><code>   shared (read by both):                copied (CoW until written):
     - file descriptors (refcount++)      - the entire address space
     - controlling tty                      (anon pages, heap, stack
     - signal dispositions                  shared libs)
     - umask, cwd, ...                    - registers
                                            - thread-local storage
   reset in child:
     - pid, ppid
     - file lock state
     - timers, semadj, ...
</code></pre>
<p>Pictorially:</p>
<pre><code>   before fork():                                after fork():
   parent
     +----------------+                          parent             child
     | data  [F1][F2] |                            |                  |
     | heap  [F3][F4] |                            v                  v
     | stack ...      |                          [F1*][F2*]         [F1*][F2*]    &lt;- frames marked RO
     +----------------+                          [F3*][F4*]         [F3*][F4*]       and shared
                                                 stack ...          stack ...
                                                  ^ on first write, frame is copied
</code></pre>
<h2 id="3-execve">3. <code>execve()</code></h2>
<p>Replaces the entire address space with a new program.</p>
<pre><code class="language-c">char *argv[] = { &quot;ls&quot;, &quot;-la&quot;, NULL };
char *envp[] = { &quot;PATH=/usr/bin&quot;, NULL };
execve(&quot;/bin/ls&quot;, argv, envp);
perror(&quot;execve&quot;);   /* only reached on failure */
</code></pre>
<p>What survives the call:</p>
<pre><code>   survives execve:                           gone after execve:
     - pid                                      - text, data, bss, heap, stack
     - ppid                                     - mappings (mmap, mlock)
     - open fds (unless O_CLOEXEC)              - signal handlers (reset to default)
     - cwd, umask, controlling tty              - threads (only main remains)
     - resource limits                          - the whole image
     - signal mask
     - environment (if you pass envp through)
</code></pre>
<p>Variants:</p>
<pre><code>   execve(path, argv, envp)        the syscall
   execv (path, argv)              uses current environ
   execvp(file, argv)              search PATH
   execve(...) with envp = NULL    not portable; pass an empty array
   execvpe(file, argv, envp)       PATH + env
   execl/execle/execlp/execlpe     variadic flavours (NUL-terminated list)
</code></pre>
<h2 id="4-wait-family--reaping-children">4. <code>wait</code> family — reaping children</h2>
<pre><code class="language-c">int status;
pid_t cpid = waitpid(-1, &amp;status, 0);    // -1 = any child, 0 = block

if (WIFEXITED(status))   printf(&quot;exited with %d\\n&quot;, WEXITSTATUS(status));
if (WIFSIGNALED(status)) printf(&quot;killed by signal %d\\n&quot;, WTERMSIG(status));
if (WIFSTOPPED(status))  printf(&quot;stopped by %d\\n&quot;, WSTOPSIG(status));
if (WIFCONTINUED(status))printf(&quot;continued\\n&quot;);
</code></pre>
<p>Variants:</p>
<pre><code>   wait(&amp;status)                       reap any one child
   waitpid(pid, &amp;s, opt)               specific child or -1 (any)
   waitid(idtype, id, &amp;siginfo, opt)   more info via siginfo_t
   wait3, wait4                        legacy + rusage
</code></pre>
<p>Options:</p>
<pre><code>   WNOHANG     don't block, return 0 if no child to reap
   WUNTRACED   also report stopped children
   WCONTINUED  also report resumed children
</code></pre>
<h3 id="zombies-and-orphans">Zombies and orphans</h3>
<ul>
<li>
<p><strong>Zombie</strong>: child exited, parent hasn&rsquo;t waited. Holds onto a tiny kernel
  struct + exit code. State <code>Z</code>.</p>
</li>
<li>
<p><strong>Orphan</strong>: parent died first. The orphan is re-parented to <code>init</code> (PID 1)
  which always <code>wait</code>s.</p>
</li>
</ul>
<p>To prevent zombies in a server you don&rsquo;t care about reaping:</p>
<pre><code class="language-c">struct sigaction sa = { .sa_handler = SIG_IGN, .sa_flags = SA_NOCLDWAIT };
sigaction(SIGCHLD, &amp;sa, NULL);
</code></pre>
<p>Or <code>fork</code>-twice (the classic daemonisation trick).</p>
<h2 id="5-clone--the-real-syscall">5. <code>clone()</code> — the real syscall</h2>
<p><code>fork()</code>, <code>vfork()</code>, and <code>pthread_create()</code> are all implemented via
<code>clone(2)</code>. Its flags pick what is <strong>shared</strong> vs <strong>copied</strong>:</p>
<pre><code>   CLONE_VM       address space is shared    (threads, vfork)
   CLONE_FS       cwd, umask, root           (threads)
   CLONE_FILES    fd table                   (threads)
   CLONE_SIGHAND  signal handlers            (threads)
   CLONE_THREAD   same thread group (TGID)   (threads)
   CLONE_PARENT   same ppid as caller
   CLONE_NEWPID   new PID namespace          (containers)
   CLONE_NEWNS    new mount namespace        (containers)
   CLONE_NEWNET   new network namespace
   CLONE_NEWUTS   new hostname namespace
   CLONE_NEWIPC, CLONE_NEWUSER, CLONE_NEWCGROUP
   CLONE_CHILD_CLEARTID  for futex (used by glibc to do pthread_join)
   CLONE_SETTLS         set new TLS (FS base on x86_64)
</code></pre>
<p><code>fork()</code> = <code>clone(SIGCHLD)</code> — nothing shared.
<code>pthread_create()</code> ≈ <code>clone(CLONE_VM|CLONE_FS|CLONE_FILES|CLONE_SIGHAND|CLONE_THREAD|CLONE_SYSVSEM|CLONE_SETTLS|CLONE_PARENT_SETTID|CLONE_CHILD_CLEARTID, stack, ...)</code></p>
<p>We have a raw-<code>clone</code> example in
<a href="05_clone_thread.c"><code>05_clone_thread.c</code></a>.</p>
<h2 id="6-vfork">6. <code>vfork()</code></h2>
<pre><code class="language-c">pid_t pid = vfork();   // child shares VM with parent until execve or _exit
</code></pre>
<ul>
<li>Child runs in the <strong>same address space</strong> as the parent.</li>
<li>Parent is <strong>suspended</strong> until the child does <code>execve</code> or <code>_exit</code>.</li>
<li>
<p>Used for the tiny shim &ldquo;fork-then-exec&rdquo; without paying the CoW page-table
  copy cost. Modern Linux makes CoW cheap so the benefit is minor.</p>
</li>
<li>
<p>Dangerous: in the child you can write to the parent&rsquo;s stack — only call
  exec/_exit, nothing else.</p>
</li>
</ul>
<h2 id="7-signals--interrupting-your-process">7. Signals — interrupting your process</h2>
<p>A <strong>signal</strong> is a notification delivered to a process or thread.</p>
<pre><code>   when:                       kernel queues a signal
                               +--------+
                               | signal |
                               +--------+
                                    |
                                    v
   ----------------------- process is scheduled -----------------------
                                    |
                                    v
                       is signal in this thread's mask?
                          yes -&gt; stays pending
                          no  -&gt; deliver:
                                   |
                                   +-&gt; default action (SIG_DFL):
                                   |     SIGTERM, SIGINT: term
                                   |     SIGKILL, SIGSTOP: term/stop, NOT catchable
                                   |     SIGCHLD: ignored
                                   |     SIGSEGV: term + coredump
                                   +-&gt; SIG_IGN: ignored
                                   +-&gt; user handler:
                                         saved context, call handler,
                                         then sigreturn back
</code></pre>
<p>The most common signals:</p>
<table>
<thead>
<tr>
<th>Sig</th>
<th>Default</th>
<th>Cause</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>SIGHUP</code></td>
<td>term</td>
<td>terminal closed</td>
</tr>
<tr>
<td><code>SIGINT</code></td>
<td>term</td>
<td>Ctrl-C</td>
</tr>
<tr>
<td><code>SIGQUIT</code></td>
<td>core</td>
<td>Ctrl-\\</td>
</tr>
<tr>
<td><code>SIGILL</code></td>
<td>core</td>

</tr>

<td><code>abort()</code>, also from heap corruption</td>
</tr>
<tr>

<td>div-by-zero</td>
</tr>
<tr>
<td><code>SIGKILL</code></td>

<td>unblockable kill</td>
</tr>
<tr>
<td><code>SIGSEGV</code></td>

</tr>
<tr>
<td><code>SIGPIPE</code></td>

<td>write to closed pipe</td>
</tr>
<tr>
<td><code>SIGALRM</code></td>

<td><code>alarm</code>/<code>setitimer</code></td>
</tr>

</tr>

<td>child stopped/terminated</td>
</tr>

</tr>

</tr>

</tr>

<h3 id="install-a-handler--always-use-sigaction-never-signal">Install a handler — always use <code>sigaction</code>, never <code>signal</code></h3>
<pre><code class="language-c">void handler(int s, siginfo_t *si, void *uc) { /* ... */ }
struct sigaction sa = {0};
sa.sa_sigaction = handler;
sa.sa_flags = SA_SIGINFO | SA_RESTART;   // SA_RESTART: auto-restart syscalls
sigemptyset(&amp;sa.sa_mask);
sigaction(SIGTERM, &amp;sa, NULL);
</code></pre>
<h3 id="async-signal-safe-functions">Async-signal-safe functions</h3>
<p>The list of functions you can call inside a handler is <strong>tiny</strong>: see
<code>signal-safety(7)</code>. <code>printf</code>, <code>malloc</code>, <code>free</code>, <code>pthread_mutex_lock</code> are
<em>not</em> on it. Stick to <code>write</code>, <code>_exit</code>, <code>signalfd</code>-style designs, or set a
flag (<code>volatile sig_atomic_t flag = 1</code>) and handle in the main loop.</p>
<h2 id="8-pipes-and-fork--classic-ipc">8. Pipes and <code>fork</code> — classic IPC</h2>
<pre><code class="language-c">int fd[2];
pipe(fd);                    // [0] = read, [1] = write
pid_t pid = fork();
if (pid == 0) {
    close(fd[1]);            // child reads
    char buf[64];
    int n = read(fd[0], buf, sizeof buf);
    write(1, buf, n);
    _exit(0);
}
close(fd[0]);                // parent writes
write(fd[1], &quot;hi child\\n&quot;, 9);
close(fd[1]);                // child reads EOF
waitpid(pid, NULL, 0);
</code></pre>
<p>Pipe data lives in a small in-kernel circular buffer (64 KiB by default).</p>
<pre><code>   parent          kernel              child
   write(fd[1]) -&gt; [ buffer .... ] -&gt; read(fd[0])
                    ^                  ^
                    one fd per end; close both refs to drop
</code></pre>
<h2 id="9-daemonisation">9. Daemonisation</h2>
<pre><code>   1. fork ; parent exits      -&gt; child has new ppid (init eventually)
   2. setsid()                 -&gt; become session leader, no controlling tty
   3. fork again ; parent exits-&gt; child no longer session leader,
                                  can't acquire tty by accident
   4. chdir(&quot;/&quot;)               -&gt; don't pin any filesystem
   5. umask(0)                 -&gt; predictable file perms
   6. close stdin/out/err or redirect to /dev/null
   7. open syslog / log file
</code></pre>
<p>See <a href="07_daemonise.c"><code>07_daemonise.c</code></a>.</p>

  { name: `71. Threads Memory / Pthread Create`, path: `09_threads_memory/01_pthread_create.c`, dir: `09_threads_memory`, words: 126, mins: 1, body: `<h1 id="01_pthread_createc">01_pthread_create.c</h1>
<pre><code class="language-c">/*
 * 01_pthread_create.c
 * --------------------
 * Spawn a few threads and print the stack ranges so you can see that
 * each non-main thread has its own VMA in the mmap area.
 */
#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;pthread.h&gt;
#include &lt;unistd.h&gt;
#include &lt;sys/syscall.h&gt;

static void *worker(void *arg)
{
    int local;
    pthread_attr_t a;
    void *stk; size_t sz;
    pthread_getattr_np(pthread_self(), &amp;a);
    pthread_attr_getstack(&amp;a, &amp;stk, &amp;sz);
    pthread_attr_destroy(&amp;a);
    printf(&quot;thread #%ld tid=%ld &amp;local=%p stack=[%p..%p) (%zu KiB)\\n&quot;,
           (long)arg, syscall(SYS_gettid), (void *)&amp;local,
           stk, (char *)stk + sz, sz / 1024);
    return NULL;
}

int main(void)
{
    int local;
    printf(&quot;main      tid=%ld &amp;local=%p\\n&quot;,
           syscall(SYS_gettid), (void *)&amp;local);

    pthread_t t[3];
    for (long i = 0; i &lt; 3; ++i) pthread_create(&amp;t[i], NULL, worker, (void *)i);
    for (int i = 0; i &lt; 3; ++i) pthread_join(t[i], NULL);
    return 0;
}

</code></pre>` },
  { name: `72. Threads Memory / Tls Compiler`, path: `09_threads_memory/02_tls_compiler.c`, dir: `09_threads_memory`, words: 144, mins: 1, body: `<h1 id="02_tls_compilerc">02_tls_compiler.c</h1>
<pre><code class="language-c">/*
 * 02_tls_compiler.c
 * ------------------
 * Compiler-supported TLS: each thread gets its own instance.
 *
 *   __thread int x;          // GCC extension
 *   _Thread_local int y;     // C11
 *
 * Access is one instruction on x86_64:    mov %fs:offset, %eax
 */
#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;pthread.h&gt;
#include &lt;unistd.h&gt;
#include &lt;sys/syscall.h&gt;

static _Thread_local int counter;   // per-thread, init = 0

static void *worker(void *arg)
{
    long n = (long)arg;
    for (int i = 0; i &lt; n; ++i) counter++;
    printf(&quot;tid=%ld counter=%d (&amp;counter=%p)\\n&quot;,
           syscall(SYS_gettid), counter, (void *)&amp;counter);
    return NULL;
}

int main(void)
{
    counter = 100;
    pthread_t t[3];
    long ns[] = { 10, 20, 30 };
    for (int i = 0; i &lt; 3; ++i) pthread_create(&amp;t[i], NULL, worker, (void *)ns[i]);
    for (int i = 0; i &lt; 3; ++i) pthread_join(t[i], NULL);

    /* main thread's counter is still 100 */
    printf(&quot;main counter=%d\\n&quot;, counter);
    return 0;
}

</code></pre>` },
  { name: `73. Threads Memory / Tls Pthread Key`, path: `09_threads_memory/03_tls_pthread_key.c`, dir: `09_threads_memory`, words: 148, mins: 1, body: `<h1 id="03_tls_pthread_keyc">03_tls_pthread_key.c</h1>
<pre><code class="language-c">/*
 * 03_tls_pthread_key.c
 * ---------------------
 * Pre-C11 TLS via pthread_key_create.  The advantage is a per-thread
 * destructor that runs at thread exit.
 *
 * Use compiler TLS unless you need the destructor mechanism (e.g. for
 * cleaning up a struct that owns heap or fds).
 */
#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;pthread.h&gt;
#include &lt;unistd.h&gt;
#include &lt;sys/syscall.h&gt;
#include &lt;string.h&gt;

static pthread_key_t key;

static void dtor(void *p)
{
    printf(&quot;[dtor] freeing %p in tid=%ld\\n&quot;, p, syscall(SYS_gettid));
    free(p);
}

static void *worker(void *arg)
{
    char *buf = malloc(64);
    snprintf(buf, 64, &quot;hello from %ld&quot;, (long)arg);
    pthread_setspecific(key, buf);
    /* later: */
    char *got = pthread_getspecific(key);
    printf(&quot;tid=%ld got=\\&quot;%s\\&quot; (%p)\\n&quot;, syscall(SYS_gettid), got, (void *)got);
    return NULL;
}

int main(void)
{
    pthread_key_create(&amp;key, dtor);
    pthread_t t[3];
    for (long i = 0; i &lt; 3; ++i) pthread_create(&amp;t[i], NULL, worker, (void *)i);
    for (int i = 0; i &lt; 3; ++i) pthread_join(t[i], NULL);
    pthread_key_delete(key);
    return 0;
}

  { name: `74. Threads Memory / Pthread Join`, path: `09_threads_memory/04_pthread_join.c`, dir: `09_threads_memory`, words: 125, mins: 1, body: `<h1 id="04_pthread_joinc">04_pthread_join.c</h1>
<pre><code class="language-c">/*
 * 04_pthread_join.c
 * ------------------
 * Spawn a thread that returns a heap-allocated value; main joins and
 * takes ownership.
 *
 *   pthread_create(&amp;tid, attr, fn, arg)
 *   pthread_join (tid, &amp;retval)
 *
 *   join blocks until the thread exits and writes its return into retval.
 *   Under the hood: glibc futex-waits on the tid word being CLEAR'd by the
 *   kernel via CLONE_CHILD_CLEARTID.
 */
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;pthread.h&gt;
#include &lt;unistd.h&gt;

static void *worker(void *arg)
{
    int n = *(int *)arg;
    int *result = malloc(sizeof *result);
    *result = n * n;
    usleep(100000);
    return result;
}

int main(void)
{
    int n = 7;
    pthread_t t;
    pthread_create(&amp;t, NULL, worker, &amp;n);

    void *r = NULL;
    pthread_join(t, &amp;r);
    printf(&quot;worker(%d) returned %d\\n&quot;, n, *(int *)r);
    free(r);
    return 0;
}

</code></pre>` },
  { name: `75. Threads Memory / Futex Basic`, path: `09_threads_memory/05_futex_basic.c`, dir: `09_threads_memory`, words: 225, mins: 1, body: `<h1 id="05_futex_basicc">05_futex_basic.c</h1>
<pre><code class="language-c">/*
 * 05_futex_basic.c
 * -----------------
 * Build a tiny mutex on top of SYS_futex.  Two threads each increment a
 * shared counter 100K times.
 *
 *   futex word states:
 *     0 = unlocked
 *     1 = locked, no waiters
 *     2 = locked, contended (someone in FUTEX_WAIT)
 *
 *   uncontested lock/unlock = a single atomic CAS + maybe atomic_exchange.
 *   contested lock           = FUTEX_WAIT syscall.
 *   contested unlock         = FUTEX_WAKE syscall.
 */
#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;pthread.h&gt;
#include &lt;stdatomic.h&gt;
#include &lt;sys/syscall.h&gt;
#include &lt;linux/futex.h&gt;
#include &lt;unistd.h&gt;

static int futex_wait(_Atomic int *uaddr, int val)
{ return syscall(SYS_futex, uaddr, FUTEX_WAIT_PRIVATE, val, NULL, NULL, 0); }
static int futex_wake(_Atomic int *uaddr, int n)
{ return syscall(SYS_futex, uaddr, FUTEX_WAKE_PRIVATE, n, NULL, NULL, 0); }

static _Atomic int m = 0;

static void lock(void)
{
    int e = 0;
    if (atomic_compare_exchange_strong_explicit(
            &amp;m, &amp;e, 1, memory_order_acquire, memory_order_acquire))
        return;
    while (atomic_exchange_explicit(&amp;m, 2, memory_order_acquire) != 0)
        futex_wait(&amp;m, 2);
}

static void unlock(void)
{
    if (atomic_exchange_explicit(&amp;m, 0, memory_order_release) == 2)
        futex_wake(&amp;m, 1);
}

static long shared;
#define N (100 * 1000)

static void *worker(void *arg)
{
    (void)arg;
    for (int i = 0; i &lt; N; ++i) {
        lock();
        shared++;
        unlock();
    }
    return NULL;
}

int main(void)
{
    pthread_t t1, t2;
    pthread_create(&amp;t1, NULL, worker, NULL);
    pthread_create(&amp;t2, NULL, worker, NULL);
    pthread_join(t1, NULL);
    pthread_join(t2, NULL);
    printf(&quot;shared=%ld expected=%ld\\n&quot;, shared, (long)(2 * N));
    return 0;
}

</code></pre>` },
  { name: `76. Threads Memory / Mutex Vs Atomic`, path: `09_threads_memory/06_mutex_vs_atomic.c`, dir: `09_threads_memory`, words: 192, mins: 1, body: `<h1 id="06_mutex_vs_atomicc">06_mutex_vs_atomic.c</h1>
<pre><code class="language-c">/*
 * 06_mutex_vs_atomic.c
 * ---------------------
 * Microbenchmark: which is faster, pthread_mutex_t or atomic_fetch_add,
 * when there's no contention?  (Spoiler: atomic wins by 10-50x.)
 *
 *   Why?  pthread_mutex still does atomic ops; it also touches more cache
 *   lines (the mutex struct) and runs a few branches.  For a single word
 *   increment, the mutex is overkill.
 */
#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;pthread.h&gt;
#include &lt;stdatomic.h&gt;
#include &lt;time.h&gt;

#define N (50 * 1000 * 1000)

static double now(void) { struct timespec ts; clock_gettime(CLOCK_MONOTONIC, &amp;ts); return ts.tv_sec + ts.tv_nsec * 1e-9; }

static long mx_counter;
static pthread_mutex_t mu = PTHREAD_MUTEX_INITIALIZER;

static _Atomic long at_counter;

int main(void)
{
    double t0 = now();
    for (int i = 0; i &lt; N; ++i) {
        pthread_mutex_lock(&amp;mu);
        mx_counter++;
        pthread_mutex_unlock(&amp;mu);
    }
    double t1 = now();
    printf(&quot;pthread_mutex 1-thread : %d ops in %.3f s  -&gt; %.1f ns/op\\n&quot;,
           N, t1 - t0, (t1 - t0) * 1e9 / N);

    t0 = now();
    for (int i = 0; i &lt; N; ++i)
        atomic_fetch_add_explicit(&amp;at_counter, 1, memory_order_relaxed);
    t1 = now();
    printf(&quot;atomic_fetch_add        : %d ops in %.3f s  -&gt; %.1f ns/op\\n&quot;,
           N, t1 - t0, (t1 - t0) * 1e9 / N);
    return 0;
}

</code></pre>` },
  { name: `77. Threads Memory`, path: `09_threads_memory/README.md`, dir: `09_threads_memory`, words: 940, mins: 5, body: `<h1 id="09--threads-from-a-memory-perspective">09 — Threads from a Memory Perspective</h1>
<p>We covered threads from a <em>synchronisation</em> perspective in the sibling
<a href="../../threading_guide/">threading_guide</a>. Here we look at them strictly from
the <strong>memory</strong> side: where does a thread&rsquo;s stack live, what is TLS, how does
glibc actually create a thread, and what is a futex.</p>
<h2 id="1-what-gets-shared">1. What gets shared</h2>
<pre><code>   Process address space (ONE PML4 / CR3 / page tables)
   +-------------------------------------------------------------+
   | text, rodata, data, bss   - shared                          |
   | heap (brk + arenas)       - shared                          |
   | mmap regions              - shared                          |
   | fds (kernel side)         - shared                          |
   | signal handlers           - shared (signal mask is PER-thread!) |
   |                                                             |
   | thread A: stack + regs + TLS                                |
   | thread B: stack + regs + TLS                                |
   | thread C: stack + regs + TLS                                |
   +-------------------------------------------------------------+
</code></pre>
<p>Concretely, every thread is its own <code>struct task_struct</code> (kernel) and Linux
schedules tasks, not processes. A &ldquo;process&rdquo; is a <em>thread group</em>: tasks
sharing a TGID (the process&rsquo;s PID).</p>
<h2 id="2-the-thread-stack">2. The thread stack</h2>
<p>The main thread&rsquo;s stack is the <code>[stack]</code> VMA up at the top of the address
space. Every additional thread gets its <strong>own mmap&rsquo;d region</strong>:</p>
<ul>
<li>Default size: <code>RLIMIT_STACK</code>, typically 8 MiB.</li>
<li>A 4 KiB <strong>guard page</strong> with <code>PROT_NONE</code> at the low end.</li>
<li>The TCB (thread control block, glibc internal) lives at the <em>high</em> end.</li>
</ul>
<pre><code>   thread stack VMA (one per non-main thread)
   +-----------------------+   &lt;- high addr; TCB + dtv + ... live here
   |    TCB (glibc)        |
   +-----------------------+
   |    TLS data           |
   +-----------------------+
   |    stack frames       |    grows down as the thread runs
   |    ...                |
   +-----------------------+
   |    free / unused      |
   +-----------------------+
   |    guard page (---p)  |   touching this -&gt; SIGSEGV
   +-----------------------+
</code></pre>
<p>Set explicitly:</p>
<pre><code class="language-c">pthread_attr_t a;
pthread_attr_init(&amp;a);
pthread_attr_setstacksize(&amp;a, 256 * 1024);
pthread_attr_setguardsize(&amp;a, 4096);
pthread_create(&amp;tid, &amp;a, fn, NULL);
pthread_attr_destroy(&amp;a);
</code></pre>
<h2 id="3-thread-local-storage-tls">3. Thread Local Storage (TLS)</h2>
<p>TLS gives each thread its own copy of a variable.</p>
<pre><code class="language-c">// C11
_Thread_local int per_thread_x;

// GCC
__thread int per_thread_y;

// C++
thread_local int per_thread_z;
</code></pre>
<p>How does the runtime find &ldquo;my&rdquo; copy? On x86_64, the <code>FS</code> segment register
points to the <strong>TCB</strong>, which holds the offset of each TLS variable. So:</p>
<pre><code>   mov  %fs:per_thread_x@tpoff, %eax     // load this thread's per_thread_x
</code></pre>
<p>There are <em>two</em> TLS models you&rsquo;ll encounter:</p>
<ul>
<li>
<p><strong>Initial-Exec / Local-Exec</strong>: TLS slot allocated at load time, offsets
  computed by the static linker. Fast (just <code>%fs:offset</code>).</p>
</li>
<li>
<p><strong>Global-Dynamic / Local-Dynamic</strong>: TLS allocated for <code>dlopen</code>&lsquo;d libraries.
  Slower (<code>__tls_get_addr</code> runtime resolver).</p>
</li>
</ul>
<p>Use <code>-ftls-model=initial-exec</code> for hot per-thread state if you control
linkage.</p>
<pre><code>   thread A's TCB              thread B's TCB
   +---------------+           +---------------+
   | dtv pointer   |           | dtv pointer   |
   +---------------+           +---------------+
   | per_thread_x  |           | per_thread_x  |   &lt;- two distinct words
   +---------------+           +---------------+
   | per_thread_y  |           | per_thread_y  |
   +---------------+           +---------------+
   ...                         ...
   %fs in A points here        %fs in B points here
</code></pre>
<h3 id="posix-tls-pthread_key_t">Posix TLS (<code>pthread_key_t</code>)</h3>
<p>Used pre-C11; supports a destructor per key:</p>
<pre><code class="language-c">pthread_key_t key;
pthread_key_create(&amp;key, free);    // destructor called at thread exit
pthread_setspecific(key, malloc(64));
void *p = pthread_getspecific(key);
</code></pre>
<p>Use compiler TLS (<code>__thread</code>) whenever possible — it&rsquo;s faster and cleaner.</p>
<h2 id="4-the-pthread_create-lowdown">4. The <code>pthread_create</code> lowdown</h2>
<pre><code>   pthread_create(&amp;tid, attr, fn, arg)
       |
       v
   glibc:
       - allocate stack (mmap, with guard page)
       - allocate TCB at top of stack
       - set up signal mask, TLS
       - clone(CLONE_VM|CLONE_FS|CLONE_FILES|CLONE_SIGHAND|
               CLONE_THREAD|CLONE_SYSVSEM|CLONE_SETTLS|
               CLONE_PARENT_SETTID|CLONE_CHILD_CLEARTID, stack_top,
               &amp;tid, tls_desc, &amp;child_tid)
                                ^                    ^
                                |                    |
                       stored in *tid       cleared on thread exit,
                                            then futex_wake -&gt; pthread_join sees 0
</code></pre>
<p><code>pthread_join(tid, &amp;ret)</code> blocks on a futex (the same child_tid word) and
copies out the return value.</p>
<h2 id="5-futexes--fast-userspace-mutexes">5. Futexes — fast userspace mutexes</h2>
<p>A <strong>futex</strong> (&ldquo;fast userspace mutex&rdquo;) is the primitive every pthread mutex,
condvar, and <code>std::atomic</code> wait is built on.</p>
<pre><code>   user: an int (the &quot;futex word&quot;) in shared memory
   user: atomic compare-and-set on it (fast path, no syscall)
   user: if uncontended: lock acquired -- never enter the kernel.
   user: if contended  : call futex(2):
            FUTEX_WAIT  -- check val matches expected, sleep if so
            FUTEX_WAKE  -- wake N waiters on the word
</code></pre>
<p>Pseudocode of a mutex:</p>
<pre><code class="language-c">void lock(_Atomic int *m) {
    int expected = 0;
    if (atomic_compare_exchange_strong(m, &amp;expected, 1)) return;       // uncontested
    while (atomic_exchange(m, 2) != 0) {                               // mark contended
        syscall(SYS_futex, m, FUTEX_WAIT, 2, NULL, NULL, 0);           // sleep
    }
}
void unlock(_Atomic int *m) {
    if (atomic_exchange(m, 0) != 1)                                    // had waiters
        syscall(SYS_futex, m, FUTEX_WAKE, 1, NULL, NULL, 0);
}
</code></pre>
<p>States of the futex word:</p>
<ul>
<li><code>0</code> = unlocked</li>
<li><code>1</code> = locked, no waiters</li>
<li><code>2</code> = locked, possible waiters</li>
</ul>
<p>The kernel keeps a hash table of waiters keyed by <strong>physical address</strong> of the
futex word, so the same futex can be used cross-process (when the word is in
shared memory like <code>mmap(MAP_SHARED)</code>).</p>
<p>See <a href="05_futex_basic.c"><code>05_futex_basic.c</code></a>.</p>
<h2 id="6-memory-ordering-primer-cross-thread">6. Memory ordering primer (cross-thread)</h2>
<p>Two threads communicating via shared memory must agree on a <em>memory model</em>.
On x86_64 the hardware is <strong>TSO</strong> (total store order): every core sees the
same global order of writes; the only reordering is &ldquo;store followed by load
to different addresses&rdquo;.</p>
<p>In C, use <strong><code>_Atomic</code></strong> (C11) or <strong>C11 atomics</strong>:</p>
<pre><code class="language-c">#include &lt;stdatomic.h&gt;
_Atomic int flag;
atomic_store_explicit(&amp;flag, 1, memory_order_release);   // producer
while (!atomic_load_explicit(&amp;flag, memory_order_acquire)) ; // consumer
// at this point consumer sees everything producer did before the store
</code></pre>
<p>Memory orders (<code>stdatomic.h</code>):</p>
<pre><code>   memory_order_relaxed   only the operation is atomic; no ordering
   memory_order_acquire   pairs with release; later loads ordered after this load
   memory_order_release   pairs with acquire; prior stores ordered before this store
   memory_order_acq_rel   for RMW (fetch_add, exchange, CAS)
   memory_order_seq_cst   sequentially consistent (default)
</code></pre>
<p>Full coverage in the sibling <a href="../../threading_guide/">threading_guide</a>.</p>

  { name: `78. Ipc Memory / Pipe`, path: `10_ipc_memory/01_pipe.c`, dir: `10_ipc_memory`, words: 99, mins: 1, body: `<h1 id="01_pipec">01_pipe.c</h1>
<pre><code class="language-c">/*
 * 01_pipe.c
 * ----------
 * Basic anonymous pipe + fork; parent sends a few records.
 */
#include &lt;stdio.h&gt;
#include &lt;unistd.h&gt;
#include &lt;string.h&gt;
#include &lt;sys/wait.h&gt;

int main(void)
{
    int fd[2]; if (pipe(fd) &lt; 0) return 1;
    pid_t pid = fork();
    if (pid == 0) {
        close(fd[1]);
        char buf[64]; ssize_t n;
        while ((n = read(fd[0], buf, sizeof buf)) &gt; 0)
            write(1, buf, n);
        _exit(0);
    }
    close(fd[0]);
    for (int i = 0; i &lt; 3; ++i) {
        char msg[64];
        int len = snprintf(msg, sizeof msg, &quot;record %d\\n&quot;, i);
        write(fd[1], msg, len);
        usleep(50000);
    }
    close(fd[1]);
    waitpid(pid, NULL, 0);
    return 0;
}

</code></pre>` },
  { name: `79. Ipc Memory / Socketpair`, path: `10_ipc_memory/02_socketpair.c`, dir: `10_ipc_memory`, words: 128, mins: 1, body: `<h1 id="02_socketpairc">02_socketpair.c</h1>
<pre><code class="language-c">/*
 * 02_socketpair.c
 * ----------------
 * Anonymous, bidirectional, in-kernel socket pair.
 *
 *   socketpair(AF_UNIX, SOCK_STREAM, 0, sv)
 *     sv[0] &lt;-&gt; sv[1], full duplex
 *
 *   No filesystem name; pass to child via fork() (inherit) or via
 *   SCM_RIGHTS on another already-shared socket.
 */
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;unistd.h&gt;
#include &lt;sys/socket.h&gt;
#include &lt;sys/wait.h&gt;
#include &lt;string.h&gt;

int main(void)
{
    int sv[2];
    if (socketpair(AF_UNIX, SOCK_STREAM, 0, sv) &lt; 0) { perror(&quot;socketpair&quot;); return 1; }

    pid_t pid = fork();
    if (pid == 0) {
        close(sv[0]);
        char buf[64];
        ssize_t n = read(sv[1], buf, sizeof buf);
        printf(&quot;[child] got %.*s&quot;, (int)n, buf);
        write(sv[1], &quot;pong\\n&quot;, 5);
        close(sv[1]);
        _exit(0);
    }
    close(sv[1]);
    write(sv[0], &quot;ping\\n&quot;, 5);
    char buf[64]; ssize_t n = read(sv[0], buf, sizeof buf);
    printf(&quot;[parent] got %.*s&quot;, (int)n, buf);
    close(sv[0]);
    waitpid(pid, NULL, 0);
    return 0;
}

</code></pre>` },
  { name: `80. Ipc Memory / Fifo`, path: `10_ipc_memory/03_fifo.c`, dir: `10_ipc_memory`, words: 125, mins: 1, body: `<h1 id="03_fifoc">03_fifo.c</h1>
<pre><code class="language-c">/*
 * 03_fifo.c
 * ----------
 * Named pipe (FIFO).  Works between UNRELATED processes (no fork).
 *
 *   mkfifo(&quot;/tmp/myfifo&quot;, 0600)   -&gt; a special inode in the filesystem
 *   open(... O_RDONLY)            blocks until a writer opens the other end
 *   open(... O_WRONLY)            same, for the reader
 */
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;unistd.h&gt;
#include &lt;fcntl.h&gt;
#include &lt;sys/stat.h&gt;
#include &lt;sys/wait.h&gt;
#include &lt;string.h&gt;

int main(void)
{
    const char *path = &quot;/tmp/mem_guide_fifo&quot;;
    unlink(path);
    if (mkfifo(path, 0600) &lt; 0) { perror(&quot;mkfifo&quot;); return 1; }

    pid_t pid = fork();
    if (pid == 0) {
        int fd = open(path, O_RDONLY);
        char buf[64]; int n = read(fd, buf, sizeof buf);
        write(1, buf, n);
        close(fd);
        _exit(0);
    }
    int fd = open(path, O_WRONLY);
    write(fd, &quot;hello fifo\\n&quot;, 11);
    close(fd);
    waitpid(pid, NULL, 0);
    unlink(path);
    return 0;
}

</code></pre>` },
  { name: `81. Ipc Memory / Shm Open`, path: `10_ipc_memory/04_shm_open.c`, dir: `10_ipc_memory`, words: 177, mins: 1, body: `<h1 id="04_shm_openc">04_shm_open.c</h1>
<pre><code class="language-c">/*
 * 04_shm_open.c
 * --------------
 * POSIX shared memory.  Two processes (parent + child) attach to the same
 * /dev/shm/... object via mmap and synchronise through it.
 *
 *   parent:
 *     fd = shm_open(&quot;/foo&quot;, O_CREAT|O_RDWR, 0600)
 *     ftruncate(fd, sz)
 *     p = mmap(MAP_SHARED, fd, 0)
 *     fork()
 *   ...both processes see the same memory through different VAs (same frames)
 *
 *   shm_unlink(&quot;/foo&quot;) removes the name; the mapping persists until
 *   both processes munmap().
 */
#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;unistd.h&gt;
#include &lt;fcntl.h&gt;
#include &lt;sys/mman.h&gt;
#include &lt;sys/wait.h&gt;
#include &lt;stdatomic.h&gt;
#include &lt;string.h&gt;

struct shared { _Atomic int ready; char msg[64]; };

int main(void)
{
    const char *name = &quot;/mem_guide_shm&quot;;
    shm_unlink(name);
    int fd = shm_open(name, O_CREAT | O_RDWR, 0600);
    ftruncate(fd, sizeof(struct shared));
    struct shared *s = mmap(NULL, sizeof *s, PROT_READ | PROT_WRITE,
                            MAP_SHARED, fd, 0);
    close(fd);
    s-&gt;ready = 0;

    pid_t pid = fork();
    if (pid == 0) {
        while (atomic_load(&amp;s-&gt;ready) == 0) usleep(1000);
        printf(&quot;[child] got: \\&quot;%s\\&quot;\\n&quot;, s-&gt;msg);
        _exit(0);
    }
    strncpy(s-&gt;msg, &quot;hello via shm_open&quot;, sizeof s-&gt;msg);
    atomic_store(&amp;s-&gt;ready, 1);
    waitpid(pid, NULL, 0);

    munmap(s, sizeof *s);
    shm_unlink(name);
    return 0;
}

</code></pre>` },
  { name: `82. Ipc Memory / Sysv Shm`, path: `10_ipc_memory/05_sysv_shm.c`, dir: `10_ipc_memory`, words: 170, mins: 1, body: `<h1 id="05_sysv_shmc">05_sysv_shm.c</h1>
<pre><code class="language-c">/*
 * 05_sysv_shm.c
 * --------------
 * Legacy SysV shared memory.  Inspect with \`ipcs -m\`.
 *
 *   key  = ftok(path, id)       derive an integer key from a file
 *   id   = shmget(key, sz, IPC_CREAT|0600)
 *   p    = shmat(id, NULL, 0)
 *   ... use p ...
 *   shmdt(p)
 *   shmctl(id, IPC_RMID, NULL)  remove segment
 */
#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;unistd.h&gt;
#include &lt;sys/ipc.h&gt;
#include &lt;sys/shm.h&gt;
#include &lt;sys/wait.h&gt;
#include &lt;string.h&gt;
#include &lt;stdatomic.h&gt;

struct s { _Atomic int ready; char msg[64]; };

int main(void)
{
    key_t k = IPC_PRIVATE;     /* anonymous, inherited via fork */
    int id = shmget(k, sizeof(struct s), IPC_CREAT | 0600);
    if (id &lt; 0) { perror(&quot;shmget&quot;); return 1; }

    struct s *p = shmat(id, NULL, 0);
    if (p == (void *)-1) { perror(&quot;shmat&quot;); return 1; }
    p-&gt;ready = 0;

    pid_t pid = fork();
    if (pid == 0) {
        while (atomic_load(&amp;p-&gt;ready) == 0) usleep(1000);
        printf(&quot;[child] %s\\n&quot;, p-&gt;msg);
        shmdt(p);
        _exit(0);
    }
    strncpy(p-&gt;msg, &quot;hello SysV shm&quot;, sizeof p-&gt;msg);
    atomic_store(&amp;p-&gt;ready, 1);
    waitpid(pid, NULL, 0);

    shmdt(p);
    shmctl(id, IPC_RMID, NULL);
    return 0;
}

</code></pre>` },
  { name: `83. Ipc Memory / Memfd Create`, path: `10_ipc_memory/06_memfd_create.c`, dir: `10_ipc_memory`, words: 195, mins: 1, body: `<h1 id="06_memfd_createc">06_memfd_create.c</h1>
<pre><code class="language-c">/*
 * 06_memfd_create.c
 * ------------------
 * memfd_create -- create an anonymous file in RAM, get an fd back.
 *
 *   Use cases:
 *     - share data between unrelated processes via SCM_RIGHTS
 *     - JIT: write code to memfd, mmap PROT_EXEC
 *     - SEALS: lock down so receivers know the content can't change
 *
 *   No filesystem path; no quota concerns; lives in tmpfs (RAM).
 */
#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;unistd.h&gt;
#include &lt;sys/mman.h&gt;
#include &lt;sys/syscall.h&gt;
#include &lt;linux/memfd.h&gt;
#include &lt;fcntl.h&gt;
#include &lt;string.h&gt;

#ifndef SYS_memfd_create
#define SYS_memfd_create 319 /* x86_64 */
#endif

static int memfd_create_(const char *name, unsigned flags)
{ return syscall(SYS_memfd_create, name, flags); }

int main(void)
{
    int fd = memfd_create_(&quot;demo&quot;, MFD_CLOEXEC | MFD_ALLOW_SEALING);
    if (fd &lt; 0) { perror(&quot;memfd_create&quot;); return 1; }
    printf(&quot;memfd_create fd = %d  (look in /proc/%d/fd/%d)\\n&quot;, fd, getpid(), fd);

    ftruncate(fd, 4096);
    char *p = mmap(NULL, 4096, PROT_READ | PROT_WRITE, MAP_SHARED, fd, 0);
    strcpy(p, &quot;hello memfd!&quot;);
    printf(&quot;via mmap: \\&quot;%s\\&quot;\\n&quot;, p);

    /* lock down further changes to the size / content */
    if (fcntl(fd, F_ADD_SEALS, F_SEAL_SHRINK | F_SEAL_GROW | F_SEAL_WRITE) &lt; 0)
        perror(&quot;F_ADD_SEALS (need MFD_ALLOW_SEALING)&quot;);
    int seals = fcntl(fd, F_GET_SEALS);
    printf(&quot;current seals = 0x%x\\n&quot;, seals);

    munmap(p, 4096);
    close(fd);
    return 0;
}

</code></pre>` },
  { name: `84. Ipc Memory / Eventfd`, path: `10_ipc_memory/07_eventfd.c`, dir: `10_ipc_memory`, words: 140, mins: 1, body: `<h1 id="07_eventfdc">07_eventfd.c</h1>
<pre><code class="language-c">/*
 * 07_eventfd.c
 * -------------
 * eventfd is a counter you can read/write/poll.  Common pattern:
 *
 *   - server thread: epoll_wait on the eventfd
 *   - producer thread: write(efd, &amp;(uint64_t){1}, 8) when work is ready
 *   - server: read returns the count, resets to 0; can poll for more.
 */
#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;unistd.h&gt;
#include &lt;sys/eventfd.h&gt;
#include &lt;pthread.h&gt;
#include &lt;stdint.h&gt;

static int efd;

static void *worker(void *arg)
{
    (void)arg;
    for (int i = 0; i &lt; 5; ++i) {
        uint64_t one = 1;
        write(efd, &amp;one, sizeof one);
        usleep(100000);
    }
    return NULL;
}

int main(void)
{
    efd = eventfd(0, EFD_CLOEXEC);
    pthread_t t; pthread_create(&amp;t, NULL, worker, NULL);

    uint64_t v;
    for (int i = 0; i &lt; 5; ++i) {
        read(efd, &amp;v, sizeof v);
        printf(&quot;woke up: got count %lu\\n&quot;, (unsigned long)v);
    }
    pthread_join(t, NULL);
    close(efd);
    return 0;
}

</code></pre>` },
  { name: `85. Ipc Memory / Signalfd`, path: `10_ipc_memory/08_signalfd.c`, dir: `10_ipc_memory`, words: 127, mins: 1, body: `<h1 id="08_signalfdc">08_signalfd.c</h1>
<pre><code class="language-c">/*
 * 08_signalfd.c
 * --------------
 * Deliver signals through an fd, sidestepping handler safety constraints.
 *
 *   1. block the signal so default handler doesn't fire
 *   2. signalfd() returns a read'able fd that yields signalfd_siginfo
 *   3. read it, dispatch normally (full libc available)
 */
#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;unistd.h&gt;
#include &lt;signal.h&gt;
#include &lt;sys/signalfd.h&gt;
#include &lt;string.h&gt;

int main(void)
{
    sigset_t s; sigemptyset(&amp;s); sigaddset(&amp;s, SIGTERM); sigaddset(&amp;s, SIGINT);
    sigprocmask(SIG_BLOCK, &amp;s, NULL);

    int sfd = signalfd(-1, &amp;s, SFD_CLOEXEC);
    if (sfd &lt; 0) { perror(&quot;signalfd&quot;); return 1; }

    printf(&quot;pid=%d  send me SIGINT (Ctrl-C) or SIGTERM (kill -TERM %d)\\n&quot;,
           getpid(), getpid());

    struct signalfd_siginfo si;
    ssize_t n = read(sfd, &amp;si, sizeof si);
    if (n == sizeof si)
        printf(&quot;got signal %d from pid=%d\\n&quot;, si.ssi_signo, si.ssi_pid);
    close(sfd);
    return 0;
}

</code></pre>` },
  { name: `86. Ipc Memory / Mq`, path: `10_ipc_memory/09_mq.c`, dir: `10_ipc_memory`, words: 169, mins: 1, body: `<h1 id="09_mqc">09_mq.c</h1>
<pre><code class="language-c">/*
 * 09_mq.c
 * --------
 * POSIX message queue with priority.
 *
 *   /dev/mqueue/&lt;name&gt; shows up after mq_open(O_CREAT).
 *   Each message is delivered in (priority, time) order.
 *
 * Link with -lrt
 */
#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;unistd.h&gt;
#include &lt;mqueue.h&gt;
#include &lt;fcntl.h&gt;
#include &lt;string.h&gt;
#include &lt;sys/wait.h&gt;

int main(void)
{
    const char *name = &quot;/mem_guide_mq&quot;;
    struct mq_attr a = { .mq_flags = 0, .mq_maxmsg = 8, .mq_msgsize = 64, .mq_curmsgs = 0 };
    mq_unlink(name);
    mqd_t mq = mq_open(name, O_CREAT | O_RDWR, 0600, &amp;a);
    if (mq == (mqd_t)-1) { perror(&quot;mq_open&quot;); return 1; }

    pid_t pid = fork();
    if (pid == 0) {
        char buf[64]; unsigned prio;
        for (int i = 0; i &lt; 3; ++i) {
            ssize_t n = mq_receive(mq, buf, sizeof buf, &amp;prio);
            printf(&quot;[child] got prio=%u msg=\\&quot;%.*s\\&quot;\\n&quot;, prio, (int)n, buf);
        }
        mq_close(mq);
        _exit(0);
    }
    /* parent sends in mixed priorities; receiver gets high prio first */
    mq_send(mq, &quot;low&quot;,   3, 0);
    mq_send(mq, &quot;high&quot;,  4, 10);
    mq_send(mq, &quot;mid&quot;,   3, 5);

    waitpid(pid, NULL, 0);
    mq_close(mq);
    mq_unlink(name);
    return 0;
}

  { name: `87. Ipc Memory / Scm Rights`, path: `10_ipc_memory/10_scm_rights.c`, dir: `10_ipc_memory`, words: 324, mins: 2, body: `<h1 id="10_scm_rightsc">10_scm_rights.c</h1>
<pre><code class="language-c">/*
 * 10_scm_rights.c
 * ----------------
 * Pass an open file descriptor across a UNIX socket using SCM_RIGHTS.
 *
 *   sender:                                    receiver:
 *     - open a file -&gt; got fd X                  - has its own socketpair end
 *     - sendmsg(sock, msg with cmsg SCM_RIGHTS{X})
 *                                                - recvmsg returns: msg + cmsg
 *                                                - the kernel installed a NEW fd Y in the receiver
 *                                                - read/write Y == read/write X
 *
 * This is how memfd_create is shared between sandboxed processes, how
 * fork-server architectures hand out pty/tty fds, how snapd installs perms.
 */
#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;unistd.h&gt;
#include &lt;fcntl.h&gt;
#include &lt;string.h&gt;
#include &lt;sys/socket.h&gt;
#include &lt;sys/wait.h&gt;
#include &lt;sys/un.h&gt;

static int send_fd(int sock, int fd_to_send)
{
    char dummy = 'F';
    char cbuf[CMSG_SPACE(sizeof(int))];
    struct iovec iov = { .iov_base = &amp;dummy, .iov_len = 1 };
    struct msghdr msg = {0};
    msg.msg_iov     = &amp;iov;
    msg.msg_iovlen  = 1;
    msg.msg_control = cbuf;
    msg.msg_controllen = sizeof cbuf;
    struct cmsghdr *cm = CMSG_FIRSTHDR(&amp;msg);
    cm-&gt;cmsg_level = SOL_SOCKET;
    cm-&gt;cmsg_type  = SCM_RIGHTS;
    cm-&gt;cmsg_len   = CMSG_LEN(sizeof(int));
    memcpy(CMSG_DATA(cm), &amp;fd_to_send, sizeof(int));
    return sendmsg(sock, &amp;msg, 0);
}

static int recv_fd(int sock)
{
    char dummy;
    char cbuf[CMSG_SPACE(sizeof(int))];
    struct iovec iov = { .iov_base = &amp;dummy, .iov_len = 1 };
    struct msghdr msg = {0};
    msg.msg_iov     = &amp;iov;
    msg.msg_iovlen  = 1;
    msg.msg_control = cbuf;
    msg.msg_controllen = sizeof cbuf;
    if (recvmsg(sock, &amp;msg, 0) &lt;= 0) return -1;
    struct cmsghdr *cm = CMSG_FIRSTHDR(&amp;msg);
    if (!cm || cm-&gt;cmsg_type != SCM_RIGHTS) return -1;
    int fd;
    memcpy(&amp;fd, CMSG_DATA(cm), sizeof fd);
    return fd;
}

int main(void)
{
    int sv[2];
    socketpair(AF_UNIX, SOCK_STREAM, 0, sv);

    pid_t pid = fork();
    if (pid == 0) {
        close(sv[0]);
        int fd = recv_fd(sv[1]);
        printf(&quot;[child] received fd=%d\\n&quot;, fd);
        char buf[64];
        lseek(fd, 0, SEEK_SET);
        int n = read(fd, buf, sizeof buf);
        write(1, buf, n);
        close(fd); close(sv[1]);
        _exit(0);
    }
    close(sv[1]);
    int fd = open(&quot;/etc/hostname&quot;, O_RDONLY);
    if (fd &lt; 0) { perror(&quot;open&quot;); return 1; }
    printf(&quot;[parent] passing fd=%d (/etc/hostname) to child\\n&quot;, fd);
    send_fd(sv[0], fd);
    close(fd); close(sv[0]);
    waitpid(pid, NULL, 0);
    return 0;
}

</code></pre>` },
  { name: `88. Ipc Memory`, path: `10_ipc_memory/README.md`, dir: `10_ipc_memory`, words: 664, mins: 3, body: `<h1 id="10--ipc-shared-memory--other-ways-processes-talk">10 — IPC: Shared Memory &amp; Other Ways Processes Talk</h1>
<p>When two processes need to exchange data, you have an <em>embarrassment</em> of
options on Linux. Pick the one that matches your data shape and lifetime.</p>
<pre><code>                  How big is each message?
                       |
       small (bytes)   |   large (MB+) / streaming
            v          |          v
         signals       |       mmap + shared memory
         eventfd       |       memfd_create
         signalfd      |
            |          |
            v          |          v
         pipes / FIFO  |       MAP_SHARED file
         UNIX sockets  |
         msg queues    |
         dgram sockets |
            |          |
            v          |          v
                  unidirectional / structured  -&gt; sockets, message queues
                  full-duplex streaming         -&gt; socketpair
                  one-shot signal               -&gt; eventfd, signalfd
</code></pre>
<h2 id="1-pipes-pipe2">1. Pipes (<code>pipe2</code>)</h2>
<pre><code>   pipe(fd)              // [0]=read, [1]=write
   pipe2(fd, O_CLOEXEC | O_NONBLOCK)   // Linux: extra flags

   - in-kernel buffer (64 KiB default; F_SETPIPE_SZ to grow)
   - unidirectional
   - usually paired with fork(); one process closes [1], other [0]
</code></pre>
<p>A <em>named pipe</em> (FIFO) lives in the filesystem: <code>mkfifo /tmp/p</code>, then any
process can <code>open("/tmp/p", O_RDONLY/O_WRONLY)</code>.</p>
<h2 id="2-unix-domain-sockets">2. UNIX domain sockets</h2>
<p>Full-duplex, can be stream or datagram, can carry <strong>fds</strong> (the magic
<code>SCM_RIGHTS</code>!).</p>
<pre><code>   socketpair(AF_UNIX, SOCK_STREAM, 0, fd)   // anonymous, bidirectional pair
   socket(AF_UNIX, SOCK_STREAM/DGRAM, 0)     // named, bind to /tmp/...
</code></pre>
<p><a href="02_socketpair.c"><code>02_socketpair.c</code></a>.</p>
<h2 id="3-posix-shared-memory-shm_open">3. POSIX shared memory (<code>shm_open</code>)</h2>
<p>This is the <em>modern</em> way to share a large memory region between unrelated
processes.</p>
<pre><code class="language-c">fd = shm_open(&quot;/myseg&quot;, O_CREAT|O_RDWR, 0600);
ftruncate(fd, size);
void *p = mmap(NULL, size, PROT_READ|PROT_WRITE, MAP_SHARED, fd, 0);
close(fd);
...
munmap(p, size);
shm_unlink(&quot;/myseg&quot;);    // remove the name
</code></pre>
<p>Backed by <code>tmpfs</code> at <code>/dev/shm/</code>. Survives process exit until <code>shm_unlink</code>.</p>
<h2 id="4-sysv-shared-memory-shmget--shmat">4. SysV shared memory (<code>shmget</code> / <code>shmat</code>)</h2>
<p>Legacy. Still around for compatibility (PostgreSQL uses it, Oracle, &hellip;).</p>
<pre><code class="language-c">key_t k = ftok(&quot;/some/file&quot;, 1);
int id = shmget(k, size, IPC_CREAT | 0600);
void *p = shmat(id, NULL, 0);
...
shmdt(p);
shmctl(id, IPC_RMID, NULL);
</code></pre>
<p>Inspect: <code>ipcs -m</code>. Tweak limits: <code>/proc/sys/kernel/shmmax</code>, <code>shmall</code>, <code>shmmni</code>.</p>
<p>Prefer POSIX <code>shm_open</code> for new code.</p>
<h2 id="5-memfd_create--file-less-files">5. <code>memfd_create</code> — file-less files</h2>
<pre><code class="language-c">int fd = memfd_create(&quot;scratch&quot;, MFD_CLOEXEC);
ftruncate(fd, 1 &lt;&lt; 20);
void *p = mmap(NULL, 1 &lt;&lt; 20, PROT_READ|PROT_WRITE, MAP_SHARED, fd, 0);
</code></pre>
<p>Anonymous, in-RAM, no filesystem path; pass <code>fd</code> over a UNIX socket
(<code>SCM_RIGHTS</code>) to share. Also supports <strong>seals</strong> (<code>F_ADD_SEALS</code>) so the
receiver can verify nobody can modify or resize it. Used by Wayland,
container runtimes, KVM/libvirt.</p>
<h2 id="6-eventfd--a-counter-you-can-poll-on">6. <code>eventfd</code> — a counter you can poll on</h2>
<pre><code class="language-c">int e = eventfd(0, EFD_CLOEXEC);
write(e, &amp;(uint64_t){1}, 8);   // increment by 1
read (e, &amp;(uint64_t){0}, 8);   // returns current value, sets it to 0
poll/epoll(e)                  // becomes readable when value &gt; 0
</code></pre>
<p>Great for &ldquo;thread A wants to wake up thread B&rdquo; with <code>epoll</code>.</p>
<h2 id="7-signalfd--signals-via-fd">7. <code>signalfd</code> — signals via fd</h2>
<pre><code class="language-c">sigset_t s; sigemptyset(&amp;s); sigaddset(&amp;s, SIGTERM);
sigprocmask(SIG_BLOCK, &amp;s, NULL);  // important
int sfd = signalfd(-1, &amp;s, SFD_CLOEXEC);
struct signalfd_siginfo si; read(sfd, &amp;si, sizeof si);
</code></pre>
<p>Now <code>SIGTERM</code> is delivered through a file descriptor — no signal handler, no
async-signal-safety constraints.</p>
<h2 id="8-posix-message-queues-mq_open">8. POSIX message queues (<code>mq_open</code>)</h2>
<pre><code class="language-c">mqd_t mq = mq_open(&quot;/q&quot;, O_CREAT|O_RDWR, 0600, &amp;(struct mq_attr){.mq_maxmsg=8,.mq_msgsize=64});
mq_send(mq, msg, len, prio);
mq_receive(mq, buf, sizeof buf, &amp;prio);
mq_unlink(&quot;/q&quot;);
</code></pre>
<p>Kernel-managed; persistent until unlink; bounded; supports priorities. Inspect:
<code>ls /dev/mqueue/</code>.</p>
<h2 id="9-pipes-vs-sockets-vs-shm--decision-tree">9. Pipes vs sockets vs shm — decision tree</h2>
<pre><code>   &quot;I need to copy bytes between procs&quot;
       smallish (&lt; pagesize), one-way            -&gt; pipe / FIFO
       smallish, bidirectional                   -&gt; socketpair
       smallish, between unrelated procs         -&gt; AF_UNIX socket on disk
       structured w/ priorities + persistence    -&gt; mq_open
   &quot;I need to share a big buffer (no copy)&quot;
       related (fork)        -&gt; mmap(MAP_SHARED|MAP_ANONYMOUS) before fork
       unrelated processes   -&gt; shm_open + mmap, or memfd + SCM_RIGHTS
       persistent across boot-&gt; mmap a real file on disk
   &quot;I need to pass FDs&quot;
       socketpair + SCM_RIGHTS
   &quot;Just wake another thread / proc&quot;
       eventfd + poll/epoll
</code></pre>
<h2 id="10-files">10. Files</h2>
<table>

<th>Demonstrates</th>

  { name: `89. Memory Protection / Mprotect Jit`, path: `11_memory_protection/01_mprotect_jit.c`, dir: `11_memory_protection`, words: 222, mins: 1, body: `<h1 id="01_mprotect_jitc">01_mprotect_jit.c</h1>
<pre><code class="language-c">/*
 * 01_mprotect_jit.c
 * ------------------
 * A tiny &quot;JIT&quot;.  We allocate an anonymous page RW, write x86_64 machine
 * code into it, flip to RX, and call the result as a function.
 *
 * The encoded function is:
 *     int f(int a, int b) { return a + b; }
 *
 *   x86_64 SysV ABI:
 *     args:    rdi = a, rsi = b
 *     return:  rax
 *
 *   asm:
 *     mov %rdi, %rax   ; 48 89 f8     (mov rax, rdi)
 *     add %rsi, %rax   ; 48 01 f0     (add rax, rsi)
 *     ret              ; c3
 *
 *  Run with:  ./01_mprotect_jit
 */
#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;unistd.h&gt;
#include &lt;sys/mman.h&gt;
#include &lt;string.h&gt;

int main(void)
{
    long pg = sysconf(_SC_PAGESIZE);
    void *p = mmap(NULL, pg, PROT_READ | PROT_WRITE,
                   MAP_PRIVATE | MAP_ANONYMOUS, -1, 0);
    if (p == MAP_FAILED) { perror(&quot;mmap&quot;); return 1; }

    unsigned char code[] = {
        0x48, 0x89, 0xf8,       /* mov rax, rdi */
        0x48, 0x01, 0xf0,       /* add rax, rsi */
        0xc3                    /* ret           */
    };
    memcpy(p, code, sizeof code);

    /* Flip to read+execute -- W^X: never have W AND X at the same time */
    if (mprotect(p, pg, PROT_READ | PROT_EXEC) &lt; 0) { perror(&quot;mprotect&quot;); return 1; }

    int (*f)(int, int) = p;
    int r = f(3, 4);
    printf(&quot;JIT'd f(3,4) = %d\\n&quot;, r);

    munmap(p, pg);
    return 0;
}

</code></pre>` },
  { name: `90. Memory Protection / Aslr Test`, path: `11_memory_protection/02_aslr_test.c`, dir: `11_memory_protection`, words: 92, mins: 1, body: `<h1 id="02_aslr_testc">02_aslr_test.c</h1>
<pre><code class="language-c">/*
 * 02_aslr_test.c
 * ---------------
 * Print key addresses; run several times to see ASLR.
 *
 *   $ for i in 1 2 3 4 5; do ./02_aslr_test; done
 *
 * Disable per-run:    setarch $(uname -m) -R ./02_aslr_test
 * System-wide:        sudo sysctl kernel.randomize_va_space=0  (don't!)
 */
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;

  { name: `91. Memory Protection / Segfault Handler`, path: `11_memory_protection/03_segfault_handler.c`, dir: `11_memory_protection`, words: 195, mins: 1, body: `<h1 id="03_segfault_handlerc">03_segfault_handler.c</h1>
<pre><code class="language-c">/*
 * 03_segfault_handler.c
 * ----------------------
 * Install a SIGSEGV handler that runs on an alternate stack and prints the
 * fault address.  Useful for: post-mortem dumps, JIT page-fault tricks,
 * automatic recovery in some servers.
 *
 *   1. sigaltstack -- reserve a separate small stack for handlers
 *   2. sigaction with SA_ONSTACK | SA_SIGINFO
 *   3. siginfo_t-&gt;si_addr is the faulting virtual address
 *
 * Run this and watch it crash gracefully (after printing useful info).
 */
#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;signal.h&gt;
#include &lt;unistd.h&gt;
#include &lt;string.h&gt;

static char altstk[64 * 1024];

static void h(int sig, siginfo_t *si, void *uc)
{
    (void)uc;
    char msg[160];
    int n = snprintf(msg, sizeof msg,
                     &quot;[handler] signal %d at addr %p (errno=%d code=%d)\\n&quot;,
                     sig, si-&gt;si_addr, si-&gt;si_errno, si-&gt;si_code);
    int unused = write(2, msg, n);
    (void)unused;
    _exit(128 + sig);
}

int main(void)
{
    stack_t ss = { .ss_sp = altstk, .ss_size = sizeof altstk };
    sigaltstack(&amp;ss, NULL);

    struct sigaction sa = {0};
    sa.sa_sigaction = h;
    sa.sa_flags = SA_SIGINFO | SA_ONSTACK;
    sigemptyset(&amp;sa.sa_mask);
    sigaction(SIGSEGV, &amp;sa, NULL);
    sigaction(SIGBUS,  &amp;sa, NULL);

    /* Deliberately deref NULL to trigger SIGSEGV */
    printf(&quot;about to deref NULL...\\n&quot;);
    int *p = NULL;
    *p = 42;
    printf(&quot;unreachable\\n&quot;);
    return 0;
}

</code></pre>` },
