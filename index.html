  { name: `94. Memory Protection / W Xor X`, path: `11_memory_protection/06_w_xor_x.c`, dir: `11_memory_protection`, words: 164, mins: 1, body: `<h1 id="06_w_xor_xc">06_w_xor_x.c</h1>
<pre><code class="language-c">/*
 * 06_w_xor_x.c
 * -------------
 * W^X demo: try to execute a writable page.  CPU's NX bit + Linux mapping
 * combine to SIGSEGV us instantly.
 *
 * If you remove PROT_WRITE before the call (mprotect -&gt; RX) it works
 * (that's how a JIT does it).
 */
#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;unistd.h&gt;
#include &lt;sys/mman.h&gt;
#include &lt;signal.h&gt;
#include &lt;string.h&gt;

static void h(int s, siginfo_t *si, void *uc)
{
    (void)s; (void)uc;
    char m[128];
    int n = snprintf(m, sizeof m,
                     &quot;SIGSEGV: attempted to execute non-X page %p\\n&quot;,
                     si-&gt;si_addr);
    int unused = write(2, m, n);
    (void)unused;
    _exit(1);
}

int main(void)
{
    struct sigaction sa = {0};
    sa.sa_sigaction = h; sa.sa_flags = SA_SIGINFO;
    sigaction(SIGSEGV, &amp;sa, NULL);

    long pg = sysconf(_SC_PAGESIZE);
    void *p = mmap(NULL, pg, PROT_READ | PROT_WRITE,
                   MAP_PRIVATE | MAP_ANONYMOUS, -1, 0);

    /* x86_64:  ret == 0xC3 */
    *(unsigned char *)p = 0xC3;

    printf(&quot;about to call writable (NX) page %p ...\\n&quot;, p);
    ((void (*)(void))p)();   /* SIGSEGV here */
    printf(&quot;never reached\\n&quot;);
    return 0;
}

</code></pre>` },
  { name: `95. Memory Protection`, path: `11_memory_protection/README.md`, dir: `11_memory_protection`, words: 659, mins: 3, body: `<h1 id="11--memory-protection">11 — Memory Protection</h1>
<p>The 1980s ended thirty-some years ago. Memory accesses in user space are
now policed by a stack of defences:</p>
<pre><code>   +-----------------------------+
   |  ASLR (random layout)       |   makes addresses unpredictable
   +-----------------------------+
   |  NX / W^X                   |   data pages are non-executable
   +-----------------------------+
   |  stack canaries             |   detect overflow before return
   +-----------------------------+
   |  RELRO + Full RELRO         |   GOT/PLT made read-only after load
   +-----------------------------+
   |  Fortify (libc)             |   compile-time + runtime checks of
   |                             |   memcpy, sprintf, ...
   +-----------------------------+
   |  PIE                        |   executable's own base also randomised
   +-----------------------------+
   |  Sanitizers (ASan/UBSan/    |   developer tools; not production
   |  MSan/TSan)                 |
   +-----------------------------+
</code></pre>
<p>This section explains each one and shows how to use it (or break it for
testing).</p>
<h2 id="1-mprotect-revisited">1. <code>mprotect</code> revisited</h2>
<p>We&rsquo;ve used it for guard pages. It changes the perm bits in the PTE for the
requested range.</p>
<pre><code class="language-c">mprotect(addr, len, PROT_READ);                 // RO
mprotect(addr, len, PROT_READ|PROT_WRITE);      // RW
mprotect(addr, len, PROT_READ|PROT_EXEC);       // RX (JIT)
mprotect(addr, len, PROT_NONE);                 // no access (guard)
</code></pre>
<p>Requirements:</p>
<ul>
<li><code>addr</code> must be page-aligned.</li>
<li><code>len</code> is rounded up.</li>
<li>Removing all perms doesn&rsquo;t unmap, just makes the pages inaccessible until
  you change them back.</li>
</ul>
<h2 id="2-nx--wx--dep">2. NX / W^X / DEP</h2>
<p>The CPU&rsquo;s NX bit (bit 63 of PTE) marks pages non-executable. Any
fetch-as-instruction from such a page raises <code>#PF</code>.</p>
<pre><code>   ROP attack tries: jmp into a writable buffer  -&gt; trap.
   Old worms put shellcode on the stack and jumped to it; NX defeats that.
</code></pre>
<p>Linux respects the NX bit when it&rsquo;s available; the ELF <code>GNU_STACK</code> segment
flags decide whether the stack is X. By default it&rsquo;s <code>RW</code>, no <code>X</code> —
&ldquo;executable stack&rdquo; requires explicit linker flags (<code>-z execstack</code>) and is
visible in <code>readelf -l a.out</code>.</p>
<h2 id="3-aslr--three-levels">3. ASLR — three levels</h2>
<pre><code>   /proc/sys/kernel/randomize_va_space
     0 = off
     1 = stack, mmap, vdso randomised; heap NOT randomised
     2 = all of the above + brk-managed heap (default)
</code></pre>
<p>For ASLR to apply to your executable&rsquo;s base, it must be a <strong>PIE</strong> (compiled
with <code>-fPIE -pie</code>). Modern distros build PIE by default.</p>
<p>See <a href="02_aslr_test.c"><code>02_aslr_test.c</code></a>.</p>
<h2 id="4-stack-canaries---fstack-protector-strongall">4. Stack canaries — <code>-fstack-protector-{strong,all}</code></h2>
<p>Already covered in §03. To turn ON (default on Debian/Ubuntu/RHEL):</p>
<pre><code>   -fstack-protector-strong      -- protects functions with arrays / pointers
   -fstack-protector-all         -- protects ALL functions
   -fstack-protector-explicit    -- only functions tagged
                                    __attribute__((stack_protect))
   -fno-stack-protector          -- turn OFF (for benchmarking; not for prod)
</code></pre>
<h2 id="5-relro">5. RELRO</h2>
<p>The linker initially makes the GOT writable so the runtime can resolve
symbols lazily. Once resolution is done, <code>mprotect</code> flips it to RO. With
<strong>Full RELRO</strong> all resolution is forced at load time and the GOT is RO
ever after.</p>
<p>Build:</p>
<pre><code>   -Wl,-z,relro          partial RELRO
   -Wl,-z,relro,-z,now   full RELRO (no lazy binding)
</code></pre>
<p>Check: <code>checksec --file=./a.out</code>.</p>
<h2 id="6-fortify-source-_fortify_source">6. Fortify Source (<code>_FORTIFY_SOURCE</code>)</h2>
<p>A glibc + compiler feature that replaces variants of <code>memcpy</code>, <code>strcpy</code>,
<code>sprintf</code>, etc. with versions that take a &ldquo;destination size&rdquo; argument.</p>
<pre><code class="language-c">char buf[16];
strcpy(buf, &quot;this string is much too long&quot;); // _FORTIFY_SOURCE catches it
*** buffer overflow detected ***: terminated
Aborted
</code></pre>
<p>Compile with <code>-D_FORTIFY_SOURCE=2 -O2</code> (most distros enable this by default).</p>
<h2 id="7-sigaltstack--handle-signals-when-the-stack-is-sick">7. Sigaltstack — handle signals when the stack is sick</h2>
<p>If you <code>SIGSEGV</code> because your stack is broken, the default signal handler
runs on the <em>same</em> broken stack — and dies. Solution:</p>
<pre><code class="language-c">static char altstk[SIGSTKSZ];
stack_t ss = { .ss_sp = altstk, .ss_size = sizeof altstk };
sigaltstack(&amp;ss, NULL);

struct sigaction sa = {0};
sa.sa_sigaction = h;
sa.sa_flags = SA_SIGINFO | SA_ONSTACK;
sigaction(SIGSEGV, &amp;sa, NULL);
</code></pre>
<p>Now <code>h</code> runs on <code>altstk</code>, far from the corrupted stack.</p>
<h2 id="8-building-hard-recommended-flags">8. Building hard, recommended flags</h2>
<pre><code class="language-bash">gcc -O2 -g -D_FORTIFY_SOURCE=2 \\
    -fstack-protector-strong \\
    -fstack-clash-protection \\
    -fcf-protection=full \\
    -fPIE -pie \\
    -Wl,-z,relro,-z,now,-z,noexecstack,-z,separate-code \\
    prog.c -o prog
</code></pre>
<p>Compare with <code>checksec</code>:</p>
<pre><code>   Stack:    Canary found
   NX:       NX enabled
   PIE:      PIE enabled
   RELRO:    Full RELRO
   Fortify:  Yes
</code></pre>
<h2 id="9-files">9. Files</h2>
<table>
<thead>
<tr>
<th>File</th>
<th>Demonstrates</th>
</tr>
</thead>
<tbody>

</tr>
<tr>
<td><a href="02_aslr_test.c"><code>02_aslr_test.c</code></a></td>
<td>Print addresses; run several times to see randomness</td>
</tr>
<tr>
<td><a href="03_segfault_handler.c"><code>03_segfault_handler.c</code></a></td>
<td><code>SIGSEGV</code> handler on alternate stack</td>
</tr>
<tr>
<td><a href="04_canary_demo.c"><code>04_canary_demo.c</code></a></td>
<td>Overflow triggers <code>__stack_chk_fail</code></td>
</tr>
<tr>

<td>Fortify catches a too-long <code>strcpy</code></td>

  { name: `96. Debugging Tools / Proc Maps Dump`, path: `12_debugging_tools/01_proc_maps_dump.c`, dir: `12_debugging_tools`, words: 139, mins: 1, body: `<h1 id="01_proc_maps_dumpc">01_proc_maps_dump.c</h1>
<pre><code class="language-c">/*
 * 01_proc_maps_dump.c
 * --------------------
 * Pretty-print /proc/self/maps with totals.
 */
#include &lt;stdio.h&gt;
#include &lt;string.h&gt;

int main(void)
{
    FILE *f = fopen(&quot;/proc/self/maps&quot;, &quot;r&quot;);
    char line[512];
    unsigned long total = 0;
    printf(&quot;%-30s %-5s %-10s  %-25s  %-10s\\n&quot;,
           &quot;range&quot;, &quot;perm&quot;, &quot;size(KiB)&quot;, &quot;path&quot;, &quot;kind&quot;);
    while (fgets(line, sizeof line, f)) {
        unsigned long a, b; char perm[6], dev[8]; unsigned long off, inode;
        char path[256] = &quot;&quot;;
        int n = sscanf(line, &quot;%lx-%lx %5s %lx %7s %lu %255[^\\n]&quot;,
                       &amp;a, &amp;b, perm, &amp;off, dev, &amp;inode, path);
        if (n &lt; 6) continue;
        const char *kind = path[0] == '[' ? path
                         : path[0] == 0   ? &quot;(anon)&quot;
                         : &quot;file&quot;;
        printf(&quot;%012lx-%012lx %-5s %10lu  %-25.25s  %-10s\\n&quot;,
               a, b, perm, (b - a) &gt;&gt; 10, path, kind);
        total += (b - a);
    }
    fclose(f);
    printf(&quot;VSZ total = %lu KiB (%lu MiB)\\n&quot;, total &gt;&gt; 10, total &gt;&gt; 20);
    return 0;
}

</code></pre>` },
  { name: `97. Debugging Tools / Proc Smaps`, path: `12_debugging_tools/02_proc_smaps.c`, dir: `12_debugging_tools`, words: 204, mins: 1, body: `<h1 id="02_proc_smapsc">02_proc_smaps.c</h1>
<pre><code class="language-c">/*
 * 02_proc_smaps.c
 * ----------------
 * Aggregate RSS / PSS / Swap across all VMAs.
 *
 *   RSS  = resident set size (shared pages counted in full per process)
 *   PSS  = proportional set size (shared pages divided by # users)
 *   USS  = unique set size (private pages only)
 *
 *   PSS is the closest thing to &quot;honest&quot; memory usage on shared systems.
 */
#include &lt;stdio.h&gt;
#include &lt;string.h&gt;

int main(void)
{
    FILE *f = fopen(&quot;/proc/self/smaps&quot;, &quot;r&quot;);
    char line[512];
    long rss = 0, pss = 0, swap = 0, priv_dirty = 0, priv_clean = 0;
    while (fgets(line, sizeof line, f)) {
        long v;
        if (sscanf(line, &quot;Rss: %ld kB&quot;, &amp;v) == 1) rss += v;
        else if (sscanf(line, &quot;Pss: %ld kB&quot;, &amp;v) == 1) pss += v;
        else if (sscanf(line, &quot;Swap: %ld kB&quot;, &amp;v) == 1) swap += v;
        else if (sscanf(line, &quot;Private_Dirty: %ld kB&quot;, &amp;v) == 1) priv_dirty += v;
        else if (sscanf(line, &quot;Private_Clean: %ld kB&quot;, &amp;v) == 1) priv_clean += v;
    }
    fclose(f);
    printf(&quot;RSS           = %8ld KiB\\n&quot;, rss);
    printf(&quot;PSS           = %8ld KiB  (your fair share)\\n&quot;, pss);
    printf(&quot;Swap          = %8ld KiB\\n&quot;, swap);
    printf(&quot;Private_Dirty = %8ld KiB  (would survive across exec)\\n&quot;, priv_dirty);
    printf(&quot;Private_Clean = %8ld KiB  (can be dropped freely)\\n&quot;, priv_clean);
    return 0;
}

</code></pre>` },
  { name: `98. Debugging Tools / Status Summary`, path: `12_debugging_tools/03_status_summary.c`, dir: `12_debugging_tools`, words: 176, mins: 1, body: `<h1 id="03_status_summaryc">03_status_summary.c</h1>
<pre><code class="language-c">/*
 * 03_status_summary.c
 * --------------------
 * Print the Vm* fields from /proc/self/status with explanations.
 */
#include &lt;stdio.h&gt;
#include &lt;string.h&gt;

struct entry { const char *key; const char *desc; };
static struct entry e[] = {
    { &quot;VmPeak:&quot;,  &quot;peak VSZ since exec&quot;          },
    { &quot;VmSize:&quot;,  &quot;current VSZ (sum of VMAs)&quot;    },
    { &quot;VmLck:&quot;,   &quot;mlocked&quot;                      },
    { &quot;VmHWM:&quot;,   &quot;peak RSS since exec&quot;          },
    { &quot;VmRSS:&quot;,   &quot;current resident set&quot;         },
    { &quot;RssAnon:&quot;, &quot;anon resident&quot;                },
    { &quot;RssFile:&quot;, &quot;file-backed resident&quot;         },
    { &quot;RssShmem:&quot;,&quot;shmem resident&quot;               },
    { &quot;VmData:&quot;,  &quot;data segments (heap + bss)&quot;   },
    { &quot;VmStk:&quot;,   &quot;main thread stack&quot;            },
    { &quot;VmExe:&quot;,   &quot;text&quot;                         },
    { &quot;VmLib:&quot;,   &quot;shared libraries (text only)&quot; },
    { &quot;VmPTE:&quot;,   &quot;page tables themselves&quot;       },
    { &quot;VmSwap:&quot;,  &quot;in swap&quot;                      },
    { &quot;Threads:&quot;, &quot;thread count&quot;                 },
};

int main(void)
{
    FILE *f = fopen(&quot;/proc/self/status&quot;, &quot;r&quot;);
    char line[256];
    while (fgets(line, sizeof line, f)) {
        for (size_t i = 0; i &lt; sizeof e / sizeof *e; ++i) {
            if (!strncmp(line, e[i].key, strlen(e[i].key))) {
                line[strcspn(line, &quot;\\n&quot;)] = 0;
                printf(&quot;  %-40s  -- %s\\n&quot;, line, e[i].desc);
            }
        }
    }
    fclose(f);
    return 0;
}

</code></pre>` },
  { name: `99. Debugging Tools / Getrusage Demo`, path: `12_debugging_tools/04_getrusage_demo.c`, dir: `12_debugging_tools`, words: 125, mins: 1, body: `<h1 id="04_getrusage_democ">04_getrusage_demo.c</h1>
<pre><code class="language-c">/*
 * 04_getrusage_demo.c
 * --------------------
 * Drive a small workload (malloc + memset of 256 MiB) and print before/after
 * rusage so you can see ru_maxrss climb and ru_minflt count up.
 */
#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;string.h&gt;
#include &lt;sys/resource.h&gt;

static void show(const char *t)
{
    struct rusage r; getrusage(RUSAGE_SELF, &amp;r);
    printf(&quot;[%-15s] maxrss=%-8ld KiB  minflt=%-8ld majflt=%ld   utime=%ld.%06lds\\n&quot;,
           t, r.ru_maxrss, r.ru_minflt, r.ru_majflt,
           (long)r.ru_utime.tv_sec, (long)r.ru_utime.tv_usec);
}

int main(void)
{
    show(&quot;start&quot;);

    size_t n = 256UL &lt;&lt; 20;
    char *p = malloc(n);
    memset(p, 1, n);
    show(&quot;after 256M&quot;);

    /* hot loop -- run up some utime */
    volatile long s = 0;
    for (long i = 0; i &lt; (long)(n / 64); ++i) s += p[i * 64];
    show(&quot;after sweep&quot;);
    (void)s;

    free(p);
    show(&quot;after free&quot;);
    return 0;
}

</code></pre>` },
  { name: `100. Debugging Tools / Mallinfo Dump`, path: `12_debugging_tools/05_mallinfo_dump.c`, dir: `12_debugging_tools`, words: 108, mins: 1, body: `<h1 id="05_mallinfo_dumpc">05_mallinfo_dump.c</h1>

    printf(&quot;\\n=== malloc_stats() to stderr ===\\n&quot;);

    printf(&quot;\\n=== malloc_info() to stderr ===\\n&quot;);

    for (int i = 0; i &lt; N; ++i) free(p[i]);

  { name: `101. Debugging Tools`, path: `12_debugging_tools/README.md`, dir: `12_debugging_tools`, words: 616, mins: 3, body: `<h1 id="12--debugging--observation">12 — Debugging &amp; Observation</h1>
<p>You now know the theory. This section is the toolbox: how to <em>look</em> at a
running process&rsquo;s memory, how to make a problem reproducible, and which tool
to reach for first.</p>
<pre><code>   What do I want to know?           Reach for...
   -------------------------         -------------
   &quot;Where do my pages live?&quot;         /proc/self/maps, smaps
   &quot;How much RAM am I using?&quot;        /proc/self/status, getrusage
   &quot;Is malloc behaving?&quot;             mallinfo2, malloc_stats, malloc_info
   &quot;What syscalls am I making?&quot;      strace -e trace=memory ./prog
   &quot;Memory leak / heap bug?&quot;         valgrind --tool=memcheck, ASan
   &quot;Where is the heap growing?&quot;      valgrind --tool=massif + ms_print
   &quot;Cache misses? branch mispred?&quot;   perf stat -e cache-misses,branch-misses
   &quot;Stack &amp; symbols at crash?&quot;       gdb, addr2line, eu-stack, coredumpctl
   &quot;Threads stuck?&quot;                  gdb thread apply all bt
</code></pre>
<h2 id="1-procself--the-kernel-telling-on-you">1. <code>/proc/self</code> — the kernel telling on you</h2>
<table>
<thead>
<tr>
<th>File</th>
<th>What</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>maps</code></td>
<td>every VMA, in human form (start-end perms offset dev:inode path)</td>
</tr>
<tr>
<td><code>smaps</code></td>
<td>per-VMA detailed accounting — Rss, Pss, Swap, &hellip;</td>
</tr>
<tr>
<td><code>smaps_rollup</code></td>
<td>sum across all VMAs (5.0+)</td>
</tr>
<tr>
<td><code>status</code></td>
<td>one-line-per-field VmSize, VmRSS, Vm{Data,Stk,Exe,Lib}, threads</td>
</tr>
<tr>
<td><code>stat</code></td>
<td>compact single-line (parseable) version of the above</td>
</tr>
<tr>
<td><code>statm</code></td>
<td>size, resident, share, text, lib, data, dt — all in pages</td>
</tr>
<tr>
<td><code>cmdline</code></td>
<td>NUL-separated argv</td>
</tr>
<tr>
<td><code>environ</code></td>
<td>NUL-separated env</td>
</tr>
<tr>
<td><code>limits</code></td>
<td>rlimits in human form</td>
</tr>
<tr>
<td><code>cgroup</code></td>
<td>cgroup memberships</td>
</tr>
<tr>
<td><code>fd/</code></td>
<td>each open fd as a symlink</td>
</tr>
<tr>
<td><code>task/&lt;tid&gt;/...</code></td>
<td>per-thread mirror of everything above</td>
</tr>
</tbody>
</table>
<h3 id="useful-one-liners">Useful one-liners</h3>
<pre><code class="language-bash"># what's eating my RAM?
awk '/^Pss:/{p+=$2} END{print p,&quot;KiB&quot;}' /proc/&lt;pid&gt;/smaps

# how many private dirty bytes do I have?
awk '/^Private_Dirty:/{p+=$2} END{print p,&quot;KiB&quot;}' /proc/&lt;pid&gt;/smaps

# which library is biggest in my process?
sort -k3n /proc/&lt;pid&gt;/smaps | head -50
</code></pre>
<h2 id="2-getrusage">2. <code>getrusage</code></h2>
<pre><code class="language-c">struct rusage r;
getrusage(RUSAGE_SELF, &amp;r);

r.ru_utime / r.ru_stime    // CPU user/sys time
r.ru_maxrss                // peak RSS in KiB
r.ru_minflt                // minor faults
r.ru_majflt                // major faults
r.ru_inblock / r.ru_oublock// block I/O
r.ru_nvcsw  / r.ru_nivcsw  // voluntary / involuntary context switches
</code></pre>
<p><code>time -v ./prog</code> (the <em>GNU</em> time, not the shell built-in) prints this nicely.</p>
<h2 id="3-mallinfo2-and-friends">3. <code>mallinfo2</code> and friends</h2>
<pre><code class="language-c">#include &lt;malloc.h&gt;
struct mallinfo2 mi = mallinfo2();
malloc_stats();           // stderr dump per arena
char *xml; size_t len;
malloc_info(0, fmemopen ?: stderr);   // detailed XML dump
malloc_trim(0);
</code></pre>
<h2 id="4-strace-recipes">4. <code>strace</code> recipes</h2>
<pre><code class="language-bash">strace -f -e trace=memory ./prog 2&gt;&amp;1 | grep -E 'mmap|brk|munmap|mprotect'
strace -f -e trace=signal ./prog
strace -f -c ./prog       # summary of syscalls
strace -p &lt;pid&gt;           # attach
</code></pre>
<h2 id="5-valgrind">5. <code>valgrind</code></h2>
<pre><code class="language-bash">valgrind --tool=memcheck --leak-check=full --show-leak-kinds=all ./prog
valgrind --tool=massif ./prog &amp;&amp; ms_print massif.out.&lt;pid&gt;
valgrind --tool=cachegrind ./prog
valgrind --tool=helgrind ./prog     # race detector (alternative to TSan)
</code></pre>
<p>Valgrind makes the program 10-100x slower but reports almost every memory
sin imaginable. For production-speed checking use ASan/TSan/UBSan (compile-
time instrumentation).</p>
<h2 id="6-perf">6. <code>perf</code></h2>
<pre><code class="language-bash">perf stat -e cycles,instructions,page-faults,minor-faults,major-faults,\\
cache-references,cache-misses,branch-misses ./prog

perf record -F 99 -g ./prog          # CPU profile with callstacks
perf report

perf trace -p &lt;pid&gt;                  # cheap strace alternative

perf stat -e dTLB-load-misses ./prog # TLB pressure
</code></pre>
<h2 id="7-gdb-cheatsheet">7. <code>gdb</code> cheatsheet</h2>
<pre><code>gdb ./prog
(gdb) run [args]
(gdb) bt                    # backtrace
(gdb) thread apply all bt   # backtraces for every thread
(gdb) info proc mappings    # equivalent to /proc/&lt;pid&gt;/maps
(gdb) info threads
(gdb) print/x  *(unsigned long*)0x7fff...
(gdb) x/16xb   0x7fff...
(gdb) watch *(int*)0xADDR
(gdb) catch syscall mmap
(gdb) run
</code></pre>
<p>For a core dump:</p>
<pre><code class="language-bash">ulimit -c unlimited
./prog          # crashes; coredumpctl info / gdb -c core.&lt;pid&gt;
</code></pre>
<h2 id="8-asan--ubsan--tsan--msan">8. ASan / UBSan / TSan / MSan</h2>
<table>
<thead>
<tr>
<th>Sanitizer</th>
<th>What it detects</th>
<th>Flag</th>
</tr>
</thead>
<tbody>
<tr>
<td>ASan</td>
<td>heap/stack/global overflow, UAF, double-free</td>
<td><code>-fsanitize=address</code></td>
</tr>
<tr>
<td>UBSan</td>
<td>undefined behaviour (alignment, overflow, etc.)</td>
<td><code>-fsanitize=undefined</code></td>
</tr>
<tr>
<td>TSan</td>
<td>data races, deadlocks</td>
<td><code>-fsanitize=thread</code></td>
</tr>
<tr>
<td>MSan</td>
<td>uses of uninitialised memory (Clang only)</td>
<td><code>-fsanitize=memory</code></td>
</tr>
<tr>
<td>LSan</td>
<td>leaks (subset of ASan)</td>
<td><code>-fsanitize=leak</code></td>
</tr>
<tr>
<td>HWASan</td>
<td>ASan with hw tagging (ARM64)</td>
<td><code>-fsanitize=hwaddress</code></td>
</tr>
<tr>
<td>MTE</td>
<td>hardware tag-based on ARMv8.5+</td>
<td>(Android NDK)</td>
</tr>

<p>All require <code>-O1+ -g</code>. Always rebuild dependencies; sanitizers don&rsquo;t compose
across libs not built with them.</p>

  { name: `102. Advanced / Thp Madvise`, path: `13_advanced/01_thp_madvise.c`, dir: `13_advanced`, words: 195, mins: 1, body: `<h1 id="01_thp_madvisec">01_thp_madvise.c</h1>
<pre><code class="language-c">/*
 * 01_thp_madvise.c
 * -----------------
 * Allocate 64 MiB, hint MADV_HUGEPAGE, touch the pages, and read
 * /proc/self/smaps to see &quot;AnonHugePages: ...&quot; for our VMA.
 *
 *   khugepaged works in the background; the promotion may not happen
 *   immediately.  Re-run after a few seconds if you don't see it yet.
 */
#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;unistd.h&gt;
#include &lt;sys/mman.h&gt;
#include &lt;string.h&gt;

int main(void)
{
    size_t len = 64UL &lt;&lt; 20;
    void *p = mmap(NULL, len, PROT_READ | PROT_WRITE,
                   MAP_PRIVATE | MAP_ANONYMOUS, -1, 0);
    if (p == MAP_FAILED) { perror(&quot;mmap&quot;); return 1; }

    if (madvise(p, len, MADV_HUGEPAGE) &lt; 0) perror(&quot;madvise(HUGEPAGE)&quot;);
    memset(p, 0x41, len);

    /* Wait a few seconds for khugepaged */
    sleep(3);

    /* Locate the VMA in smaps */
    char our[64]; snprintf(our, sizeof our, &quot;%lx-%lx&quot;, (unsigned long)p,
                           (unsigned long)((char *)p + len));
    FILE *f = fopen(&quot;/proc/self/smaps&quot;, &quot;r&quot;);
    char line[512]; int in_ours = 0;
    while (fgets(line, sizeof line, f)) {
        if (strstr(line, our)) in_ours = 1;
        if (in_ours) {
            fputs(line, stdout);
            if (line[0] != ' ' &amp;&amp; strchr(line, '-') == NULL &amp;&amp; in_ours)
                /* hit next VMA */
                break;
            if (strncmp(line, &quot;VmFlags:&quot;, 8) == 0) break;
        }
    }
    fclose(f);

    munmap(p, len);
    return 0;
}

</code></pre>` },
  { name: `103. Advanced / Hugetlb Mmap`, path: `13_advanced/02_hugetlb_mmap.c`, dir: `13_advanced`, words: 130, mins: 1, body: `<h1 id="02_hugetlb_mmapc">02_hugetlb_mmap.c</h1>
<pre><code class="language-c">/*
 * 02_hugetlb_mmap.c
 * ------------------
 * Allocate a 2 MiB hugepage with mmap.  Prerequisites:
 *
 *   sudo sh -c 'echo 64 &gt; /proc/sys/vm/nr_hugepages'
 *   cat /proc/meminfo | grep HugePages
 *
 *   MAP_HUGETLB|MAP_HUGE_2MB asks for a 2 MiB page.
 */
#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;unistd.h&gt;
#include &lt;sys/mman.h&gt;
#include &lt;string.h&gt;

#ifndef MAP_HUGE_2MB
#define MAP_HUGE_2MB (21 &lt;&lt; MAP_HUGE_SHIFT)
#endif

int main(void)
{
    size_t len = 2UL &lt;&lt; 20; /* one 2 MiB huge page */
    void *p = mmap(NULL, len, PROT_READ | PROT_WRITE,
                   MAP_PRIVATE | MAP_ANONYMOUS | MAP_HUGETLB | MAP_HUGE_2MB,
                   -1, 0);
    if (p == MAP_FAILED) { perror(&quot;mmap(HUGETLB) -- need nr_hugepages&gt;0&quot;); return 1; }

    memset(p, 0x42, len);
    printf(&quot;got 2 MiB huge page @ %p\\n&quot;, p);

    /* one TLB entry covers all of \`p\` */
    munmap(p, len);
    return 0;
}

</code></pre>` },
  { name: `104. Advanced / Userfaultfd`, path: `13_advanced/03_userfaultfd.c`, dir: `13_advanced`, words: 396, mins: 2, body: `<h1 id="03_userfaultfdc">03_userfaultfd.c</h1>
<pre><code class="language-c">/*
 * 03_userfaultfd.c
 * -----------------
 * Userfaultfd: register a region; a worker thread receives page-fault
 * messages and fills pages on demand from user space.
 *
 *   1. addr = mmap(NULL, sz, ANON|PRIVATE) -- reserved but unfilled
 *   2. ufd = userfaultfd()
 *   3. ioctl(UFFDIO_API)
 *   4. ioctl(UFFDIO_REGISTER, MODE_MISSING)
 *   5. thread: for (;;) read(ufd, &amp;msg)
 *                     ioctl(UFFDIO_COPY, src=our buf, dst=fault addr)
 *   6. main: write to addr -&gt; faults trapped to ufd handler, filled with our content.
 *
 * vm.unprivileged_userfaultfd may need to be 1 (Linux 5.11+) or run as root.
 */
#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;unistd.h&gt;
#include &lt;sys/mman.h&gt;
#include &lt;sys/syscall.h&gt;
#include &lt;sys/ioctl.h&gt;
#include &lt;linux/userfaultfd.h&gt;
#include &lt;pthread.h&gt;
#include &lt;string.h&gt;
#include &lt;stdint.h&gt;
#include &lt;fcntl.h&gt;
#include &lt;poll.h&gt;
#include &lt;errno.h&gt;

static int ufd;
static char *base;
static size_t reg_len;
static long pg;

static void *fault_thread(void *arg)
{
    (void)arg;
    char fillbuf[1 &lt;&lt; 16];
    memset(fillbuf, 'U', sizeof fillbuf); /* our magic byte */
    struct pollfd p = { .fd = ufd, .events = POLLIN };

    for (;;) {
        if (poll(&amp;p, 1, -1) &lt; 0) { if (errno == EINTR) continue; perror(&quot;poll&quot;); break; }
        struct uffd_msg msg;
        ssize_t n = read(ufd, &amp;msg, sizeof msg);
        if (n != sizeof msg) break;
        if (msg.event != UFFD_EVENT_PAGEFAULT) continue;

        uintptr_t fa = (uintptr_t)msg.arg.pagefault.address &amp; ~(pg - 1);
        struct uffdio_copy c = {
            .src = (uintptr_t)fillbuf,
            .dst = fa,
            .len = pg,
            .mode = 0
        };
        if (ioctl(ufd, UFFDIO_COPY, &amp;c) &lt; 0) { perror(&quot;UFFDIO_COPY&quot;); break; }
        printf(&quot;[uffd] satisfied fault @ %p with 'U' fill\\n&quot;, (void *)fa);
    }
    return NULL;
}

int main(void)
{
    pg = sysconf(_SC_PAGESIZE);
    ufd = syscall(SYS_userfaultfd, O_CLOEXEC | O_NONBLOCK);
    if (ufd &lt; 0) { perror(&quot;userfaultfd&quot;); return 1; }

    struct uffdio_api api = { .api = UFFD_API };
    if (ioctl(ufd, UFFDIO_API, &amp;api) &lt; 0) { perror(&quot;UFFDIO_API&quot;); return 1; }

    reg_len = 4 * pg;
    base = mmap(NULL, reg_len, PROT_READ | PROT_WRITE,
                MAP_PRIVATE | MAP_ANONYMOUS, -1, 0);
    if (base == MAP_FAILED) { perror(&quot;mmap&quot;); return 1; }

    struct uffdio_register reg = {
        .range = { .start = (uintptr_t)base, .len = reg_len },
        .mode  = UFFDIO_REGISTER_MODE_MISSING
    };
    if (ioctl(ufd, UFFDIO_REGISTER, &amp;reg) &lt; 0) { perror(&quot;UFFDIO_REGISTER&quot;); return 1; }

    pthread_t t; pthread_create(&amp;t, NULL, fault_thread, NULL);

    /* trigger faults */
    for (size_t off = 0; off &lt; reg_len; off += pg) {
        printf(&quot;[main] reading first byte of page %zu  ...\\n&quot;, off / pg);
        printf(&quot;[main] got 0x%02x\\n&quot;, (unsigned char)base[off]);
    }
    munmap(base, reg_len);
    close(ufd);
    return 0;
}

</code></pre>` },

<pre><code class="language-c">/*
 * 04_numa_inspect.c
 * ------------------
 * Cat /proc/self/numa_maps to see which NUMA node each VMA's pages are

#include &lt;stdio.h&gt;

  { name: `106. Advanced / Ksm Demo`, path: `13_advanced/05_ksm_demo.c`, dir: `13_advanced`, words: 153, mins: 1, body: `<h1 id="05_ksm_democ">05_ksm_demo.c</h1>
<pre><code class="language-c">/*
 * 05_ksm_demo.c
 * --------------
 * Allocate two large identical regions and mark them MADV_MERGEABLE so the
 * KSM daemon (if enabled) deduplicates them.
 *
 *   sudo sh -c 'echo 1 &gt; /sys/kernel/mm/ksm/run'
 *   sudo cat /sys/kernel/mm/ksm/pages_shared      # before and after
 *
 * KSM scans periodically; you may have to wait a bit.
 */
#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;unistd.h&gt;
#include &lt;sys/mman.h&gt;
#include &lt;string.h&gt;

int main(void)
{
    size_t len = 64UL &lt;&lt; 20;
    char *a = mmap(NULL, len, PROT_READ | PROT_WRITE,
                   MAP_PRIVATE | MAP_ANONYMOUS, -1, 0);
    char *b = mmap(NULL, len, PROT_READ | PROT_WRITE,
                   MAP_PRIVATE | MAP_ANONYMOUS, -1, 0);
    memset(a, 0xAA, len);
    memset(b, 0xAA, len);

    if (madvise(a, len, MADV_MERGEABLE) &lt; 0) perror(&quot;madvise(MERGEABLE)&quot;);
    if (madvise(b, len, MADV_MERGEABLE) &lt; 0) perror(&quot;madvise(MERGEABLE)&quot;);

    printf(&quot;two identical 64 MiB regions allocated and marked MERGEABLE\\n&quot;);
    printf(&quot;watch:  watch -n2 cat /sys/kernel/mm/ksm/pages_shared\\n&quot;);
    printf(&quot;sleeping 30s so KSM has a chance to dedupe...\\n&quot;);
    sleep(30);

    munmap(a, len); munmap(b, len);
    return 0;
}

</code></pre>` },
  { name: `107. Advanced`, path: `13_advanced/README.md`, dir: `13_advanced`, words: 868, mins: 4, body: `<h1 id="13--advanced-topics">13 — Advanced Topics</h1>
<p>If you&rsquo;ve made it this far, the basics are solid. Here are the deeper /
newer / weirder corners of Linux memory.</p>
<h2 id="1-numa--non-uniform-memory-access">1. NUMA — Non-Uniform Memory Access</h2>
<p>Modern multi-socket servers have one or more <strong>NUMA nodes</strong> per socket; each
node has its own memory controller and &ldquo;local&rdquo; DRAM. Accessing remote DRAM
costs 1.5–2× more latency.</p>
<pre><code>   CPU socket 0                      CPU socket 1
   +------------------+              +------------------+
   |  cores 0..15     | &lt;----QPI---&gt; |  cores 16..31    |
   |  L1 / L2 / L3    |              |  L1 / L2 / L3    |
   +-----+------------+              +-----+------------+
         | local DRAM                       | local DRAM
         v                                  v
   +----------------+                +----------------+
   | NUMA node 0    |   &quot;remote&quot;     | NUMA node 1    |
   | 96 GiB         |   accesses     | 96 GiB         |
   +----------------+   over QPI     +----------------+
</code></pre>
<h3 id="inspecting">Inspecting</h3>
<pre><code class="language-bash">numactl --hardware
numactl --show
cat /proc/&lt;pid&gt;/numa_maps
</code></pre>
<h3 id="controlling-placement">Controlling placement</h3>
<pre><code class="language-bash">numactl --membind=0 --cpunodebind=0 ./prog       # pin to node 0
numactl --interleave=all ./prog                   # round-robin across nodes
</code></pre>
<p>In C use <code>libnuma</code>:</p>
<pre><code class="language-c">#include &lt;numa.h&gt;
numa_set_localalloc();         // default policy
numa_bind(numa_parse_nodestring(&quot;0&quot;));
void *p = numa_alloc_onnode(sz, 0);
</code></pre>
<p>Or syscalls:</p>
<pre><code class="language-c">mbind(addr, len, MPOL_BIND, &amp;nodemask, maxnode, 0);
move_pages(pid, count, pages, nodes, status, MPOL_MF_MOVE);
</code></pre>
<h3 id="numa-pitfalls">NUMA pitfalls</h3>
<ul>
<li>
<p><strong>First-touch policy</strong>: a page is allocated on the node of the CPU that
  first writes to it (with default policy). Initialise from the thread that
  will use the data.</p>
</li>
<li>
<p>Migrating threads across nodes after pages are placed is expensive — pin
  threads (<code>taskset</code>, <code>pthread_setaffinity_np</code>).</p>
</li>
</ul>
<h2 id="2-huge-pages">2. Huge pages</h2>
<p>Already touched in §05. Two flavours:</p>
<h3 id="transparent-huge-pages-thp">Transparent Huge Pages (THP)</h3>
<pre><code class="language-bash">cat /sys/kernel/mm/transparent_hugepage/enabled
   [always] madvise never

echo madvise &gt; /sys/kernel/mm/transparent_hugepage/enabled   # opt-in only
</code></pre>
<p>Use <code>madvise(p, len, MADV_HUGEPAGE)</code> to ask the kernel to promote your VMA
to 2 MiB pages. <code>khugepaged</code> does the merging in the background.</p>
<h3 id="explicit-hugetlb">Explicit HugeTLB</h3>
<pre><code class="language-bash"># reserve 64 huge pages (128 MiB) at boot or runtime:
echo 64 &gt; /proc/sys/vm/nr_hugepages
cat /proc/meminfo | grep -i huge
</code></pre>
<pre><code class="language-c">void *p = mmap(NULL, 2UL &lt;&lt; 20,
               PROT_READ | PROT_WRITE,
               MAP_PRIVATE | MAP_ANONYMOUS | MAP_HUGETLB | MAP_HUGE_2MB,
               -1, 0);
</code></pre>
<p>Or use <code>hugetlbfs</code>:</p>
<pre><code class="language-bash">mount -t hugetlbfs hugetlbfs /mnt/huge -o pagesize=2M
</code></pre>
<p>then <code>open("/mnt/huge/myfile")</code> and mmap it.</p>
<p>See <a href="01_thp_madvise.c"><code>01_thp_madvise.c</code></a> and
<a href="02_hugetlb_mmap.c"><code>02_hugetlb_mmap.c</code></a>.</p>
<h2 id="3-userfaultfd--user-space-page-fault-handling">3. <code>userfaultfd</code> — user-space page-fault handling</h2>
<p>Get an fd that delivers a message every time the process touches an
unmapped page in a registered range. Used by:</p>
<ul>
<li>VM live migration (post-copy)</li>
<li>Garbage collectors (read barriers)</li>
<li>Sandboxes (intercept access to virtual memory)</li>
<li>Databases (custom paging)</li>
</ul>
<p>Pseudocode:</p>
<pre><code class="language-c">int u = syscall(SYS_userfaultfd, O_CLOEXEC | O_NONBLOCK);
struct uffdio_api api = { .api = UFFD_API, .features = 0 };
ioctl(u, UFFDIO_API, &amp;api);
struct uffdio_register reg = { .range = { .start = addr, .len = sz },
                                .mode = UFFDIO_REGISTER_MODE_MISSING };
ioctl(u, UFFDIO_REGISTER, &amp;reg);

for (;;) {
    struct uffd_msg msg;
    read(u, &amp;msg, sizeof msg);
    /* compute the page to provide, then: */
    struct uffdio_copy c = { .dst = msg.arg.pagefault.address &amp; ~0xfff,
                              .src = (uintptr_t)page,
                              .len = 4096 };
    ioctl(u, UFFDIO_COPY, &amp;c);
}
</code></pre>
<p>See <a href="03_userfaultfd.c"><code>03_userfaultfd.c</code></a> (Linux-only; needs unprivileged
mode if <code>vm.unprivileged_userfaultfd = 1</code>).</p>
<h2 id="4-memfd_create--anonymous-in-ram-files">4. <code>memfd_create</code> — anonymous in-RAM files</h2>
<p>Already in §10. Two extra superpowers:</p>
<ul>
<li><strong>F_SEAL_WRITE/F_SEAL_GROW/F_SEAL_SHRINK</strong> — once set, can never be unset.</li>
<li>Pass over <code>SCM_RIGHTS</code> so a receiver gets an fd to <em>exactly</em> the same
  pages.</li>
</ul>
<p>Use case: a sandbox can hand its parent a memfd to act as a read-only
input channel; the parent seals it after writing.</p>
<h2 id="5-io_uring--async-io-with-shared-rings">5. <code>io_uring</code> — async I/O with shared rings</h2>
<p>io_uring is a syscall family that gives userspace two mmap&rsquo;d rings (SQ and
CQ) shared with the kernel:</p>
<pre><code>   process VA                                 kernel
   +-----------------+   io_uring_setup       +-----------------+
   | SQ ring (mmap)  | &lt;--shared mapping----&gt; | sq_entries[]    |
   +-----------------+                        +-----------------+
   | CQ ring (mmap)  | &lt;--shared mapping----&gt; | cq_entries[]    |
   +-----------------+                        +-----------------+
</code></pre>
<p>You queue requests into the SQ (no syscall), tell the kernel &ldquo;go&rdquo; with
<code>io_uring_enter</code>, and harvest completions from the CQ. The same mechanism
can:</p>
<ul>
<li>read/write to fds (<code>IORING_OP_READ/WRITE</code>)</li>
<li>do <code>fsync</code>, <code>splice</code>, <code>accept</code>, <code>connect</code>, &hellip;</li>
<li>do many syscalls in one shot (<code>io_uring_enter</code>)</li>
<li>register buffers (avoid copy)</li>
<li>use <code>IORING_OP_PROVIDE_BUFFERS</code> for true zero-copy I/O</li>
</ul>
<p>It&rsquo;s not strictly a &ldquo;memory&rdquo; topic but it relies on shared-memory rings —
mmap is the basis. We don&rsquo;t include a full demo here (see
<a href="https://github.com/axboe/liburing"><code>liburing</code></a>).</p>
<h2 id="6-dax--direct-access-to-persistent-memory">6. DAX — Direct Access to persistent memory</h2>
<p>Persistent memory (Intel Optane was the classic example) can be exposed as
<code>/dev/pmem0</code> or via <code>fsdax</code>. <code>mmap(MAP_SYNC | MAP_SHARED_VALIDATE, ...)</code> on
a DAX file gives <strong>persistent stores</strong> — <code>clflushopt</code> + <code>sfence</code> is enough,
no need for <code>msync</code>.</p>
<p>Not in mainstream usage today (Optane is EOL) but the kernel mechanism
remains and is used by CXL persistent memory.</p>
<h2 id="7-mremap-magic">7. <code>mremap</code> magic</h2>
<p>Beyond simple grow/shrink, <code>mremap</code> can:</p>
<ul>
<li>
<p><strong>swap two regions</strong> of equal size with <code>MREMAP_FIXED | MREMAP_DONTUNMAP</code>
  (Linux 5.7+) — used by GCs that flip between heaps.</p>
</li>
<li>
<p><strong>move a mapping</strong> somewhere else without copying — just rewires PTEs.</p>
</li>
</ul>
<h2 id="8-kernel-same-page-merging-ksm">8. Kernel same-page merging (KSM)</h2>
<p><code>madvise(p, len, MADV_MERGEABLE)</code> registers a region with KSM, the
deduplication daemon. When two pages of two processes have identical
content, KSM merges them to a single CoW frame. Big win on KVM hosts with
many similar VMs.</p>
<pre><code class="language-bash">echo 1 &gt; /sys/kernel/mm/ksm/run
cat /sys/kernel/mm/ksm/pages_shared
</code></pre>

  { name: `108. Putting It Together / Bump`, path: `14_putting_it_together/01_bump.c`, dir: `14_putting_it_together`, words: 254, mins: 1, body: `<h1 id="01_bumpc">01_bump.c</h1>
<pre><code class="language-c">/*
 * 01_bump.c
 * ----------
 * Bump (arena) allocator.  Backing: a single mmap'd region.
 *
 *   arena layout:
 *     +-------------+
 *     | used        | &lt;-- bump pointer
 *     +-------------+
 *     | free        |
 *     +-------------+
 *
 *   alloc(sz):     return bump; bump += round_up(sz, ALIGN)
 *   reset()  :     bump = base
 *   destroy() :    munmap(base, capacity)
 */
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;stdint.h&gt;
#include &lt;sys/mman.h&gt;
#include &lt;string.h&gt;

#define ALIGN 16
#define ALIGN_UP(x) (((x) + (ALIGN - 1)) &amp; ~(ALIGN - 1))

typedef struct {
    char *base;
    char *bump;
    char *end;
} Arena;

static int arena_init(Arena *a, size_t cap)
{
    a-&gt;base = mmap(NULL, cap, PROT_READ | PROT_WRITE,
                   MAP_PRIVATE | MAP_ANONYMOUS, -1, 0);
    if (a-&gt;base == MAP_FAILED) return -1;
    a-&gt;bump = a-&gt;base;
    a-&gt;end  = a-&gt;base + cap;
    return 0;
}

static void *arena_alloc(Arena *a, size_t sz)
{
    sz = ALIGN_UP(sz);
    if (a-&gt;bump + sz &gt; a-&gt;end) return NULL;
    void *p = a-&gt;bump;
    a-&gt;bump += sz;
    return p;
}

static void arena_reset(Arena *a)   { a-&gt;bump = a-&gt;base; }
static void arena_destroy(Arena *a) { munmap(a-&gt;base, a-&gt;end - a-&gt;base); }

/* demo */
int main(void)
{
    Arena a;
    arena_init(&amp;a, 4 * 1024 * 1024);

    char *s1 = arena_alloc(&amp;a, 13);    strcpy(s1, &quot;hello world!&quot;);
    char *s2 = arena_alloc(&amp;a, 100);   memset(s2, 'B', 100); s2[99] = 0;
    int  *ai = arena_alloc(&amp;a, 1000 * sizeof(int));
    for (int i = 0; i &lt; 1000; ++i) ai[i] = i;

    printf(&quot;s1=%p \\&quot;%s\\&quot;\\n&quot;, s1, s1);
    printf(&quot;s2=%p (%c..%c)\\n&quot;, s2, s2[0], s2[98]);
    printf(&quot;ai[999]=%d  used=%ld bytes\\n&quot;, ai[999],
           (long)(a.bump - a.base));

    arena_reset(&amp;a);
    printf(&quot;after reset: used=%ld\\n&quot;, (long)(a.bump - a.base));

    arena_destroy(&amp;a);
    return 0;
}

</code></pre>` },
  { name: `109. Putting It Together / Pool`, path: `14_putting_it_together/02_pool.c`, dir: `14_putting_it_together`, words: 314, mins: 2, body: `<h1 id="02_poolc">02_pool.c</h1>
<pre><code class="language-c">/*
 * 02_pool.c
 * ----------
 * Fixed-size pool / object freelist.  Each slot is exactly OBJ_SZ bytes.
 *
 *   When a slot is FREE we re-use the slot itself to store the freelist
 *   &quot;next&quot; pointer.  This gives us zero per-object metadata.
 *
 *   alloc:    if (head) p = head; head = head-&gt;next; return p
 *   free(p):  p-&gt;next = head; head = p
 *   both O(1).
 */
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;stdint.h&gt;
#include &lt;string.h&gt;
#include &lt;sys/mman.h&gt;

typedef struct Node { struct Node *next; } Node;

typedef struct {
    char *base;
    size_t obj_sz;
    size_t cap;
    Node *free_head;
} Pool;

static int pool_init(Pool *p, size_t obj_sz, size_t n)
{
    if (obj_sz &lt; sizeof(Node)) obj_sz = sizeof(Node);
    p-&gt;obj_sz = obj_sz;
    p-&gt;cap    = n;
    p-&gt;base = mmap(NULL, obj_sz * n, PROT_READ | PROT_WRITE,
                   MAP_PRIVATE | MAP_ANONYMOUS, -1, 0);
    if (p-&gt;base == MAP_FAILED) return -1;

    /* thread the freelist through all slots */
    p-&gt;free_head = NULL;
    for (size_t i = 0; i &lt; n; ++i) {
        Node *node = (Node *)(p-&gt;base + i * obj_sz);
        node-&gt;next = p-&gt;free_head;
        p-&gt;free_head = node;
    }
    return 0;
}

static void *pool_alloc(Pool *p)
{
    if (!p-&gt;free_head) return NULL;
    Node *n = p-&gt;free_head;
    p-&gt;free_head = n-&gt;next;
    return n;
}

static void pool_free(Pool *p, void *q)
{
    Node *n = q;
    n-&gt;next = p-&gt;free_head;
    p-&gt;free_head = n;
}

static void pool_destroy(Pool *p) { munmap(p-&gt;base, p-&gt;obj_sz * p-&gt;cap); }

/* demo */
typedef struct { int id; char name[28]; } Obj;

int main(void)
{
    Pool p;
    pool_init(&amp;p, sizeof(Obj), 1024);

    Obj *a = pool_alloc(&amp;p);
    Obj *b = pool_alloc(&amp;p);
    a-&gt;id = 1; snprintf(a-&gt;name, sizeof a-&gt;name, &quot;alpha&quot;);
    b-&gt;id = 2; snprintf(b-&gt;name, sizeof b-&gt;name, &quot;beta&quot;);
    printf(&quot;a=%p {%d, %s}\\n&quot;, a, a-&gt;id, a-&gt;name);
    printf(&quot;b=%p {%d, %s}\\n&quot;, b, b-&gt;id, b-&gt;name);

    pool_free(&amp;p, a);
    Obj *c = pool_alloc(&amp;p);
    printf(&quot;after free(a) + alloc -&gt; c=%p (%s)\\n&quot;, c, c == a ? &quot;got a back&quot; : &quot;different&quot;);

    pool_free(&amp;p, b);
    pool_free(&amp;p, c);
    pool_destroy(&amp;p);
    return 0;
}

</code></pre>` },
  { name: `110. Putting It Together / Slab`, path: `14_putting_it_together/03_slab.c`, dir: `14_putting_it_together`, words: 684, mins: 3, body: `<h1 id="03_slabc">03_slab.c</h1>
<pre><code class="language-c">/*
 * 03_slab.c
 * ----------
 * Bonwick-style slab allocator.
 *
 *   A &quot;cache&quot; stores objects of a fixed size, organised into &quot;slabs&quot;
 *   (regions carved into N objects + a small header).
 *
 *   cache:
 *     +-- list of all slabs -----------------------+
 *     | slab1 (some used)  -&gt; slab2 (some used)... |
 *     +--------------------------------------------+
 *     partial = head of slabs with at least one free object
 *
 *   slab:
 *     +-----------------------+
 *     | slab header (next,    |   linked in cache-&gt;all_slabs
 *     | in_use, capacity,     |   and (when partial) cache-&gt;partial
 *     | free freelist head)   |
 *     +-----------------------+
 *     | obj 0                 |   each object is OBJ_SZ bytes
 *     +-----------------------+
 *     | obj 1                 |   when free, reuses its bytes for a
 *     +-----------------------+   FreeNode-&gt;next pointer.
 *     | ... obj N             |
 *     +-----------------------+
 *
 *   alloc:
 *     - if no partial slab, create one (mmap SLAB_BYTES + init freelist).
 *     - pop a FreeNode from its freelist.
 *     - if the slab is now fully used, unlink it from cache-&gt;partial.
 *
 *   free(p):
 *     - find the owning slab by searching cache-&gt;all_slabs
 *       (in production: store slab pointer at top of object or use page
 *        alignment magic; here we keep it simple).
 *     - push p onto the slab's freelist.
 *     - if slab was full, relink into cache-&gt;partial.
 */
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;stdint.h&gt;
#include &lt;string.h&gt;
#include &lt;sys/mman.h&gt;
#include &lt;unistd.h&gt;

#define SLAB_BYTES (32 * 1024)
#define ALIGN 16

typedef struct FreeNode { struct FreeNode *next; } FreeNode;
typedef struct Slab {
    struct Slab *next_all;       /* in cache-&gt;all_slabs */
    struct Slab *next_partial;   /* in cache-&gt;partial */
    FreeNode    *free;
    int          in_use;
    int          capacity;
    char        *base;           /* first object */
    char        *end;            /* one past last object */
} Slab;

typedef struct {
    Slab  *all_slabs;
    Slab  *partial;
    size_t obj_sz;
    int    objs_per_slab;
} Cache;

static void cache_init(Cache *c, size_t obj_sz)
{
    if (obj_sz &lt; sizeof(FreeNode)) obj_sz = sizeof(FreeNode);
    obj_sz = (obj_sz + (ALIGN - 1)) &amp; ~(ALIGN - 1);
    c-&gt;obj_sz = obj_sz;
    c-&gt;all_slabs = NULL;
    c-&gt;partial   = NULL;
    int header   = (int)((sizeof(Slab) + (ALIGN - 1)) &amp; ~(ALIGN - 1));
    c-&gt;objs_per_slab = (SLAB_BYTES - header) / obj_sz;
}

static Slab *new_slab(Cache *c)
{
    void *p = mmap(NULL, SLAB_BYTES, PROT_READ | PROT_WRITE,
                   MAP_PRIVATE | MAP_ANONYMOUS, -1, 0);
    if (p == MAP_FAILED) return NULL;
    Slab *s = p;
    int header = (int)((sizeof(Slab) + (ALIGN - 1)) &amp; ~(ALIGN - 1));
    s-&gt;base = (char *)p + header;
    s-&gt;end  = s-&gt;base + c-&gt;objs_per_slab * c-&gt;obj_sz;
    s-&gt;in_use = 0;
    s-&gt;capacity = c-&gt;objs_per_slab;
    s-&gt;free = NULL;
    for (int i = 0; i &lt; c-&gt;objs_per_slab; ++i) {
        FreeNode *n = (FreeNode *)(s-&gt;base + i * c-&gt;obj_sz);
        n-&gt;next = s-&gt;free;
        s-&gt;free = n;
    }
    s-&gt;next_all = c-&gt;all_slabs;     c-&gt;all_slabs = s;
    s-&gt;next_partial = c-&gt;partial;   c-&gt;partial   = s;
    return s;
}

static void *cache_alloc(Cache *c)
{
    if (!c-&gt;partial &amp;&amp; !new_slab(c)) return NULL;
    Slab *s = c-&gt;partial;
    FreeNode *n = s-&gt;free;
    s-&gt;free = n-&gt;next;
    s-&gt;in_use++;
    if (!s-&gt;free) c-&gt;partial = s-&gt;next_partial;   /* slab is full */
    return n;
}

static void cache_free(Cache *c, void *p)
{
    Slab *s = NULL;
    for (Slab *it = c-&gt;all_slabs; it; it = it-&gt;next_all) {
        if ((char *)p &gt;= it-&gt;base &amp;&amp; (char *)p &lt; it-&gt;end) { s = it; break; }
    }
    if (!s) { fprintf(stderr, &quot;cache_free: pointer %p not from us!\\n&quot;, p); return; }

    int was_full = (s-&gt;free == NULL);
    FreeNode *n = p;
    n-&gt;next = s-&gt;free;
    s-&gt;free = n;
    s-&gt;in_use--;
    if (was_full) {
        s-&gt;next_partial = c-&gt;partial;
        c-&gt;partial      = s;
    }
}

typedef struct { int id; char name[60]; } Obj;

int main(void)
{
    Cache cc;
    cache_init(&amp;cc, sizeof(Obj));
    printf(&quot;slab=%d KiB, obj=%zu B, objs/slab=%d\\n&quot;,
           SLAB_BYTES &gt;&gt; 10, cc.obj_sz, cc.objs_per_slab);

    enum { N = 10000 };
    Obj *p[N];
    for (int i = 0; i &lt; N; ++i) p[i] = cache_alloc(&amp;cc);
    for (int i = 0; i &lt; N; ++i) p[i]-&gt;id = i;
    int sum = 0; for (int i = 0; i &lt; N; ++i) sum += p[i]-&gt;id;
    for (int i = 0; i &lt; N; ++i) cache_free(&amp;cc, p[i]);
    printf(&quot;alloc/free %d Obj OK; sum of ids = %d (expected %d)\\n&quot;,
           N, sum, (N * (N - 1)) / 2);
    return 0;
}

</code></pre>` },
  { name: `111. Putting It Together / Freelist`, path: `14_putting_it_together/04_freelist.c`, dir: `14_putting_it_together`, words: 615, mins: 3, body: `<h1 id="04_freelistc">04_freelist.c</h1>
<pre><code class="language-c">/*
 * 04_freelist.c
 * --------------
 * A minimal variable-size first-fit allocator with coalescing.  ~200 lines.
 * Educational; nowhere near production quality.
 *
 *   Layout of a chunk:
 *     +------------+
 *     |  size  | F |   size in bytes (incl header), F = free flag in low bit
 *     +------------+
 *     |  payload   |   user pointer points here
 *     |  ...       |
 *     +------------+
 *
 *   We keep a SINGLE doubly-linked free-list (no size classes).
 *
 *   alloc(n):     walk list, find first chunk with usable &gt;= n; split if leftover
 *                 is big enough; mark in-use; return payload
 *
 *   free(p):      compute header from p; mark free; coalesce with next neighbour
 *                 by inspecting the trailing chunk; coalesce with previous by
 *                 reading a footer.
 *
 *   We use boundary tags (size repeated as a footer) so coalescing is O(1).
 */
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;stdint.h&gt;
#include &lt;string.h&gt;
#include &lt;sys/mman.h&gt;

#define ALIGN 16
#define ALIGN_UP(x) (((x) + (ALIGN - 1)) &amp; ~(ALIGN - 1))

typedef struct Hdr {
    size_t size_flags;  /* low bit = free */
    struct Hdr *prev_free, *next_free;
} Hdr;
typedef struct { size_t size_flags; } Ftr;

#define HDR_SZ ALIGN_UP(sizeof(Hdr))
#define FTR_SZ ALIGN_UP(sizeof(Ftr))
#define MIN_CHUNK (HDR_SZ + ALIGN + FTR_SZ)

static char *heap_base, *heap_end;
static Hdr  *free_head;

static size_t  csz(Hdr *h)   { return h-&gt;size_flags &amp; ~1ULL; }
static int     cfree(Hdr *h) { return h-&gt;size_flags &amp; 1; }
static Ftr    *ftr_of(Hdr *h){ return (Ftr *)((char *)h + csz(h) - FTR_SZ); }
static Hdr    *next_of(Hdr *h){ return (Hdr *)((char *)h + csz(h)); }
static Hdr    *prev_of(Hdr *h){
    if ((char *)h == heap_base) return NULL;
    Ftr *pf = (Ftr *)((char *)h - FTR_SZ);
    return (Hdr *)((char *)h - (pf-&gt;size_flags &amp; ~1ULL));
}
static void    set_size(Hdr *h, size_t sz, int free){
    h-&gt;size_flags = sz | (free ? 1 : 0);
    ftr_of(h)-&gt;size_flags = h-&gt;size_flags;
}

static void fl_insert(Hdr *h)
{
    h-&gt;prev_free = NULL;
    h-&gt;next_free = free_head;
    if (free_head) free_head-&gt;prev_free = h;
    free_head = h;
}
static void fl_remove(Hdr *h)
{
    if (h-&gt;prev_free) h-&gt;prev_free-&gt;next_free = h-&gt;next_free;
    else              free_head             = h-&gt;next_free;
    if (h-&gt;next_free) h-&gt;next_free-&gt;prev_free = h-&gt;prev_free;
}

void my_init(size_t cap)
{
    cap = (cap + 4095) &amp; ~4095;
    heap_base = mmap(NULL, cap, PROT_READ | PROT_WRITE,
                     MAP_PRIVATE | MAP_ANONYMOUS, -1, 0);
    heap_end  = heap_base + cap;
    Hdr *whole = (Hdr *)heap_base;
    set_size(whole, cap, 1);
    free_head = NULL;
    fl_insert(whole);
}

void *my_malloc(size_t req)
{
    if (req == 0) return NULL;
    size_t need = ALIGN_UP(req + HDR_SZ + FTR_SZ);
    if (need &lt; MIN_CHUNK) need = MIN_CHUNK;
    for (Hdr *h = free_head; h; h = h-&gt;next_free) {
        if (csz(h) &gt;= need) {
            fl_remove(h);
            size_t leftover = csz(h) - need;
            if (leftover &gt;= MIN_CHUNK) {
                set_size(h, need, 0);
                Hdr *r = next_of(h);
                set_size(r, leftover, 1);
                fl_insert(r);
            } else {
                set_size(h, csz(h), 0);
            }
            return (char *)h + HDR_SZ;
        }
    }
    return NULL;
}

void my_free(void *p)
{
    if (!p) return;
    Hdr *h = (Hdr *)((char *)p - HDR_SZ);
    set_size(h, csz(h), 1);

    /* coalesce with next */
    Hdr *n = next_of(h);
    if ((char *)n &lt; heap_end &amp;&amp; cfree(n)) {
        fl_remove(n);

<pre><code class="language-c">/*
 * 05_buddy.c
 * -----------
 * Power-of-2 buddy allocator over a single mmap'd region of size 2^MAX_ORDER
 * pages.  Pages are 4 KiB.
 *
 *   free lists: an array of length MAX_ORDER+1; each holds linked free blocks
 *   of size (1&lt;&lt;order) * PG.
 *
 *   alloc(n):
 *     compute order o = ceil(log2(n / PG))
 *     while free[o] empty and o &lt; MAX_ORDER: o++
 *     pop block from free[o]; while o &gt; requested: split, push half on free[--o]
 *     return block
 *
 *   free(p, order):
 *     buddy = p ^ (1 &lt;&lt; order * PG_LOG2)        (bit flip)
 *     if buddy free at same order: merge, recurse
 *     else: push p on free[order]
 */
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;stdint.h&gt;
#include &lt;string.h&gt;
#include &lt;sys/mman.h&gt;

#define PG_LOG2 12        /* 4 KiB pages */
#define MIN_PG  1
#define MAX_ORDER 8       /* up to 2^8 pages = 1 MiB per allocation */
#define TOTAL_PAGES (1 &lt;&lt; MAX_ORDER)
#define ARENA_BYTES ((size_t)TOTAL_PAGES &lt;&lt; PG_LOG2)

typedef struct Block { struct Block *next; int order; } Block;

static char  *base;
static Block *fl[MAX_ORDER + 1];

static void fl_push(int o, Block *b) { b-&gt;order = o; b-&gt;next = fl[o]; fl[o] = b; }
static Block *fl_pop(int o) { Block *b = fl[o]; if (b) fl[o] = b-&gt;next; return b; }
static int   fl_remove(int o, Block *target) {
    Block **p = &amp;fl[o];
    while (*p) {
        if (*p == target) { *p = (*p)-&gt;next; return 1; }
        p = &amp;(*p)-&gt;next;
    }
    return 0;
}

void buddy_init(void)
{
    base = mmap(NULL, ARENA_BYTES, PROT_READ | PROT_WRITE,
                MAP_PRIVATE | MAP_ANONYMOUS, -1, 0);
    fl_push(MAX_ORDER, (Block *)base);
}

void *buddy_alloc(int pages)
{
    int order = 0; int sz = 1;
    while (sz &lt; pages) { sz &lt;&lt;= 1; order++; }
    if (order &gt; MAX_ORDER) return NULL;

    int o = order;
    while (o &lt;= MAX_ORDER &amp;&amp; !fl[o]) o++;
    if (o &gt; MAX_ORDER) return NULL;

    Block *b = fl_pop(o);
    while (o &gt; order) {
        size_t half = (size_t)((1 &lt;&lt; (o - 1)) &lt;&lt; PG_LOG2);
        Block *buddy = (Block *)((char *)b + half);
        --o;
        fl_push(o, buddy);
    }
    b-&gt;order = order;
    return b;
}

void buddy_free(void *p, int pages)
{
    int order = 0; int sz = 1;
    while (sz &lt; pages) { sz &lt;&lt;= 1; order++; }

    while (order &lt; MAX_ORDER) {
        uintptr_t off    = (char *)p - base;
        uintptr_t bsz    = (uintptr_t)((1UL &lt;&lt; order) &lt;&lt; PG_LOG2);
        uintptr_t buddyo = off ^ bsz;
        Block *buddy     = (Block *)(base + buddyo);
        if (!fl_remove(order, buddy)) break;
        if (buddy &lt; (Block *)p) p = buddy;
        order++;
    }
    fl_push(order, (Block *)p);
}

static void dump(void)
{
    printf(&quot;free lists:&quot;);
    for (int o = 0; o &lt;= MAX_ORDER; ++o) {
        int n = 0;
        for (Block *b = fl[o]; b; b = b-&gt;next) n++;
        printf(&quot;  order=%d:%d&quot;, o, n);
    }
    puts(&quot;&quot;);
}

int main(void)
{
    buddy_init();
    dump();

    void *a = buddy_alloc(3);   printf(&quot;alloc 3 pages -&gt; %p\\n&quot;, a); dump();
    void *b = buddy_alloc(1);   printf(&quot;alloc 1 page  -&gt; %p\\n&quot;, b); dump();
    void *c = buddy_alloc(8);   printf(&quot;alloc 8 pages -&gt; %p\\n&quot;, c); dump();

    buddy_free(a, 3);           puts(&quot;free a&quot;); dump();
    buddy_free(b, 1);           puts(&quot;free b&quot;); dump();
    buddy_free(c, 8);           puts(&quot;free c&quot;); dump();
    return 0;
}

<p>You can&rsquo;t say you understand memory until you&rsquo;ve written an allocator.
This section builds five classic allocators from scratch, on top of <code>mmap</code>.</p>
<pre><code>   allocator          best for                       complexity
   -----------        ---------                      ----------
   bump (arena)       short-lived burst; freed all
                      at once                        ~30 lines
   pool (freelist)    fixed-size objects             ~60 lines
   slab               sets of same-size objects;
                      cache-line aware               ~120 lines
   freelist           variable-size; learning ptmalloc ~150 lines
   buddy              power-of-2 size; OS-level      ~200 lines
</code></pre>
<p>All examples are <em>educational</em>, not production-quality. They cover the
algorithms; thread safety / shrink / error checks are stubs at best.</p>
<h2 id="1-bump-allocator-arena">1. Bump allocator (arena)</h2>
<p>A <em>region</em> of memory; <code>alloc</code> just advances a pointer. There is no
individual <code>free</code>; you drop the whole region with <code>arena_destroy</code>.</p>
<pre><code>   +-----------------------+
   | used                  | &lt;- bump pointer advances -&gt;|       free       |
   +-----------------------+----------------------------+------------------+
   ^                                                    ^                  ^
   base                                              top                  end
</code></pre>
<p>Pros: O(1) alloc, no metadata per object, perfect locality.
Cons: cannot free individual objects; only good for &ldquo;one big phase&rdquo;.</p>
<p>See <a href="01_bump.c"><code>01_bump.c</code></a>.</p>
<h2 id="2-pool-allocator-fixed-size-freelist">2. Pool allocator (fixed-size freelist)</h2>
<p>If you allocate many objects of the same size (e.g. AST nodes, network
packet buffers), a <em>pool</em> is ideal:</p>
<pre><code>   pool: array of N slots of size S, plus a freelist head

   +-----+ +-----+ +-----+ +-----+
   | s 0 | | s 1 | | s 2 | | s 3 |  &lt;- the slab
   +-----+ +-----+ +-----+ +-----+
      ^
      free: 0 -&gt; 2 -&gt; NULL    (freelist threads through unused slots)
              ^- in use
</code></pre>
<p>Alloc = pop head. Free = push onto head. Both O(1).</p>
<p>See <a href="02_pool.c"><code>02_pool.c</code></a>.</p>
<h2 id="3-slab-allocator-bonwick-style">3. Slab allocator (Bonwick-style)</h2>
<p>Each &ldquo;cache&rdquo; is a list of <em>slabs</em> (page-sized regions) carved into
fixed-size objects with a freelist per slab. Each slab additionally tracks
constructor/destructor hooks so reuse can preserve invariants.</p>
<p>This is essentially what the Linux kernel&rsquo;s <code>kmalloc</code> uses.</p>
<p>See <a href="03_slab.c"><code>03_slab.c</code></a>.</p>
<h2 id="4-freelist-allocator-mini-malloc">4. Freelist allocator (mini-malloc)</h2>
<p>A real <code>malloc</code>: variable sized, coalesces adjacent free chunks, uses a
first-fit or best-fit search. Each chunk has a header so <code>free(p)</code> can find
the size from <code>p - sizeof(header)</code>.</p>
<pre><code>   +---------+-----------------+---------+-----------------+---------+
   | header  |  payload        | header  |  payload        | header  |
   | size, F |  (in use OR     | size, F | (in use OR      | size, F |
   |         |   free-&gt;fd/bk)  |         |  free-&gt;fd/bk)   |         |
   +---------+-----------------+---------+-----------------+---------+
   ^                                                                ^
   base                                                          top
</code></pre>
<p>See <a href="04_freelist.c"><code>04_freelist.c</code></a>.</p>
<h2 id="5-buddy-allocator">5. Buddy allocator</h2>
<p>The classic OS allocator. Memory is a power-of-2; split into halves
recursively as needed; free coalesces &ldquo;buddies&rdquo;.</p>
<pre><code>   start: order 4 (16 pages)
   alloc 3 pages -&gt; need order 2 (4 pages)
     split 16 -&gt; 8|8
     split 8 (lower) -&gt; 4|4
     return first 4 pages, mark used

   free those 4 -&gt; recurse: buddy is its partner of order 2
     buddy free? yes -&gt; merge to order 3 (8 pages)
                       buddy free? yes -&gt; merge to order 4
                       etc.
</code></pre>
<p>See <a href="05_buddy.c"><code>05_buddy.c</code></a>.</p>
<h2 id="6-how-real-allocators-are-built">6. How real allocators are built</h2>
<pre><code>   glibc ptmalloc2     -- arenas + chunks + tcache (per-thread caches)
   jemalloc            -- per-thread arenas + size classes + slabs
   tcmalloc            -- thread-local caches + central cache + heap
   mimalloc            -- size classes + page-based + sharded
   musl                -- modest size-bucket freelist
   Linux kernel        -- SLUB (default) / SLAB / SLOB; buddy at page-frame level
</code></pre>
<p>The patterns repeat: <strong>per-thread cache</strong> for speed, <strong>size classes</strong> to
keep fragmentation bounded, <strong>page-sized backing</strong> so the OS can reclaim
in chunks.</p>

// Prettify function in JS (matching Python's prettify)
function prettify(component) {
    let c = component.replace(/^[0-9]+[_-]/, '');
    c = c.replace(/_/g, ' ').replace(/-/g, ' ').trim();
    if (c.toLowerCase() === 'readme') return 'README';
    if (c.toLowerCase() === 'cheatsheet') return 'Cheatsheet';
    return c.replace(/\b\w/g, l => l.toUpperCase());
}

// Like prettify(), but keeps any leading "01_"/"2-" style number as a "01. "
// prefix so the sidebar mirrors the on-disk ordering of the documents.
function prettifyKeepNum(component) {
    const m = component.match(/^([0-9]+)[_-]/);
    const prefix = m ? m[1] + '. ' : '';
    return prefix + prettify(component);
}

const HTML_ESCAPES = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' };

const BY_PATH = {};        // "01_pthreads/readme.md"  -> idx
const BY_DIR_README = {};  // "01_pthreads" / ""        -> idx (README of dir)
const BY_BASENAME = {};    // "cheatsheet.md"           -> idx (only if unique)
const BASENAME_DUP = {};

        if (Object.prototype.hasOwnProperty.call(BY_BASENAME, base)) BASENAME_DUP[base] = true;

/* Join a relative href onto a base directory and normalize . / .. segments. */
function joinPath(baseDir, rel) {
    if (rel.charAt(0) === '/') { baseDir = ''; rel = rel.replace(/^\/+/, ''); }
    const parts = (baseDir ? baseDir.split('/') : []).concat(rel.split('/'));
    const out = [];
    for (const p of parts) {
        if (p === '' || p === '.') continue;
        if (p === '..') { out.pop(); continue; }
        out.push(p);
    }
    return out.join('/');
}

function mdTarget(rawHref, baseDir) {
    if (!rawHref || rawHref.charAt(0) === '#') return null;
    if (/^[a-z][a-z0-9+.-]*:\/\//i.test(rawHref) || /^(mailto|tel):/i.test(rawHref)) return null;

    let anchor = '';
    let pathPart = rawHref;
    const hashIdx = pathPart.indexOf('#');
    if (hashIdx >= 0) {
        anchor = pathPart.substring(hashIdx + 1);
        pathPart = pathPart.substring(0, hashIdx);
        try { anchor = decodeURIComponent(anchor); } catch (e) {}
    }
    const qIdx = pathPart.indexOf('?');
    if (qIdx >= 0) pathPart = pathPart.substring(0, qIdx);
    if (!pathPart) return null;

    const joined = joinPath(baseDir || '', pathPart).toLowerCase();
    let idx;
    if (/\.md$/i.test(pathPart)) {
        idx = BY_PATH[joined];
        if (idx === undefined) {
            const base = joined.split('/').pop();
            idx = BY_BASENAME[base];
        }
    } else {
        // a directory reference -> that folder's README
        idx = BY_DIR_README[joined];
    }
    if (idx === undefined) return null;
    return { idx: idx, anchor: anchor };
}

function baseDirOf(node) {
    const panel = node && node.closest ? node.closest('.tab-content') : null;
    return panel ? (panel.dataset.dir || '') : '';
}

        } else if (/^[a-z][a-z0-9+.-]*:\/\//i.test(href)) {

    ta.value = text;

    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); done(); } catch (e) {}
    document.body.removeChild(ta);
}

function highlightAllCode() {
    document.querySelectorAll('.tab-content pre code').forEach(block => {
        if (block.dataset.highlighted === '1') return;
        const pre = block.closest('pre');
        const langClass = Array.from(block.classList).find(c => c.startsWith('language-'));
        if (langClass) {
            const lang = langClass.replace('language-', '');
            const label = document.createElement('span');
            label.className = 'code-lang-label';
            label.textContent = lang;
            pre.appendChild(label);
        }
        hljs.highlightElement(block);
        addCopyButton(pre, block);
        block.dataset.highlighted = '1';
    });
}

highlightAllCode();

function wrapTables() {

function getStoredTheme() {
    try { return localStorage.getItem('doc-theme'); } catch(e) { return null; }
}

const darkMql = window.matchMedia ? window.matchMedia('(prefers-color-scheme: dark)') : null;
function osTheme() { return (darkMql && darkMql.matches) ? 'dark' : 'light'; }

// Apply a theme. `persist` is true ONLY for an explicit user action; auto/OS
// applications must NOT write to storage, otherwise the very first auto theme
// would look like an explicit choice and we'd stop following the OS.
function setTheme(theme, persist) {
    document.body.setAttribute('data-theme', theme);
    hljsLink.href = theme === 'light' ? HLJS_LIGHT : HLJS_DARK;
    themeToggleBtn.innerHTML = (theme === 'light' ? ICON_SUN : ICON_MOON);
    themeToggleBtn.title = theme === 'light'
        ? 'Switch to dark mode (Ctrl+Shift+L)'
        : 'Switch to light mode (Ctrl+Shift+L)';
    if (persist) {
        try { localStorage.setItem('doc-theme', theme); } catch(e) {}
    }
}

function toggleTheme() {
    const current = document.body.getAttribute('data-theme') || 'dark';
    setTheme(current === 'dark' ? 'light' : 'dark', true);
}

(function initTheme() {
    const stored = getStoredTheme();
    if (stored === 'light' || stored === 'dark') {
        setTheme(stored, false);              // explicit user choice wins
    } else {
        setTheme(osTheme(), false);           // otherwise follow the OS (live)
    }
})();

// Live-follow the OS appearance while the reader hasn't picked a theme manually.
if (darkMql) {
    const onOsChange = (e) => {
        const stored = getStoredTheme();
        if (stored !== 'light' && stored !== 'dark') {
            setTheme(e.matches ? 'dark' : 'light', false);
        }
    };
    if (darkMql.addEventListener) darkMql.addEventListener('change', onOsChange);
    else if (darkMql.addListener) darkMql.addListener(onOsChange);  // older Safari
}

themeToggleBtn.addEventListener('click', toggleTheme);

document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'L') {
        e.preventDefault();
        toggleTheme();
