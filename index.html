  { name: `16. Advanced`, path: `13_advanced/README.md`, dir: `13_advanced`, body: `<h1 id="13--advanced-topics">13 — Advanced Topics</h1>
<p>If you&rsquo;ve made it this far, the basics are solid. Here are the deeper /
newer / weirder corners of Linux memory.</p>
<h2 id="1-numa--non-uniform-memory-access">1. NUMA — Non-Uniform Memory Access</h2>
<p>Modern multi-socket servers have one or more <strong>NUMA nodes</strong> per socket; each
node has its own memory controller and &ldquo;local&rdquo; DRAM. Accessing remote DRAM
costs 1.5–2× more latency.</p>
<pre><code>   CPU socket 0                      CPU socket 1
   +------------------+              +------------------+
   |  cores 0..15     | &lt;----QPI---&gt; |  cores 16..31    |
   |  L1 / L2 / L3    |              |  L1 / L2 / L3    |
   +-----+------------+              +-----+------------+
         | local DRAM                       | local DRAM
         v                                  v
   +----------------+                +----------------+
   | NUMA node 0    |   &quot;remote&quot;     | NUMA node 1    |
   | 96 GiB         |   accesses     | 96 GiB         |
   +----------------+   over QPI     +----------------+
</code></pre>
<h3 id="inspecting">Inspecting</h3>
<pre><code class="language-bash">numactl --hardware
numactl --show
cat /proc/&lt;pid&gt;/numa_maps
</code></pre>
<h3 id="controlling-placement">Controlling placement</h3>
<pre><code class="language-bash">numactl --membind=0 --cpunodebind=0 ./prog       # pin to node 0
numactl --interleave=all ./prog                   # round-robin across nodes
</code></pre>
<p>In C use <code>libnuma</code>:</p>
<pre><code class="language-c">#include &lt;numa.h&gt;
numa_set_localalloc();         // default policy
numa_bind(numa_parse_nodestring(&quot;0&quot;));
void *p = numa_alloc_onnode(sz, 0);
</code></pre>
<p>Or syscalls:</p>
<pre><code class="language-c">mbind(addr, len, MPOL_BIND, &amp;nodemask, maxnode, 0);
move_pages(pid, count, pages, nodes, status, MPOL_MF_MOVE);
</code></pre>
<h3 id="numa-pitfalls">NUMA pitfalls</h3>
<ul>
<li><strong>First-touch policy</strong>: a page is allocated on the node of the CPU that
  first writes to it (with default policy). Initialise from the thread that
  will use the data.</li>
<li>Migrating threads across nodes after pages are placed is expensive — pin
  threads (<code>taskset</code>, <code>pthread_setaffinity_np</code>).</li>
</ul>
<h2 id="2-huge-pages">2. Huge pages</h2>
<p>Already touched in §05. Two flavours:</p>
<h3 id="transparent-huge-pages-thp">Transparent Huge Pages (THP)</h3>
<pre><code class="language-bash">cat /sys/kernel/mm/transparent_hugepage/enabled
   [always] madvise never

echo madvise &gt; /sys/kernel/mm/transparent_hugepage/enabled   # opt-in only
</code></pre>
<p>Use <code>madvise(p, len, MADV_HUGEPAGE)</code> to ask the kernel to promote your VMA
to 2 MiB pages. <code>khugepaged</code> does the merging in the background.</p>
<h3 id="explicit-hugetlb">Explicit HugeTLB</h3>
<pre><code class="language-bash"># reserve 64 huge pages (128 MiB) at boot or runtime:
echo 64 &gt; /proc/sys/vm/nr_hugepages
cat /proc/meminfo | grep -i huge
</code></pre>
<pre><code class="language-c">void *p = mmap(NULL, 2UL &lt;&lt; 20,
               PROT_READ | PROT_WRITE,
               MAP_PRIVATE | MAP_ANONYMOUS | MAP_HUGETLB | MAP_HUGE_2MB,
               -1, 0);
</code></pre>
<p>Or use <code>hugetlbfs</code>:</p>
<pre><code class="language-bash">mount -t hugetlbfs hugetlbfs /mnt/huge -o pagesize=2M
</code></pre>
<p>then <code>open("/mnt/huge/myfile")</code> and mmap it.</p>
<p>See <a href="01_thp_madvise.c"><code>01_thp_madvise.c</code></a> and
<a href="02_hugetlb_mmap.c"><code>02_hugetlb_mmap.c</code></a>.</p>
<h2 id="3-userfaultfd--user-space-page-fault-handling">3. <code>userfaultfd</code> — user-space page-fault handling</h2>
<p>Get an fd that delivers a message every time the process touches an
unmapped page in a registered range. Used by:</p>
<ul>
<li>VM live migration (post-copy)</li>
<li>Garbage collectors (read barriers)</li>
<li>Sandboxes (intercept access to virtual memory)</li>
<li>Databases (custom paging)</li>
</ul>
<p>Pseudocode:</p>
<pre><code class="language-c">int u = syscall(SYS_userfaultfd, O_CLOEXEC | O_NONBLOCK);
struct uffdio_api api = { .api = UFFD_API, .features = 0 };
ioctl(u, UFFDIO_API, &amp;api);
struct uffdio_register reg = { .range = { .start = addr, .len = sz },
                                .mode = UFFDIO_REGISTER_MODE_MISSING };
ioctl(u, UFFDIO_REGISTER, &amp;reg);

for (;;) {
    struct uffd_msg msg;
    read(u, &amp;msg, sizeof msg);
    /* compute the page to provide, then: */
    struct uffdio_copy c = { .dst = msg.arg.pagefault.address &amp; ~0xfff,
                              .src = (uintptr_t)page,
                              .len = 4096 };
    ioctl(u, UFFDIO_COPY, &amp;c);
}
</code></pre>
<p>See <a href="03_userfaultfd.c"><code>03_userfaultfd.c</code></a> (Linux-only; needs unprivileged
mode if <code>vm.unprivileged_userfaultfd = 1</code>).</p>
<h2 id="4-memfd_create--anonymous-in-ram-files">4. <code>memfd_create</code> — anonymous in-RAM files</h2>
<p>Already in §10. Two extra superpowers:</p>
<ul>
<li><strong>F_SEAL_WRITE/F_SEAL_GROW/F_SEAL_SHRINK</strong> — once set, can never be unset.</li>
<li>Pass over <code>SCM_RIGHTS</code> so a receiver gets an fd to <em>exactly</em> the same
  pages.</li>
</ul>
<p>Use case: a sandbox can hand its parent a memfd to act as a read-only
input channel; the parent seals it after writing.</p>
<h2 id="5-io_uring--async-io-with-shared-rings">5. <code>io_uring</code> — async I/O with shared rings</h2>
<p>io_uring is a syscall family that gives userspace two mmap&rsquo;d rings (SQ and
CQ) shared with the kernel:</p>
<pre><code>   process VA                                 kernel
   +-----------------+   io_uring_setup       +-----------------+
   | SQ ring (mmap)  | &lt;--shared mapping----&gt; | sq_entries[]    |
   +-----------------+                        +-----------------+
   | CQ ring (mmap)  | &lt;--shared mapping----&gt; | cq_entries[]    |
   +-----------------+                        +-----------------+
</code></pre>
<p>You queue requests into the SQ (no syscall), tell the kernel &ldquo;go&rdquo; with
<code>io_uring_enter</code>, and harvest completions from the CQ. The same mechanism
can:</p>
<ul>
<li>read/write to fds (<code>IORING_OP_READ/WRITE</code>)</li>
<li>do <code>fsync</code>, <code>splice</code>, <code>accept</code>, <code>connect</code>, &hellip;</li>
<li>do many syscalls in one shot (<code>io_uring_enter</code>)</li>
<li>register buffers (avoid copy)</li>
<li>use <code>IORING_OP_PROVIDE_BUFFERS</code> for true zero-copy I/O</li>
</ul>
<p>It&rsquo;s not strictly a &ldquo;memory&rdquo; topic but it relies on shared-memory rings —
mmap is the basis. We don&rsquo;t include a full demo here (see
<a href="https://github.com/axboe/liburing"><code>liburing</code></a>).</p>
<h2 id="6-dax--direct-access-to-persistent-memory">6. DAX — Direct Access to persistent memory</h2>
<p>Persistent memory (Intel Optane was the classic example) can be exposed as
<code>/dev/pmem0</code> or via <code>fsdax</code>. <code>mmap(MAP_SYNC | MAP_SHARED_VALIDATE, ...)</code> on
a DAX file gives <strong>persistent stores</strong> — <code>clflushopt</code> + <code>sfence</code> is enough,
no need for <code>msync</code>.</p>
<p>Not in mainstream usage today (Optane is EOL) but the kernel mechanism
remains and is used by CXL persistent memory.</p>
<h2 id="7-mremap-magic">7. <code>mremap</code> magic</h2>
<p>Beyond simple grow/shrink, <code>mremap</code> can:</p>
<ul>
<li><strong>swap two regions</strong> of equal size with <code>MREMAP_FIXED | MREMAP_DONTUNMAP</code>
  (Linux 5.7+) — used by GCs that flip between heaps.</li>
<li><strong>move a mapping</strong> somewhere else without copying — just rewires PTEs.</li>
</ul>
<h2 id="8-kernel-same-page-merging-ksm">8. Kernel same-page merging (KSM)</h2>
<p><code>madvise(p, len, MADV_MERGEABLE)</code> registers a region with KSM, the
deduplication daemon. When two pages of two processes have identical
content, KSM merges them to a single CoW frame. Big win on KVM hosts with
many similar VMs.</p>
<pre><code class="language-bash">echo 1 &gt; /sys/kernel/mm/ksm/run
cat /sys/kernel/mm/ksm/pages_shared
</code></pre>

<p>You can&rsquo;t say you understand memory until you&rsquo;ve written an allocator.
This section builds five classic allocators from scratch, on top of <code>mmap</code>.</p>
<pre><code>   allocator          best for                       complexity
   -----------        ---------                      ----------
   bump (arena)       short-lived burst; freed all
                      at once                        ~30 lines
   pool (freelist)    fixed-size objects             ~60 lines
   slab               sets of same-size objects;
                      cache-line aware               ~120 lines
   freelist           variable-size; learning ptmalloc ~150 lines
   buddy              power-of-2 size; OS-level      ~200 lines
</code></pre>
<p>All examples are <em>educational</em>, not production-quality. They cover the
algorithms; thread safety / shrink / error checks are stubs at best.</p>
<h2 id="1-bump-allocator-arena">1. Bump allocator (arena)</h2>
<p>A <em>region</em> of memory; <code>alloc</code> just advances a pointer. There is no
individual <code>free</code>; you drop the whole region with <code>arena_destroy</code>.</p>
<pre><code>   +-----------------------+
   | used                  | &lt;- bump pointer advances -&gt;|       free       |
   +-----------------------+----------------------------+------------------+
   ^                                                    ^                  ^
   base                                              top                  end
</code></pre>
<p>Pros: O(1) alloc, no metadata per object, perfect locality.
Cons: cannot free individual objects; only good for &ldquo;one big phase&rdquo;.</p>
<p>See <a href="01_bump.c"><code>01_bump.c</code></a>.</p>
<h2 id="2-pool-allocator-fixed-size-freelist">2. Pool allocator (fixed-size freelist)</h2>
<p>If you allocate many objects of the same size (e.g. AST nodes, network
packet buffers), a <em>pool</em> is ideal:</p>
<pre><code>   pool: array of N slots of size S, plus a freelist head

   +-----+ +-----+ +-----+ +-----+
   | s 0 | | s 1 | | s 2 | | s 3 |  &lt;- the slab
   +-----+ +-----+ +-----+ +-----+
      ^
      free: 0 -&gt; 2 -&gt; NULL    (freelist threads through unused slots)
              ^- in use
</code></pre>
<p>Alloc = pop head. Free = push onto head. Both O(1).</p>
<p>See <a href="02_pool.c"><code>02_pool.c</code></a>.</p>
<h2 id="3-slab-allocator-bonwick-style">3. Slab allocator (Bonwick-style)</h2>
<p>Each &ldquo;cache&rdquo; is a list of <em>slabs</em> (page-sized regions) carved into
fixed-size objects with a freelist per slab. Each slab additionally tracks
constructor/destructor hooks so reuse can preserve invariants.</p>
<p>This is essentially what the Linux kernel&rsquo;s <code>kmalloc</code> uses.</p>
<p>See <a href="03_slab.c"><code>03_slab.c</code></a>.</p>
<h2 id="4-freelist-allocator-mini-malloc">4. Freelist allocator (mini-malloc)</h2>
<p>A real <code>malloc</code>: variable sized, coalesces adjacent free chunks, uses a
first-fit or best-fit search. Each chunk has a header so <code>free(p)</code> can find
the size from <code>p - sizeof(header)</code>.</p>
<pre><code>   +---------+-----------------+---------+-----------------+---------+
   | header  |  payload        | header  |  payload        | header  |
   | size, F |  (in use OR     | size, F | (in use OR      | size, F |
   |         |   free-&gt;fd/bk)  |         |  free-&gt;fd/bk)   |         |
   +---------+-----------------+---------+-----------------+---------+
   ^                                                                ^
   base                                                          top
</code></pre>
<p>See <a href="04_freelist.c"><code>04_freelist.c</code></a>.</p>
<h2 id="5-buddy-allocator">5. Buddy allocator</h2>
<p>The classic OS allocator. Memory is a power-of-2; split into halves
recursively as needed; free coalesces &ldquo;buddies&rdquo;.</p>
<pre><code>   start: order 4 (16 pages)
   alloc 3 pages -&gt; need order 2 (4 pages)
     split 16 -&gt; 8|8
     split 8 (lower) -&gt; 4|4
     return first 4 pages, mark used

   free those 4 -&gt; recurse: buddy is its partner of order 2
     buddy free? yes -&gt; merge to order 3 (8 pages)
                       buddy free? yes -&gt; merge to order 4
                       etc.
</code></pre>
<p>See <a href="05_buddy.c"><code>05_buddy.c</code></a>.</p>
<h2 id="6-how-real-allocators-are-built">6. How real allocators are built</h2>
<pre><code>   glibc ptmalloc2     -- arenas + chunks + tcache (per-thread caches)
   jemalloc            -- per-thread arenas + size classes + slabs
   tcmalloc            -- thread-local caches + central cache + heap
   mimalloc            -- size classes + page-based + sharded
   musl                -- modest size-bucket freelist
   Linux kernel        -- SLUB (default) / SLAB / SLOB; buddy at page-frame level
</code></pre>
<p>The patterns repeat: <strong>per-thread cache</strong> for speed, <strong>size classes</strong> to
keep fragmentation bounded, <strong>page-sized backing</strong> so the OS can reclaim
in chunks.</p>

const BY_DIR_README = {};  // "01_pthreads" / ""        -> idx (README of dir)
const BY_BASENAME = {};    // "cheatsheet.md"           -> idx (only if unique)
const BASENAME_DUP = {};

TAB_DATA.forEach((tab, idx) => {
    const path = (tab.path || '').toLowerCase();
    if (path) BY_PATH[path] = idx;
    const base = path.split('/').pop();
    if (base) {
        if (Object.prototype.hasOwnProperty.call(BY_BASENAME, base)) BASENAME_DUP[base] = true;
        else BY_BASENAME[base] = idx;
    }
    if (base === 'readme.md') {
        BY_DIR_README[(tab.dir || '').toLowerCase()] = idx;
    }
});
Object.keys(BASENAME_DUP).forEach(b => { delete BY_BASENAME[b]; });

/* Join a relative href onto a base directory and normalize . / .. segments. */
function joinPath(baseDir, rel) {
    if (rel.charAt(0) === '/') { baseDir = ''; rel = rel.replace(/^\/+/, ''); }
    const parts = (baseDir ? baseDir.split('/') : []).concat(rel.split('/'));
    const out = [];
    for (const p of parts) {
        if (p === '' || p === '.') continue;
        if (p === '..') { out.pop(); continue; }
        out.push(p);
    }
    return out.join('/');
}

function mdTarget(rawHref, baseDir) {
    if (!rawHref || rawHref.charAt(0) === '#') return null;
    if (/^[a-z][a-z0-9+.-]*:\/\//i.test(rawHref) || /^(mailto|tel):/i.test(rawHref)) return null;

    let anchor = '';
    let pathPart = rawHref;
    const hashIdx = pathPart.indexOf('#');
    if (hashIdx >= 0) {
        anchor = pathPart.substring(hashIdx + 1);
        pathPart = pathPart.substring(0, hashIdx);
        try { anchor = decodeURIComponent(anchor); } catch (e) {}
    }
    const qIdx = pathPart.indexOf('?');
    if (qIdx >= 0) pathPart = pathPart.substring(0, qIdx);
    if (!pathPart) return null;

    const joined = joinPath(baseDir || '', pathPart).toLowerCase();
    let idx;
    if (/\.md$/i.test(pathPart)) {
        idx = BY_PATH[joined];
        if (idx === undefined) {
            const base = joined.split('/').pop();
            idx = BY_BASENAME[base];
        }
    } else {
        // a directory reference -> that folder's README
        idx = BY_DIR_README[joined];
    }
    if (idx === undefined) return null;
    return { idx: idx, anchor: anchor };
}

function baseDirOf(node) {
    const panel = node && node.closest ? node.closest('.tab-content') : null;
    return panel ? (panel.dataset.dir || '') : '';
}

/* Tag links so we can style internal navigation distinctly from external ones. */
function classifyLinks() {
    document.querySelectorAll('.tab-content a[href]').forEach(a => {
        const href = a.getAttribute('href');
        if (!href) return;
        if (href.charAt(0) === '#') {
            a.classList.add('anchor-link');
        } else if (mdTarget(href, baseDirOf(a))) {
            a.classList.add('xref-link');
        } else if (/^[a-z][a-z0-9+.-]*:\/\//i.test(href)) {
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
        }
    });
}
classifyLinks();

docSelect.addEventListener('change', () => {
    activateTab(parseInt(docSelect.value, 10));
});

/* ───── Syntax highlighting ───── */

function addCopyButton(pre, block) {
    const btn = document.createElement('button');
    btn.className = 'code-copy-btn';
    btn.type = 'button';
    btn.textContent = 'Copy';
    btn.addEventListener('click', () => {
        const text = block.innerText;
        const done = () => {
            btn.textContent = 'Copied';
            btn.classList.add('copied');
            setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1600);
        };
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
        } else {
            fallbackCopy(text, done);
        }
    });
    pre.appendChild(btn);
}

function fallbackCopy(text, done) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); done(); } catch (e) {}
    document.body.removeChild(ta);
}

function highlightAllCode() {
    document.querySelectorAll('.tab-content pre code').forEach(block => {
        if (block.dataset.highlighted === '1') return;
        const pre = block.closest('pre');
        const langClass = Array.from(block.classList).find(c => c.startsWith('language-'));
        if (langClass) {
            const lang = langClass.replace('language-', '');
            const label = document.createElement('span');
            label.className = 'code-lang-label';
            label.textContent = lang;
            pre.appendChild(label);
        }
        hljs.highlightElement(block);
        addCopyButton(pre, block);
        block.dataset.highlighted = '1';
    });
}

highlightAllCode();

function getStoredTheme() {
    try { return localStorage.getItem('doc-theme'); } catch(e) { return null; }
}

function setTheme(theme) {
    document.body.setAttribute('data-theme', theme);
    hljsLink.href = theme === 'light' ? HLJS_LIGHT : HLJS_DARK;
    themeToggleBtn.innerHTML = theme === 'light' ? ICON_SUN : ICON_MOON;
    themeToggleBtn.title = theme === 'light'
        ? 'Switch to dark mode (Ctrl+Shift+L)'
        : 'Switch to light mode (Ctrl+Shift+L)';
    try { localStorage.setItem('doc-theme', theme); } catch(e) {}
}

(function initTheme() {
    const stored = getStoredTheme();
    const theme = (stored === 'light' || stored === 'dark')
        ? stored
        : (document.body.getAttribute('data-theme') || 'dark');
    setTheme(theme);
})();

themeToggleBtn.addEventListener('click', () => {
    const current = document.body.getAttribute('data-theme') || 'dark';
    setTheme(current === 'dark' ? 'light' : 'dark');
});

document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'L') {
        e.preventDefault();
        const current = document.body.getAttribute('data-theme') || 'dark';
        setTheme(current === 'dark' ? 'light' : 'dark');
    }
});

/* ───── Tab activation ───── */

function activateTab(idx, resetScroll) {
    if (resetScroll === undefined) resetScroll = true;
    document.querySelectorAll('.tab-content').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + idx).classList.add('active');
    docSelect.value = String(idx);
    docList.querySelectorAll('a').forEach(a => {
        a.classList.toggle('nav-doc-active', parseInt(a.dataset.docIdx, 10) === idx);
    });
    history.replaceState(null, null, '#tab-' + idx);
    if (typeof buildToc === 'function') buildToc(idx);
    // Reflect the active document's title in the condensing navbar.
    if (navDocTitle && TAB_DATA[idx]) {
        navDocTitle.textContent = TAB_DATA[idx].name.replace(/^\s*\d+\.\s*/, '');
    }
    // Jump back to the top when switching documents so the reader starts at
    // the beginning rather than wherever the previous doc was scrolled to.
    if (resetScroll) {
        window.scrollTo({ top: 0, behavior: 'auto' });
        document.body.classList.remove('nav-condensed');
        navLastY = 0;
    }
}

/* ───── Search index: pre-extract plain text per block ───── */

const searchIndex = [];

TAB_DATA.forEach((tab, tabIdx) => {
    const tmp = document.createElement('div');
    tmp.innerHTML = tab.body;
    let currentHeading = '';

    function walk(node) {
        for (const child of node.childNodes) {
            if (child.nodeType === Node.ELEMENT_NODE) {
                const tag = child.tagName;
                if (/^H[1-6]$/.test(tag)) {
                    currentHeading = child.textContent.trim();
                }
                const text = child.textContent.trim();
                if (text.length > 0) {
                    searchIndex.push({
                        tabIdx: tabIdx,
                        tabName: tab.name,
                        heading: currentHeading,
                        text: text,
                        tag: tag
                    });
                }
                if (/^(P|LI|TD|TH|BLOCKQUOTE|PRE|H[1-6])$/.test(tag)) {
                    continue;
                }
                walk(child);
            }
        }
    }
    walk(tmp);
});

/* ───── Search overlay logic ───── */

const overlay = document.getElementById('searchOverlay');
const searchInput = document.getElementById('searchInput');
const searchTrigger = document.getElementById('searchTrigger');
const srBody = document.getElementById('srBody');
const srCount = document.getElementById('srCount');
let srActiveIdx = -1;
let srResults = [];

function openSearch() {
    overlay.classList.add('open');
    searchInput.value = '';
    searchInput.focus();
    srBody.innerHTML = '<div class="sr-empty">Type to search across all tabs</div>';
    srCount.textContent = '';
    srActiveIdx = -1;
    srResults = [];
}

function closeSearch() {
    overlay.classList.remove('open');
    searchInput.value = '';
}

searchTrigger.addEventListener('click', openSearch);

overlay.addEventListener('click', (e) => {
    if (e.target === overlay) closeSearch();
});

document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        if (overlay.classList.contains('open')) closeSearch();
        else openSearch();
        return;
    }
    if (e.key === '/' && !overlay.classList.contains('open') &&
        !['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)) {
        e.preventDefault();
        openSearch();
        return;
    }
    if (e.key === 'Escape' && overlay.classList.contains('open')) {
        closeSearch();
        return;
    }
    if (overlay.classList.contains('open')) {
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (srResults.length > 0) {
                srActiveIdx = Math.min(srActiveIdx + 1, srResults.length - 1);
                updateActiveResult();
            }
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (srResults.length > 0) {
                srActiveIdx = Math.max(srActiveIdx - 1, 0);
                updateActiveResult();
            }
        } else if (e.key === 'Enter') {
            e.preventDefault();
            if (srActiveIdx >= 0 && srActiveIdx < srResults.length) {
                navigateToResult(srResults[srActiveIdx]);
            }
        }
    }
});

function updateActiveResult() {
    srBody.querySelectorAll('.sr-item').forEach((el, i) => {
        el.classList.toggle('sr-active', i === srActiveIdx);
    });
    const active = srBody.querySelector('.sr-active');
    if (active) active.scrollIntoView({ block: 'nearest' });
}

function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function highlightSnippet(text, query, maxLen) {
    const lower = text.toLowerCase();
    const qLower = query.toLowerCase();
    const pos = lower.indexOf(qLower);
    if (pos < 0) return text.substring(0, maxLen);

    const pad = Math.floor((maxLen - query.length) / 2);
    let start = Math.max(0, pos - pad);
    let end = Math.min(text.length, pos + query.length + pad);
    let snippet = text.substring(start, end);
    if (start > 0) snippet = '...' + snippet;
    if (end < text.length) snippet = snippet + '...';

    const re = new RegExp('(' + escapeRegex(query) + ')', 'gi');
    return snippet.replace(re, '<mark>$1</mark>');
}

let searchTimer = null;
searchInput.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(runSearch, 120);
});

function runSearch() {
    const query = searchInput.value.trim();
    if (query.length < 2) {
        srBody.innerHTML = '<div class="sr-empty">Type at least 2 characters</div>';
        srCount.textContent = '';
        srResults = [];
        srActiveIdx = -1;
        return;
    }

    const qLower = query.toLowerCase();
    const matches = [];
    const seen = new Set();

    for (const entry of searchIndex) {
        if (entry.text.toLowerCase().includes(qLower)) {
            const key = entry.tabIdx + ':' + entry.heading + ':' + entry.text.substring(0, 80);
            if (seen.has(key)) continue;
            seen.add(key);
            matches.push(entry);
            if (matches.length >= 100) break;
        }
    }

    srResults = matches;
    srActiveIdx = matches.length > 0 ? 0 : -1;

    if (matches.length === 0) {
        srBody.innerHTML = '<div class="sr-empty">No results for "' +
            query.replace(/</g,'&lt;') + '"</div>';
        srCount.textContent = '0 results';
        return;
    }

    srCount.textContent = matches.length >= 100 ? '100+ results' : matches.length + ' result' + (matches.length > 1 ? 's' : '');

    let html = '';
    matches.forEach((m, i) => {
        const snippet = highlightSnippet(m.text, query, 160);
        html += '<div class="sr-item' + (i === 0 ? ' sr-active' : '') + '" data-ridx="' + i + '">';
        html += '<div class="sr-item-tab">' + m.tabName + '</div>';
        if (m.heading) html += '<div class="sr-item-heading">' + m.heading.replace(/</g,'&lt;') + '</div>';
        html += '<div class="sr-item-snippet">' + snippet + '</div>';
        html += '</div>';
    });
    srBody.innerHTML = html;

    srBody.querySelectorAll('.sr-item').forEach(el => {
        el.addEventListener('click', () => {
            const idx = parseInt(el.dataset.ridx, 10);
            navigateToResult(srResults[idx]);
        });
    });
}

function navigateToResult(result) {
    const savedQuery = searchInput.value.trim() || result.text.substring(0, 20);
    closeSearch();
    activateTab(result.tabIdx, false);

    requestAnimationFrame(() => {
        clearHighlights();
        const panel = document.getElementById('panel-' + result.tabIdx);
        const qLower = savedQuery.toLowerCase();
        const qLen = savedQuery.length;

        const hits = [];
        const walker = document.createTreeWalker(panel, NodeFilter.SHOW_TEXT);
        while (walker.nextNode()) {
            const node = walker.currentNode;
            const idx = node.textContent.toLowerCase().indexOf(qLower);
            if (idx >= 0) {
                hits.push({ node: node, offset: idx });
            }
        }

        let firstMark = null;
        for (let i = hits.length - 1; i >= 0; i--) {
            const h = hits[i];
            const range = document.createRange();
            range.setStart(h.node, h.offset);
            range.setEnd(h.node, h.offset + qLen);
            const mark = document.createElement('span');
            mark.className = 'search-highlight';
            mark.dataset.searchHighlight = '1';
            try { range.surroundContents(mark); firstMark = mark; } catch(e) {}
        }

        if (firstMark) {
            firstMark.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        setTimeout(clearHighlights, 6000);
    });
}

function clearHighlights() {
    document.querySelectorAll('[data-search-highlight]').forEach(el => {
        const parent = el.parentNode;
        parent.replaceChild(document.createTextNode(el.textContent), el);
        parent.normalize();
    });
}

/* ───── Sidebar TOC + scroll spy ───── */

const sidebarNav = document.getElementById('sidebarNav');
const navList = document.getElementById('navList');
const sidebarToggle = document.getElementById('sidebarToggle');
let currentTocHeadings = [];

function buildToc(panelIdx) {
    navList.innerHTML = '';
    currentTocHeadings = [];
    const panel = document.getElementById('panel-' + panelIdx);
    if (!panel) return;
    const headings = panel.querySelectorAll('h1, h2, h3, h4');
    headings.forEach((h, i) => {
        if (!h.id) h.id = 'autoid-' + panelIdx + '-' + i;
        const level = h.tagName.substring(1);
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = '#' + h.id;
        a.textContent = h.textContent;
        a.className = 'nav-h' + level;
        a.title = h.textContent;
        a.dataset.headingId = h.id;
        a.addEventListener('click', function(e) {
            e.preventDefault();
            h.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
        li.appendChild(a);
        navList.appendChild(li);
        currentTocHeadings.push({ el: h, link: a });
    });
    updateScrollSpy();
}

let spyRaf = null;
function updateScrollSpy() {
    if (spyRaf) return;
    spyRaf = requestAnimationFrame(() => {
        spyRaf = null;
        if (currentTocHeadings.length === 0) return;
        const scrollY = window.scrollY;
        const offset = 80;
        let activeEntry = currentTocHeadings[0];
        for (const entry of currentTocHeadings) {
            if (entry.el.offsetTop <= scrollY + offset) {
                activeEntry = entry;
            } else {
                break;
            }
        }
        currentTocHeadings.forEach(e => e.link.classList.remove('nav-active'));
        if (activeEntry) {
            activeEntry.link.classList.add('nav-active');
            const linkTop = activeEntry.link.offsetTop;
            const navH = sidebarNav.clientHeight;
            const navScroll = sidebarNav.scrollTop;
            if (linkTop < navScroll + 40 || linkTop > navScroll + navH - 40) {
                sidebarNav.scrollTo({ top: linkTop - navH / 3, behavior: 'smooth' });
            }
        }
    });
}

window.addEventListener('scroll', updateScrollSpy, { passive: true });

/* ───── iOS-style condensing navbar (hide on scroll down, show on scroll up) ───── */
function updateNavCondense() {
    const y = window.scrollY;
    const NAV_TOP = 8;       // always expanded near the very top
    const NAV_TRIGGER = 72;  // must scroll past this before condensing
    const DELTA = 5;         // ignore tiny jitters
    if (y <= NAV_TOP) {
        document.body.classList.remove('nav-condensed');
    } else if (y > navLastY + DELTA && y > NAV_TRIGGER) {
        document.body.classList.add('nav-condensed');   // scrolling down
    } else if (y < navLastY - DELTA) {
        document.body.classList.remove('nav-condensed'); // scrolling up
    }
    navLastY = y;
}
window.addEventListener('scroll', updateNavCondense, { passive: true });

function toggleSidebar() {
    const collapsed = sidebarNav.classList.toggle('collapsed');
    document.body.classList.toggle('sidebar-collapsed', collapsed);
}

sidebarToggle.addEventListener('click', toggleSidebar);

document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'b' && !overlay.classList.contains('open')) {
        e.preventDefault();
        toggleSidebar();
    }
});

/* ───── Anchor + cross-document link interception ───── */

/* Find an element by id, preferring the given panel (heading ids can collide
   across documents because each file is converted independently). */
function findById(id, preferredPanel) {
    if (preferredPanel) {
        const scoped = preferredPanel.querySelector('[id="' + id.replace(/(["\\])/g, '\\$1') + '"]');
        if (scoped) return scoped;
    }
    return document.getElementById(id);
}

function scrollToTarget(target) {
    requestAnimationFrame(() => target.scrollIntoView({ behavior: 'smooth', block: 'start' }));
}

function gotoAnchor(idx, anchor) {
    activateTab(idx, !anchor);
    const panel = document.getElementById('panel-' + idx);
    if (anchor) {
        const target = findById(anchor, panel);
        if (target) { scrollToTarget(target); return; }
    }
}

document.addEventListener('click', function(e) {
    const link = e.target.closest('a[href]');
    if (!link) return;
    const href = link.getAttribute('href');
    if (!href) return;

    // In-page anchor: resolve within the panel that owns the link first.
    if (href.charAt(0) === '#') {
        const id = href.substring(1);
        if (!id) return;
        const ownerPanel = link.closest('.tab-content');
        const target = findById(id, ownerPanel);
        if (target) {
            e.preventDefault();
            const dest = target.closest('.tab-content');
            if (dest) {
                const m = dest.id.match(/^panel-(\d+)$/);
                if (m) activateTab(parseInt(m[1], 10), false);
            }
            scrollToTarget(target);
        }
        return;
    }

    // Cross-document link to another bundled doc (file or folder), optionally #anchor.
    const md = mdTarget(href, baseDirOf(link));
    if (md) {
        e.preventDefault();
        gotoAnchor(md.idx, md.anchor);
    }
});

/* ───── Startup ───── */
/* - Nagesh N Nazare - */

const hash = location.hash || '';
const tabMatch = hash.match(/^#tab-(\d+)$/);
if (tabMatch) {
    activateTab(Math.min(parseInt(tabMatch[1], 10), TAB_DATA.length - 1));
} else if (hash.length > 1) {
    const targetId = hash.substring(1);
    const target = document.getElementById(targetId);
    if (target) {
        const panels = document.querySelectorAll('.tab-content');
        for (let i = 0; i < panels.length; i++) {
            if (panels[i].contains(target)) {
                activateTab(i, false);
                requestAnimationFrame(() => {
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                });
                break;
            }
        }
    } else {
        activateTab(0);
    }
} else {
    activateTab(0);
}
