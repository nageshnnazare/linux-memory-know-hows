  { name: `7. Heap Malloc`, path: `04_heap_malloc/README.md`, dir: `04_heap_malloc`, body: `<h1 id="04--the-heap-and-malloc">04 — The Heap and <code>malloc</code></h1>
<p>This is the longest chapter and arguably the most important one. <code>malloc</code> is
where most programmers get their mental model of memory, and yet most
programmers do not know that:</p>
<ul>
<li><code>malloc</code> is <strong>not a syscall</strong>. It&rsquo;s a library routine in glibc.</li>
<li><code>malloc(big)</code> and <code>malloc(small)</code> take <em>completely different code paths</em>.</li>
<li><code>free</code> rarely returns memory to the kernel — it usually just hands the
  chunk back to a per-process freelist for reuse.</li>
<li>A &ldquo;buffer overflow&rdquo; doesn&rsquo;t only overflow your buffer — it corrupts the
  glibc <em>heap metadata</em> that lives <strong>right next to</strong> your data.</li>
</ul>
<p>The glibc allocator is called <strong>ptmalloc2</strong> and is based on Doug Lea&rsquo;s
<code>dlmalloc</code>. We&rsquo;ll dissect it.</p>
<h2 id="1-the-big-picture">1. The big picture</h2>
<pre><code>   ┌─────────────────── glibc user-facing ────────────────────┐
   │   malloc(size) ─┐                                        │
   │   free(p)       │                                        │
   │   calloc(n,s)   │    pthread-aware (per-thread arenas)   │
   │   realloc(p,s)  │                                        │
   │   aligned_alloc │                                        │
   └─────────────────┴────────────────────────────────────────┘
            │                                          │
            │ small / mid-size                         │ big (default &gt;=128 KiB)
            v                                          v
   ┌──────────────────────┐                ┌──────────────────────────┐
   │  ptmalloc arena      │                │  mmap()ed region         │
   │  (carved with brk)   │                │  -- one per allocation   │
   │                      │                │  -- whole pages          │
   │   freelists (bins)   │                │  -- munmap'd on free     │
   │   chunks &lt;-&gt; chunks  │                └──────────────────────────┘
   └──────────────────────┘                       │
            │                                     │
            v                                     v
        sbrk(2)                                mmap(2)
        kernel                                 kernel
</code></pre>
<p>Take-aways:
- <strong>Big</strong> allocations (<code>&gt; M_MMAP_THRESHOLD</code>, default 128 KiB) go via <code>mmap</code> and
  are returned to the kernel on <code>free</code> (a real <code>munmap</code>).
- <strong>Small/medium</strong> allocations are carved out of an <em>arena</em> — a chunk of
  memory the allocator obtained earlier with <code>sbrk</code> (for the main arena) or
  <code>mmap</code> (for thread arenas).</p>
<h2 id="2-a-chunk">2. A chunk</h2>
<p><code>ptmalloc</code> keeps a tiny <strong>header</strong> before every chunk it gives you. The
pointer <code>malloc</code> returns points to the <strong>payload</strong>, but the header (and
sometimes a footer / inline metadata) live <em>just before</em> and <em>just after</em>
that payload.</p>
<pre><code>                    +-----------------+   &lt;- chunk start
                    | prev_size (8B)  |       only used if previous chunk is free
                    +-----------------+
                    | size  | A M P   |       size of THIS chunk (incl. header),
                    |       | flags   |       low 3 bits hold A/M/P flags:
                    +-----------------+         A = arena (non-main)
   user pointer -&gt;  | payload         |         M = mmap'd
                    | (N bytes)       |         P = previous chunk in use
                    | ...             |
                    | ...             |
                    | padding to 16B  |
                    +-----------------+   &lt;- next chunk's \`prev_size\`
</code></pre>
<p>So <code>sizeof(metadata)</code> is <strong>16 bytes</strong> per allocation on x86_64 (8B prev_size,
8B size+flags). Always.</p>
<blockquote>
<p>Mental model: every <code>malloc(N)</code> actually uses <code>N + 16</code> bytes, rounded up to
a 16-byte multiple, with a minimum chunk size of 32 bytes.</p>
</blockquote>
<p>Free chunks also store forward/backward pointers (<code>fd</code>, <code>bk</code>) <strong>inside the
payload area</strong> so the allocator can chain them in a doubly-linked list.</p>
<pre><code>   FREE chunk (in a bin):
   +-----------------+
   | prev_size       |
   +-----------------+
   | size | A 0 P    |
   +-----------------+
   | fd (next free)  |
   +-----------------+
   | bk (prev free)  |
   +-----------------+
   | unused space    |
   |                 |
   +-----------------+
   | size            |   footer, repeated, for boundary tags
   +-----------------+
</code></pre>
<h2 id="3-bins--the-freelist-taxonomy">3. Bins — the freelist taxonomy</h2>
<p>When you <code>free(p)</code>, the chunk lands in a <strong>bin</strong> according to its size.
There are five families:</p>
<pre><code>   chunk freed ── how big is it?
       │
       │  16..88 B           ─► fastbin (single-linked LIFO, no coalesce)
       │  16..512 B          ─► tcache  (per-thread, single-linked, glibc 2.26+)
       │  16..512 B          ─► smallbin (doubly-linked, exact size)
       │  &gt;= 1024 B          ─► largebin (size-ordered)
       │  any sizes leftover ─► unsorted bin (just freed, scanned on next malloc)
       │  top of arena (wilderness) ─► top chunk
</code></pre>
<h3 id="tcache-glibc--226">Tcache (glibc ≥ 2.26)</h3>
<p>A <strong>per-thread</strong> array of 64 single-linked LIFO lists, one per size class.
Default: 7 chunks per bin, sizes from 24 to 1032 bytes. Tcache makes
<code>malloc</code>/<code>free</code> of small objects essentially lock-free.</p>
<pre><code>   tcache[0]  -&gt;  [chunk]-&gt;[chunk]-&gt;NULL   (16B chunks)
   tcache[1]  -&gt;  [chunk]-&gt;NULL            (32B)
   tcache[2]  -&gt;  NULL                     (48B)
   ...
   tcache[63] -&gt;  ...
</code></pre>
<h3 id="fastbins">Fastbins</h3>
<p>Slightly larger sizes, also single-linked LIFO, but per-arena (not
per-thread). They are <em>not coalesced</em> immediately — they trade some heap
fragmentation for speed. The allocator periodically runs
<code>malloc_consolidate()</code> to merge fastbin chunks with neighbours.</p>
<h3 id="smallbins--largebins">Smallbins / Largebins</h3>
<p>Doubly-linked lists. Smallbins hold exact-size chunks (one bin per size from
16 to 504 bytes). Largebins (size ≥ 1024) hold size-ordered lists for
best-fit.</p>
<h3 id="top-chunk">Top chunk</h3>
<p>The free region at the very top of the heap is called the <strong>top chunk</strong> (a.k.a.
the &ldquo;wilderness&rdquo;). It&rsquo;s the only chunk that can be enlarged by <code>sbrk</code> /
<code>mmap</code>-extension.</p>
<pre><code>   heap (after a while of malloc/free):

   +----------+----------+----------+----------+----------+--------------------+
   | in-use   | FREE     | in-use   | in-use   | FREE     |   TOP CHUNK        |
   +----------+----------+----------+----------+----------+--------------------+
                                                          ^                    ^
                                                          |                    |
                                                       end of last           program break
                                                       in-use chunk          (sbrk(0))
</code></pre>
<h2 id="4-arenas--multi-threaded-heaps">4. Arenas — multi-threaded heaps</h2>
<p>In single-thread land, there is <strong>one arena</strong>: the <em>main arena</em>, grown by
<code>sbrk</code>. When threads appear, contention on the main arena&rsquo;s lock becomes a
bottleneck, so glibc creates <strong>per-thread arenas</strong>:</p>
<ul>
<li>First time thread T calls <code>malloc</code>, glibc may <code>mmap</code> a fresh arena (64 MiB
  default) and use it for T thereafter.</li>
<li>The number of arenas is capped at <code>8 * ncpu</code> (configurable with
  <code>M_ARENA_MAX</code> or env var <code>MALLOC_ARENA_MAX</code>).</li>
<li>Each arena has its own mutex.</li>
</ul>
<pre><code>            [main arena]               [arena 1]              [arena 2]
            +----------+               +----------+           +----------+
            | freelist |               | freelist |           | freelist |
            +----------+               +----------+           +----------+
            | top chunk|               | top chunk|           | top chunk|
            +----------+               +----------+           +----------+
            grown by brk               grown by mmap          grown by mmap

         thread A, main thread        thread B               thread C
         lock(main arena)             lock(arena 1)          lock(arena 2)
</code></pre>
<p>A thread is &ldquo;pinned&rdquo; to its arena but if its arena is contended it may try
the next one. Hence: a malloc-heavy multi-thread workload may show VSZ several
times larger than working set, simply because of arenas.</p>
<h2 id="5-big-allocations--mmap-path">5. Big allocations — <code>mmap</code> path</h2>
<p>When <code>size + headers &gt; M_MMAP_THRESHOLD</code> (default 128 KiB but <strong>dynamic</strong> in
modern glibc), <code>malloc</code> skips the arenas and calls <code>mmap</code>:</p>
<pre><code class="language-c">mmap(NULL, request + 16, PROT_RW, MAP_PRIVATE|MAP_ANONYMOUS, -1, 0);
</code></pre>
<p><code>free</code> on such a chunk calls <code>munmap</code>. Two consequences:</p>
<ul>
<li>Large allocations cost a syscall each, plus 1+ page faults on first touch.</li>
<li>Large allocations are returned to the kernel immediately on <code>free</code> — VSZ
  drops.</li>
</ul>
<p>Tune with <code>mallopt(M_MMAP_THRESHOLD, n)</code> or <code>MALLOC_MMAP_THRESHOLD_=N</code>.</p>
<h2 id="6-how-mallocn-actually-decides">6. How <code>malloc(N)</code> actually decides</h2>
<pre><code>   malloc(N):
   ┌─────────────────────────────────────────────────────────────┐
   │ 1. round N up to chunk size (header + 16-byte align)        │
   │ 2. if size &gt; M_MMAP_THRESHOLD:                              │
   │       p = mmap(...); flag chunk as M; return p              │
   │ 3. else if size fits in tcache and tcache bin not empty:    │
   │       pop from tcache; return                               │
   │ 4. else lock current arena                                  │
   │ 5. if size fits a fastbin and bin not empty: pop, unlock    │
   │ 6. scan smallbin for exact size; pop, unlock                │
   │ 7. scan unsorted bin; pull chunks into smallbin/largebin    │
   │ 8. scan largebin for best fit; split chunk                  │
   │ 9. otherwise grab from top chunk; if too small, sbrk/mmap   │
   │ 10. unlock; return payload                                  │
   └─────────────────────────────────────────────────────────────┘
</code></pre>
<p><code>free(p)</code>:</p>
<pre><code>   free(p):
   ┌─────────────────────────────────────────────────────────────┐
   │ 1. read chunk header at p - 16                              │
   │ 2. if M flag set (mmap'd): munmap; done                     │
   │ 3. if size fits tcache: push onto tcache; done              │
   │ 4. lock arena                                               │
   │ 5. if size fits a fastbin: push; unlock; done               │
   │ 6. coalesce with prev/next free chunks (boundary tags)      │
   │ 7. if neighbour is top chunk: merge; if heap &gt;&gt; threshold,  │
   │    optionally trim with sbrk(neg) or madvise(DONTNEED)      │
   │ 8. push onto unsorted bin                                   │
   │ 9. unlock                                                   │
   └─────────────────────────────────────────────────────────────┘
</code></pre>
<h2 id="7-brk-vs-mmap--why-both">7. <code>brk</code> vs <code>mmap</code> — why both?</h2>
<pre><code>   heap grown with brk           heap grown with mmap
   +-----------+                 +-----------+   +-----------+   +-----+
   |  in-use   |                 |  alloc 1  |   |  alloc 2  |   ...
   |  ----     |                 +-----------+   +-----------+   +-----+
   |  in-use   |                 free =&gt; munmap immediately
   |  free     |
   |  top      |
   +-----------+
   &lt;- one contiguous region -&gt;   &lt;- many separate VMAs -&gt;
</code></pre>
<p>Pros of <code>brk</code>:
- Cheap to extend (no new VMA per allocation).
- Compact metadata (one VMA for the whole heap).</p>
<p>Cons of <code>brk</code>:
- Can only shrink the <em>top</em>. A single in-use chunk near the top prevents the
  heap from being returned to the OS, even if everything else is free.</p>
<p>That&rsquo;s why ptmalloc uses <code>mmap</code> for big chunks: each one is returnable on its
own.</p>
<h2 id="8-alignment">8. Alignment</h2>
<ul>
<li><code>malloc</code> returns memory aligned to <strong>16 bytes</strong> on x86_64 (= <code>alignof
  (max_align_t)</code>).</li>
<li>C11 <code>aligned_alloc(a, sz)</code> lets you ask for larger alignment; <code>a</code> must be
  a power of two and <code>sz</code> a multiple of <code>a</code>.</li>
<li>POSIX <code>posix_memalign(&amp;p, a, sz)</code> is preferable in pre-C11 codebases.</li>
</ul>
<pre><code class="language-c">void *p; posix_memalign(&amp;p, 64, 1024);  // 64-byte aligned, 1 KiB
free(p);
</code></pre>
<p><code>aligned_alloc(64, 100)</code> is <strong>UB</strong> because 100 is not a multiple of 64; pass
128 instead.</p>
<h2 id="9-the-classic-heap-ub-demos">9. The classic heap UB demos</h2>
<p>These are not theoretical — they cause CVEs every year.</p>
<pre><code>   double-free:
   p = malloc(32); free(p); free(p);
   -&gt; tcache push twice -&gt; tcache poisoning -&gt; next malloc returns *your* pointer.

   use-after-free:
   p = malloc(32); free(p);
   strcpy(p, &quot;still writing&quot;);
   -&gt; overwrites freelist link; eventual crash or RCE.

   heap-buffer-overflow:
   p = malloc(16); memcpy(p, src, 32);
   -&gt; trashes next chunk's metadata; eventual &quot;malloc(): memory corruption&quot;
      abort, or worse if the attacker chose carefully.

   invalid free:
   free(p + 1);                  // not a chunk pointer
   free(addr_in_text_segment);   // not a chunk pointer
   -&gt; &quot;free(): invalid pointer&quot; abort.

   realloc(p, 0):
   historically equivalent to free(p), returning NULL; in C2x this is UB.
</code></pre>
<p>glibc has built-in detectors: <code>glibc.malloc.check</code>, <code>MALLOC_CHECK_=3</code>,
tcache double-free protection (a per-slot &ldquo;key&rdquo; tag), unlink macro checks.
They are not security boundaries.</p>
<p>For real protection use <strong>ASan</strong>: <code>gcc -fsanitize=address -g prog.c</code>.</p>

<h2 id="11-quick-exercise">11. Quick exercise</h2>

<pre><code class="language-c">#include &lt;malloc.h&gt;

<p>You will see <em>one</em> arena, <em>no</em> heap growth past the first chunk, and an RSS

  { name: `8. Mmap`, path: `05_mmap/README.md`, dir: `05_mmap`, body: `<h1 id="05--mmap--the-swiss-army-knife-of-memory">05 — <code>mmap</code> — the swiss army knife of memory</h1>
<p><code>mmap(2)</code> is the single most powerful memory syscall on Linux. With it you can:</p>
<ul>
<li>get raw zero-filled pages (the basis of <code>malloc</code>&rsquo;s big allocations),</li>
<li>map files into your address space (so reading is just pointer arithmetic),</li>
<li>share memory between processes,</li>
<li>request huge pages,</li>
<li>enforce strict permissions,</li>
<li>and grow / shrink / move regions.</li>
</ul>
<pre><code>   mmap is to memory what open() is to files.
</code></pre>
<h2 id="1-the-signature">1. The signature</h2>
<pre><code class="language-c">#include &lt;sys/mman.h&gt;
void *mmap(void *addr, size_t length, int prot, int flags, int fd, off_t off);
int   munmap(void *addr, size_t length);
</code></pre>
<table>
<thead>
<tr>
<th>arg</th>
<th>meaning</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>addr</code></td>
<td>hint (<code>NULL</code> lets kernel pick). With <code>MAP_FIXED</code> it&rsquo;s mandatory.</td>
</tr>
<tr>
<td><code>length</code></td>
<td>bytes; <strong>rounded up to a page</strong> (4 KiB).</td>
</tr>
<tr>
<td><code>prot</code></td>
<td><code>PROT_READ</code>, <code>PROT_WRITE</code>, <code>PROT_EXEC</code>, <code>PROT_NONE</code> (bitwise OR).</td>
</tr>
<tr>
<td><code>flags</code></td>
<td>see below. Pick exactly one of <code>MAP_PRIVATE</code> / <code>MAP_SHARED</code>.</td>
</tr>
<tr>
<td><code>fd</code></td>
<td>file descriptor; <code>-1</code> for anonymous.</td>
</tr>
<tr>
<td><code>off</code></td>
<td>must be a page multiple.</td>
</tr>
</tbody>
</table>
<h2 id="2-four-basic-combinations">2. Four basic combinations</h2>
<pre><code>                     anonymous (fd=-1, MAP_ANONYMOUS)     file-backed (fd&gt;=0)
                    +----------------------------------+ +-----------------------------+
   MAP_PRIVATE      |  zero pages, CoW                 | |  read file contents lazily; |
                    |  good for malloc-style memory    | |  writes invisible to others |
                    |  freed on munmap; never on disk  | |  and discarded at munmap    |
                    +----------------------------------+ +-----------------------------+
   MAP_SHARED       |  shared between fork'd processes | |  writes go back to the file |
                    |  (legacy MAP_SHARED|ANONYMOUS)   | |  shared with everyone who   |
                    |                                  | |  mmaps the same inode       |
                    +----------------------------------+ +-----------------------------+
</code></pre>
<ul>
<li><strong>MAP_PRIVATE | MAP_ANONYMOUS</strong> = &ldquo;give me N bytes of zero&rdquo;. Used by <code>malloc</code>
  for big allocs, and by everyone for arbitrary memory.</li>
<li><strong>MAP_SHARED | file</strong> = &ldquo;let me read/write this file through a pointer&rdquo;.
  Used by <code>mmap I/O</code>, databases (SQLite, LMDB), shared libraries (<code>r-xp</code>).</li>
<li><strong>MAP_PRIVATE | file</strong> = &ldquo;show me the file, but my writes are mine alone.&rdquo;
  Used to load executables: the loader maps <code>.text</code> with <code>r-xp</code> and <code>.data</code>
  with <code>rw-p</code> MAP_PRIVATE so each process gets its own copy on first write.</li>
<li><strong>MAP_SHARED | MAP_ANONYMOUS</strong> = shareable memory after <code>fork()</code>. Older
  pattern; modern code prefers <code>memfd_create</code> or <code>shm_open</code>.</li>
</ul>
<h2 id="3-the-flags-zoo">3. The flags zoo</h2>
<table>
<thead>
<tr>
<th>Flag</th>
<th>Effect</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>MAP_PRIVATE</code></td>
<td>CoW; private to this mapping</td>
</tr>
<tr>
<td><code>MAP_SHARED</code></td>
<td>writes are visible to everyone mapping the same object</td>
</tr>
<tr>
<td><code>MAP_SHARED_VALIDATE</code></td>
<td>like SHARED but error if any flag is unknown</td>
</tr>
<tr>
<td><code>MAP_ANONYMOUS</code></td>
<td>not backed by a file; zero-filled; <code>fd</code> must be -1</td>
</tr>
<tr>
<td><code>MAP_FIXED</code></td>
<td>place exactly at <code>addr</code> (clobbers existing mappings; dangerous)</td>
</tr>
<tr>
<td><code>MAP_FIXED_NOREPLACE</code></td>
<td>like FIXED but fail instead of clobber (Linux 4.17+)</td>
</tr>
<tr>
<td><code>MAP_POPULATE</code></td>
<td>pre-fault all pages so they&rsquo;re already resident</td>
</tr>
<tr>
<td><code>MAP_NORESERVE</code></td>
<td>don&rsquo;t reserve swap; allows over-commit on private mappings</td>
</tr>
<tr>
<td><code>MAP_LOCKED</code></td>
<td>call <code>mlock</code> after mapping</td>
</tr>
<tr>
<td><code>MAP_HUGETLB</code></td>
<td>use huge pages (need <code>huge_page_count &gt;0</code>)</td>
</tr>
<tr>
<td><code>MAP_HUGE_2MB</code> / <code>MAP_HUGE_1GB</code></td>
<td>pick page size with HUGETLB</td>
</tr>
<tr>
<td><code>MAP_STACK</code></td>
<td>mark as suitable for a stack (some arches align)</td>
</tr>
<tr>
<td><code>MAP_GROWSDOWN</code></td>
<td>legacy stack flag</td>
</tr>
<tr>
<td><code>MAP_UNINITIALIZED</code></td>
<td>embedded only; skip zero-fill</td>
</tr>
<tr>
<td><code>MAP_SYNC</code></td>
<td>(DAX) writes guaranteed durable on return</td>
</tr>
</tbody>
</table>
<h2 id="4-the-lifecycle">4. The lifecycle</h2>
<pre><code>   void *p = mmap(NULL, len, PROT_READ|PROT_WRITE, MAP_PRIVATE|MAP_ANONYMOUS, -1, 0);
                |
                |  kernel: create VMA at chosen address, no PTEs yet
                v
   touch p[i]
                |  page fault, kernel allocates frame (or maps zero page on read),
                |  installs PTE
                v
   madvise(p, len, MADV_DONTNEED)
                |  kernel drops the frames; VMA stays
                v
   mprotect(p, len, PROT_READ)
                |  PTEs marked RO; writes now fault SIGSEGV
                v
   munmap(p, len)
                |  VMA destroyed; PTEs cleared
</code></pre>
<h2 id="5-file-mapping-demystified">5. File mapping demystified</h2>
<pre><code>   open(&quot;img.bmp&quot;, O_RDONLY)         -- get an fd
   stat(... &amp;st)                     -- learn size
   p = mmap(NULL, st.st_size, PROT_READ, MAP_PRIVATE, fd, 0);
   close(fd);                        -- safe; mapping holds its own ref
   ...
   uint32_t pixel = ((uint32_t *)p)[42];
   munmap(p, st.st_size);
</code></pre>
<p>Visual:</p>
<pre><code>   disk file img.bmp
   +-----------------+-----------------+-----------------+
   | page 0 (4 KiB)  | page 1          | page 2          |
   +--------+--------+--------+--------+--------+--------+
            |                 |                 |
            v                 v                 v
   process A virtual address space:
   p -&gt;  +---+    p+4K -&gt; +---+   p+8K -&gt; +---+
         |   |             |   |          |   |
         +---+             +---+          +---+
</code></pre>
<ul>
<li>The kernel does <em>not</em> read every page on <code>mmap</code>. Pages are pulled in on
  demand from the page cache (a major fault, then probably hits cache and is
  free).</li>
<li>If the file is also being read by another process via <code>read()</code>, you share
  the same page cache pages.</li>
</ul>
<h3 id="modifying-a-file-via-mmap">Modifying a file via mmap</h3>
<pre><code class="language-c">fd = open(&quot;data&quot;, O_RDWR);
p  = mmap(NULL, sz, PROT_READ|PROT_WRITE, MAP_SHARED, fd, 0);
((char *)p)[100] = 'X';        // dirty the page
msync(p, sz, MS_SYNC);         // optional: flush now
munmap(p, sz);
</code></pre>
<p><code>MAP_SHARED</code> writes mark the page dirty. <code>pdflush</code>/<code>kworker</code> will eventually
write them back; <code>msync</code> forces it.</p>
<h2 id="6-mprotect--change-permissions">6. <code>mprotect</code> — change permissions</h2>
<pre><code class="language-c">mprotect(p, len, PROT_READ);                  // make RO
mprotect(p, len, PROT_NONE);                  // unmap-but-keep-VMA, for guard pages
mprotect(p, len, PROT_READ|PROT_EXEC);        // RX for JIT
</code></pre>
<p>Requires page-aligned <code>p</code> and <code>len</code>. Useful for:
- Guard pages around buffers (<a href="05_mprotect_guard.c"><code>05_mprotect_guard.c</code></a>).
- JIT compilers: write code as RW, flip to RX before executing.</p>
<h2 id="7-madvise--hints">7. <code>madvise</code> — hints</h2>
<pre><code class="language-c">madvise(p, len, MADV_WILLNEED);     // prefault, please read ahead
madvise(p, len, MADV_DONTNEED);     // drop frames, future reads zero
madvise(p, len, MADV_SEQUENTIAL);   // aggressive readahead
madvise(p, len, MADV_RANDOM);       // disable readahead
madvise(p, len, MADV_FREE);         // lazy free; kernel may reclaim
madvise(p, len, MADV_HUGEPAGE);     // try to promote to THP
madvise(p, len, MADV_DONTFORK);     // child doesn't inherit this region
madvise(p, len, MADV_WIPEONFORK);   // child sees zeroed copy
</code></pre>
<p><code>MADV_DONTNEED</code> is the <strong>immediate</strong> version of <code>MADV_FREE</code>: pages are gone
right now and counts decrement.</p>
<h2 id="8-mremap--grow--move">8. <code>mremap</code> — grow / move</h2>
<pre><code class="language-c">void *q = mremap(p, old_len, new_len, MREMAP_MAYMOVE);
</code></pre>
<ul>
<li>Grows or shrinks in place if possible.</li>
<li>With <code>MREMAP_MAYMOVE</code>, kernel may pick a new VA and move the VMA cheaply
  (it doesn&rsquo;t copy pages — it relinks page tables).</li>
<li>With <code>MREMAP_FIXED|MREMAP_MAYMOVE</code>, places at a specific address.</li>
</ul>
<p>This is faster than <code>mmap</code> + <code>memcpy</code> + <code>munmap</code> because no data is copied;
the kernel just rewires the page tables.</p>
<h2 id="9-huge-pages-via-mmap">9. Huge pages via mmap</h2>
<pre><code class="language-c">void *p = mmap(NULL, 2UL*1024*1024,
               PROT_READ|PROT_WRITE,
               MAP_PRIVATE|MAP_ANONYMOUS|MAP_HUGETLB|MAP_HUGE_2MB, -1, 0);
</code></pre>
<p>Need <code>sudo sh -c 'echo 64 &gt; /proc/sys/vm/nr_hugepages'</code> first (reserves 64
huge pages × 2 MiB = 128 MiB).</p>
<p>Why? 1 TLB entry covers 2 MiB (or 1 GiB) instead of 4 KiB. For workloads with
huge working sets (databases, ML), TLB pressure dominates.</p>
<p>See <a href="../13_advanced/02_huge_tlb.c"><code>../13_advanced/02_huge_tlb.c</code></a>.</p>

  { name: `9. Brk Sbrk`, path: `06_brk_sbrk/README.md`, dir: `06_brk_sbrk`, body: `<h1 id="06--brk-and-sbrk--the-program-break">06 — <code>brk</code> and <code>sbrk</code> — the program break</h1>
<p><code>brk(2)</code> and <code>sbrk(2)</code> are the two oldest memory syscalls in UNIX. They set
the <strong>program break</strong> — the highest virtual address used by the data segment
(heap). <code>malloc</code> was originally just a thin wrapper around them. Modern
glibc still uses <code>brk</code> for the main arena.</p>
<h2 id="1-the-picture">1. The picture</h2>
<pre><code>   process VA (excerpt around heap)
        ...
        +-------------------------+   &lt;- start_brk  (top of .bss/.data)
        |       in-use heap       |
        |                         |
        |                         |
        +-------------------------+   &lt;- brk(0) / sbrk(0) -- current break
        |                         |
        |                         |
        +-------------------------+   &lt;- never used yet (still virtual hole)
        ...
</code></pre>
<ul>
<li><code>brk(addr)</code>: set the break to <code>addr</code>. Return 0 on success, -1 on error.</li>
<li><code>sbrk(incr)</code>: increase break by <code>incr</code> bytes, return the <strong>old</strong> break.
  <code>sbrk(0)</code> returns the current break without changing it.</li>
</ul>
<p>In <code>/proc/self/maps</code>:</p>
<pre><code>   555a3b9b1000-555a3b9d2000 rw-p 00000000 00:00 0      [heap]
                  ^                                       ^
                  start_brk                              current break
</code></pre>
<h2 id="2-why-is-sbrk-deprecated">2. Why is <code>sbrk</code> &ldquo;deprecated&rdquo;?</h2>
<p>It isn&rsquo;t <em>technically</em> deprecated, but:</p>
<ul>
<li>It&rsquo;s not thread-safe. Two threads calling <code>sbrk</code> simultaneously could
  collide. glibc takes the malloc arena lock around it.</li>
<li>It only grows in one direction (up). You can shrink with <code>brk(smaller)</code>,
  but only if everything above the new break is unused.</li>
<li>It only grows one <strong>contiguous</strong> region. If something (<code>mmap</code>&lsquo;d library
  segment, thread arena) ends up directly above the heap, <code>brk</code> can&rsquo;t grow
  further — <code>malloc</code> will fall back to <code>mmap</code>.</li>
</ul>
<p>For these reasons, modern allocators (jemalloc, mimalloc, tcmalloc) avoid
<code>brk</code> entirely. glibc keeps using it for the main arena only.</p>
<h2 id="3-worked-example">3. Worked example</h2>
<pre><code class="language-c">void *base = sbrk(0);
sbrk(4096);                   // grow break by one page
*(char *)base = 'A';          // valid: that page belongs to us
sbrk(-4096);                  // shrink back
*(char *)base = 'A';          // !!! UB: page no longer owned
</code></pre>
<p>The kernel doesn&rsquo;t necessarily unmap on <code>brk(smaller)</code> — it may keep the
pages mapped until pressure forces a reclaim — but reading from them is UB.</p>
<h2 id="4-sequence-diagram">4. Sequence diagram</h2>
<pre><code>   user             glibc                     kernel
   ----             -----                     ------
   malloc(N)
     |---&gt;          ptmalloc lock
                    no chunk fits
                    -- need to grow main arena --
                    sbrk(M)   ----------------&gt; set break += M
                    &lt;----------------- old break (= chunk addr)
                    initialise chunk header
                    unlock
   &lt;----------------  payload
</code></pre>
<h2 id="5-files">5. Files</h2>
<table>
<thead>
<tr>
<th>File</th>
<th>Demonstrates</th>
</tr>
</thead>
<tbody>
<tr>
<td><a href="01_program_break.c"><code>01_program_break.c</code></a></td>
<td>Print <code>sbrk(0)</code> before/after small/large <code>malloc</code></td>
</tr>
<tr>
<td><a href="02_brk_directly.c"><code>02_brk_directly.c</code></a></td>
<td>Allocate memory by calling <code>brk</code> directly (no malloc)</td>
</tr>
</tbody>
</table>` },
  { name: `10. Paging Swapping`, path: `07_paging_swapping/README.md`, dir: `07_paging_swapping`, body: `<h1 id="07--paging-page-cache-swap-and-the-oom-killer">07 — Paging, Page Cache, Swap, and the OOM Killer</h1>
<p>So far we&rsquo;ve talked about memory from the <em>process&rsquo;s</em> viewpoint. This section
looks at the system level: how the kernel rations RAM, what the <strong>page
cache</strong> is, how <strong>swap</strong> works, and why your program just got killed by the
OOM killer at 3am.</p>
<h2 id="1-where-do-physical-frames-live">1. Where do physical frames live?</h2>
<pre><code>                            +------- PHYSICAL RAM -------+
                            |                            |
                            |  free pages                |
                            |    (kept on per-NUMA       |
                            |     buddy free lists)      |
                            |                            |
                            |  anonymous pages           | &lt;- your malloc,
                            |    (process private RAM)   |    stacks, bss
                            |                            |
                            |  file-backed (page cache)  | &lt;- mmap'd files,
                            |    clean / dirty           |    read() buffers
                            |                            |
                            |  slab / kernel             | &lt;- inode caches,
                            |                            |    network buffers
                            |  reserved / kernel text    |
                            +----------------------------+
</code></pre>
<p><code>cat /proc/meminfo</code> shows the breakdown:</p>
<pre><code>   MemTotal:       16252160 kB     total RAM the kernel sees
   MemFree:         1234567 kB     unused, on buddy free lists
   MemAvailable:    8000000 kB     &quot;you can probably allocate this much&quot;
   Buffers:           45000 kB     page cache for block devices (raw)
   Cached:          6800000 kB     page cache for files (incl. tmpfs)
   SwapTotal:       4194304 kB
   SwapFree:        4150000 kB
   Dirty:               500 kB     dirty (not yet written to disk) page cache
   Writeback:             0 kB     currently being written
   AnonPages:       4500000 kB     non-file-backed (heap/stack/anon mmap)
   Mapped:           700000 kB     mapped via mmap somewhere
   Slab:             400000 kB     kernel slab (kmalloc internals)
   ...
</code></pre>
<h2 id="2-the-page-cache">2. The page cache</h2>
<p>Every read or write to a regular file goes through the <strong>page cache</strong>:</p>
<pre><code>   write(fd, buf, n)
        |
        v
   kernel copies buf -&gt; page cache pages (RAM); marks them dirty
        |
        v
   returns immediately (no disk I/O yet)
        |
        v
   later: pdflush / kworker writes dirty pages to disk
   (sync() / fsync() forces it now)
</code></pre>
<p><code>mmap(file, MAP_SHARED)</code> lets you skip the copy entirely — you read and write
the cache pages directly via your mapping.</p>
<h3 id="why-is-free-showing-little-free-ram">Why is <code>free</code> showing little free RAM?</h3>
<p>Because Linux uses every byte it has. Cached file pages are not &ldquo;in use&rdquo; in
any meaningful sense — they will be evicted instantly when something else
needs memory. Look at <code>MemAvailable</code>, not <code>MemFree</code>.</p>
<h3 id="dropping-the-page-cache-debug-only">Dropping the page cache (debug only)</h3>
<pre><code class="language-bash">sync &amp;&amp; echo 3 | sudo tee /proc/sys/vm/drop_caches
# 1 = clean page cache, 2 = slab, 3 = both
</code></pre>
<h2 id="3-the-buddy-allocator">3. The buddy allocator</h2>
<p>The kernel&rsquo;s physical-frame allocator is a <strong>buddy system</strong>.</p>
<pre><code>   memory split into orders:
     order 0 = 1 page    = 4 KiB
     order 1 = 2 pages   = 8 KiB
     order 2 = 4 pages   = 16 KiB
     ...
     order 10 = 1024 pages = 4 MiB

   free list per (zone, order):
   +--------+--------+--------+ ...
   | order0 | order1 | order2 |
   +--------+--------+--------+
   | head | | head | | head | |
   |  v   | |  v   | |  v   | |
   | pg-&gt; | | pg-&gt; | | pg-&gt; | |
   | pg   | | pg   | | pg   | |
   +------+ +------+ +------+
</code></pre>
<p><code>cat /proc/buddyinfo</code>:</p>
<pre><code>   Node 0, zone DMA32  1234  567  89  10  ...
                       ^     ^     ^   ^
                       order 0 (4K), 1 (8K), 2 (16K), 3 (32K), ...
</code></pre>
<p>When the kernel needs N contiguous pages, it asks for <code>2^ceil(log2(N))</code> and
splits a buddy bigger than that. Releases coalesce buddies recursively.</p>
<p>External fragmentation can be a problem: lots of free 4 KiB pages, no
contiguous 2 MiB block for THP. Hence <strong>memory compaction</strong>.</p>
<h2 id="4-swap">4. Swap</h2>
<p>When RAM is exhausted (more precisely: when the kernel&rsquo;s LRU lists need to
evict pages), it picks <strong>inactive anonymous</strong> pages and writes them out to
the <strong>swap device</strong> (a swap partition or swapfile).</p>
<pre><code>   anonymous page lifecycle:

     created (e.g. malloc + first touch)
           |
     +-----v-----+
     | active    |  recently used
     +-----------+
           |
           v
     +-----------+
     | inactive  |  not used in a while
     +-----------+
           |
           v
     written to swap; page reclaimed; PTE points to swap slot
           |
           v
     next access -&gt; #PF (major); kernel reads from swap; re-resident
</code></pre>
<p>Two important sysctls:</p>
<ul>
<li><code>vm.swappiness</code> (0..200, default 60). Higher = swap more eagerly.</li>
<li><code>vm.overcommit_memory</code>:</li>
<li><code>0</code> (default): heuristic — refuses really obviously impossible allocations.</li>
<li><code>1</code>: always say yes. <code>malloc</code> of 1 PiB succeeds; you OOM-kill when you
    touch it.</li>
<li><code>2</code>: strict — <code>CommitLimit = swap + RAM × overcommit_ratio/100</code>.</li>
</ul>
<h3 id="why-isnt-file-backed-memory-swapped">Why isn&rsquo;t <em>file-backed</em> memory swapped?</h3>
<p>Because we can just throw it away and read it again from the file on next
access. Only anonymous (non-file) pages need to go through swap.</p>
<h2 id="5-the-oom-killer">5. The OOM killer</h2>
<p>When the kernel is <strong>truly</strong> out of memory and can&rsquo;t reclaim any more pages,
it invokes <code>oom_kill_process</code>. Each process has an OOM <strong>score</strong> (visible at
<code>/proc/PID/oom_score</code>):</p>
<pre><code>   higher score = killed first.
   score = badness(memory_use, runtime, oom_score_adj, ...)
</code></pre>
<p>You can bias your process:</p>
<pre><code class="language-c">int fd = open(&quot;/proc/self/oom_score_adj&quot;, O_WRONLY);
write(fd, &quot;-1000&quot;, 5);   // never killed if any other option exists
close(fd);
</code></pre>
<p>Or with <code>choom -p PID -n N</code>.</p>
<p>When a process is killed, you see in <code>dmesg</code>:</p>
<pre><code>   Out of memory: Killed process 1234 (foo) total-vm:8GB,
       anon-rss:7GB, file-rss:0kB, shmem-rss:0kB
</code></pre>
<h2 id="6-mlock--pin-pages-in-ram">6. <code>mlock</code> — pin pages in RAM</h2>
<p>For real-time / security-sensitive code (cryptographic keys must not be
swapped to disk), use <code>mlock</code>:</p>
<pre><code class="language-c">char *secret = malloc(64);
mlock(secret, 64);          // pin in RAM
// ... use secret ...
explicit_bzero(secret, 64);
munlock(secret, 64);
free(secret);
</code></pre>
<p>Or pin the entire process:</p>
<pre><code class="language-c">mlockall(MCL_CURRENT | MCL_FUTURE);
</code></pre>
<p>Limited by <code>RLIMIT_MEMLOCK</code> for non-root.</p>
<h2 id="7-watching-swap--faults--rss">7. Watching swap / faults / RSS</h2>
<pre><code class="language-bash">vmstat 1                # si/so columns = swap in/out per sec
free -h                 # human totals
sar -B 1                # paging stats
cat /proc/PID/status | grep -E 'Vm|Hugepages'
cat /proc/PID/smaps_rollup
/usr/bin/time -v ./prog # majfaults, minor faults, maxrss

</code></pre>

  { name: `11. Process Syscalls`, path: `08_process_syscalls/README.md`, dir: `08_process_syscalls`, body: `<h1 id="08--process-syscalls-fork--exec--wait--clone--signals">08 — Process Syscalls (fork / exec / wait / clone / signals)</h1>
<p>A <em>process</em> is the kernel-side data structure (<code>struct task_struct</code>) wrapping
&ldquo;one address space + one or more threads + one set of fds + &hellip;&rdquo;. This
section is how you create, control, and tear down processes from C.</p>
<h2 id="1-the-life-of-a-process">1. The life of a process</h2>
<pre><code>   fork() / clone()        execve()                 _exit()
       |                       |                      |
       v                       v                      v
   +------------+    +-------------------+   +-----------------+
   |  newborn   |---&gt;|  running          |--&gt;|  zombie (Z)     |--&gt; reaped by
   |  child     |    |  R / S / D / T    |   |  exit_code held |    parent's
   +------------+    +-------------------+   +-----------------+    wait()
                          ^                       ^
                          |                       |
                       signals,                  parent must call
                       scheduling                wait/waitpid/waitid
                                                 (or pre-set SA_NOCLDWAIT)
</code></pre>
<p>Process states (visible in <code>ps -o pid,stat</code>):</p>
<pre><code>   R   running / runnable
   S   interruptible sleep    (most blocking I/O)
   D   uninterruptible sleep  (I/O that ignores signals; can't kill)
   T   stopped (Ctrl-Z)
   t   traced (gdb attached)
   Z   zombie (exited, parent hasn't waited)
   X   dead (just removed)
</code></pre>
<h2 id="2-fork">2. <code>fork()</code></h2>
<pre><code class="language-c">pid_t pid = fork();
if (pid &lt; 0)        perror(&quot;fork&quot;), exit(1);
else if (pid == 0)  /* child  -- runs in a copy of the parent */
else                /* parent -- pid is the child's PID       */
</code></pre>
<p>What gets duplicated:</p>
<pre><code>   shared (read by both):                copied (CoW until written):
     - file descriptors (refcount++)      - the entire address space
     - controlling tty                      (anon pages, heap, stack
     - signal dispositions                  shared libs)
     - umask, cwd, ...                    - registers
                                            - thread-local storage
   reset in child:
     - pid, ppid
     - file lock state
     - timers, semadj, ...
</code></pre>
<p>Pictorially:</p>
<pre><code>   before fork():                                after fork():
   parent
     +----------------+                          parent             child
     | data  [F1][F2] |                            |                  |
     | heap  [F3][F4] |                            v                  v
     | stack ...      |                          [F1*][F2*]         [F1*][F2*]    &lt;- frames marked RO
     +----------------+                          [F3*][F4*]         [F3*][F4*]       and shared
                                                 stack ...          stack ...
                                                  ^ on first write, frame is copied
</code></pre>
<h2 id="3-execve">3. <code>execve()</code></h2>
<p>Replaces the entire address space with a new program.</p>
<pre><code class="language-c">char *argv[] = { &quot;ls&quot;, &quot;-la&quot;, NULL };
char *envp[] = { &quot;PATH=/usr/bin&quot;, NULL };
execve(&quot;/bin/ls&quot;, argv, envp);
perror(&quot;execve&quot;);   /* only reached on failure */
</code></pre>
<p>What survives the call:</p>
<pre><code>   survives execve:                           gone after execve:
     - pid                                      - text, data, bss, heap, stack
     - ppid                                     - mappings (mmap, mlock)
     - open fds (unless O_CLOEXEC)              - signal handlers (reset to default)
     - cwd, umask, controlling tty              - threads (only main remains)
     - resource limits                          - the whole image
     - signal mask
     - environment (if you pass envp through)
</code></pre>
<p>Variants:</p>
<pre><code>   execve(path, argv, envp)        the syscall
   execv (path, argv)              uses current environ
   execvp(file, argv)              search PATH
   execve(...) with envp = NULL    not portable; pass an empty array
   execvpe(file, argv, envp)       PATH + env
   execl/execle/execlp/execlpe     variadic flavours (NUL-terminated list)
</code></pre>
<h2 id="4-wait-family--reaping-children">4. <code>wait</code> family — reaping children</h2>
<pre><code class="language-c">int status;
pid_t cpid = waitpid(-1, &amp;status, 0);    // -1 = any child, 0 = block

if (WIFEXITED(status))   printf(&quot;exited with %d\\n&quot;, WEXITSTATUS(status));
if (WIFSIGNALED(status)) printf(&quot;killed by signal %d\\n&quot;, WTERMSIG(status));
if (WIFSTOPPED(status))  printf(&quot;stopped by %d\\n&quot;, WSTOPSIG(status));
if (WIFCONTINUED(status))printf(&quot;continued\\n&quot;);
</code></pre>
<p>Variants:</p>
<pre><code>   wait(&amp;status)                       reap any one child
   waitpid(pid, &amp;s, opt)               specific child or -1 (any)
   waitid(idtype, id, &amp;siginfo, opt)   more info via siginfo_t
   wait3, wait4                        legacy + rusage
</code></pre>
<p>Options:</p>
<pre><code>   WNOHANG     don't block, return 0 if no child to reap
   WUNTRACED   also report stopped children
   WCONTINUED  also report resumed children
</code></pre>
<h3 id="zombies-and-orphans">Zombies and orphans</h3>
<ul>
<li><strong>Zombie</strong>: child exited, parent hasn&rsquo;t waited. Holds onto a tiny kernel
  struct + exit code. State <code>Z</code>.</li>
<li><strong>Orphan</strong>: parent died first. The orphan is re-parented to <code>init</code> (PID 1)
  which always <code>wait</code>s.</li>
</ul>
<p>To prevent zombies in a server you don&rsquo;t care about reaping:</p>
<pre><code class="language-c">struct sigaction sa = { .sa_handler = SIG_IGN, .sa_flags = SA_NOCLDWAIT };
sigaction(SIGCHLD, &amp;sa, NULL);
</code></pre>
<p>Or <code>fork</code>-twice (the classic daemonisation trick).</p>
<h2 id="5-clone--the-real-syscall">5. <code>clone()</code> — the real syscall</h2>
<p><code>fork()</code>, <code>vfork()</code>, and <code>pthread_create()</code> are all implemented via
<code>clone(2)</code>. Its flags pick what is <strong>shared</strong> vs <strong>copied</strong>:</p>
<pre><code>   CLONE_VM       address space is shared    (threads, vfork)
   CLONE_FS       cwd, umask, root           (threads)
   CLONE_FILES    fd table                   (threads)
   CLONE_SIGHAND  signal handlers            (threads)
   CLONE_THREAD   same thread group (TGID)   (threads)
   CLONE_PARENT   same ppid as caller
   CLONE_NEWPID   new PID namespace          (containers)
   CLONE_NEWNS    new mount namespace        (containers)
   CLONE_NEWNET   new network namespace
   CLONE_NEWUTS   new hostname namespace
   CLONE_NEWIPC, CLONE_NEWUSER, CLONE_NEWCGROUP
   CLONE_CHILD_CLEARTID  for futex (used by glibc to do pthread_join)
   CLONE_SETTLS         set new TLS (FS base on x86_64)
</code></pre>
<p><code>fork()</code> = <code>clone(SIGCHLD)</code> — nothing shared.
<code>pthread_create()</code> ≈ <code>clone(CLONE_VM|CLONE_FS|CLONE_FILES|CLONE_SIGHAND|CLONE_THREAD|CLONE_SYSVSEM|CLONE_SETTLS|CLONE_PARENT_SETTID|CLONE_CHILD_CLEARTID, stack, ...)</code></p>
<p>We have a raw-<code>clone</code> example in
<a href="05_clone_thread.c"><code>05_clone_thread.c</code></a>.</p>
<h2 id="6-vfork">6. <code>vfork()</code></h2>
<pre><code class="language-c">pid_t pid = vfork();   // child shares VM with parent until execve or _exit
</code></pre>
<ul>
<li>Child runs in the <strong>same address space</strong> as the parent.</li>
<li>Parent is <strong>suspended</strong> until the child does <code>execve</code> or <code>_exit</code>.</li>
<li>Used for the tiny shim &ldquo;fork-then-exec&rdquo; without paying the CoW page-table
  copy cost. Modern Linux makes CoW cheap so the benefit is minor.</li>
<li>Dangerous: in the child you can write to the parent&rsquo;s stack — only call
  exec/_exit, nothing else.</li>
</ul>
<h2 id="7-signals--interrupting-your-process">7. Signals — interrupting your process</h2>
<p>A <strong>signal</strong> is a notification delivered to a process or thread.</p>
<pre><code>   when:                       kernel queues a signal
                               +--------+
                               | signal |
                               +--------+
                                    |
                                    v
   ----------------------- process is scheduled -----------------------
                                    |
                                    v
                       is signal in this thread's mask?
                          yes -&gt; stays pending
                          no  -&gt; deliver:
                                   |
                                   +-&gt; default action (SIG_DFL):
                                   |     SIGTERM, SIGINT: term
                                   |     SIGKILL, SIGSTOP: term/stop, NOT catchable
                                   |     SIGCHLD: ignored
                                   |     SIGSEGV: term + coredump
                                   +-&gt; SIG_IGN: ignored
                                   +-&gt; user handler:
                                         saved context, call handler,
                                         then sigreturn back
</code></pre>
<p>The most common signals:</p>
<table>
<thead>
<tr>
<th>Sig</th>
<th>Default</th>
<th>Cause</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>SIGHUP</code></td>
<td>term</td>
<td>terminal closed</td>
</tr>
<tr>
<td><code>SIGINT</code></td>
<td>term</td>
<td>Ctrl-C</td>
</tr>
<tr>
<td><code>SIGQUIT</code></td>
<td>core</td>
<td>Ctrl-\\</td>
</tr>
<tr>
<td><code>SIGILL</code></td>
<td>core</td>
<td>illegal instruction</td>
</tr>
<tr>
<td><code>SIGABRT</code></td>
<td>core</td>
<td><code>abort()</code>, also from heap corruption</td>
</tr>
<tr>
<td><code>SIGFPE</code></td>
<td>core</td>
<td>div-by-zero</td>
</tr>
<tr>
<td><code>SIGKILL</code></td>
<td>term</td>
<td>unblockable kill</td>
</tr>
<tr>
<td><code>SIGSEGV</code></td>
<td>core</td>
<td>bad memory access</td>
</tr>
<tr>
<td><code>SIGPIPE</code></td>
<td>term</td>
<td>write to closed pipe</td>
</tr>
<tr>
<td><code>SIGALRM</code></td>
<td>term</td>
<td><code>alarm</code>/<code>setitimer</code></td>
</tr>
<tr>
<td><code>SIGTERM</code></td>
<td>term</td>
<td>polite kill</td>
</tr>
<tr>
<td><code>SIGCHLD</code></td>
<td>ign</td>
<td>child stopped/terminated</td>
</tr>
<tr>
<td><code>SIGSTOP</code></td>
<td>stop</td>
<td>unblockable stop</td>
</tr>
<tr>
<td><code>SIGCONT</code></td>
<td>cont</td>
<td>continue</td>
</tr>
<tr>
<td><code>SIGUSR1/2</code></td>
<td>term</td>
<td>application-defined</td>
</tr>
</tbody>
</table>
<h3 id="install-a-handler--always-use-sigaction-never-signal">Install a handler — always use <code>sigaction</code>, never <code>signal</code></h3>
<pre><code class="language-c">void handler(int s, siginfo_t *si, void *uc) { /* ... */ }
struct sigaction sa = {0};
sa.sa_sigaction = handler;
sa.sa_flags = SA_SIGINFO | SA_RESTART;   // SA_RESTART: auto-restart syscalls
sigemptyset(&amp;sa.sa_mask);
sigaction(SIGTERM, &amp;sa, NULL);
</code></pre>
<h3 id="async-signal-safe-functions">Async-signal-safe functions</h3>
<p>The list of functions you can call inside a handler is <strong>tiny</strong>: see
<code>signal-safety(7)</code>. <code>printf</code>, <code>malloc</code>, <code>free</code>, <code>pthread_mutex_lock</code> are
<em>not</em> on it. Stick to <code>write</code>, <code>_exit</code>, <code>signalfd</code>-style designs, or set a
flag (<code>volatile sig_atomic_t flag = 1</code>) and handle in the main loop.</p>
<h2 id="8-pipes-and-fork--classic-ipc">8. Pipes and <code>fork</code> — classic IPC</h2>
<pre><code class="language-c">int fd[2];
pipe(fd);                    // [0] = read, [1] = write
pid_t pid = fork();
if (pid == 0) {
    close(fd[1]);            // child reads
    char buf[64];
    int n = read(fd[0], buf, sizeof buf);
    write(1, buf, n);
    _exit(0);
}
close(fd[0]);                // parent writes
write(fd[1], &quot;hi child\\n&quot;, 9);
close(fd[1]);                // child reads EOF
waitpid(pid, NULL, 0);
</code></pre>
<p>Pipe data lives in a small in-kernel circular buffer (64 KiB by default).</p>
<pre><code>   parent          kernel              child
   write(fd[1]) -&gt; [ buffer .... ] -&gt; read(fd[0])
                    ^                  ^
                    one fd per end; close both refs to drop
</code></pre>
<h2 id="9-daemonisation">9. Daemonisation</h2>
<pre><code>   1. fork ; parent exits      -&gt; child has new ppid (init eventually)
   2. setsid()                 -&gt; become session leader, no controlling tty
   3. fork again ; parent exits-&gt; child no longer session leader,
                                  can't acquire tty by accident
   4. chdir(&quot;/&quot;)               -&gt; don't pin any filesystem
   5. umask(0)                 -&gt; predictable file perms
   6. close stdin/out/err or redirect to /dev/null
   7. open syslog / log file
</code></pre>
<p>See <a href="07_daemonise.c"><code>07_daemonise.c</code></a>.</p>

</tr>

  { name: `12. Threads Memory`, path: `09_threads_memory/README.md`, dir: `09_threads_memory`, body: `<h1 id="09--threads-from-a-memory-perspective">09 — Threads from a Memory Perspective</h1>
<p>We covered threads from a <em>synchronisation</em> perspective in the sibling
<a href="../../threading_guide/">threading_guide</a>. Here we look at them strictly from
the <strong>memory</strong> side: where does a thread&rsquo;s stack live, what is TLS, how does
glibc actually create a thread, and what is a futex.</p>
<h2 id="1-what-gets-shared">1. What gets shared</h2>
<pre><code>   Process address space (ONE PML4 / CR3 / page tables)
   +-------------------------------------------------------------+
   | text, rodata, data, bss   - shared                          |
   | heap (brk + arenas)       - shared                          |
   | mmap regions              - shared                          |
   | fds (kernel side)         - shared                          |
   | signal handlers           - shared (signal mask is PER-thread!) |
   |                                                             |
   | thread A: stack + regs + TLS                                |
   | thread B: stack + regs + TLS                                |
   | thread C: stack + regs + TLS                                |
   +-------------------------------------------------------------+
</code></pre>
<p>Concretely, every thread is its own <code>struct task_struct</code> (kernel) and Linux
schedules tasks, not processes. A &ldquo;process&rdquo; is a <em>thread group</em>: tasks
sharing a TGID (the process&rsquo;s PID).</p>
<h2 id="2-the-thread-stack">2. The thread stack</h2>
<p>The main thread&rsquo;s stack is the <code>[stack]</code> VMA up at the top of the address
space. Every additional thread gets its <strong>own mmap&rsquo;d region</strong>:</p>
<ul>
<li>Default size: <code>RLIMIT_STACK</code>, typically 8 MiB.</li>
<li>A 4 KiB <strong>guard page</strong> with <code>PROT_NONE</code> at the low end.</li>
<li>The TCB (thread control block, glibc internal) lives at the <em>high</em> end.</li>
</ul>
<pre><code>   thread stack VMA (one per non-main thread)
   +-----------------------+   &lt;- high addr; TCB + dtv + ... live here
   |    TCB (glibc)        |
   +-----------------------+
   |    TLS data           |
   +-----------------------+
   |    stack frames       |    grows down as the thread runs
   |    ...                |
   +-----------------------+
   |    free / unused      |
   +-----------------------+
   |    guard page (---p)  |   touching this -&gt; SIGSEGV
   +-----------------------+
</code></pre>
<p>Set explicitly:</p>
<pre><code class="language-c">pthread_attr_t a;
pthread_attr_init(&amp;a);
pthread_attr_setstacksize(&amp;a, 256 * 1024);
pthread_attr_setguardsize(&amp;a, 4096);
pthread_create(&amp;tid, &amp;a, fn, NULL);
pthread_attr_destroy(&amp;a);
</code></pre>
<h2 id="3-thread-local-storage-tls">3. Thread Local Storage (TLS)</h2>
<p>TLS gives each thread its own copy of a variable.</p>
<pre><code class="language-c">// C11
_Thread_local int per_thread_x;

// GCC
__thread int per_thread_y;

// C++
thread_local int per_thread_z;
</code></pre>
<p>How does the runtime find &ldquo;my&rdquo; copy? On x86_64, the <code>FS</code> segment register
points to the <strong>TCB</strong>, which holds the offset of each TLS variable. So:</p>
<pre><code>   mov  %fs:per_thread_x@tpoff, %eax     // load this thread's per_thread_x
</code></pre>
<p>There are <em>two</em> TLS models you&rsquo;ll encounter:</p>
<ul>
<li><strong>Initial-Exec / Local-Exec</strong>: TLS slot allocated at load time, offsets
  computed by the static linker. Fast (just <code>%fs:offset</code>).</li>
<li><strong>Global-Dynamic / Local-Dynamic</strong>: TLS allocated for <code>dlopen</code>&lsquo;d libraries.
  Slower (<code>__tls_get_addr</code> runtime resolver).</li>
</ul>
<p>Use <code>-ftls-model=initial-exec</code> for hot per-thread state if you control
linkage.</p>
<pre><code>   thread A's TCB              thread B's TCB
   +---------------+           +---------------+
   | dtv pointer   |           | dtv pointer   |
   +---------------+           +---------------+
   | per_thread_x  |           | per_thread_x  |   &lt;- two distinct words
   +---------------+           +---------------+
   | per_thread_y  |           | per_thread_y  |
   +---------------+           +---------------+
   ...                         ...
   %fs in A points here        %fs in B points here
</code></pre>
<h3 id="posix-tls-pthread_key_t">Posix TLS (<code>pthread_key_t</code>)</h3>
<p>Used pre-C11; supports a destructor per key:</p>
<pre><code class="language-c">pthread_key_t key;
pthread_key_create(&amp;key, free);    // destructor called at thread exit
pthread_setspecific(key, malloc(64));
void *p = pthread_getspecific(key);
</code></pre>
<p>Use compiler TLS (<code>__thread</code>) whenever possible — it&rsquo;s faster and cleaner.</p>
<h2 id="4-the-pthread_create-lowdown">4. The <code>pthread_create</code> lowdown</h2>
<pre><code>   pthread_create(&amp;tid, attr, fn, arg)
       |
       v
   glibc:
       - allocate stack (mmap, with guard page)
       - allocate TCB at top of stack
       - set up signal mask, TLS
       - clone(CLONE_VM|CLONE_FS|CLONE_FILES|CLONE_SIGHAND|
               CLONE_THREAD|CLONE_SYSVSEM|CLONE_SETTLS|
               CLONE_PARENT_SETTID|CLONE_CHILD_CLEARTID, stack_top,
               &amp;tid, tls_desc, &amp;child_tid)
                                ^                    ^
                                |                    |
                       stored in *tid       cleared on thread exit,
                                            then futex_wake -&gt; pthread_join sees 0
</code></pre>
<p><code>pthread_join(tid, &amp;ret)</code> blocks on a futex (the same child_tid word) and
copies out the return value.</p>
<h2 id="5-futexes--fast-userspace-mutexes">5. Futexes — fast userspace mutexes</h2>
<p>A <strong>futex</strong> (&ldquo;fast userspace mutex&rdquo;) is the primitive every pthread mutex,
condvar, and <code>std::atomic</code> wait is built on.</p>
<pre><code>   user: an int (the &quot;futex word&quot;) in shared memory
   user: atomic compare-and-set on it (fast path, no syscall)
   user: if uncontended: lock acquired -- never enter the kernel.
   user: if contended  : call futex(2):
            FUTEX_WAIT  -- check val matches expected, sleep if so
            FUTEX_WAKE  -- wake N waiters on the word
</code></pre>
<p>Pseudocode of a mutex:</p>
<pre><code class="language-c">void lock(_Atomic int *m) {
    int expected = 0;
    if (atomic_compare_exchange_strong(m, &amp;expected, 1)) return;       // uncontested
    while (atomic_exchange(m, 2) != 0) {                               // mark contended
        syscall(SYS_futex, m, FUTEX_WAIT, 2, NULL, NULL, 0);           // sleep
    }
}
void unlock(_Atomic int *m) {
    if (atomic_exchange(m, 0) != 1)                                    // had waiters
        syscall(SYS_futex, m, FUTEX_WAKE, 1, NULL, NULL, 0);
}
</code></pre>
<p>States of the futex word:
- <code>0</code> = unlocked
- <code>1</code> = locked, no waiters
- <code>2</code> = locked, possible waiters</p>
<p>The kernel keeps a hash table of waiters keyed by <strong>physical address</strong> of the
futex word, so the same futex can be used cross-process (when the word is in
shared memory like <code>mmap(MAP_SHARED)</code>).</p>
<p>See <a href="05_futex_basic.c"><code>05_futex_basic.c</code></a>.</p>
<h2 id="6-memory-ordering-primer-cross-thread">6. Memory ordering primer (cross-thread)</h2>
<p>Two threads communicating via shared memory must agree on a <em>memory model</em>.
On x86_64 the hardware is <strong>TSO</strong> (total store order): every core sees the
same global order of writes; the only reordering is &ldquo;store followed by load
to different addresses&rdquo;.</p>
<p>In C, use <strong><code>_Atomic</code></strong> (C11) or <strong>C11 atomics</strong>:</p>
<pre><code class="language-c">#include &lt;stdatomic.h&gt;
_Atomic int flag;
atomic_store_explicit(&amp;flag, 1, memory_order_release);   // producer
while (!atomic_load_explicit(&amp;flag, memory_order_acquire)) ; // consumer
// at this point consumer sees everything producer did before the store
</code></pre>
<p>Memory orders (<code>stdatomic.h</code>):</p>
<pre><code>   memory_order_relaxed   only the operation is atomic; no ordering
   memory_order_acquire   pairs with release; later loads ordered after this load
   memory_order_release   pairs with acquire; prior stores ordered before this store
   memory_order_acq_rel   for RMW (fetch_add, exchange, CAS)
   memory_order_seq_cst   sequentially consistent (default)
</code></pre>
<p>Full coverage in the sibling <a href="../../threading_guide/">threading_guide</a>.</p>

  { name: `13. Ipc Memory`, path: `10_ipc_memory/README.md`, dir: `10_ipc_memory`, body: `<h1 id="10--ipc-shared-memory--other-ways-processes-talk">10 — IPC: Shared Memory &amp; Other Ways Processes Talk</h1>
<p>When two processes need to exchange data, you have an <em>embarrassment</em> of
options on Linux. Pick the one that matches your data shape and lifetime.</p>
<pre><code>                  How big is each message?
                       |
       small (bytes)   |   large (MB+) / streaming
            v          |          v
         signals       |       mmap + shared memory
         eventfd       |       memfd_create
         signalfd      |
            |          |
            v          |          v
         pipes / FIFO  |       MAP_SHARED file
         UNIX sockets  |
         msg queues    |
         dgram sockets |
            |          |
            v          |          v
                  unidirectional / structured  -&gt; sockets, message queues
                  full-duplex streaming         -&gt; socketpair
                  one-shot signal               -&gt; eventfd, signalfd
</code></pre>
<h2 id="1-pipes-pipe2">1. Pipes (<code>pipe2</code>)</h2>
<pre><code>   pipe(fd)              // [0]=read, [1]=write
   pipe2(fd, O_CLOEXEC | O_NONBLOCK)   // Linux: extra flags

   - in-kernel buffer (64 KiB default; F_SETPIPE_SZ to grow)
   - unidirectional
   - usually paired with fork(); one process closes [1], other [0]
</code></pre>
<p>A <em>named pipe</em> (FIFO) lives in the filesystem: <code>mkfifo /tmp/p</code>, then any
process can <code>open("/tmp/p", O_RDONLY/O_WRONLY)</code>.</p>
<h2 id="2-unix-domain-sockets">2. UNIX domain sockets</h2>
<p>Full-duplex, can be stream or datagram, can carry <strong>fds</strong> (the magic
<code>SCM_RIGHTS</code>!).</p>
<pre><code>   socketpair(AF_UNIX, SOCK_STREAM, 0, fd)   // anonymous, bidirectional pair
   socket(AF_UNIX, SOCK_STREAM/DGRAM, 0)     // named, bind to /tmp/...
</code></pre>
<p><a href="02_socketpair.c"><code>02_socketpair.c</code></a>.</p>
<h2 id="3-posix-shared-memory-shm_open">3. POSIX shared memory (<code>shm_open</code>)</h2>
<p>This is the <em>modern</em> way to share a large memory region between unrelated
processes.</p>
<pre><code class="language-c">fd = shm_open(&quot;/myseg&quot;, O_CREAT|O_RDWR, 0600);
ftruncate(fd, size);
void *p = mmap(NULL, size, PROT_READ|PROT_WRITE, MAP_SHARED, fd, 0);
close(fd);
...
munmap(p, size);
shm_unlink(&quot;/myseg&quot;);    // remove the name
</code></pre>
<p>Backed by <code>tmpfs</code> at <code>/dev/shm/</code>. Survives process exit until <code>shm_unlink</code>.</p>
<h2 id="4-sysv-shared-memory-shmget--shmat">4. SysV shared memory (<code>shmget</code> / <code>shmat</code>)</h2>
<p>Legacy. Still around for compatibility (PostgreSQL uses it, Oracle, &hellip;).</p>
<pre><code class="language-c">key_t k = ftok(&quot;/some/file&quot;, 1);
int id = shmget(k, size, IPC_CREAT | 0600);
void *p = shmat(id, NULL, 0);
...
shmdt(p);
shmctl(id, IPC_RMID, NULL);
</code></pre>
<p>Inspect: <code>ipcs -m</code>. Tweak limits: <code>/proc/sys/kernel/shmmax</code>, <code>shmall</code>, <code>shmmni</code>.</p>
<p>Prefer POSIX <code>shm_open</code> for new code.</p>
<h2 id="5-memfd_create--file-less-files">5. <code>memfd_create</code> — file-less files</h2>
<pre><code class="language-c">int fd = memfd_create(&quot;scratch&quot;, MFD_CLOEXEC);
ftruncate(fd, 1 &lt;&lt; 20);
void *p = mmap(NULL, 1 &lt;&lt; 20, PROT_READ|PROT_WRITE, MAP_SHARED, fd, 0);
</code></pre>
<p>Anonymous, in-RAM, no filesystem path; pass <code>fd</code> over a UNIX socket
(<code>SCM_RIGHTS</code>) to share. Also supports <strong>seals</strong> (<code>F_ADD_SEALS</code>) so the
receiver can verify nobody can modify or resize it. Used by Wayland,
container runtimes, KVM/libvirt.</p>
<h2 id="6-eventfd--a-counter-you-can-poll-on">6. <code>eventfd</code> — a counter you can poll on</h2>
<pre><code class="language-c">int e = eventfd(0, EFD_CLOEXEC);
write(e, &amp;(uint64_t){1}, 8);   // increment by 1
read (e, &amp;(uint64_t){0}, 8);   // returns current value, sets it to 0
poll/epoll(e)                  // becomes readable when value &gt; 0
</code></pre>
<p>Great for &ldquo;thread A wants to wake up thread B&rdquo; with <code>epoll</code>.</p>
<h2 id="7-signalfd--signals-via-fd">7. <code>signalfd</code> — signals via fd</h2>
<pre><code class="language-c">sigset_t s; sigemptyset(&amp;s); sigaddset(&amp;s, SIGTERM);
sigprocmask(SIG_BLOCK, &amp;s, NULL);  // important
int sfd = signalfd(-1, &amp;s, SFD_CLOEXEC);
struct signalfd_siginfo si; read(sfd, &amp;si, sizeof si);
</code></pre>
<p>Now <code>SIGTERM</code> is delivered through a file descriptor — no signal handler, no
async-signal-safety constraints.</p>
<h2 id="8-posix-message-queues-mq_open">8. POSIX message queues (<code>mq_open</code>)</h2>
<pre><code class="language-c">mqd_t mq = mq_open(&quot;/q&quot;, O_CREAT|O_RDWR, 0600, &amp;(struct mq_attr){.mq_maxmsg=8,.mq_msgsize=64});
mq_send(mq, msg, len, prio);
mq_receive(mq, buf, sizeof buf, &amp;prio);
mq_unlink(&quot;/q&quot;);
</code></pre>
<p>Kernel-managed; persistent until unlink; bounded; supports priorities. Inspect:
<code>ls /dev/mqueue/</code>.</p>
<h2 id="9-pipes-vs-sockets-vs-shm--decision-tree">9. Pipes vs sockets vs shm — decision tree</h2>
<pre><code>   &quot;I need to copy bytes between procs&quot;
       smallish (&lt; pagesize), one-way            -&gt; pipe / FIFO
       smallish, bidirectional                   -&gt; socketpair
       smallish, between unrelated procs         -&gt; AF_UNIX socket on disk
       structured w/ priorities + persistence    -&gt; mq_open
   &quot;I need to share a big buffer (no copy)&quot;
       related (fork)        -&gt; mmap(MAP_SHARED|MAP_ANONYMOUS) before fork
       unrelated processes   -&gt; shm_open + mmap, or memfd + SCM_RIGHTS
       persistent across boot-&gt; mmap a real file on disk
   &quot;I need to pass FDs&quot;
       socketpair + SCM_RIGHTS
   &quot;Just wake another thread / proc&quot;
       eventfd + poll/epoll
</code></pre>
<h2 id="10-files">10. Files</h2>
<table>
<thead>
<tr>
<th>File</th>
<th>Demonstrates</th>
</tr>
</thead>
<tbody>
<tr>
<td><a href="01_pipe.c"><code>01_pipe.c</code></a></td>
<td>Basic pipe between parent / child</td>
</tr>
<tr>
<td><a href="02_socketpair.c"><code>02_socketpair.c</code></a></td>
<td>Full-duplex AF_UNIX socketpair</td>
</tr>
<tr>
<td><a href="03_fifo.c"><code>03_fifo.c</code></a></td>
<td>Named pipe (<code>mkfifo</code>)</td>
</tr>
<tr>
<td><a href="04_shm_open.c"><code>04_shm_open.c</code></a></td>
<td>POSIX shared memory, two-process demo</td>
</tr>
<tr>
<td><a href="05_sysv_shm.c"><code>05_sysv_shm.c</code></a></td>
<td>SysV <code>shmget/shmat</code></td>
</tr>
<tr>
<td><a href="06_memfd_create.c"><code>06_memfd_create.c</code></a></td>
<td><code>memfd_create</code> + seals</td>
</tr>
<tr>
<td><a href="07_eventfd.c"><code>07_eventfd.c</code></a></td>
<td>Use eventfd to wake threads</td>
</tr>
<tr>
<td><a href="08_signalfd.c"><code>08_signalfd.c</code></a></td>
<td>Receive SIGTERM via signalfd</td>
</tr>
<tr>
<td><a href="09_mq.c"><code>09_mq.c</code></a></td>
<td>POSIX message queue</td>
</tr>
<tr>
<td><a href="10_scm_rights.c"><code>10_scm_rights.c</code></a></td>
<td>Pass an fd over a UNIX socket</td>
</tr>
</tbody>
</table>` },
  { name: `14. Memory Protection`, path: `11_memory_protection/README.md`, dir: `11_memory_protection`, body: `<h1 id="11--memory-protection">11 — Memory Protection</h1>
<p>The 1980s ended thirty-some years ago. Memory accesses in user space are
now policed by a stack of defences:</p>
<pre><code>   +-----------------------------+
   |  ASLR (random layout)       |   makes addresses unpredictable
   +-----------------------------+
   |  NX / W^X                   |   data pages are non-executable
   +-----------------------------+
   |  stack canaries             |   detect overflow before return
   +-----------------------------+
   |  RELRO + Full RELRO         |   GOT/PLT made read-only after load
   +-----------------------------+
   |  Fortify (libc)             |   compile-time + runtime checks of
   |                             |   memcpy, sprintf, ...
   +-----------------------------+
   |  PIE                        |   executable's own base also randomised
   +-----------------------------+
   |  Sanitizers (ASan/UBSan/    |   developer tools; not production
   |  MSan/TSan)                 |
   +-----------------------------+
</code></pre>
<p>This section explains each one and shows how to use it (or break it for
testing).</p>
<h2 id="1-mprotect-revisited">1. <code>mprotect</code> revisited</h2>
<p>We&rsquo;ve used it for guard pages. It changes the perm bits in the PTE for the
requested range.</p>
<pre><code class="language-c">mprotect(addr, len, PROT_READ);                 // RO
mprotect(addr, len, PROT_READ|PROT_WRITE);      // RW
mprotect(addr, len, PROT_READ|PROT_EXEC);       // RX (JIT)
mprotect(addr, len, PROT_NONE);                 // no access (guard)
</code></pre>
<p>Requirements:
- <code>addr</code> must be page-aligned.
- <code>len</code> is rounded up.
- Removing all perms doesn&rsquo;t unmap, just makes the pages inaccessible until
  you change them back.</p>
<h2 id="2-nx--wx--dep">2. NX / W^X / DEP</h2>
<p>The CPU&rsquo;s NX bit (bit 63 of PTE) marks pages non-executable. Any
fetch-as-instruction from such a page raises <code>#PF</code>.</p>
<pre><code>   ROP attack tries: jmp into a writable buffer  -&gt; trap.
   Old worms put shellcode on the stack and jumped to it; NX defeats that.
</code></pre>
<p>Linux respects the NX bit when it&rsquo;s available; the ELF <code>GNU_STACK</code> segment
flags decide whether the stack is X. By default it&rsquo;s <code>RW</code>, no <code>X</code> —
&ldquo;executable stack&rdquo; requires explicit linker flags (<code>-z execstack</code>) and is
visible in <code>readelf -l a.out</code>.</p>
<h2 id="3-aslr--three-levels">3. ASLR — three levels</h2>
<pre><code>   /proc/sys/kernel/randomize_va_space
     0 = off
     1 = stack, mmap, vdso randomised; heap NOT randomised
     2 = all of the above + brk-managed heap (default)
</code></pre>
<p>For ASLR to apply to your executable&rsquo;s base, it must be a <strong>PIE</strong> (compiled
with <code>-fPIE -pie</code>). Modern distros build PIE by default.</p>
<p>See <a href="02_aslr_test.c"><code>02_aslr_test.c</code></a>.</p>
<h2 id="4-stack-canaries---fstack-protector-strongall">4. Stack canaries — <code>-fstack-protector-{strong,all}</code></h2>
<p>Already covered in §03. To turn ON (default on Debian/Ubuntu/RHEL):</p>
<pre><code>   -fstack-protector-strong      -- protects functions with arrays / pointers
   -fstack-protector-all         -- protects ALL functions
   -fstack-protector-explicit    -- only functions tagged
                                    __attribute__((stack_protect))
   -fno-stack-protector          -- turn OFF (for benchmarking; not for prod)
</code></pre>
<h2 id="5-relro">5. RELRO</h2>
<p>The linker initially makes the GOT writable so the runtime can resolve
symbols lazily. Once resolution is done, <code>mprotect</code> flips it to RO. With
<strong>Full RELRO</strong> all resolution is forced at load time and the GOT is RO
ever after.</p>
<p>Build:</p>
<pre><code>   -Wl,-z,relro          partial RELRO
   -Wl,-z,relro,-z,now   full RELRO (no lazy binding)
</code></pre>
<p>Check: <code>checksec --file=./a.out</code>.</p>
<h2 id="6-fortify-source-_fortify_source">6. Fortify Source (<code>_FORTIFY_SOURCE</code>)</h2>
<p>A glibc + compiler feature that replaces variants of <code>memcpy</code>, <code>strcpy</code>,
<code>sprintf</code>, etc. with versions that take a &ldquo;destination size&rdquo; argument.</p>
<pre><code class="language-c">char buf[16];
strcpy(buf, &quot;this string is much too long&quot;); // _FORTIFY_SOURCE catches it
*** buffer overflow detected ***: terminated
Aborted
</code></pre>
<p>Compile with <code>-D_FORTIFY_SOURCE=2 -O2</code> (most distros enable this by default).</p>
<h2 id="7-sigaltstack--handle-signals-when-the-stack-is-sick">7. Sigaltstack — handle signals when the stack is sick</h2>
<p>If you <code>SIGSEGV</code> because your stack is broken, the default signal handler
runs on the <em>same</em> broken stack — and dies. Solution:</p>
<pre><code class="language-c">static char altstk[SIGSTKSZ];
stack_t ss = { .ss_sp = altstk, .ss_size = sizeof altstk };
sigaltstack(&amp;ss, NULL);

struct sigaction sa = {0};
sa.sa_sigaction = h;
sa.sa_flags = SA_SIGINFO | SA_ONSTACK;
sigaction(SIGSEGV, &amp;sa, NULL);
</code></pre>
<p>Now <code>h</code> runs on <code>altstk</code>, far from the corrupted stack.</p>
<h2 id="8-building-hard-recommended-flags">8. Building hard, recommended flags</h2>
<pre><code class="language-bash">gcc -O2 -g -D_FORTIFY_SOURCE=2 \\
    -fstack-protector-strong \\
    -fstack-clash-protection \\
    -fcf-protection=full \\
    -fPIE -pie \\
    -Wl,-z,relro,-z,now,-z,noexecstack,-z,separate-code \\
    prog.c -o prog
</code></pre>
<p>Compare with <code>checksec</code>:</p>
<pre><code>   Stack:    Canary found
   NX:       NX enabled
   PIE:      PIE enabled
   RELRO:    Full RELRO
   Fortify:  Yes
</code></pre>
<h2 id="9-files">9. Files</h2>
<table>
<thead>
<tr>
<th>File</th>
<th>Demonstrates</th>
</tr>
</thead>
<tbody>
<tr>
<td><a href="01_mprotect_jit.c"><code>01_mprotect_jit.c</code></a></td>
<td>Write code into anon mmap, flip to PROT_READ|PROT_EXEC, jump in</td>
</tr>
<tr>
<td><a href="02_aslr_test.c"><code>02_aslr_test.c</code></a></td>
<td>Print addresses; run several times to see randomness</td>
</tr>
<tr>
<td><a href="03_segfault_handler.c"><code>03_segfault_handler.c</code></a></td>
<td><code>SIGSEGV</code> handler on alternate stack</td>
</tr>
<tr>
<td><a href="04_canary_demo.c"><code>04_canary_demo.c</code></a></td>
<td>Overflow triggers <code>__stack_chk_fail</code></td>
</tr>
<tr>
<td><a href="05_fortify_demo.c"><code>05_fortify_demo.c</code></a></td>
<td>Fortify catches a too-long <code>strcpy</code></td>
</tr>
<tr>
<td><a href="06_w_xor_x.c"><code>06_w_xor_x.c</code></a></td>
<td>Try to execute a writable page (fails)</td>
</tr>
</tbody>
</table>` },
  { name: `15. Debugging Tools`, path: `12_debugging_tools/README.md`, dir: `12_debugging_tools`, body: `<h1 id="12--debugging--observation">12 — Debugging &amp; Observation</h1>
<p>You now know the theory. This section is the toolbox: how to <em>look</em> at a
running process&rsquo;s memory, how to make a problem reproducible, and which tool
to reach for first.</p>
<pre><code>   What do I want to know?           Reach for...
   -------------------------         -------------
   &quot;Where do my pages live?&quot;         /proc/self/maps, smaps
   &quot;How much RAM am I using?&quot;        /proc/self/status, getrusage
   &quot;Is malloc behaving?&quot;             mallinfo2, malloc_stats, malloc_info
   &quot;What syscalls am I making?&quot;      strace -e trace=memory ./prog
   &quot;Memory leak / heap bug?&quot;         valgrind --tool=memcheck, ASan
   &quot;Where is the heap growing?&quot;      valgrind --tool=massif + ms_print
   &quot;Cache misses? branch mispred?&quot;   perf stat -e cache-misses,branch-misses
   &quot;Stack &amp; symbols at crash?&quot;       gdb, addr2line, eu-stack, coredumpctl
   &quot;Threads stuck?&quot;                  gdb thread apply all bt
</code></pre>
<h2 id="1-procself--the-kernel-telling-on-you">1. <code>/proc/self</code> — the kernel telling on you</h2>
<table>
<thead>
<tr>
<th>File</th>
<th>What</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>maps</code></td>
<td>every VMA, in human form (start-end perms offset dev:inode path)</td>
</tr>
<tr>
<td><code>smaps</code></td>
<td>per-VMA detailed accounting — Rss, Pss, Swap, &hellip;</td>
</tr>
<tr>
<td><code>smaps_rollup</code></td>
<td>sum across all VMAs (5.0+)</td>
</tr>
<tr>
<td><code>status</code></td>
<td>one-line-per-field VmSize, VmRSS, Vm{Data,Stk,Exe,Lib}, threads</td>
</tr>
<tr>
<td><code>stat</code></td>
<td>compact single-line (parseable) version of the above</td>
</tr>
<tr>
<td><code>statm</code></td>
<td>size, resident, share, text, lib, data, dt — all in pages</td>
</tr>
<tr>
<td><code>cmdline</code></td>
<td>NUL-separated argv</td>
</tr>
<tr>
<td><code>environ</code></td>
<td>NUL-separated env</td>
</tr>
<tr>
<td><code>limits</code></td>
<td>rlimits in human form</td>
</tr>
<tr>
<td><code>cgroup</code></td>
<td>cgroup memberships</td>
</tr>
<tr>
<td><code>fd/</code></td>
<td>each open fd as a symlink</td>
</tr>
<tr>
<td><code>task/&lt;tid&gt;/...</code></td>
<td>per-thread mirror of everything above</td>
</tr>
</tbody>
</table>
<h3 id="useful-one-liners">Useful one-liners</h3>
<pre><code class="language-bash"># what's eating my RAM?
awk '/^Pss:/{p+=$2} END{print p,&quot;KiB&quot;}' /proc/&lt;pid&gt;/smaps

# how many private dirty bytes do I have?
awk '/^Private_Dirty:/{p+=$2} END{print p,&quot;KiB&quot;}' /proc/&lt;pid&gt;/smaps

# which library is biggest in my process?
sort -k3n /proc/&lt;pid&gt;/smaps | head -50
</code></pre>
<h2 id="2-getrusage">2. <code>getrusage</code></h2>
<pre><code class="language-c">struct rusage r;
getrusage(RUSAGE_SELF, &amp;r);

r.ru_utime / r.ru_stime    // CPU user/sys time
r.ru_maxrss                // peak RSS in KiB
r.ru_minflt                // minor faults
r.ru_majflt                // major faults
r.ru_inblock / r.ru_oublock// block I/O
r.ru_nvcsw  / r.ru_nivcsw  // voluntary / involuntary context switches
</code></pre>
<p><code>time -v ./prog</code> (the <em>GNU</em> time, not the shell built-in) prints this nicely.</p>
<h2 id="3-mallinfo2-and-friends">3. <code>mallinfo2</code> and friends</h2>
<pre><code class="language-c">#include &lt;malloc.h&gt;

malloc_stats();           // stderr dump per arena

<h2 id="4-strace-recipes">4. <code>strace</code> recipes</h2>
<pre><code class="language-bash">strace -f -e trace=memory ./prog 2&gt;&amp;1 | grep -E 'mmap|brk|munmap|mprotect'
strace -f -e trace=signal ./prog
strace -f -c ./prog       # summary of syscalls
strace -p &lt;pid&gt;           # attach

<pre><code class="language-bash">valgrind --tool=memcheck --leak-check=full --show-leak-kinds=all ./prog
valgrind --tool=massif ./prog &amp;&amp; ms_print massif.out.&lt;pid&gt;
valgrind --tool=cachegrind ./prog
valgrind --tool=helgrind ./prog     # race detector (alternative to TSan)

sin imaginable. For production-speed checking use ASan/TSan/UBSan (compile-

<pre><code class="language-bash">perf stat -e cycles,instructions,page-faults,minor-faults,major-faults,\\
cache-references,cache-misses,branch-misses ./prog

perf record -F 99 -g ./prog          # CPU profile with callstacks
perf report

perf trace -p &lt;pid&gt;                  # cheap strace alternative

<pre><code>gdb ./prog
(gdb) run [args]
(gdb) bt                    # backtrace
(gdb) thread apply all bt   # backtraces for every thread
(gdb) info proc mappings    # equivalent to /proc/&lt;pid&gt;/maps
