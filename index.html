  { name: `8. Virtual Memory / Pagesize`, path: `01_virtual_memory/01_pagesize.c`, dir: `01_virtual_memory`, words: 196, mins: 1, body: `<h1 id="01_pagesizec">01_pagesize.c</h1>
<pre><code class="language-c">/*
 * 01_pagesize.c
 * --------------
 * Print the OS page size and demonstrate that mmap rounds up to it.
 *
 *   sysconf(_SC_PAGESIZE)  == getpagesize()  == typically 4096 on x86_64
 *
 *   mmap(NULL, 1, PROT_RW, ANON|PRIVATE)         -&gt; returns a whole 4 KiB page
 *   p = mmap(...);    you can write p[0]..p[4095]; touching p[4096] segfaults
 */

#include &lt;stdio.h&gt;
#include &lt;unistd.h&gt;
#include &lt;sys/mman.h&gt;
#include &lt;stdint.h&gt;

int main(void)
{
    long pg = sysconf(_SC_PAGESIZE);
    printf(&quot;page size = %ld (sysconf)\\n&quot;, pg);
    printf(&quot;page size = %d (getpagesize)\\n&quot;, getpagesize());

    /* Ask for 1 byte; get back a whole page. */
    void *p = mmap(NULL, 1, PROT_READ | PROT_WRITE,
                   MAP_PRIVATE | MAP_ANONYMOUS, -1, 0);
    if (p == MAP_FAILED) { perror(&quot;mmap&quot;); return 1; }

    printf(&quot;mmap'd 1 byte at %p (page-aligned? %s)\\n&quot;,
           p, ((uintptr_t)p % pg == 0) ? &quot;yes&quot; : &quot;no&quot;);

    /* writing inside the page is fine: */
    ((char *)p)[0]      = 'a';
    ((char *)p)[pg - 1] = 'z';
    printf(&quot;wrote p[0]=%c, p[%ld]=%c   (still in page)\\n&quot;,
           ((char *)p)[0], pg - 1, ((char *)p)[pg - 1]);

    /* writing past the page would segfault: uncomment to test
       ((char *)p)[pg] = '!';
    */

    munmap(p, 1);  /* munmap also rounds up; the whole page is gone */
    return 0;
}

</code></pre>` },
  { name: `9. Virtual Memory / Lazy Allocation`, path: `01_virtual_memory/02_lazy_allocation.c`, dir: `01_virtual_memory`, words: 361, mins: 2, body: `<h1 id="02_lazy_allocationc">02_lazy_allocation.c</h1>
<pre><code class="language-c">/*
 * 02_lazy_allocation.c
 * ---------------------
 * Reserve 1 GiB with mmap, then touch one byte per page in a loop.
 * Watch RSS climb from ~0 to ~1 GiB even though VSZ was 1 GiB from the
 * start.
 *
 *   VSZ (virtual)  = sum of all VMAs (mmap regions, stack, heap, ...)
 *   RSS (resident) = sum of frames actually mapped into RAM
 *
 *   step 1: mmap 1 GiB                   -&gt; VSZ +1 GiB, RSS +0
 *   step 2: read one byte of each page   -&gt; RSS +0   (zero page mapped RO)
 *   step 3: write one byte of each page  -&gt; RSS +1 GiB  (real frames!)
 *
 * Inspect with:  watch -n0.2 &quot;cat /proc/$(pidof 02_lazy_allocation)/status \\
 *                              | grep -E 'Vm(Size|RSS|Data)'&quot;
 *
 * Build:  gcc -O0 -g 02_lazy_allocation.c -o 02_lazy_allocation
 */

#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;unistd.h&gt;
#include &lt;sys/mman.h&gt;
#include &lt;sys/resource.h&gt;

static void show(const char *tag)
{
    /* Read /proc/self/status to print VmRSS without parsing tools */
    FILE *f = fopen(&quot;/proc/self/status&quot;, &quot;r&quot;);
    char line[256];
    long vm = 0, rss = 0;
    while (fgets(line, sizeof line, f)) {
        if (!strncmp(line, &quot;VmSize:&quot;, 7)) sscanf(line + 7, &quot;%ld&quot;, &amp;vm);
        if (!strncmp(line, &quot;VmRSS:&quot;,  6)) sscanf(line + 6, &quot;%ld&quot;, &amp;rss);
    }
    fclose(f);

    struct rusage r; getrusage(RUSAGE_SELF, &amp;r);
    printf(&quot;[%-15s] VmSize=%6ld KiB  VmRSS=%6ld KiB  minflt=%-5ld majflt=%ld\\n&quot;,
           tag, vm, rss, r.ru_minflt, r.ru_majflt);
}

#include &lt;string.h&gt;
int main(void)
{
    const size_t BYTES = 1024UL * 1024 * 1024; /* 1 GiB */
    const long pg = sysconf(_SC_PAGESIZE);

    show(&quot;start&quot;);

    char *p = mmap(NULL, BYTES, PROT_READ | PROT_WRITE,
                   MAP_PRIVATE | MAP_ANONYMOUS, -1, 0);
    if (p == MAP_FAILED) { perror(&quot;mmap&quot;); return 1; }
    show(&quot;after mmap&quot;);

    /* Read one byte of every page.  The kernel maps the zero page RO. */
    volatile char sink = 0;
    for (size_t i = 0; i &lt; BYTES; i += pg) sink = p[i];
    (void)sink;
    show(&quot;after reads&quot;);

    /* Write one byte of every page.  CoW from zero page -&gt; real frame. */
    for (size_t i = 0; i &lt; BYTES; i += pg) p[i] = (char)i;
    show(&quot;after writes&quot;);

    /* Give it back to the OS without unmapping.  RSS should drop. */
    madvise(p, BYTES, MADV_DONTNEED);
    show(&quot;after DONTNEED&quot;);

    munmap(p, BYTES);
    show(&quot;after munmap&quot;);
    return 0;
}

</code></pre>` },
  { name: `10. Virtual Memory / Count Page Faults`, path: `01_virtual_memory/03_count_page_faults.c`, dir: `01_virtual_memory`, words: 289, mins: 1, body: `<h1 id="03_count_page_faultsc">03_count_page_faults.c</h1>
<pre><code class="language-c">/*
 * 03_count_page_faults.c
 * -----------------------
 * Use getrusage() to count minor and major page faults around a workload.
 *
 *   minor fault = page-table miss, kernel allocates a frame, NO disk I/O.
 *                 (e.g. first write to malloc'd memory)
 *   major fault = needed disk read (mmap'd file or swap-in).
 *
 *   workload:                 expected behaviour
 *   ----------------------    --------------------------------------------
 *   mmap 256 MiB ANON          0 faults yet
 *   touch every page (RW)      ~65536 minor faults (256 MiB / 4 KiB)
 *
 * Build:  gcc -O0 -g 03_count_page_faults.c -o 03_count_page_faults
 */

#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;unistd.h&gt;
#include &lt;sys/mman.h&gt;
#include &lt;sys/resource.h&gt;

static void diff_rusage(const char *label,
                        const struct rusage *a, const struct rusage *b)
{
    printf(&quot;%-22s  minor=%-8ld  major=%-3ld\\n&quot;,
           label,
           b-&gt;ru_minflt - a-&gt;ru_minflt,
           b-&gt;ru_majflt - a-&gt;ru_majflt);
}

int main(void)
{
    const size_t BYTES = 256UL * 1024 * 1024;
    const long pg = sysconf(_SC_PAGESIZE);
    struct rusage r0, r1;

    getrusage(RUSAGE_SELF, &amp;r0);
    char *p = mmap(NULL, BYTES, PROT_READ | PROT_WRITE,
                   MAP_PRIVATE | MAP_ANONYMOUS, -1, 0);
    if (p == MAP_FAILED) { perror(&quot;mmap&quot;); return 1; }
    getrusage(RUSAGE_SELF, &amp;r1);
    diff_rusage(&quot;mmap (no touch)&quot;, &amp;r0, &amp;r1);

    /* touch every page */
    r0 = r1;
    for (size_t i = 0; i &lt; BYTES; i += pg) p[i] = 1;
    getrusage(RUSAGE_SELF, &amp;r1);
    diff_rusage(&quot;write each page&quot;,  &amp;r0, &amp;r1);

    /* read again - already mapped, no faults */
    r0 = r1;
    volatile char sink = 0;
    for (size_t i = 0; i &lt; BYTES; i += pg) sink = p[i];
    (void)sink;
    getrusage(RUSAGE_SELF, &amp;r1);
    diff_rusage(&quot;re-read each page&quot;, &amp;r0, &amp;r1);

    /* MADV_DONTNEED throws frames away; next access re-faults */
    r0 = r1;
    madvise(p, BYTES, MADV_DONTNEED);
    for (size_t i = 0; i &lt; BYTES; i += pg) sink = p[i];
    (void)sink;
    getrusage(RUSAGE_SELF, &amp;r1);
    diff_rusage(&quot;DONTNEED + re-read&quot;, &amp;r0, &amp;r1);

    munmap(p, BYTES);
    return 0;
}

</code></pre>` },
  { name: `11. Virtual Memory / Pagemap`, path: `01_virtual_memory/04_pagemap.c`, dir: `01_virtual_memory`, words: 348, mins: 2, body: `<h1 id="04_pagemapc">04_pagemap.c</h1>
<pre><code class="language-c">/*
 * 04_pagemap.c
 * -------------
 * Translate a virtual address to its physical frame number using
 * /proc/self/pagemap.
 *
 * /proc/self/pagemap is an array indexed by virtual page number:
 *   vpn = VA / pagesize;     offset = vpn * 8;     read 8 bytes
 *
 * 64-bit entry layout (from Documentation/admin-guide/mm/pagemap.rst):
 *
 *   bit  63   present
 *   bit  62   swapped out
 *   bit  61   page is file-backed or shared anonymous
 *   bit  56   exclusively mapped (since 4.2)
 *   bit  55   pte soft-dirty
 *   bits 0..54 if present: physical frame number (PFN)
 *              if swapped:  swap type [0..4] | offset [5..54]
 *
 * NOTE: since Linux 4.0 the PFN is masked out for non-root users unless
 *       CAP_SYS_ADMIN is held -- you'll see 0.  Run with sudo to see PFNs.
 *
 * Build:  gcc -O0 -g 04_pagemap.c -o 04_pagemap
 * Run :   sudo ./04_pagemap     (for real PFN values)
 */

#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;string.h&gt;
#include &lt;stdint.h&gt;
#include &lt;unistd.h&gt;
#include &lt;fcntl.h&gt;
#include &lt;inttypes.h&gt;
#include &lt;sys/mman.h&gt;

static uint64_t pa_of(void *va)
{
    long pg = sysconf(_SC_PAGESIZE);
    uint64_t vpn = (uintptr_t)va / pg;
    int fd = open(&quot;/proc/self/pagemap&quot;, O_RDONLY);
    if (fd &lt; 0) { perror(&quot;open&quot;); exit(1); }
    uint64_t entry = 0;
    if (pread(fd, &amp;entry, 8, vpn * 8) != 8) { perror(&quot;pread&quot;); exit(1); }
    close(fd);
    return entry;
}

static void describe(const char *label, void *va)
{
    uint64_t e = pa_of(va);
    int present = (e &gt;&gt; 63) &amp; 1;
    int swap    = (e &gt;&gt; 62) &amp; 1;
    int filebak = (e &gt;&gt; 61) &amp; 1;
    int excl    = (e &gt;&gt; 56) &amp; 1;
    uint64_t pfn= e &amp; ((1ULL &lt;&lt; 55) - 1);

    printf(&quot;%-22s  va=%p  present=%d swap=%d filebak=%d excl=%d  pfn=0x%&quot; PRIx64 &quot;\\n&quot;,
           label, va, present, swap, filebak, excl, pfn);
}

int main(void)
{
    int stack_var;
    static int bss_var;
    static int data_var = 42;
    char *heap = malloc(4096); *heap = 1;
    char *anon = mmap(NULL, 4096, PROT_READ | PROT_WRITE,
                      MAP_PRIVATE | MAP_ANONYMOUS, -1, 0);
    *anon = 1; /* fault it in */

    describe(&quot;stack&quot;,        &amp;stack_var);
    describe(&quot;bss&quot;,          &amp;bss_var);
    describe(&quot;data&quot;,         &amp;data_var);
    describe(&quot;malloc heap&quot;,  heap);
    describe(&quot;mmap anon&quot;,    anon);
    describe(&quot;text (main)&quot;,  (void *)main);

    free(heap); munmap(anon, 4096);
    return 0;
}

</code></pre>` },
  { name: `12. Virtual Memory`, path: `01_virtual_memory/README.md`, dir: `01_virtual_memory`, words: 1531, mins: 8, body: `<h1 id="01--virtual-memory-paging-and-the-mmu">01 — Virtual Memory, Paging, and the MMU</h1>
<p>This is the engine room. Every memory access your C program makes goes through
the <strong>MMU</strong> (Memory Management Unit), a piece of silicon that converts a
<strong>virtual address</strong> (what your pointer holds) into a <strong>physical address</strong>
(actual DRAM bytes). The translation table is the <strong>page table</strong>.</p>
<p>We focus on <strong>x86_64</strong> with 4 KiB pages and 4 levels of paging, which is what
desktop / server Linux runs on. Concepts (huge pages, levels, TLB) apply on
ARM64 too.</p>
<h2 id="1-the-virtual-address-split">1. The virtual address split</h2>
<p>A 64-bit virtual address is not really 64 bits. Today&rsquo;s x86_64 implementations
use <strong>48-bit</strong> canonical addresses (the upper 16 bits must be a sign-extension
of bit 47). Bit-by-bit:</p>
<pre><code>   63                 47       39       30       21       12       0
   |                  |        |        |        |        |        |
   +---------+--------+--------+--------+--------+--------+--------+
   | sign ext| PML4   | PDPT   | PD     | PT     | page offset    |
   | bits 63..48      | 9 bits | 9 bits | 9 bits | 9 bits | 12 b  |
   +------------------+--------+--------+--------+--------+--------+
        |                  |       |       |       |          |
        +-- must equal     |       |       |       |          +--&gt; byte within
            bit 47         |       |       |       |               4 KiB page
                           |       |       |       +-&gt; index into PT
                           |       |       +-&gt; index into Page-Dir
                           |       +-&gt; index into PDPT
                           +-&gt; index into top-level PML4
</code></pre>
<ul>
<li><strong>PML4</strong> = Page Map Level 4. The root table. 512 entries × 8 bytes = 4 KiB.</li>
<li>
<p>Each entry points to the next-level table&rsquo;s physical address (and has
  permission bits).</p>
</li>
<li>
<p>A leaf entry&rsquo;s physical frame base + offset[11:0] = physical address.</p>
</li>
</ul>
<h3 id="page-table-entry-pte-layout-simplified">Page-table entry (PTE) layout (simplified)</h3>
<pre><code>   bit  63 62..52 51 .... 12 11..9   8  7  6  5  4  3  2  1  0
        +---+------+--------+-----+--+--+--+--+--+--+--+--+--+
        | NX|  hw  |  PFN   | sw  | G|PS| D| A|PCD|PWT|U/S|R/W|P|
        +---+------+--------+-----+--+--+--+--+--+--+--+--+--+
         |    res  | phys   | OS  |  |  |  |  |   |   |    |  |
         |         | frame# | use |  |  |  |  |   |   |    |  +-&gt; Present
         |                  |     |  |  |  |  |   |   |    +-&gt; Read/Write
         |                  |     |  |  |  |  |   |   +-&gt; User/Supervisor
         |                  |     |  |  |  |  |   +-&gt; Cache Disable
         |                  |     |  |  |  |  +-&gt; Write-Through
         |                  |     |  |  |  +-&gt; Accessed (set by HW)
         |                  |     |  |  +-&gt; Dirty   (set by HW on write)
         |                  |     |  +-&gt; Page Size (1 = huge page here)
         |                  |     +-&gt; Global (don't flush on CR3 reload)
         +-&gt; No-eXecute (1 = data, faults if you jump here)
</code></pre>
<p><code>U/S=0</code> means kernel-only — touching from CPL=3 raises <code>#PF</code> (page fault).
<code>R/W=0</code> makes the page read-only. <code>NX=1</code> makes the page non-executable. Linux
sets these flags when you call <code>mprotect</code> (see
<a href="../11_memory_protection/"><code>../11_memory_protection</code></a>).</p>
<h2 id="2-walking-the-page-tables">2. Walking the page tables</h2>
<pre><code>   virtual addr  0x00007FFE_DEAD_C0DE
        |
        |  CR3 register holds the physical address of THIS process's PML4.
        v
   +----------------+  PML4[idx9] -&gt; PDPT physical addr
   |  PML4 (4 KiB)  | --------------------------------------+
   +----------------+                                       |
                                                            v
                                       +----------------+ PDPT[idx9] -&gt; PD addr
                                       |  PDPT (4 KiB)  | -------------+
                                       +----------------+              |
                                                                       v
                                                  +----------------+ PD[idx9] -&gt; PT
                                                  |  PD  (4 KiB)   | -----+
                                                  +----------------+      |
                                                                          v
                                              +----------------+ PT[idx9] -&gt; frame
                                              |  PT  (4 KiB)   | -----+
                                              +----------------+      |
                                                                      v
                                                              +----------------+
                                                              | 4 KiB frame    |
                                                              +-+--------------+
                                                                |
                                                                v
                                                       offset[11:0] is added
                                                       to get physical addr
</code></pre>
<p>So each load/store the CPU <em>might</em> do 4 extra memory accesses to walk the
tables. That would be catastrophic, which is why we have the…</p>
<h2 id="3-tlb--translation-lookaside-buffer">3. TLB — Translation Lookaside Buffer</h2>
<p>A small fully-associative cache <strong>inside the MMU</strong> that maps recently used
virtual page numbers → physical frame numbers.</p>
<pre><code>   CPU asks for VA -&gt; MMU
        |
        v
   +------------+   hit (~0 extra cycles)
   |    TLB     | -----&gt; PA -&gt; data
   +------------+
        | miss
        v
   page-table walk (the diagram above; uses caches but can DRAM-bounce)
        |
        v
   install translation in TLB; retry the access
</code></pre>
<ul>
<li>L1 dTLB on a modern x86 is ~64 entries for 4 KiB pages, ~32 for 2 MiB.</li>
<li>An L2 unified TLB can hold ~1500+ entries.</li>
<li>A <strong>TLB flush</strong> happens when CR3 changes (context switch) — except for
  <strong>global</strong> pages (kernel mappings) — or when you call <code>invlpg</code>/<code>mprotect</code>
  /<code>munmap</code> to invalidate a range.</li>
</ul>
<pre><code>   TLB lifetime:
     write to CR3   ......... TLB flushed (except global)
     INVLPG addr    ......... evict one entry
     munmap, mprotect ......  kernel issues INVLPG (and IPI on SMP)
</code></pre>
<h2 id="4-huge-pages">4. Huge pages</h2>
<p>Instead of <code>(level3 leaf) -&gt; 4 KiB frame</code>, the CPU can stop at level 2 with
<code>PS=1</code> and treat the next 21 bits as the offset into a <strong>2 MiB frame</strong>.
Similarly level 1 + <code>PS=1</code> = 1 GiB page.</p>
<pre><code>   4 KiB page (default):  walk 4 levels, 4 KiB granularity
   2 MiB page:            walk 3 levels, 2 MiB granularity, fewer TLB entries
   1 GiB page:            walk 2 levels, 1 GiB granularity, almost free TLB
</code></pre>
<p>Two ways to get them on Linux:</p>
<ol>
<li>
<p><strong>Transparent Huge Pages (THP)</strong> — kernel quietly promotes whole 2 MiB
   regions into huge pages when possible. <code>cat /sys/kernel/mm/transparent_hugepage/enabled</code>.</p>
</li>
<li>
<p><strong>Explicit HugeTLB</strong> — <code>mmap(..., MAP_HUGETLB, ...)</code> or <code>hugetlbfs</code>. You
   must reserve them up front via <code>/proc/sys/vm/nr_hugepages</code>.</p>
</li>
</ol>
<p>See <a href="../13_advanced/02_huge_tlb.c"><code>../13_advanced/02_huge_tlb.c</code></a>.</p>
<h2 id="5-page-faults">5. Page faults</h2>
<p>A page fault (<code>#PF</code> on x86) happens when the MMU cannot complete a translation
because the PTE is &ldquo;not present&rdquo; or the access is not allowed by the
permission bits.</p>
<pre><code>   CPU access  -&gt; MMU walk -&gt; PTE present?    perms ok?     =&gt; OK, do it
        |          |              | no            | no
        |          v              v               v
        |  raise #PF (CR2 = faulting VA, error code = R/W, U/S, ...)
        |          |
        |          v
        |  kernel's do_page_fault() runs
        |          |
        |          +-- valid VMA?  (was it ever mmap'd / brk'd?)
        |          |     no  -&gt; SIGSEGV to the process
        |          |     yes
        |          +-- access permitted by VMA flags?
        |          |     no  -&gt; SIGSEGV or SIGBUS
        |          |     yes
        |          +-- &quot;soft&quot; path:
        |          |     minor fault: allocate a frame (or share zero page),
        |          |     fill in PTE, return
        |          +-- &quot;swapped&quot;     -&gt; read from swap (major fault)
        |          +-- &quot;file-backed&quot; -&gt; read from file (major fault)
        +-&gt; instruction restarted
</code></pre>
<p>Two kinds of &ldquo;successful&rdquo; faults:</p>
<ul>
<li>
<p><strong>Minor fault</strong> = no disk I/O. The kernel allocates a zero page or maps the
  shared zero page. <code>malloc</code>&lsquo;d pages produce minor faults on first touch.</p>
</li>
<li>
<p><strong>Major fault</strong> = disk I/O was required (swap-in or first read of an
  mmap&rsquo;d file).</p>
</li>
</ul>
<p>Count them with <code>getrusage(RUSAGE_SELF, &amp;r)</code>:</p>
<pre><code class="language-c">struct rusage r;
getrusage(RUSAGE_SELF, &amp;r);
printf(&quot;minor=%ld major=%ld\\n&quot;, r.ru_minflt, r.ru_majflt);
</code></pre>
<p>See <a href="03_count_page_faults.c"><code>03_count_page_faults.c</code></a>.</p>
<h2 id="6-the-zero-page">6. The zero page</h2>
<p>Anonymous pages (e.g. fresh <code>mmap(NULL, sz, ANON|PRIVATE)</code> or freshly-bss&rsquo;d
globals) are <em>not</em> allocated until you read or write them. On the first
<strong>read</strong>, Linux maps the global <strong>zero page</strong> read-only — a single 4 KiB frame
full of zeros, shared by every process. On the first <strong>write</strong>, the kernel
allocates a real frame and updates the PTE.</p>
<pre><code>   mmap(NULL, 4 GiB, PROT_RW, ANON|PRIVATE, -1, 0);

   step 1 — return from mmap:    VMA created, but no PTEs
                                 (Vsize += 4 GiB, RSS unchanged)
   step 2 — read p[0]:           PTE installed pointing to the zero page,
                                 R-O, shared across processes
                                 (RSS unchanged; reads of zero are &quot;free&quot;)
   step 3 — write p[0]:          CoW -&gt; new private frame allocated,
                                 PTE updated, R/W
                                 (RSS += 4 KiB)
</code></pre>
<p>This is how Linux supports <code>malloc(1 GiB)</code> on a 512 MiB machine: it only
breaks when you actually <em>touch</em> enough pages.</p>
<h2 id="7-copy-on-write">7. Copy-on-write</h2>
<p>The other place pages become read-only-shared is right after <code>fork</code>. We will
detail it in <a href="../08_process_syscalls/"><code>../08_process_syscalls/01_fork.c</code></a>,
but the picture is:</p>
<pre><code>   before fork:
     parent VMA -&gt; [F1][F2][F3]    (PTEs RW)

   after fork (no copies yet):
     parent VMA -&gt; [F1][F2][F3]    (PTEs RO, refcount=2 per frame)
     child  VMA -&gt; [F1][F2][F3]    (PTEs RO, refcount=2 per frame)

   child writes to page F2 -&gt; #PF -&gt; kernel allocates F2' for child:
     parent VMA -&gt; [F1][F2][F3]
     child  VMA -&gt; [F1][F2'][F3]
</code></pre>
<h2 id="8-per-process-page-tables">8. Per-process page tables</h2>
<p>Each process has its <strong>own</strong> PML4. <code>CR3</code> is loaded at every context switch.
Two processes can share <em>some</em> frames (CoW, <code>MAP_SHARED</code>, shared libraries)
but each has its own page tables.</p>
<pre><code>   process A
     CR3 -&gt; PML4 A -&gt; ... -&gt; [F7]
                              ^
                              | refcnt=2 because shared lib
                              v
   process B
     CR3 -&gt; PML4 B -&gt; ... -&gt; [F7]
</code></pre>
<h2 id="9-walking-your-own-page-tables-linux-only">9. Walking your own page tables (Linux-only)</h2>
<p>Linux exposes a partial view of your page tables via <code>/proc/self/pagemap</code>
(read-only since 4.0). Each VA maps to a 64-bit entry:</p>
<pre><code>   bits 0..54   physical frame number (if present)
   bit 55       swap?
   bit 56       file/shared?
   bit 61       page is exclusively mapped?
   bit 62       swapped out?
   bit 63       present?
</code></pre>
<p>See <a href="04_pagemap.c"><code>04_pagemap.c</code></a> to translate the address of a local
variable to a PFN.</p>
<h2 id="10-pointers-to-remember">10. Pointers to remember</h2>
<pre><code>   * 4 KiB page, 64-byte cache line, 8-byte word -- on x86_64
   * Virtual addr -&gt; 4-level table -&gt; physical frame
   * TLB caches translations; flushed on CR3 reload, INVLPG, munmap, mprotect
   * Page fault = MMU asks kernel for help
   * Minor faults are cheap (frame alloc); major faults touch disk
   * fresh anonymous pages are MAPPED LAZILY to the zero page
   * fork is cheap because of copy-on-write
</code></pre>

  { name: `13. Process Address Space / Segments Addresses`, path: `02_process_address_space/01_segments_addresses.c`, dir: `02_process_address_space`, words: 320, mins: 2, body: `<h1 id="01_segments_addressesc">01_segments_addresses.c</h1>
<pre><code class="language-c">/*
 * 01_segments_addresses.c
 * ------------------------
 * Print the address of one variable per segment so you can see the layout
 * of a Linux process at run-time.  Compare these addresses to the lines in
 * /proc/self/maps (printed at the end).
 *
 *   text   = code,            low addresses (PIE base, ~0x55... with ASLR)
 *   rodata = const strings,   right above text
 *   data   = init globals,    just above rodata
 *   bss    = uninit globals,  right after data
 *   heap   = brk-managed,     above bss with an ASLR gap
 *   mmap   = anonymous,       high addresses, just below shared libs
 *   stack  = local variables, very high addresses, grows down
 */

#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;string.h&gt;
#include &lt;sys/mman.h&gt;
#include &lt;unistd.h&gt;

static const char rodata_const[] = &quot;I live in .rodata&quot;;
static int   data_int = 42;     /* initialised -&gt; .data */
static int   bss_int;           /* uninitialised, zero -&gt; .bss */

static void some_function(void) {}

int main(int argc, char **argv)
{
    int    stack_int = 1;
    char  *heap_buf  = malloc(64);
    char  *mmap_buf  = mmap(NULL, 4096, PROT_READ | PROT_WRITE,
                            MAP_PRIVATE | MAP_ANONYMOUS, -1, 0);

    printf(&quot;=== Segment addresses ===\\n&quot;);
    printf(&quot;  text   (main)            : %p\\n&quot;, (void *)main);
    printf(&quot;  text   (some_function)   : %p\\n&quot;, (void *)some_function);
    printf(&quot;  rodata (literal)         : %p\\n&quot;, (void *)&quot;a string literal&quot;);
    printf(&quot;  rodata (const array)     : %p\\n&quot;, (void *)rodata_const);
    printf(&quot;  data   (init global)     : %p  (val=%d)\\n&quot;, (void *)&amp;data_int, data_int);
    printf(&quot;  bss    (uninit global)   : %p  (val=%d)\\n&quot;, (void *)&amp;bss_int,  bss_int);
    printf(&quot;  heap   (malloc)          : %p\\n&quot;, (void *)heap_buf);
    printf(&quot;  mmap   (anonymous)       : %p\\n&quot;, (void *)mmap_buf);
    printf(&quot;  stack  (local var)       : %p\\n&quot;, (void *)&amp;stack_int);
    printf(&quot;  stack  (argv ptr array)  : %p\\n&quot;, (void *)argv);
    printf(&quot;  stack  (argv[0] string)  : %p  (= \\&quot;%s\\&quot;)\\n&quot;,
           (void *)argv[0], argv[0]);
    printf(&quot;  libc   (printf)          : %p\\n&quot;, (void *)printf);

    /* dump /proc/self/maps so you can correlate */
    puts(&quot;\\n=== /proc/self/maps ===&quot;);
    FILE *f = fopen(&quot;/proc/self/maps&quot;, &quot;r&quot;);
    if (f) { char buf[512]; while (fgets(buf, sizeof buf, f)) fputs(buf, stdout); fclose(f); }

    free(heap_buf);
    munmap(mmap_buf, 4096);
    (void)argc;
    return 0;
}

</code></pre>` },
  { name: `14. Process Address Space / Environ`, path: `02_process_address_space/02_environ.c`, dir: `02_process_address_space`, words: 425, mins: 2, body: `<h1 id="02_environc">02_environ.c</h1>
<pre><code class="language-c">/*
 * 02_environ.c
 * -------------
 * Show how argv, envp, and the auxiliary vector are laid out at the top
 * of the stack at program start.
 *
 *   higher addr (top of stack)
 *   +--------------------------+
 *   | env strings (NUL-sep)    |
 *   | argv strings (NUL-sep)   |
 *   | random data (AT_RANDOM)  |
 *   | (alignment)              |
 *   +--------------------------+
 *   | NULL                     |
 *   | auxv entries (8B key + 8B val), terminated by AT_NULL
 *   +--------------------------+
 *   | NULL                     |
 *   | envp[N-1] -&gt; &quot;PATH=...&quot;  |
 *   | ...                      |
 *   | envp[0]   -&gt; &quot;HOME=...&quot;  |
 *   +--------------------------+
 *   | NULL                     |
 *   | argv[argc-1] -&gt; ...      |
 *   | ...                      |
 *   | argv[0]    -&gt; &quot;./prog&quot;   |
 *   +--------------------------+
 *   | argc (a long)            |
 *   +--------------------------+   &lt;- %rsp at _start
 */

#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;sys/auxv.h&gt;
#include &lt;elf.h&gt;
#include &lt;string.h&gt;

extern char **environ;

static const char *auxv_name(unsigned long type)
{
    switch (type) {
    case AT_NULL:      return &quot;AT_NULL&quot;;
    case AT_PHDR:      return &quot;AT_PHDR&quot;;
    case AT_PHENT:     return &quot;AT_PHENT&quot;;
    case AT_PHNUM:     return &quot;AT_PHNUM&quot;;
    case AT_PAGESZ:    return &quot;AT_PAGESZ&quot;;
    case AT_BASE:      return &quot;AT_BASE&quot;;       /* ld.so load address */
    case AT_FLAGS:     return &quot;AT_FLAGS&quot;;
    case AT_ENTRY:     return &quot;AT_ENTRY&quot;;      /* program entry point */
    case AT_UID:       return &quot;AT_UID&quot;;
    case AT_EUID:      return &quot;AT_EUID&quot;;
    case AT_GID:       return &quot;AT_GID&quot;;
    case AT_EGID:      return &quot;AT_EGID&quot;;
    case AT_PLATFORM:  return &quot;AT_PLATFORM&quot;;
    case AT_HWCAP:     return &quot;AT_HWCAP&quot;;
    case AT_CLKTCK:    return &quot;AT_CLKTCK&quot;;
    case AT_SECURE:    return &quot;AT_SECURE&quot;;
    case AT_RANDOM:    return &quot;AT_RANDOM&quot;;
    case AT_EXECFN:    return &quot;AT_EXECFN&quot;;
    case AT_SYSINFO_EHDR: return &quot;AT_SYSINFO_EHDR (vDSO)&quot;;
    default:           return &quot;AT_?&quot;;
    }
}

int main(int argc, char **argv)
{
    printf(&quot;=== argc / argv ===\\n&quot;);
    printf(&quot;argc = %d\\n&quot;, argc);
    for (int i = 0; i &lt; argc; ++i)
        printf(&quot;  argv[%d] = %p -&gt; \\&quot;%s\\&quot;\\n&quot;, i, (void *)argv[i], argv[i]);
    printf(&quot;  argv[%d] = NULL\\n&quot;, argc);

    printf(&quot;\\n=== environ ===\\n&quot;);
    int n = 0;
    for (char **e = environ; *e; ++e, ++n) {
        if (n &lt; 10) /* don't drown user */
            printf(&quot;  environ[%d] = %p -&gt; \\&quot;%.80s%s\\&quot;\\n&quot;,
                   n, (void *)*e, *e, strlen(*e) &gt; 80 ? &quot;...&quot; : &quot;&quot;);
    }
    printf(&quot;  ... %d total entries, environ[%d] = NULL\\n&quot;, n, n);

    /* Walk auxv by finding the NULL terminator after environ */
    char **after_env = environ;
    while (*after_env) ++after_env;
    ++after_env; /* skip the NULL */
    Elf64_auxv_t *auxv = (Elf64_auxv_t *)after_env;

    printf(&quot;\\n=== auxv ===\\n&quot;);
    for (; auxv-&gt;a_type != AT_NULL; ++auxv) {
        printf(&quot;  %-20s (%lu) = 0x%lx\\n&quot;,
               auxv_name(auxv-&gt;a_type), auxv-&gt;a_type,
               auxv-&gt;a_un.a_val);
    }

    printf(&quot;\\n=== via getauxval(3) (libc helper) ===\\n&quot;);
    printf(&quot;  AT_PAGESZ        = %lu\\n&quot;,  getauxval(AT_PAGESZ));
    printf(&quot;  AT_BASE   (ld)   = %lx\\n&quot;,  getauxval(AT_BASE));
    printf(&quot;  AT_SYSINFO_EHDR  = %lx\\n&quot;,  getauxval(AT_SYSINFO_EHDR));
    printf(&quot;  AT_EXECFN        = \\&quot;%s\\&quot;\\n&quot;, (const char *)getauxval(AT_EXECFN));
    return 0;
}

</code></pre>` },
  { name: `15. Process Address Space / Dump Maps`, path: `02_process_address_space/03_dump_maps.c`, dir: `02_process_address_space`, words: 226, mins: 1, body: `<h1 id="03_dump_mapsc">03_dump_maps.c</h1>
<pre><code class="language-c">/*
 * 03_dump_maps.c
 * ---------------
 * Read /proc/self/maps and pretty-print it grouped by region kind:
 *   text, rodata, data/bss, heap, stack, mmap-anon, mmap-file, vvar/vdso.
 *
 * Use this on any program you don't understand the memory map of:
 *   $ gdb ./victim ; (gdb) catch syscall mmap ; ...
 * or just have the program pause and read its own maps.
 */

#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;string.h&gt;
#include &lt;stdlib.h&gt;

int main(void)
{
    FILE *f = fopen(&quot;/proc/self/maps&quot;, &quot;r&quot;);
    if (!f) { perror(&quot;open&quot;); return 1; }

    char line[512];
    printf(&quot;%-37s %-5s %-9s %-7s %-7s  %s\\n&quot;,
           &quot;range&quot;, &quot;perm&quot;, &quot;offset&quot;, &quot;dev&quot;, &quot;inode&quot;, &quot;path&quot;);
    printf(&quot;---------------------------------------------------------------------\\n&quot;);

    unsigned long total = 0;
    while (fgets(line, sizeof line, f)) {
        unsigned long start, end;
        char perms[6], dev[8];
        unsigned long off, inode;
        char path[256] = &quot;&quot;;
        int n = sscanf(line, &quot;%lx-%lx %5s %lx %7s %lu %255[^\\n]&quot;,
                       &amp;start, &amp;end, perms, &amp;off, dev, &amp;inode, path);
        if (n &lt; 6) continue;
        unsigned long sz = end - start;
        total += sz;

        const char *kind = &quot;anon&quot;;
        if (path[0] == '[') kind = path;       /* [heap] [stack] [vdso] ... */
        else if (path[0])   kind = &quot;file&quot;;

        printf(&quot;0x%012lx-0x%012lx %-5s %08lx %-7s %-7lu  %s  (%lu KiB)\\n&quot;,
               start, end, perms, off, dev, inode,
               path[0] ? path : &quot;(anon)&quot;,
               sz &gt;&gt; 10);
        (void)kind;
    }
    fclose(f);
    printf(&quot;---------------------------------------------------------------------\\n&quot;);
    printf(&quot;VSS (all VMAs)  = %lu KiB  (%lu MiB)\\n&quot;,
           total &gt;&gt; 10, total &gt;&gt; 20);
    return 0;
}

</code></pre>` },
  { name: `16. Process Address Space / Aslr`, path: `02_process_address_space/04_aslr.c`, dir: `02_process_address_space`, words: 132, mins: 1, body: `<h1 id="04_aslrc">04_aslr.c</h1>
<pre><code class="language-c">/*
 * 04_aslr.c
 * ----------
 * Run this several times in a row.  Note that on a normal system the
 * addresses of every segment change between runs -- that's ASLR.
 *
 *   $ for i in 1 2 3; do ./04_aslr; echo &quot;---&quot;; done
 *
 * To disable ASLR for a single run:   setarch $(uname -m) -R ./04_aslr
 * To disable system-wide (dangerous): sudo sysctl -w kernel.randomize_va_space=0
 */

#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;

static int data_var = 1;

int main(int argc, char **argv)
{
    int stack_var;
    char *heap = malloc(16);
    printf(&quot;text  (main)     = %p\\n&quot;, (void *)main);
    printf(&quot;data  (data_var) = %p\\n&quot;, (void *)&amp;data_var);
    printf(&quot;heap  (malloc)   = %p\\n&quot;, (void *)heap);
    printf(&quot;stack (local)    = %p\\n&quot;, (void *)&amp;stack_var);
    printf(&quot;libc  (printf)   = %p\\n&quot;, (void *)printf);
    printf(&quot;argv  (ptr)      = %p\\n&quot;, (void *)argv);
    free(heap);
    (void)argc;
    return 0;
}

</code></pre>` },
  { name: `17. Process Address Space / Rlimit`, path: `02_process_address_space/05_rlimit.c`, dir: `02_process_address_space`, words: 306, mins: 2, body: `<h1 id="05_rlimitc">05_rlimit.c</h1>
<pre><code class="language-c">/*
 * 05_rlimit.c
 * ------------
 * Print all the memory-related rlimits and explain what each one means.
 *
 *   RLIMIT_AS      = max virtual address space (VSZ)         &lt;- can be unlimited
 *   RLIMIT_DATA    = max heap + bss + data segments
 *   RLIMIT_STACK   = max main-thread stack size              &lt;- typical 8 MiB
 *   RLIMIT_RSS     = max resident set size (legacy, ignored on modern kernels)
 *   RLIMIT_MEMLOCK = max bytes you can mlock without privilege
 *   RLIMIT_NOFILE  = max number of open file descriptors
 *
 *  Inspect &amp; change with:   ulimit -a
 *                           ulimit -s 16384
 *                           prlimit --pid=$$ --stack=64M:64M
 */

#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;sys/resource.h&gt;

struct entry { int id; const char *name; const char *unit; };

static struct entry rls[] = {
    { RLIMIT_AS,      &quot;RLIMIT_AS&quot;,      &quot;bytes&quot; },
    { RLIMIT_CORE,    &quot;RLIMIT_CORE&quot;,    &quot;bytes&quot; },
    { RLIMIT_CPU,     &quot;RLIMIT_CPU&quot;,     &quot;sec&quot; },
    { RLIMIT_DATA,    &quot;RLIMIT_DATA&quot;,    &quot;bytes&quot; },

  { name: `18. Process Address Space`, path: `02_process_address_space/README.md`, dir: `02_process_address_space`, words: 920, mins: 5, body: `<h1 id="02--the-process-address-space">02 — The Process Address Space</h1>
<p>When the kernel does <code>execve("a.out", argv, envp)</code> it constructs a brand-new
virtual address space for your process out of pieces of the ELF file, libc,
the kernel&rsquo;s <code>vdso</code>, and a generous helping of zero-filled anonymous memory.
This section is the <em>map</em> of that space.</p>
<h2 id="1-elf--whats-in-the-file">1. ELF — what&rsquo;s in the file</h2>
<pre><code>   a.out
   +--------------------------------+
   | ELF header  (entry point, ...) |
   +--------------------------------+
   | program headers  (LOAD, ...)   |  &lt;- the loader reads these
   +--------------------------------+
   | .text     (code, RX)           |
   | .rodata   (strings, R-)        |  packed into a &quot;LOAD&quot; segment
   +--------------------------------+
   | .data     (init globals, RW)   |  another LOAD segment
   | .bss      (zero-init, RW)      |  zero-filled by kernel, not on disk
   +--------------------------------+
   | section headers (linker info)  |
   +--------------------------------+
</code></pre>
<p>The kernel honours the <strong>LOAD program headers</strong>, not the sections. Run
<code>readelf -l a.out</code> to see them:</p>
<pre><code>   LOAD off=0x000000 vaddr=0x400000 filesz=0x4f8 memsz=0x4f8 flags=R E
   LOAD off=0x000e10 vaddr=0x401e10 filesz=0x230 memsz=0x238 flags=RW
                                                       ^         ^
                                                       |         |
                                              filesz=on-disk    memsz=in-mem
                                              (the extra 8 bytes
                                               are .bss, kernel zeros them)
</code></pre>
<h2 id="2-the-standard-segments-after-execve">2. The standard segments after <code>execve</code></h2>
<pre><code>   high addr  +---------------------------------+ 0x7FFFFFFFFFFF (canonical max)
              |  kernel half (not mapped to us) |
              +---------------------------------+ 0xFFFF800000000000 - 1
              |   non-canonical hole            |
              +---------------------------------+
              |  [stack]                        |   main thread stack (rw-)
              |     |                           |
              |     v                           |
              +---------------------------------+
              |  args + env + auxv at very top  |
              |  of the stack region            |
              +---------------------------------+
              |  ...                            |
              |  [vdso]    kernel shim          |
              |  [vvar]    kernel data          |
              |  [vsyscall] (legacy)            |
              |  /lib/libc.so.6 segments        |
              |  /lib/ld-linux.so.2 segments    |
              |  arbitrary anonymous mmap       |   thread stacks land here too
              |  ...                            |
              +---------------------------------+
              |  [heap]                         |   ptmalloc grows this with brk
              |     ^                           |
              |     |                           |
              +---------------------------------+
              |  .bss   (zero-filled)           |
              |  .data  (init globals)          |
              |  .rodata (strings, RO)          |
              |  .text  (code, RX)              |
   low addr   +---------------------------------+ 0x400000 (typical PIE/non-PIE)
              |  guard page at addr 0           |  *PROT_NONE*, NULL deref =&gt; SIGSEGV
              +---------------------------------+ 0
</code></pre>
<p>(With <strong>PIE</strong> — Position Independent Executable — the base is randomised by
ASLR; without PIE, it is <code>0x400000</code> on x86_64.)</p>
<h2 id="3-the-auxiliary-vector-auxv">3. The auxiliary vector (auxv)</h2>
<p>When the kernel sets up the stack it pushes:</p>
<pre><code>   top of stack -----+
                     |  envp[]
                     |  argv[]
                     |  argc
                     |  ...
                     |  auxv[]  (key/value pairs the kernel gives us)
                     |  envp strings
                     |  argv strings
                     |  random data, AT_RANDOM, padding
</code></pre>
<p>You can read it via <code>getauxval(3)</code>:</p>
<pre><code class="language-c">#include &lt;sys/auxv.h&gt;
unsigned long pgsz = getauxval(AT_PAGESZ);
unsigned long base = getauxval(AT_BASE);     /* ld.so load addr */
const char *exe   = (const char *)getauxval(AT_EXECFN);
</code></pre>
<h2 id="4-procselfmaps--the-truth">4. <code>/proc/self/maps</code> — the truth</h2>
<p>Every line is one <strong>VMA</strong> (Virtual Memory Area). Example:</p>
<pre><code>   address                   perms offset   dev   inode      pathname
   ----------------          ----- ------- ----- ------     ---------------
   55b6a4400000-55b6a4401000 r--p  00000000  fd:01  393425   /home/x/a.out
   55b6a4401000-55b6a4402000 r-xp  00001000  fd:01  393425   /home/x/a.out
   55b6a4402000-55b6a4403000 r--p  00002000  fd:01  393425   /home/x/a.out
   55b6a4403000-55b6a4404000 r--p  00002000  fd:01  393425   /home/x/a.out
   55b6a4404000-55b6a4405000 rw-p  00003000  fd:01  393425   /home/x/a.out
   55b6a5b65000-55b6a5b86000 rw-p  00000000  00:00  0        [heap]
   7f9e10000000-7f9e10021000 rw-p  00000000  00:00  0
   7f9e10021000-7f9e14000000 ---p  00000000  00:00  0
   7f9e17af1000-7f9e17b13000 r--p  00000000  fd:01  524332   /lib/x86_64-linux-gnu/libc.so.6
   ...
   7ffd9e22d000-7ffd9e24e000 rw-p  00000000  00:00  0        [stack]
   7ffd9e2ad000-7ffd9e2b1000 r--p  00000000  00:00  0        [vvar]
   7ffd9e2b1000-7ffd9e2b3000 r-xp  00000000  00:00  0        [vdso]
   ffffffffff600000-ffffffffff601000 --xp 00000000 00:00 0   [vsyscall]
</code></pre>
<p>Columns:</p>
<table>
<thead>
<tr>
<th>col</th>
<th>meaning</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>address</code></td>
<td><code>start-end</code>, half-open <code>[start, end)</code></td>
</tr>
<tr>
<td><code>perms</code></td>
<td><code>rwxp</code> or <code>rwxs</code> (<code>p</code>=private, <code>s</code>=shared); <code>-</code> = none</td>
</tr>
<tr>
<td><code>offset</code></td>
<td>offset into the backing file (or 0 for anon)</td>
</tr>
<tr>
<td><code>dev</code></td>
<td><code>major:minor</code> of the device (or <code>00:00</code> for anon)</td>
</tr>
<tr>
<td><code>inode</code></td>
<td>inode of the backing file (or <code>0</code> for anon)</td>
</tr>
<tr>
<td><code>pathname</code></td>
<td><code>/path/to/file</code>, <code>[heap]</code>, <code>[stack]</code>, <code>[vdso]</code>, &hellip;</td>
</tr>
</tbody>
</table>
<blockquote>
<p>Pro tip: pause your program with <code>pause()</code> or <code>getchar()</code> and inspect from
another terminal. See <a href="03_dump_maps.c"><code>03_dump_maps.c</code></a>.</p>
</blockquote>
<h3 id="why-so-many-segments-per-elf-file">Why so many segments per ELF file?</h3>
<p>Modern ELF + ld separate read-only data (<code>r--p</code>), code (<code>r-xp</code>), relocations
(another <code>r--p</code>), and writable data (<code>rw-p</code>) so each can get the tightest
permissions. The kernel maps each LOAD header as its own VMA.</p>
<h2 id="5-aslr--address-space-layout-randomisation">5. ASLR — Address Space Layout Randomisation</h2>
<p>By default Linux randomises:</p>
<ol>
<li>The mmap base (libraries, thread stacks).</li>
<li>The brk base (small offset above <code>.bss</code> if <code>randomize_va_space &gt;= 1</code>).</li>
<li>The main stack base.</li>
<li>The PIE executable base (<code>/proc/sys/kernel/randomize_va_space=2</code>).</li>
</ol>
<p>Disable for one process: <code>setarch $(uname -m) -R ./prog</code>
System-wide: <code>sudo sysctl -w kernel.randomize_va_space=0</code> (don&rsquo;t do this in
production!).</p>
<p>See <a href="04_aslr.c"><code>04_aslr.c</code></a> which prints addresses across multiple runs.</p>
<h2 id="6-where-things-actually-live--empirically">6. Where things actually live — empirically</h2>
<p>Run <a href="01_segments_addresses.c"><code>01_segments_addresses.c</code></a> and you&rsquo;ll see
something like:</p>
<pre><code>   .text     (code)     0x55a8a8bb6149    &lt;-- low
   .rodata   (const)    0x55a8a8bb7008
   .data     (globals)  0x55a8a8bb9020
   .bss      (uninit)   0x55a8a8bb9034
   heap      (malloc)   0x55a8aa3b1010   &lt;-- brk-managed
   mmap anon            0x7f23e6cb5000
   stack     (locals)   0x7ffd1233a55c   &lt;-- high
</code></pre>
<p>Notice the <strong>giant</strong> gap between heap and mmap — that&rsquo;s the address-space
hole reserved so the heap can grow up and mmap can grow down without
colliding (until they meet — which is when <code>brk(2)</code> will fail).</p>
<h2 id="7-the-vdso-and-vvar">7. The <code>vdso</code> and <code>vvar</code></h2>
<p>To make <code>gettimeofday</code>, <code>clock_gettime</code>, and a few other &ldquo;trivial&rdquo; syscalls
faster, the kernel maps a small ELF (the <strong>vDSO</strong>) into every process. Calling
<code>clock_gettime(CLOCK_MONOTONIC, ...)</code> does not actually trap into the kernel
— it reads a counter out of the <code>[vvar]</code> page.</p>
<pre><code>   user calls clock_gettime(...)
        |
        v
   glibc resolves via auxv (AT_SYSINFO_EHDR) -&gt; [vdso] entry
        |
        v
   [vdso] code reads [vvar] (no syscall!) and returns
</code></pre>
<p>This is one reason measuring <code>clock_gettime</code> shows &lt; 30 ns per call.</p>

<pre><code class="language-c">/*
 * 01_stack_growth.c
 * ------------------
 * Print &amp;local at increasing recursion depths.  On x86_64 the value
 * decreases with depth (stack grows DOWN).
 */
#include &lt;stdio.h&gt;
#include &lt;stdint.h&gt;

static void recurse(int depth, uintptr_t prev_addr)
{
    int local;
    long delta = prev_addr ? (long)prev_addr - (long)&amp;local : 0;
    printf(&quot;depth=%2d  &amp;local=%p  (delta=%ld bytes from caller)\\n&quot;,
           depth, (void *)&amp;local, delta);
    if (depth &lt; 8)
        recurse(depth + 1, (uintptr_t)&amp;local);
}

int main(void)
{
    int top;
    printf(&quot;main &amp;top = %p (top of our journey)\\n&quot;, (void *)&amp;top);
    recurse(0, (uintptr_t)&amp;top);
    return 0;
}

  { name: `20. Stack / Recursion Depth`, path: `03_stack/02_recursion_depth.c`, dir: `03_stack`, words: 234, mins: 1, body: `<h1 id="02_recursion_depthc">02_recursion_depth.c</h1>
<pre><code class="language-c">/*
 * 02_recursion_depth.c
 * ---------------------
 * Find out how deep you can recurse before the stack overflows.  We catch
 * SIGSEGV on an alternate stack so we can print results before dying.
 *
 *   Typical: ~80,000 frames for an empty function (8 MiB / ~100 B per frame).
 *
 * Build:  gcc -O0 -g 02_recursion_depth.c -o 02_recursion_depth
 */

#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;signal.h&gt;
#include &lt;string.h&gt;
#include &lt;unistd.h&gt;
#include &lt;setjmp.h&gt;

static jmp_buf jb;
static long depth_reached;

static void on_segv(int sig, siginfo_t *si, void *ctx)
{
    (void)sig; (void)si; (void)ctx;
    /* Note: long-jumping out of a signal handler is technically UB but
     * works on Linux for SIGSEGV stack-overflow scenarios when run on an
     * alternate stack. */
    siglongjmp(jb, 1);
}

static long counter;
static void recurse(void)
{
    char filler[64];  /* make the frame non-trivial */
    filler[0] = 0;
    counter++;
    recurse();
    (void)filler;
}

int main(void)
{
    /* alternate signal stack so the handler runs even with a smashed stack */
    static char altstack[SIGSTKSZ];
    stack_t ss = { .ss_sp = altstack, .ss_size = sizeof altstack };
    sigaltstack(&amp;ss, NULL);

    struct sigaction sa = {0};
    sa.sa_sigaction = on_segv;
    sa.sa_flags = SA_SIGINFO | SA_ONSTACK;
    sigemptyset(&amp;sa.sa_mask);
    sigaction(SIGSEGV, &amp;sa, NULL);

    if (sigsetjmp(jb, 1) == 0) {
        recurse();
    } else {
        depth_reached = counter;
        printf(&quot;SIGSEGV caught at depth %ld\\n&quot;, depth_reached);
        printf(&quot;each frame ~= %ld bytes\\n&quot;,
               (long)(8 * 1024 * 1024) / (depth_reached ? depth_reached : 1));
    }
    return 0;
}

</code></pre>` },
  { name: `21. Stack / Alloca Vs Vla`, path: `03_stack/03_alloca_vs_vla.c`, dir: `03_stack`, words: 210, mins: 1, body: `<h1 id="03_alloca_vs_vlac">03_alloca_vs_vla.c</h1>
<pre><code class="language-c">/*
 * 03_alloca_vs_vla.c
 * -------------------
 * Compare three ways to grab N bytes inside a function:
 *
 *     malloc(N)  -- heap; survives function return; you must free()
 *     alloca(N)  -- stack; freed at function return; non-standard (BSD)
 *     char[N]    -- VLA;   stack; C99+; freed at end of enclosing block
 *
 *   stack frame after a VLA / alloca:
 *
 *   +--------------------------+   &lt;- %rbp
 *   | saved rbp / canary / ... |
 *   +--------------------------+
 *   | other locals             |
 *   +--------------------------+
 *   | dynamic block (n bytes)  |   &lt;-- VLA / alloca lives here
 *   +--------------------------+   &lt;- %rsp grows down as n grows
 *
 *   NB: large n =&gt; may overflow the stack.  Always validate n!
 */
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;string.h&gt;
#include &lt;alloca.h&gt;

static void use_malloc(size_t n)
{
    char *p = malloc(n);
    memset(p, 'M', n);
    printf(&quot;  malloc  -&gt; %p (heap)\\n&quot;, (void *)p);
    free(p);
}

static void use_alloca(size_t n)
{
    char *p = alloca(n);
    memset(p, 'A', n);
    printf(&quot;  alloca  -&gt; %p (stack)\\n&quot;, (void *)p);
}

static void use_vla(size_t n)
{
    char p[n];                  /* C99 VLA */
    memset(p, 'V', n);
    printf(&quot;  VLA     -&gt; %p (stack)\\n&quot;, (void *)p);
}

int main(void)
{
    size_t n = 1024;
    int stack_anchor;
    printf(&quot;&amp;stack_anchor = %p (reference)\\n&quot;, (void *)&amp;stack_anchor);
    use_malloc(n);
    use_alloca(n);
    use_vla(n);
    return 0;
}

</code></pre>` },
  { name: `22. Stack / Stack Overflow`, path: `03_stack/04_stack_overflow.c`, dir: `03_stack`, words: 227, mins: 1, body: `<h1 id="04_stack_overflowc">04_stack_overflow.c</h1>
<pre><code class="language-c">/*
 * 04_stack_overflow.c
 * --------------------
 * Overflow the stack on purpose, but catch the SIGSEGV on an alternate
 * stack so we don't die silently.  Compare:
 *
 *   $ ulimit -s          # current limit, KiB
 *   8192
 *   $ ulimit -s 1024     # shrink the limit
 *   $ ./04_stack_overflow
 *
 * Build:  gcc -O0 -g 04_stack_overflow.c -o 04_stack_overflow
 */

#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;signal.h&gt;
#include &lt;string.h&gt;
#include &lt;sys/resource.h&gt;
#include &lt;unistd.h&gt;
#include &lt;setjmp.h&gt;

static jmp_buf jb;

static void h(int s, siginfo_t *si, void *uc)
{
    (void)s; (void)uc;
    /* write(2) is async-signal-safe; printf isn't */
    char msg[128];
    int n = snprintf(msg, sizeof msg,
                     &quot;[signal] SIGSEGV at fault addr %p (this is the stack guard page)\\n&quot;,
                     si ? si-&gt;si_addr : NULL);
    write(2, msg, n);
    siglongjmp(jb, 1);
}

static char altstack[1 &lt;&lt; 16];

static long used;
static void grow(void)
{
    char waste[1024];
    waste[0] = 0;
    used += sizeof waste;
    grow();
    (void)waste;
}

int main(void)
{
    struct rlimit rl;
    getrlimit(RLIMIT_STACK, &amp;rl);
    printf(&quot;RLIMIT_STACK soft=%lu hard=%lu\\n&quot;,
           (unsigned long)rl.rlim_cur, (unsigned long)rl.rlim_max);

    stack_t ss = { .ss_sp = altstack, .ss_size = sizeof altstack };
    sigaltstack(&amp;ss, NULL);

    struct sigaction sa = {0};
    sa.sa_sigaction = h;
    sa.sa_flags     = SA_SIGINFO | SA_ONSTACK | SA_RESETHAND;
    sigemptyset(&amp;sa.sa_mask);
    sigaction(SIGSEGV, &amp;sa, NULL);

    if (sigsetjmp(jb, 1) == 0) {
        grow();
    } else {
        printf(&quot;recovered; approximate stack used = %ld bytes (~%ld KiB)\\n&quot;,
               used, used / 1024);
    }
    return 0;
}

</code></pre>` },
  { name: `23. Stack / Dangling Local`, path: `03_stack/05_dangling_local.c`, dir: `03_stack`, words: 198, mins: 1, body: `<h1 id="05_dangling_localc">05_dangling_local.c</h1>
<pre><code class="language-c">/*
 * 05_dangling_local.c
 * --------------------
 * Return a pointer to a stack-local buffer.  The storage is GONE when the
 * function returns -- using the returned pointer is undefined behaviour.
 *
 *   bad():
 *     [ frame for bad ]
 *     +----------+
 *     | buf[16]  | &lt;-- ptr returned
 *     +----------+
 *     bad returns; frame collapses;
 *     subsequent calls (printf, etc.) reuse this stack space.
 *
 * Compile WITHOUT optimisation to see the corruption.  With -O2 GCC may
 * detect this at compile time and even refuse to compile.
 */
#include &lt;stdio.h&gt;
#include &lt;string.h&gt;

/* prevent the compiler from inlining bad() into main, which would make
 * the bug &quot;go away&quot; in clever ways. */
__attribute__((noinline))
static char *bad(void)
{
    char buf[16];
    strcpy(buf, &quot;danger!&quot;);
    return buf;       /* &lt;--- WRONG, but C lets you do it */
}

__attribute__((noinline))
static void clobber(void)
{
    char other[256];
    memset(other, '#', sizeof other - 1);
    other[sizeof other - 1] = 0;
    /* don't print 'other' so optimizer keeps it; just touch it */
    if (other[0] == 'X') puts(&quot;never&quot;);
}

int main(void)
{
    char *p = bad();
    printf(&quot;right after return: \\&quot;%s\\&quot;\\n&quot;, p);
    clobber();
    printf(&quot;after clobber:      \\&quot;%s\\&quot;\\n&quot;, p);  /* probably garbage */
    return 0;
}

</code></pre>` },

  { name: `25. Stack / Pthread Stack`, path: `03_stack/07_pthread_stack.c`, dir: `03_stack`, words: 245, mins: 1, body: `<h1 id="07_pthread_stackc">07_pthread_stack.c</h1>
<pre><code class="language-c">/*
 * 07_pthread_stack.c
 * -------------------
 * Show where a pthread's stack lives, what its size and guard size are,
 * and how to override them.
 *
 *   Process address space (high addr at top):
 *
 *   +-----------------+   main thread stack (~8 MiB)
 *   +-----------------+
 *   |   mmap area     |   --- thread 2 stack ---
 *   |                 |   --- guard page     ---
 *   |                 |   --- thread 1 stack ---
 *   |                 |   --- guard page     ---
 *   +-----------------+   heap (brk)
 *
 * Build:  gcc -O0 -g -pthread 07_pthread_stack.c -o 07_pthread_stack
 */

#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;pthread.h&gt;
#include &lt;unistd.h&gt;

static void *worker(void *arg)
{
    (void)arg;
    int local;

    pthread_attr_t a;
    pthread_getattr_np(pthread_self(), &amp;a);
    void *stkaddr; size_t stksize, guard;
    pthread_attr_getstack(&amp;a, &amp;stkaddr, &amp;stksize);
    pthread_attr_getguardsize(&amp;a, &amp;guard);

    printf(&quot;[thread %lu] &amp;local       = %p\\n&quot;,
           (unsigned long)pthread_self(), (void *)&amp;local);
    printf(&quot;[thread %lu] stack base   = %p\\n&quot;,
           (unsigned long)pthread_self(), stkaddr);
    printf(&quot;[thread %lu] stack top    = %p\\n&quot;,
           (unsigned long)pthread_self(), (char *)stkaddr + stksize);
    printf(&quot;[thread %lu] stack size   = %zu KiB\\n&quot;,
           (unsigned long)pthread_self(), stksize / 1024);
    printf(&quot;[thread %lu] guard size   = %zu bytes\\n&quot;,
           (unsigned long)pthread_self(), guard);
    pthread_attr_destroy(&amp;a);
    return NULL;
}

int main(void)
{
    /* Thread 1: default attributes */
    pthread_t t1; pthread_create(&amp;t1, NULL, worker, NULL);
    pthread_join(t1, NULL);

    /* Thread 2: tiny custom stack (256 KiB) */
    pthread_attr_t a;
    pthread_attr_init(&amp;a);
    pthread_attr_setstacksize(&amp;a, 256 * 1024);
    pthread_attr_setguardsize(&amp;a, sysconf(_SC_PAGESIZE));
    pthread_t t2; pthread_create(&amp;t2, &amp;a, worker, NULL);
    pthread_join(t2, NULL);
    pthread_attr_destroy(&amp;a);

    /* And the main thread for comparison */
    int local; printf(&quot;[ main ] &amp;local         = %p\\n&quot;, (void *)&amp;local);
    return 0;
}

</code></pre>` },
  { name: `26. Stack`, path: `03_stack/README.md`, dir: `03_stack`, words: 1143, mins: 6, body: `<h1 id="03--the-stack">03 — The Stack</h1>
<p>The stack is the single most important data structure in any C program. Every
function call uses it; every local variable lives in it; every argument is
passed via it (or via registers, on x86_64). Get this right and you&rsquo;ll
understand crashes, security bugs, and threading from first principles.</p>
<h2 id="1-what-the-stack-actually-is">1. What the stack actually is</h2>
<p>On Linux x86_64 the main-thread stack is a <strong>single VMA</strong> at a high address,
created by the kernel at <code>execve</code> time. It has:</p>
<ul>
<li>A fixed reserve (<code>RLIMIT_STACK</code>, typically 8 MiB).</li>
<li>A <strong>guard page</strong> of <code>PROT_NONE</code> just below it. Touch it -&gt; <code>SIGSEGV</code>.</li>
<li>The <code>MAP_GROWSDOWN</code> flag (historically) so the kernel can extend it on
  demand if you keep pushing.</li>
</ul>
<pre><code>   high addr  +-------------------------+
              |   args / env / auxv     |   set up by kernel at execve
              +-------------------------+
              |        ...  (in use)    |
              |   stack frame for main  |   &lt;- %rbp
              |   ---- ret addr ----    |
              |   stack frame for foo   |   &lt;- pushed by call
              |   ---- ret addr ----    |
              |   stack frame for bar   |
              |   ...                   |
   %rsp ----&gt; +-------------------------+
              |   (unused, but mapped)  |
              |   ...                   |
              +-------------------------+
              |   guard page PROT_NONE  |  &lt;-- touching this -&gt; SIGSEGV
              +-------------------------+
   low addr   ...
</code></pre>
<h2 id="2-anatomy-of-a-single-stack-frame-system-v-x86_64-abi">2. Anatomy of a single stack frame (System V x86_64 ABI)</h2>
<pre><code>   higher addr
   +------------------------------+
   |   caller's args 7,8,9...     |   (first 6 go in regs: rdi,rsi,rdx,rcx,r8,r9)
   +------------------------------+
   |   return address (8B)        |   pushed by \`call\`
   +------------------------------+
   |   saved RBP of caller (8B)   |   pushed by callee:  push %rbp
   +------------------------------+  &lt;- %rbp of callee (the &quot;frame pointer&quot;)
   |   callee-saved registers     |   only if used: rbx, r12-r15
   +------------------------------+
   |   local variables            |
   |     ...                      |
   |   alignment padding          |
   +------------------------------+  &lt;- %rsp (always 16-byte aligned before call)
   lower addr
</code></pre>
<p>Calling conventions in one sentence: <strong>integer args go in
<code>rdi, rsi, rdx, rcx, r8, r9</code>; FP args in <code>xmm0..xmm7</code>; everything past that
goes on the stack; return value in <code>rax</code>; the stack must be 16-byte aligned
just before a <code>call</code>.</strong></p>
<h3 id="variable-lifetime">Variable lifetime</h3>
<pre><code>   void f(void) {
       int a = 1;        // a is at, say, %rbp-4
       int b = 2;        // b is at, say, %rbp-8
       g();              // g() pushes more stuff, but f's frame is preserved
   }                     // f returns: leave; ret -- %rsp now points back to caller
</code></pre>
<p>Note: in optimised builds the compiler often <strong>omits the frame pointer</strong>
(<code>-fomit-frame-pointer</code>, default at <code>-O1+</code>). Then <code>%rbp</code> is just a general
register and the unwinder relies on <code>.eh_frame</code> DWARF tables.</p>
<h2 id="3-direction-of-growth">3. Direction of growth</h2>
<p>x86_64: stack grows <strong>downward</strong> (subtract from <code>rsp</code>).</p>
<pre><code>   void recurse(int n) {
       int local;
       printf(&quot;depth=%d, &amp;local=%p\\n&quot;, n, &amp;local);
       if (n &gt; 0) recurse(n - 1);
   }

   output:
       depth=3, &amp;local=0x7ffe...c
       depth=2, &amp;local=0x7ffe...0   (down 12 or 16 bytes, depending on layout)
       depth=1, &amp;local=0x7ffe...4
       depth=0, &amp;local=0x7ffe...8
</code></pre>
<p>See <a href="02_recursion_depth.c"><code>02_recursion_depth.c</code></a> to see exactly how much
stack each call uses.</p>
<h2 id="4-stack-overflow">4. Stack overflow</h2>
<p>The stack is <code>RLIMIT_STACK</code> big. Recurse too deeply (or allocate too large a
local with <code>alloca</code>/VLA) and you&rsquo;ll <strong>fall off the end</strong> — usually a
<code>SIGSEGV</code> because you wrote into the guard page.</p>
<pre><code>   stack VMA
   +------------------------------+
   |       (used by frames)       |
   |   .                          |
   |   .                          |
   |   .                          |
   +-- guard page PROT_NONE ------+    &lt;- touching this kills you
</code></pre>
<p>To detect it gracefully, install a <code>SIGSEGV</code> handler <strong>on an alternate stack</strong>
with <code>sigaltstack</code>. We do that in
<a href="../11_memory_protection/"><code>../11_memory_protection/04_segfault_handler.c</code></a>.</p>
<p>See <a href="04_stack_overflow.c"><code>04_stack_overflow.c</code></a> for a controlled crash demo.</p>
<h2 id="5-alloca-vlas-large-locals">5. <code>alloca</code>, VLAs, large locals</h2>
<pre><code class="language-c">void f(size_t n) {
    char buf[n];          // VLA      -- allocated on stack
    char *q = alloca(n);  // alloca   -- like VLA, freed at function return
    ...
}
</code></pre>
<p>Both grow the stack by <code>n</code> bytes. There is <strong>no bounds check</strong>; calling
<code>alloca(SIZE_MAX)</code> just smashes your stack. Worse, the kernel only extends the
stack by one page per fault, so a single huge <code>alloca</code> may jump <em>past</em> the
guard page and land in another VMA — a security catastrophe. That&rsquo;s why GCC
inserts <strong><code>-fstack-clash-protection</code></strong>: a probe instruction every page so the
guard page is always hit first.</p>
<pre><code>   bad (no clash protection):              good (with clash protection):
   sub  $0x100000, %rsp                   sub  $0x1000, %rsp; orq $0, (%rsp)
   ; uh oh, may have stepped over guard   ; repeat -- each page is probed
</code></pre>
<p>See <a href="03_alloca_vs_vla.c"><code>03_alloca_vs_vla.c</code></a>.</p>
<h2 id="6-stack-canaries">6. Stack canaries</h2>
<p>Compile with <code>-fstack-protector-strong</code> (default on most distributions). GCC
inserts a random value, the <strong>canary</strong>, between the locals and the saved
return address. If a buffer overflow overwrites the return address, it also
overwrites the canary; the function epilogue checks it and calls
<code>__stack_chk_fail</code> (aborts with a diagnostic).</p>
<pre><code>   without canary:                with canary:
   +-------------------+          +-------------------+
   | return addr       |          | return addr       |
   +-------------------+          +-------------------+
   | saved rbp         |          | saved rbp         |
   +-------------------+          +-------------------+
   |                   |          | CANARY (random)   |  &lt;- checked before ret
   | locals / buffers  |          +-------------------+
   |                   |          |                   |
   +-------------------+          | locals / buffers  |
                                  |                   |
                                  +-------------------+
</code></pre>
<p>See <a href="06_stack_canary.c"><code>06_stack_canary.c</code></a>.</p>
<h2 id="7-thread-stacks">7. Thread stacks</h2>
<p>The <strong>main</strong> thread&rsquo;s stack is the VMA above. Each <code>pthread_create</code> (or raw
<code>clone(CLONE_VM|...)</code>) thread gets its <strong>own</strong> stack — by default an
8 MiB anonymous mmap with a 4 KiB guard page at the low end.</p>
<pre><code>   process address space (high addr)
   +---------------------------+
   |  main thread stack        |
   +---------------------------+
   |  (mmap region)            |
   |    thread 3 stack         |
   |    thread 2 stack         |
   |    thread 1 stack         |
   |  ...                      |
</code></pre>
<p>Set explicitly:</p>
<pre><code class="language-c">pthread_attr_t a; pthread_attr_init(&amp;a);
pthread_attr_setstacksize(&amp;a, 64 * 1024);
pthread_attr_setguardsize(&amp;a, 4096);
pthread_create(&amp;tid, &amp;a, fn, NULL);
pthread_attr_destroy(&amp;a);
</code></pre>
<p>See <a href="07_pthread_stack.c"><code>07_pthread_stack.c</code></a>.</p>
<h2 id="8-what-goes-wrong-on-the-stack--a-checklist">8. What goes wrong on the stack — a checklist</h2>
<pre><code>   * recursion w/o a base case        -&gt; stack overflow
   * VLA / alloca of attacker-sized n -&gt; stack clash, RCE
   * returning &amp;local                 -&gt; use-after-return (UB)
   * buffer overflow in local buf[]   -&gt; overwrite return addr (CWE-121)
   * memcpy(buf, src, attacker_len)   -&gt; same; canary helps detect
   * very large local arrays          -&gt; RLIMIT_STACK; move them to heap
</code></pre>
<p>Returning a pointer to a local <strong>never</strong> works; the storage is gone the
instant the function returns:</p>
<pre><code class="language-c">char *bad(void) { char buf[16]; return buf; }   // dangling pointer
</code></pre>
<p>See <a href="05_dangling_local.c"><code>05_dangling_local.c</code></a> (UB demo; behaviour depends
on optimiser/aslr).</p>
<h2 id="9-the-red-zone">9. The red zone</h2>
<p>x86_64 ABI guarantees the <strong>128 bytes below <code>%rsp</code></strong> are safe to use by leaf
functions without adjusting the stack pointer. That&rsquo;s the <em>red zone</em>. It
saves an <code>add/sub rsp</code> for tiny leaf functions. Disabled in kernel code
(<code>-mno-red-zone</code>).</p>
<pre><code>   %rsp -------&gt; +-----------------------+
                 |  red zone, 128 bytes  |  safe for leaf functions
                 +-----------------------+
                 |  rest of stack...     |
</code></pre>

  { name: `27. Heap Malloc / Malloc Basics`, path: `04_heap_malloc/01_malloc_basics.c`, dir: `04_heap_malloc`, words: 260, mins: 1, body: `<h1 id="01_malloc_basicsc">01_malloc_basics.c</h1>
<pre><code class="language-c">/*
 * 01_malloc_basics.c
 * -------------------
 * Show the basic malloc family in action.  Note the addresses: small
 * allocations cluster in one region (heap), really large ones live in their
 * own VMA (each is its own mmap).
 *
 *   p = malloc(N) ;   p points to N bytes of UNINITIALISED memory.
 *   q = calloc(n,s);  n*s bytes of ZEROED memory; checked for overflow.
 *   r = realloc(p,n); may return p; may return new ptr (old data copied).
 *   free(p)        ;  ok for p==NULL.
 */
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;string.h&gt;

static void hexdump(const char *t, const void *p, size_t n)
{
    const unsigned char *q = p;
    printf(&quot;%s @ %p : &quot;, t, p);
    for (size_t i = 0; i &lt; n; ++i) printf(&quot;%02x &quot;, q[i]);
    putchar('\\n');
}

int main(void)
{
    /* malloc -- contents undefined */
    char *a = malloc(8);
    hexdump(&quot;after malloc(8)        &quot;, a, 8);

    /* calloc -- zeroed */
    char *b = calloc(8, 1);
    hexdump(&quot;after calloc(8,1)      &quot;, b, 8);

    /* realloc -- maybe in place, maybe moves */
    a = realloc(a, 64);
    memset(a, 'a', 64);
    printf(&quot;after realloc(8-&gt;64)   @ %p\\n&quot;, (void *)a);

    a = realloc(a, 1024 * 1024);   /* big -&gt; probably mmap'd */
    printf(&quot;after realloc(64-&gt;1MiB)@ %p\\n&quot;, (void *)a);

    /* free always returns memory to the allocator (not always to the OS) */
    free(a);
    free(b);

    /* free(NULL) is a no-op, perfectly legal */
    free(NULL);

    /* zero-size malloc is implementation-defined; glibc returns a valid
       non-NULL ptr that you must still free. */
    char *z = malloc(0);
    printf(&quot;malloc(0) = %p  (still must free!)\\n&quot;, (void *)z);
    free(z);
    return 0;
}

</code></pre>` },
  { name: `28. Heap Malloc / Chunk Layout`, path: `04_heap_malloc/02_chunk_layout.c`, dir: `04_heap_malloc`, words: 234, mins: 1, body: `<h1 id="02_chunk_layoutc">02_chunk_layout.c</h1>
<pre><code class="language-c">/*
 * 02_chunk_layout.c
 * ------------------
 * Peek at the 16-byte ptmalloc header immediately BEFORE each malloc'd
 * pointer.  Layout on x86_64 glibc:
 *
 *   p - 16: prev_size  (8 B)  -- only valid if prev chunk is free
 *   p -  8: size | flags(3b)  -- low 3 bits = A M P
 *                                A = arena (1 = non-main arena)
 *                                M = mmap'd
 *                                P = previous chunk in use
 *   p     : payload (what malloc returned)
 *
 *   The reported &quot;size&quot; includes the 16-byte header and is rounded up to
 *   16 bytes.  malloc(1) -&gt; chunk size 32.
 */
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;stdint.h&gt;

static void show(const char *t, void *p)
{
    uint64_t *hdr = (uint64_t *)((char *)p - 16);
    uint64_t prev_size = hdr[0];
    uint64_t sz_flags  = hdr[1];
    uint64_t sz = sz_flags &amp; ~0x7ULL;
    int A = (sz_flags &gt;&gt; 2) &amp; 1;
    int M = (sz_flags &gt;&gt; 1) &amp; 1;
    int P = (sz_flags &gt;&gt; 0) &amp; 1;
    printf(&quot;%-25s p=%p  prev_size=%-6lu  chunk_size=%-6lu  A=%d M=%d P=%d\\n&quot;,
           t, p,
           (unsigned long)prev_size,
           (unsigned long)sz,
           A, M, P);
}

int main(void)
{
    void *p1 = malloc(1);          show(&quot;malloc(1)&quot;,       p1);
    void *p2 = malloc(17);         show(&quot;malloc(17)&quot;,      p2);
    void *p3 = malloc(40);         show(&quot;malloc(40)&quot;,      p3);
    void *p4 = malloc(64);         show(&quot;malloc(64)&quot;,      p4);
    void *p5 = malloc(1000);       show(&quot;malloc(1000)&quot;,    p5);
    void *p6 = malloc(200 * 1024); show(&quot;malloc(200K)&quot;,    p6);   /* mmap path */

    free(p1); free(p2); free(p3); free(p4); free(p5); free(p6);
    return 0;
}

</code></pre>` },
  { name: `29. Heap Malloc / Brk Vs Mmap`, path: `04_heap_malloc/03_brk_vs_mmap.c`, dir: `04_heap_malloc`, words: 258, mins: 1, body: `<h1 id="03_brk_vs_mmapc">03_brk_vs_mmap.c</h1>
<pre><code class="language-c">/*
 * 03_brk_vs_mmap.c
 * -----------------
 * Demonstrate that small malloc()s come from the brk-managed heap and big
 * ones come from their own mmap region.  We print the addresses and the
 * current program break and dump /proc/self/maps.
 *
 *   small allocations:  addresses clustered around the [heap] VMA.
 *   large allocations:  each lives in its own anon VMA in the mmap area.
 *
 * Threshold defaults to 128 KiB but is dynamic -- glibc tunes it based on
 * previous free()s.  We override with mallopt to force the threshold.
 */

#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;unistd.h&gt;
#include &lt;malloc.h&gt;

static void dump_maps_filtered(void)
{
    FILE *f = fopen(&quot;/proc/self/maps&quot;, &quot;r&quot;);
    char line[512];
    while (fgets(line, sizeof line, f)) {
        if (strstr(line, &quot;[heap]&quot;) || strstr(line, &quot;(anon)&quot;)
            || strstr(line, &quot;00:00 0&quot;)) fputs(line, stdout);
    }
    fclose(f);
}

#include &lt;string.h&gt;
int main(void)
{
    mallopt(M_MMAP_THRESHOLD, 64 * 1024);

    printf(&quot;program break (sbrk(0)) = %p\\n&quot;, sbrk(0));

    void *small[4];
    for (int i = 0; i &lt; 4; ++i) { small[i] = malloc(1024); }
    void *big[4];
    for (int i = 0; i &lt; 4; ++i) { big[i]   = malloc(200 * 1024); }

    printf(&quot;small allocations (1 KiB each):\\n&quot;);
    for (int i = 0; i &lt; 4; ++i) printf(&quot;  small[%d] = %p\\n&quot;, i, small[i]);
    printf(&quot;big   allocations (200 KiB each):\\n&quot;);
    for (int i = 0; i &lt; 4; ++i) printf(&quot;  big[%d]   = %p\\n&quot;, i, big[i]);

    printf(&quot;\\nnew program break        = %p   (grew? %s)\\n&quot;,
           sbrk(0),
           ((char *)sbrk(0) &gt; (char *)small[0]) ? &quot;yes&quot; : &quot;maybe&quot;);

    puts(&quot;\\n/proc/self/maps (filtered):&quot;);
    dump_maps_filtered();

    for (int i = 0; i &lt; 4; ++i) { free(small[i]); free(big[i]); }
    return 0;
}

</code></pre>` },
  { name: `30. Heap Malloc / Mallopt Tuning`, path: `04_heap_malloc/04_mallopt_tuning.c`, dir: `04_heap_malloc`, words: 191, mins: 1, body: `<h1 id="04_mallopt_tuningc">04_mallopt_tuning.c</h1>
<pre><code class="language-c">/*
 * 04_mallopt_tuning.c
 * --------------------
 * Tune ptmalloc and print mallinfo2 before/after.
 *
 *   M_MMAP_THRESHOLD  -- size at/above which malloc uses mmap directly
 *   M_TRIM_THRESHOLD  -- if top chunk grows beyond this, sbrk back to OS
 *   M_TOP_PAD         -- bonus padding added to each sbrk extension
 *   M_ARENA_MAX       -- cap on per-thread arenas (1 = single arena)
 *   M_PERTURB         -- byte to overwrite freed memory with (debugging)
 */
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;malloc.h&gt;

static void show(const char *tag)
{
    struct mallinfo2 mi = mallinfo2();
    printf(&quot;[%-12s] arena=%zu hblks=%zu hblkhd=%zu  uordblks=%zu  fordblks=%zu\\n&quot;,
           tag, mi.arena, mi.hblks, mi.hblkhd, mi.uordblks, mi.fordblks);
}

int main(void)
{
    show(&quot;start&quot;);

    /* Force every malloc &gt;= 4096 to use mmap. */
    mallopt(M_MMAP_THRESHOLD, 4096);
    show(&quot;after mmap_thr=4K&quot;);

    void *p[8];
    for (int i = 0; i &lt; 8; ++i) p[i] = malloc(64 * 1024);
    show(&quot;after big mallocs&quot;);

    for (int i = 0; i &lt; 8; ++i) free(p[i]);
    show(&quot;after free&quot;);

    /* Splat 0xCC into every freed chunk so use-after-free yields obvious garbage. */
    mallopt(M_PERTURB, 0xCC);
    void *q = malloc(32);
    free(q);
    /* q is dangling now; reading would show 0xCC fill. */

    /* Force a trim attempt */
    malloc_trim(0);
    show(&quot;after trim&quot;);
    return 0;
}

</code></pre>` },

<pre><code class="language-c">/*
 * 05_mallinfo.c
 * --------------
 * Print every field of mallinfo2() with a one-line explanation, then call
 * malloc_stats() to dump the per-arena stats to stderr.
 *
 *   arena    -- total non-mmapped allocated space (heap from sbrk) in bytes
 *   ordblks  -- number of free chunks
 *   smblks   -- number of fastbin blocks
 *   hblks    -- number of mmap'd allocations currently outstanding
 *   hblkhd   -- bytes used by mmap'd allocations
 *   usmblks  -- (deprecated, always 0)
 *   fsmblks  -- bytes in fastbins
 *   uordblks -- total IN-USE allocated bytes (your &quot;memory in flight&quot;)
 *   fordblks -- total free bytes in the heap
 *   keepcost -- top-chunk free bytes (releasable via malloc_trim)
 */
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;malloc.h&gt;

static void dump(const char *tag)
{
    struct mallinfo2 m = mallinfo2();
    printf(&quot;[%s]\\n&quot;, tag);
    printf(&quot;  arena    = %10zu B  (heap from sbrk)\\n&quot;,      m.arena);
    printf(&quot;  hblks    = %10zu     (# mmap allocs)\\n&quot;,      m.hblks);
    printf(&quot;  hblkhd   = %10zu B  (bytes in mmap allocs)\\n&quot;, m.hblkhd);
    printf(&quot;  uordblks = %10zu B  (in-use)\\n&quot;,              m.uordblks);
    printf(&quot;  fordblks = %10zu B  (free in heap)\\n&quot;,        m.fordblks);
    printf(&quot;  fsmblks  = %10zu B  (in fastbins)\\n&quot;,         m.fsmblks);
    printf(&quot;  ordblks  = %10zu     (# free chunks)\\n&quot;,      m.ordblks);
    printf(&quot;  smblks   = %10zu     (# fastbin chunks)\\n&quot;,   m.smblks);
    printf(&quot;  keepcost = %10zu B  (top chunk; releasable)\\n&quot;, m.keepcost);
}

int main(void)
{
    dump(&quot;start&quot;);

    void *small[100];
    for (int i = 0; i &lt; 100; ++i) small[i] = malloc(128);
    dump(&quot;after 100x malloc(128)&quot;);

    for (int i = 0; i &lt; 100; ++i) free(small[i]);
    dump(&quot;after 100x free&quot;);

    void *big = malloc(8 * 1024 * 1024);
    dump(&quot;after malloc(8 MiB)&quot;);
    free(big);
    dump(&quot;after free(big)&quot;);

    fprintf(stderr, &quot;\\n=== malloc_stats() to stderr ===\\n&quot;);
    malloc_stats();

}
