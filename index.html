  { name: `32. Heap Malloc / Alignment`, path: `04_heap_malloc/06_alignment.c`, dir: `04_heap_malloc`, words: 222, mins: 1, body: `<h1 id="06_alignmentc">06_alignment.c</h1>
<pre><code class="language-c">/*
 * 06_alignment.c
 * ---------------
 * Show the different allocator alignment APIs.
 *
 *   default malloc          : 16-byte aligned on x86_64 glibc
 *   aligned_alloc(a, sz)    : C11; sz must be a multiple of a; a power of 2
 *   posix_memalign(&amp;p,a,sz) : POSIX; returns 0 or an errno
 *   memalign(a, sz)         : glibc legacy
 *   valloc(sz)              : page-aligned (deprecated)
 *
 *   Use cases:
 *     SSE 128b       -&gt; 16-byte alignment   (already default)
 *     AVX 256b       -&gt; 32-byte alignment
 *     AVX-512 512b   -&gt; 64-byte alignment   (cache line)
 *     DMA buffers    -&gt; page-aligned
 */
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;malloc.h&gt;
#include &lt;stdint.h&gt;

static int aligned(void *p, size_t a) { return ((uintptr_t)p &amp; (a - 1)) == 0; }

int main(void)
{
    void *p;

    p = malloc(64);
    printf(&quot;malloc(64)              = %p  16-aligned? %d  64-aligned? %d\\n&quot;,
           p, aligned(p, 16), aligned(p, 64));
    free(p);

    p = aligned_alloc(64, 128);
    printf(&quot;aligned_alloc(64, 128)  = %p  64-aligned? %d\\n&quot;,
           p, aligned(p, 64));
    free(p);

    if (posix_memalign(&amp;p, 4096, 4096) == 0) {
        printf(&quot;posix_memalign(4096,4K) = %p  page-aligned? %d\\n&quot;,
               p, aligned(p, 4096));
        free(p);
    }

    p = memalign(32, 100);
    printf(&quot;memalign(32, 100)       = %p  32-aligned? %d\\n&quot;,
           p, aligned(p, 32));
    free(p);

    /* DEMO: invalid use of aligned_alloc -- alignment not power of 2,
       OR size not multiple of alignment.  Modern glibc returns NULL+EINVAL.*/
    p = aligned_alloc(64, 100);
    printf(&quot;aligned_alloc(64, 100)  = %p  (UB, may be NULL)\\n&quot;, p);
    if (p) free(p);

    return 0;
}

</code></pre>` },
  { name: `33. Heap Malloc / Calloc Realloc`, path: `04_heap_malloc/07_calloc_realloc.c`, dir: `04_heap_malloc`, words: 230, mins: 1, body: `<h1 id="07_calloc_reallocc">07_calloc_realloc.c</h1>
<pre><code class="language-c">/*
 * 07_calloc_realloc.c
 * --------------------
 * calloc() vs malloc(); realloc() in place vs realloc() that moves.
 *
 *   calloc(n, s):
 *     - checks n*s for overflow (returns NULL + ENOMEM if it overflows)
 *     - zeroes the result (often &quot;for free&quot; because anon pages are zero)
 *
 *   realloc(p, n):
 *     - if the chunk happens to be big enough already, returns p unchanged.
 *     - else picks a bigger chunk, memcpys, frees the old one, returns new.
 *     - realloc(NULL, n) == malloc(n)
 *     - realloc(p, 0) was historically equivalent to free(p), returning NULL,
 *       but is UB in C23.  Don't.
 */
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;string.h&gt;

int main(void)
{
    char *a = calloc(8, 1);
    printf(&quot;calloc(8,1) = %p  contents: %02x %02x %02x %02x...\\n&quot;,
           (void *)a, a[0], a[1], a[2], a[3]);
    free(a);

    /* calloc detects overflow: */
    void *huge = calloc((size_t)-1 / 2, 4);
    printf(&quot;calloc(huge,4) = %p (NULL expected)\\n&quot;, huge);

    /* realloc may return the same pointer */
    char *p = malloc(8);
    memcpy(p, &quot;1234567&quot;, 8);
    printf(&quot;before realloc: p=%p \\&quot;%s\\&quot;\\n&quot;, (void *)p, p);
    p = realloc(p, 16);
    printf(&quot;after realloc(16): p=%p \\&quot;%s\\&quot;\\n&quot;, (void *)p, p);

    /* growing a lot usually moves it */
    p = realloc(p, 8 * 1024 * 1024);
    printf(&quot;after realloc(8 MiB): p=%p \\&quot;%s\\&quot;\\n&quot;, (void *)p, p);
    free(p);

    /* realloc(NULL, n) is just malloc(n) */
    char *q = realloc(NULL, 32);
    printf(&quot;realloc(NULL,32) = %p\\n&quot;, (void *)q);
    free(q);
    return 0;
}

</code></pre>` },
  { name: `34. Heap Malloc / Arenas Threads`, path: `04_heap_malloc/08_arenas_threads.c`, dir: `04_heap_malloc`, words: 216, mins: 1, body: `<h1 id="08_arenas_threadsc">08_arenas_threads.c</h1>
<pre><code class="language-c">/*
 * 08_arenas_threads.c
 * --------------------
 * Spawn N threads, each repeatedly malloc/free.  glibc will create up to
 * 8*ncpu thread arenas, each its own mmap'd region.
 *
 *   Watch /proc/self/maps -- you'll see multiple anon segments labelled
 *   &quot;(deleted)&quot; and large mmap regions (each arena starts at 64 MiB).
 *
 *   Tune with:  MALLOC_ARENA_MAX=1 ./08_arenas_threads
 */

#define _GNU_SOURCE
#include &lt;pthread.h&gt;
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;unistd.h&gt;
#include &lt;malloc.h&gt;
#include &lt;string.h&gt;

#define N_THREADS  8
#define ROUNDS     5000

static void *work(void *arg)
{
    (void)arg;
    void *buf[16];
    for (int r = 0; r &lt; ROUNDS; ++r) {
        for (int i = 0; i &lt; 16; ++i) buf[i] = malloc(256 + (i * 16));
        for (int i = 0; i &lt; 16; ++i) free(buf[i]);
    }
    return NULL;
}

static void count_anon_vmas(const char *tag)
{
    FILE *f = fopen(&quot;/proc/self/maps&quot;, &quot;r&quot;);
    char line[512];
    int anon = 0, file = 0;
    while (fgets(line, sizeof line, f)) {
        if (strstr(line, &quot;00:00 0&quot;)) anon++;
        else file++;
    }
    fclose(f);
    printf(&quot;[%s] anonymous VMAs=%d  file-backed VMAs=%d\\n&quot;, tag, anon, file);
}

int main(void)
{
    count_anon_vmas(&quot;start&quot;);

    pthread_t t[N_THREADS];
    for (int i = 0; i &lt; N_THREADS; ++i) pthread_create(&amp;t[i], NULL, work, NULL);
    for (int i = 0; i &lt; N_THREADS; ++i) pthread_join(t[i], NULL);

    count_anon_vmas(&quot;after threads&quot;);
    malloc_stats();   /* shows N arenas if more than one was used */
    return 0;
}

</code></pre>` },
  { name: `35. Heap Malloc / Tcache Demo`, path: `04_heap_malloc/09_tcache_demo.c`, dir: `04_heap_malloc`, words: 167, mins: 1, body: `<h1 id="09_tcache_democ">09_tcache_demo.c</h1>
<pre><code class="language-c">/*
 * 09_tcache_demo.c
 * -----------------
 * tcache (glibc 2.26+) is a per-thread LIFO freelist for small chunks.
 * That means malloc/free repeatedly of the same size returns the SAME
 * pointer until the bin is exhausted or coalesced.
 *
 *   Step 1: alloc a, b, c (all size 32)
 *   Step 2: free a, b, c
 *           tcache for 32B bin now:    c -&gt; b -&gt; a -&gt; NULL (LIFO)
 *   Step 3: alloc x, y, z
 *           expect:  x == c, y == b, z == a
 */
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;

int main(void)
{
    void *a = malloc(24);
    void *b = malloc(24);
    void *c = malloc(24);
    printf(&quot;alloc:  a=%p  b=%p  c=%p\\n&quot;, a, b, c);

    free(a); free(b); free(c);
    printf(&quot;free order: a then b then c\\n&quot;);

    void *x = malloc(24);
    void *y = malloc(24);
    void *z = malloc(24);
    printf(&quot;realloc: x=%p  y=%p  z=%p\\n&quot;, x, y, z);
    printf(&quot;expect:  x==c (%d), y==b (%d), z==a (%d)\\n&quot;,
           x == c, y == b, z == a);

    free(x); free(y); free(z);
    return 0;
}

</code></pre>` },

<pre><code class="language-c">/*
 * 10_double_free.c
 * -----------------
 * Trigger glibc's double-free detector.  On a modern glibc you'll see:
 *
 *   free(): double free detected in tcache 2
 *   Aborted (core dumped)
 *
 * Mechanism:
 *   tcache_entry has a &quot;key&quot; field set to the address of the per-thread
 *   tcache_perthread_struct.  On free, glibc checks: if a tcache entry
 *   carries that key, this chunk is suspected to already be in the bin.
 *
 * This is HEURISTIC, not a security boundary -- attackers can bypass it.
 * Use ASan to detect double-free reliably.
 */
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;

int main(void)
{
    void *p = malloc(32);
    printf(&quot;p = %p\\n&quot;, p);
    free(p);
    printf(&quot;first free OK\\n&quot;);
    free(p);                       /* boom (eventually) */
    printf(&quot;second free? unreachable\\n&quot;);
    return 0;
}

</code></pre>` },
  { name: `37. Heap Malloc / Use After Free`, path: `04_heap_malloc/11_use_after_free.c`, dir: `04_heap_malloc`, words: 206, mins: 1, body: `<h1 id="11_use_after_freec">11_use_after_free.c</h1>
<pre><code class="language-c">/*
 * 11_use_after_free.c
 * --------------------
 * Read/write a chunk after free()ing it.  Behaviour:
 *
 *   p = malloc(32)
 *   free(p)               -&gt; chunk pushed onto tcache; first 8 bytes hold
 *                            the &quot;next&quot; pointer of the freelist.
 *   *p = ...              -&gt; we just clobbered the freelist link.
 *   q = malloc(32)        -&gt; tcache pops p, returns it again -&gt; q == p.
 *   r = malloc(32)        -&gt; tcache uses the corrupted &quot;next&quot; -- could
 *                            return ANY pointer (a &quot;tcache poisoning&quot;
 *                            primitive for exploits).
 *
 * Build with ASan to see the real diagnostic:
 *   gcc -O0 -g -fsanitize=address 11_use_after_free.c -o 11_uaf
 */
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;string.h&gt;
#include &lt;stdint.h&gt;

int main(void)
{
    char *p = malloc(32);
    strcpy(p, &quot;live&quot;);
    printf(&quot;alloc:        p=%p  data=\\&quot;%s\\&quot;\\n&quot;, p, p);

    free(p);
    /* p now dangling; reading prints what tcache wrote there (the fd ptr) */
    printf(&quot;after free:   p=%p  data (first 8 hex): %02x%02x%02x%02x%02x%02x%02x%02x\\n&quot;,
           p,
           (unsigned char)p[0], (unsigned char)p[1],
           (unsigned char)p[2], (unsigned char)p[3],
           (unsigned char)p[4], (unsigned char)p[5],
           (unsigned char)p[6], (unsigned char)p[7]);

    /* Overwrite the freelist pointer */
    *(uintptr_t *)p = 0xdeadbeef;

    char *q = malloc(32);
    char *r = malloc(32);
    printf(&quot;q=%p  r=%p   (note q==p, r could be anywhere)\\n&quot;, q, r);
    /* don't dereference r -- likely UB */
    return 0;
}

</code></pre>` },
  { name: `38. Heap Malloc / Heap Overflow`, path: `04_heap_malloc/12_heap_overflow.c`, dir: `04_heap_malloc`, words: 197, mins: 1, body: `<h1 id="12_heap_overflowc">12_heap_overflow.c</h1>
<pre><code class="language-c">/*
 * 12_heap_overflow.c
 * -------------------
 * Overflow a small chunk and trash the next chunk's metadata.
 *
 *   memory                                   what's there
 *   p [ ........ N bytes payload ........ ]  our chunk's data
 *     [ prev_size | size | A M P (header) ]  NEXT chunk's header
 *     [ ........ next chunk's data ...... ]  someone else's allocation
 *
 *   Writing past the end of p clobbers the next chunk's header.  On the
 *   next free()/malloc() that touches the corrupt chunk, glibc's
 *   consistency check (e.g. &quot;size &gt; arena_max&quot; or &quot;fd/bk invalid&quot;)
 *   triggers an abort:
 *
 *     malloc(): corrupted unsorted chunks
 *     Aborted (core dumped)
 *
 * Build with ASan for clean diagnostics:
 *   gcc -O0 -g -fsanitize=address 12_heap_overflow.c -o 12_overflow
 */
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;string.h&gt;

int main(void)
{
    char *a = malloc(32);
    char *b = malloc(32);
    printf(&quot;a=%p  b=%p  (b-a=%ld bytes)\\n&quot;, a, b, b - a);
    /* If b sits right after a, writing 80 bytes into a will trash b's header */
    memset(a, 'A', 80);

    /* now try to free both; the second one likely aborts */
    free(a);
    free(b);
    puts(&quot;survived (some glibc versions only catch this at coalesce time)&quot;);
    return 0;
}

</code></pre>` },
  { name: `39. Heap Malloc / Malloc Trim`, path: `04_heap_malloc/13_malloc_trim.c`, dir: `04_heap_malloc`, words: 188, mins: 1, body: `<h1 id="13_malloc_trimc">13_malloc_trim.c</h1>
<pre><code class="language-c">/*
 * 13_malloc_trim.c
 * -----------------
 * Allocate, free, then call malloc_trim() to hand top-of-heap back to the
 * kernel.  Watch VmRSS drop.
 *
 *   Without trim, glibc holds the heap so future malloc()s are fast.
 *   For long-lived servers that have spikes followed by quiet periods,
 *   calling malloc_trim(0) after a spike reduces RSS substantially.
 */

#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;malloc.h&gt;
#include &lt;string.h&gt;

static void show(const char *t)
{
    FILE *f = fopen(&quot;/proc/self/status&quot;, &quot;r&quot;);
    char line[256];
    long vm = 0, rss = 0;
    while (fgets(line, sizeof line, f)) {
        if (!strncmp(line, &quot;VmSize:&quot;, 7)) sscanf(line + 7, &quot;%ld&quot;, &amp;vm);
        if (!strncmp(line, &quot;VmRSS:&quot;,  6)) sscanf(line + 6, &quot;%ld&quot;, &amp;rss);
    }
    fclose(f);
    printf(&quot;[%-18s] VmSize=%ld KiB  VmRSS=%ld KiB\\n&quot;, t, vm, rss);
}

int main(void)
{
    show(&quot;start&quot;);

    enum { N = 200 };
    void *p[N];
    for (int i = 0; i &lt; N; ++i) p[i] = malloc(64 * 1024);  /* keep some big ones */
    for (int i = 0; i &lt; N; ++i) memset(p[i], 1, 64 * 1024);
    show(&quot;after 200x64K&quot;);

    for (int i = 0; i &lt; N; ++i) free(p[i]);
    show(&quot;after free&quot;);

    malloc_trim(0);
    show(&quot;after malloc_trim&quot;);

    return 0;
}

</code></pre>` },
  { name: `40. Heap Malloc`, path: `04_heap_malloc/README.md`, dir: `04_heap_malloc`, words: 1845, mins: 9, body: `<h1 id="04--the-heap-and-malloc">04 — The Heap and <code>malloc</code></h1>
<p>This is the longest chapter and arguably the most important one. <code>malloc</code> is
where most programmers get their mental model of memory, and yet most
programmers do not know that:</p>
<ul>
<li><code>malloc</code> is <strong>not a syscall</strong>. It&rsquo;s a library routine in glibc.</li>
<li><code>malloc(big)</code> and <code>malloc(small)</code> take <em>completely different code paths</em>.</li>
<li>
<p><code>free</code> rarely returns memory to the kernel — it usually just hands the
  chunk back to a per-process freelist for reuse.</p>
</li>
<li>
<p>A &ldquo;buffer overflow&rdquo; doesn&rsquo;t only overflow your buffer — it corrupts the
  glibc <em>heap metadata</em> that lives <strong>right next to</strong> your data.</p>
</li>
</ul>
<p>The glibc allocator is called <strong>ptmalloc2</strong> and is based on Doug Lea&rsquo;s
<code>dlmalloc</code>. We&rsquo;ll dissect it.</p>
<h2 id="1-the-big-picture">1. The big picture</h2>
<pre><code>   ┌─────────────────── glibc user-facing ────────────────────┐
   │   malloc(size) ─┐                                        │
   │   free(p)       │                                        │
   │   calloc(n,s)   │    pthread-aware (per-thread arenas)   │
   │   realloc(p,s)  │                                        │
   │   aligned_alloc │                                        │
   └─────────────────┴────────────────────────────────────────┘
            │                                          │
            │ small / mid-size                         │ big (default &gt;=128 KiB)
            v                                          v
   ┌──────────────────────┐                ┌──────────────────────────┐
   │  ptmalloc arena      │                │  mmap()ed region         │
   │  (carved with brk)   │                │  -- one per allocation   │
   │                      │                │  -- whole pages          │
   │   freelists (bins)   │                │  -- munmap'd on free     │
   │   chunks &lt;-&gt; chunks  │                └──────────────────────────┘
   └──────────────────────┘                       │
            │                                     │
            v                                     v
        sbrk(2)                                mmap(2)
        kernel                                 kernel
</code></pre>
<p>Take-aways:</p>
<ul>
<li>
<p><strong>Big</strong> allocations (<code>&gt; M_MMAP_THRESHOLD</code>, default 128 KiB) go via <code>mmap</code> and
  are returned to the kernel on <code>free</code> (a real <code>munmap</code>).</p>
</li>
<li>
<p><strong>Small/medium</strong> allocations are carved out of an <em>arena</em> — a chunk of
  memory the allocator obtained earlier with <code>sbrk</code> (for the main arena) or
  <code>mmap</code> (for thread arenas).</p>
</li>
</ul>
<h2 id="2-a-chunk">2. A chunk</h2>
<p><code>ptmalloc</code> keeps a tiny <strong>header</strong> before every chunk it gives you. The
pointer <code>malloc</code> returns points to the <strong>payload</strong>, but the header (and
sometimes a footer / inline metadata) live <em>just before</em> and <em>just after</em>
that payload.</p>
<pre><code>                    +-----------------+   &lt;- chunk start
                    | prev_size (8B)  |       only used if previous chunk is free
                    +-----------------+
                    | size  | A M P   |       size of THIS chunk (incl. header),
                    |       | flags   |       low 3 bits hold A/M/P flags:
                    +-----------------+         A = arena (non-main)
   user pointer -&gt;  | payload         |         M = mmap'd
                    | (N bytes)       |         P = previous chunk in use
                    | ...             |
                    | ...             |
                    | padding to 16B  |
                    +-----------------+   &lt;- next chunk's \`prev_size\`
</code></pre>
<p>So <code>sizeof(metadata)</code> is <strong>16 bytes</strong> per allocation on x86_64 (8B prev_size,
8B size+flags). Always.</p>
<blockquote>
<p>Mental model: every <code>malloc(N)</code> actually uses <code>N + 16</code> bytes, rounded up to
a 16-byte multiple, with a minimum chunk size of 32 bytes.</p>
</blockquote>
<p>Free chunks also store forward/backward pointers (<code>fd</code>, <code>bk</code>) <strong>inside the
payload area</strong> so the allocator can chain them in a doubly-linked list.</p>
<pre><code>   FREE chunk (in a bin):
   +-----------------+
   | prev_size       |
   +-----------------+
   | size | A 0 P    |
   +-----------------+
   | fd (next free)  |
   +-----------------+
   | bk (prev free)  |
   +-----------------+
   | unused space    |
   |                 |
   +-----------------+
   | size            |   footer, repeated, for boundary tags
   +-----------------+
</code></pre>
<h2 id="3-bins--the-freelist-taxonomy">3. Bins — the freelist taxonomy</h2>
<p>When you <code>free(p)</code>, the chunk lands in a <strong>bin</strong> according to its size.
There are five families:</p>
<pre><code>   chunk freed ── how big is it?
       │
       │  16..88 B           ─► fastbin (single-linked LIFO, no coalesce)
       │  16..512 B          ─► tcache  (per-thread, single-linked, glibc 2.26+)
       │  16..512 B          ─► smallbin (doubly-linked, exact size)
       │  &gt;= 1024 B          ─► largebin (size-ordered)
       │  any sizes leftover ─► unsorted bin (just freed, scanned on next malloc)
       │  top of arena (wilderness) ─► top chunk
</code></pre>
<h3 id="tcache-glibc--226">Tcache (glibc ≥ 2.26)</h3>
<p>A <strong>per-thread</strong> array of 64 single-linked LIFO lists, one per size class.
Default: 7 chunks per bin, sizes from 24 to 1032 bytes. Tcache makes
<code>malloc</code>/<code>free</code> of small objects essentially lock-free.</p>
<pre><code>   tcache[0]  -&gt;  [chunk]-&gt;[chunk]-&gt;NULL   (16B chunks)
   tcache[1]  -&gt;  [chunk]-&gt;NULL            (32B)
   tcache[2]  -&gt;  NULL                     (48B)
   ...
   tcache[63] -&gt;  ...
</code></pre>
<h3 id="fastbins">Fastbins</h3>
<p>Slightly larger sizes, also single-linked LIFO, but per-arena (not
per-thread). They are <em>not coalesced</em> immediately — they trade some heap
fragmentation for speed. The allocator periodically runs
<code>malloc_consolidate()</code> to merge fastbin chunks with neighbours.</p>
<h3 id="smallbins--largebins">Smallbins / Largebins</h3>
<p>Doubly-linked lists. Smallbins hold exact-size chunks (one bin per size from
16 to 504 bytes). Largebins (size ≥ 1024) hold size-ordered lists for
best-fit.</p>
<h3 id="top-chunk">Top chunk</h3>
<p>The free region at the very top of the heap is called the <strong>top chunk</strong> (a.k.a.
the &ldquo;wilderness&rdquo;). It&rsquo;s the only chunk that can be enlarged by <code>sbrk</code> /
<code>mmap</code>-extension.</p>
<pre><code>   heap (after a while of malloc/free):

   +----------+----------+----------+----------+----------+--------------------+
   | in-use   | FREE     | in-use   | in-use   | FREE     |   TOP CHUNK        |
   +----------+----------+----------+----------+----------+--------------------+
                                                          ^                    ^
                                                          |                    |
                                                       end of last           program break
                                                       in-use chunk          (sbrk(0))
</code></pre>
<h2 id="4-arenas--multi-threaded-heaps">4. Arenas — multi-threaded heaps</h2>
<p>In single-thread land, there is <strong>one arena</strong>: the <em>main arena</em>, grown by
<code>sbrk</code>. When threads appear, contention on the main arena&rsquo;s lock becomes a
bottleneck, so glibc creates <strong>per-thread arenas</strong>:</p>
<ul>
<li>
<p>First time thread T calls <code>malloc</code>, glibc may <code>mmap</code> a fresh arena (64 MiB
  default) and use it for T thereafter.</p>
</li>
<li>
<p>The number of arenas is capped at <code>8 * ncpu</code> (configurable with
  <code>M_ARENA_MAX</code> or env var <code>MALLOC_ARENA_MAX</code>).</p>
</li>
<li>
<p>Each arena has its own mutex.</p>
</li>
</ul>
<pre><code>            [main arena]               [arena 1]              [arena 2]
            +----------+               +----------+           +----------+
            | freelist |               | freelist |           | freelist |
            +----------+               +----------+           +----------+
            | top chunk|               | top chunk|           | top chunk|
            +----------+               +----------+           +----------+
            grown by brk               grown by mmap          grown by mmap

         thread A, main thread        thread B               thread C
         lock(main arena)             lock(arena 1)          lock(arena 2)
</code></pre>
<p>A thread is &ldquo;pinned&rdquo; to its arena but if its arena is contended it may try
the next one. Hence: a malloc-heavy multi-thread workload may show VSZ several
times larger than working set, simply because of arenas.</p>
<h2 id="5-big-allocations--mmap-path">5. Big allocations — <code>mmap</code> path</h2>
<p>When <code>size + headers &gt; M_MMAP_THRESHOLD</code> (default 128 KiB but <strong>dynamic</strong> in
modern glibc), <code>malloc</code> skips the arenas and calls <code>mmap</code>:</p>
<pre><code class="language-c">mmap(NULL, request + 16, PROT_RW, MAP_PRIVATE|MAP_ANONYMOUS, -1, 0);
</code></pre>
<p><code>free</code> on such a chunk calls <code>munmap</code>. Two consequences:</p>
<ul>
<li>Large allocations cost a syscall each, plus 1+ page faults on first touch.</li>
<li>Large allocations are returned to the kernel immediately on <code>free</code> — VSZ
  drops.</li>
</ul>
<p>Tune with <code>mallopt(M_MMAP_THRESHOLD, n)</code> or <code>MALLOC_MMAP_THRESHOLD_=N</code>.</p>
<h2 id="6-how-mallocn-actually-decides">6. How <code>malloc(N)</code> actually decides</h2>
<pre><code>   malloc(N):
   ┌─────────────────────────────────────────────────────────────┐
   │ 1. round N up to chunk size (header + 16-byte align)        │
   │ 2. if size &gt; M_MMAP_THRESHOLD:                              │
   │       p = mmap(...); flag chunk as M; return p              │
   │ 3. else if size fits in tcache and tcache bin not empty:    │
   │       pop from tcache; return                               │
   │ 4. else lock current arena                                  │
   │ 5. if size fits a fastbin and bin not empty: pop, unlock    │
   │ 6. scan smallbin for exact size; pop, unlock                │
   │ 7. scan unsorted bin; pull chunks into smallbin/largebin    │
   │ 8. scan largebin for best fit; split chunk                  │
   │ 9. otherwise grab from top chunk; if too small, sbrk/mmap   │
   │ 10. unlock; return payload                                  │
   └─────────────────────────────────────────────────────────────┘
</code></pre>
<p><code>free(p)</code>:</p>
<pre><code>   free(p):
   ┌─────────────────────────────────────────────────────────────┐
   │ 1. read chunk header at p - 16                              │
   │ 2. if M flag set (mmap'd): munmap; done                     │
   │ 3. if size fits tcache: push onto tcache; done              │
   │ 4. lock arena                                               │
   │ 5. if size fits a fastbin: push; unlock; done               │
   │ 6. coalesce with prev/next free chunks (boundary tags)      │
   │ 7. if neighbour is top chunk: merge; if heap &gt;&gt; threshold,  │
   │    optionally trim with sbrk(neg) or madvise(DONTNEED)      │
   │ 8. push onto unsorted bin                                   │
   │ 9. unlock                                                   │
   └─────────────────────────────────────────────────────────────┘
</code></pre>
<h2 id="7-brk-vs-mmap--why-both">7. <code>brk</code> vs <code>mmap</code> — why both?</h2>
<pre><code>   heap grown with brk           heap grown with mmap
   +-----------+                 +-----------+   +-----------+   +-----+
   |  in-use   |                 |  alloc 1  |   |  alloc 2  |   ...
   |  ----     |                 +-----------+   +-----------+   +-----+
   |  in-use   |                 free =&gt; munmap immediately
   |  free     |
   |  top      |
   +-----------+
   &lt;- one contiguous region -&gt;   &lt;- many separate VMAs -&gt;
</code></pre>
<p>Pros of <code>brk</code>:</p>
<ul>
<li>Cheap to extend (no new VMA per allocation).</li>
<li>Compact metadata (one VMA for the whole heap).</li>
</ul>
<p>Cons of <code>brk</code>:</p>
<ul>
<li>Can only shrink the <em>top</em>. A single in-use chunk near the top prevents the
  heap from being returned to the OS, even if everything else is free.</li>
</ul>
<p>That&rsquo;s why ptmalloc uses <code>mmap</code> for big chunks: each one is returnable on its
own.</p>
<h2 id="8-alignment">8. Alignment</h2>
<ul>
<li>
<p><code>malloc</code> returns memory aligned to <strong>16 bytes</strong> on x86_64 (= <code>alignof
  (max_align_t)</code>).</p>
</li>
<li>
<p>C11 <code>aligned_alloc(a, sz)</code> lets you ask for larger alignment; <code>a</code> must be
  a power of two and <code>sz</code> a multiple of <code>a</code>.</p>
</li>
<li>
<p>POSIX <code>posix_memalign(&amp;p, a, sz)</code> is preferable in pre-C11 codebases.</p>
</li>
</ul>
<pre><code class="language-c">void *p; posix_memalign(&amp;p, 64, 1024);  // 64-byte aligned, 1 KiB
free(p);
</code></pre>
<p><code>aligned_alloc(64, 100)</code> is <strong>UB</strong> because 100 is not a multiple of 64; pass
128 instead.</p>
<h2 id="9-the-classic-heap-ub-demos">9. The classic heap UB demos</h2>
<p>These are not theoretical — they cause CVEs every year.</p>
<pre><code>   double-free:
   p = malloc(32); free(p); free(p);
   -&gt; tcache push twice -&gt; tcache poisoning -&gt; next malloc returns *your* pointer.

   use-after-free:
   p = malloc(32); free(p);
   strcpy(p, &quot;still writing&quot;);
   -&gt; overwrites freelist link; eventual crash or RCE.

   heap-buffer-overflow:
   p = malloc(16); memcpy(p, src, 32);
   -&gt; trashes next chunk's metadata; eventual &quot;malloc(): memory corruption&quot;
      abort, or worse if the attacker chose carefully.

   invalid free:
   free(p + 1);                  // not a chunk pointer
   free(addr_in_text_segment);   // not a chunk pointer
   -&gt; &quot;free(): invalid pointer&quot; abort.

   realloc(p, 0):
   historically equivalent to free(p), returning NULL; in C2x this is UB.
</code></pre>
<p>glibc has built-in detectors: <code>glibc.malloc.check</code>, <code>MALLOC_CHECK_=3</code>,
tcache double-free protection (a per-slot &ldquo;key&rdquo; tag), unlink macro checks.
They are not security boundaries.</p>
<p>For real protection use <strong>ASan</strong>: <code>gcc -fsanitize=address -g prog.c</code>.</p>

 * ---------------
 * Anonymous mmap is &quot;give me N bytes of zero&quot;.  This is the foundation of

    void *p = mmap(NULL, len,

    /* anonymous pages are guaranteed zero (kernel either maps the zero page

    char *q = p;

    memcpy(q, &quot;hello mmap&quot;, 11);
    printf(&quot;after write: \\&quot;%s\\&quot;\\n&quot;, q);

    munmap(p, len);
    return 0;

 * 02_file_mmap.c

 * Read a file by pointer.  We create a small file, map it, hexdump its

 *

 *   +-----+-----+-----+-----+
 *   | 'h' | 'e' | 'l' | ... |
 *   +-----+-----+-----+-----+
 *   |     ^                ^

 *   +----------------------+

 *

 */
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;unistd.h&gt;
#include &lt;sys/mman.h&gt;
#include &lt;sys/stat.h&gt;
#include &lt;fcntl.h&gt;
#include &lt;string.h&gt;

int main(void)

    int fd = open(path, O_RDWR | O_CREAT | O_TRUNC, 0644);
    if (fd &lt; 0) { perror(&quot;open&quot;); return 1; }
    const char *msg = &quot;hello mmap'd file world!\\n&quot;;
    write(fd, msg, strlen(msg));

    struct stat st; fstat(fd, &amp;st);
    char *p = mmap(NULL, st.st_size, PROT_READ | PROT_WRITE,

    close(fd);  /* mapping holds its own reference */
    if (p == MAP_FAILED) { perror(&quot;mmap&quot;); return 1; }

    printf(&quot;file size = %ld bytes  mapped @ %p\\n&quot;, (long)st.st_size, p);
    fwrite(p, 1, st.st_size, stdout);

    /* Because MAP_PRIVATE, this write goes to a CoW page, NOT to disk. */
    p[0] = 'H';
    printf(&quot;after p[0]='H' in memory: \\&quot;%.*s\\&quot;\\n&quot;, (int)st.st_size, p);

    FILE *f = fopen(path, &quot;r&quot;); char buf[64];
    size_t n = fread(buf, 1, sizeof buf, f); buf[n] = 0; fclose(f);
    printf(&quot;on disk still: \\&quot;%s\\&quot;\\n&quot;, buf);

<pre><code class="language-c">/*
 * 03_shared_mmap.c
 * -----------------
 * Allocate a shared anonymous region, then fork.  Both parent and child
 * see the same memory; one writes, the other reads.
 *
 *   parent                                           child
 *     |                                                |
 *     |  mmap(MAP_SHARED|ANONYMOUS) -&gt;  p              |
 *     |                                                |
 *     |  fork() (child inherits the SAME mapping)      |
 *     |                                                |
 *     |  *p = 'P'         ----------+                  |
 *     |                              \\                 |
 *     |                               +-&gt; *p visible -&gt; read in child
 *
 * Compare to MAP_PRIVATE -- after fork, the parent's write would be CoW'd
 * away from the child.
 */
#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;unistd.h&gt;
#include &lt;sys/mman.h&gt;
#include &lt;sys/wait.h&gt;
#include &lt;string.h&gt;

int main(void)
{
    int *p = mmap(NULL, 4096, PROT_READ | PROT_WRITE,
                  MAP_SHARED | MAP_ANONYMOUS, -1, 0);
    if (p == MAP_FAILED) { perror(&quot;mmap&quot;); return 1; }
    *p = 0;

    pid_t pid = fork();
    if (pid == 0) {
        /* child: spin until parent sets *p, then print */
        while (__atomic_load_n(p, __ATOMIC_ACQUIRE) == 0) usleep(1000);
        printf(&quot;[child] saw *p=%d via SHARED mapping\\n&quot;, *p);
        _exit(0);
    }
    /* parent: write to the shared region */
    sleep(1);
    __atomic_store_n(p, 42, __ATOMIC_RELEASE);
    waitpid(pid, NULL, 0);
    printf(&quot;[parent] done\\n&quot;);
    munmap(p, 4096);
    return 0;
}

</code></pre>` },

<pre><code class="language-c">/*
 * 04_file_share_write.c
 * ----------------------
 * Open a file, map it MAP_SHARED, write through the pointer, msync().
 * Then verify that another reader sees the change on disk.
 */
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;fcntl.h&gt;
#include &lt;unistd.h&gt;
#include &lt;sys/mman.h&gt;
#include &lt;sys/stat.h&gt;
#include &lt;string.h&gt;

int main(void)
{
    const char *path = &quot;/tmp/mmap_shared.txt&quot;;
    int fd = open(path, O_RDWR | O_CREAT | O_TRUNC, 0644);
    write(fd, &quot;AAAAAAAAAAAAAAAA&quot;, 16);
    struct stat st; fstat(fd, &amp;st);

    char *p = mmap(NULL, st.st_size, PROT_READ | PROT_WRITE,
                   MAP_SHARED, fd, 0);
    if (p == MAP_FAILED) { perror(&quot;mmap&quot;); close(fd); return 1; }
    close(fd);

    printf(&quot;before: &quot;);
    for (int i = 0; i &lt; st.st_size; ++i) putchar(p[i]); putchar('\\n');

    /* Write through the mapping; dirties the page */
    memcpy(p, &quot;BBBBBBBB&quot;, 8);

    /* Flush to disk immediately (otherwise the writeback daemon will) */
    msync(p, st.st_size, MS_SYNC);

    /* Reopen and read back */
    FILE *f = fopen(path, &quot;r&quot;);
    char buf[64];
    size_t n = fread(buf, 1, sizeof buf, f); fclose(f);
    printf(&quot;on disk : %.*s\\n&quot;, (int)n, buf);

    munmap(p, st.st_size);
    unlink(path);
    return 0;
}

  { name: `45. Mmap / Mprotect Guard`, path: `05_mmap/05_mprotect_guard.c`, dir: `05_mmap`, words: 261, mins: 1, body: `<h1 id="05_mprotect_guardc">05_mprotect_guard.c</h1>
<pre><code class="language-c">/*
 * 05_mprotect_guard.c
 * --------------------
 * Surround a buffer with PROT_NONE guard pages.  Any access just past
 * the buffer raises SIGSEGV instead of silently corrupting nearby memory.
 *
 *   page 0           page 1                          page 2
 *   +-------------+ +------------------------------+ +-------------+
 *   |  PROT_NONE  | |  PROT_READ | PROT_WRITE      | |  PROT_NONE  |
 *   |  guard      | |  the actual usable buffer    | |  guard      |
 *   +-------------+ +------------------------------+ +-------------+
 *
 * Useful for catching off-by-one bugs at the cost of 2 wasted pages per buffer.
 * (electricfence, page_alloc debug-style.)
 */
#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;sys/mman.h&gt;
#include &lt;unistd.h&gt;
#include &lt;string.h&gt;
#include &lt;signal.h&gt;

static void on_segv(int s, siginfo_t *si, void *uc)
{
    (void)s; (void)uc;
    char m[128];
    int n = snprintf(m, sizeof m, &quot;SIGSEGV at %p -- guard tripped, exiting.\\n&quot;, si-&gt;si_addr);
    write(2, m, n);
    _exit(1);
}

int main(void)
{
    size_t pg = sysconf(_SC_PAGESIZE);
    size_t total = 3 * pg;

    char *base = mmap(NULL, total, PROT_READ | PROT_WRITE,
                      MAP_PRIVATE | MAP_ANONYMOUS, -1, 0);
    /* make first and last page inaccessible */
    mprotect(base,                PROT_NONE);
    mprotect(base + 2 * pg, pg,   PROT_NONE);
    (void)mprotect(base, pg, PROT_NONE);

    char *buf = base + pg;
    printf(&quot;buffer = [%p .. %p)  size=%zu\\n&quot;, buf, buf + pg, pg);

    /* install handler */
    struct sigaction sa = {0};
    sa.sa_sigaction = on_segv;
    sa.sa_flags = SA_SIGINFO;
    sigaction(SIGSEGV, &amp;sa, NULL);

    /* normal use */
    memset(buf, 0x42, pg);
    printf(&quot;normal access OK (set first %zu bytes)\\n&quot;, pg);

    /* now step past the end -- guard page!  */
    printf(&quot;about to deliberately overflow by 1 byte...\\n&quot;);
    buf[pg] = 'X';      /* SIGSEGV here */
    printf(&quot;unreachable\\n&quot;);
    return 0;
}

</code></pre>` },
  { name: `46. Mmap / Madvise Dontneed`, path: `05_mmap/06_madvise_dontneed.c`, dir: `05_mmap`, words: 204, mins: 1, body: `<h1 id="06_madvise_dontneedc">06_madvise_dontneed.c</h1>
<pre><code class="language-c">/*
 * 06_madvise_dontneed.c
 * ----------------------
 * Allocate 256 MiB anon, dirty it, then drop with madvise(MADV_DONTNEED).
 * RSS goes back to near zero; reading the region returns zero.
 *
 *   MADV_DONTNEED  -- discard the frames immediately, future reads = 0
 *   MADV_FREE      -- lazy discard, kernel reclaims at memory pressure
 *
 * Useful for explicit &quot;I no longer need this big buffer&quot; without unmapping.
 */
#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;unistd.h&gt;
#include &lt;sys/mman.h&gt;
#include &lt;string.h&gt;

static long rss_kib(void)
{
    FILE *f = fopen(&quot;/proc/self/status&quot;, &quot;r&quot;);
    char line[256]; long rss = 0;
    while (fgets(line, sizeof line, f))
        if (!strncmp(line, &quot;VmRSS:&quot;, 6)) sscanf(line + 6, &quot;%ld&quot;, &amp;rss);
    fclose(f); return rss;
}

int main(void)
{
    size_t len = 256UL * 1024 * 1024;
    char *p = mmap(NULL, len, PROT_READ | PROT_WRITE,
                   MAP_PRIVATE | MAP_ANONYMOUS, -1, 0);
    if (p == MAP_FAILED) { perror(&quot;mmap&quot;); return 1; }

    printf(&quot;after mmap        : RSS = %ld KiB\\n&quot;, rss_kib());
    memset(p, 1, len);
    printf(&quot;after memset      : RSS = %ld KiB\\n&quot;, rss_kib());

    madvise(p, len, MADV_DONTNEED);
    printf(&quot;after DONTNEED    : RSS = %ld KiB\\n&quot;, rss_kib());

    /* a fresh read returns zeros */
    printf(&quot;p[0]=%d (zeroed)  p[1MB]=%d\\n&quot;, p[0], p[1024*1024]);
    printf(&quot;after one read    : RSS = %ld KiB (zero page mapped RO)\\n&quot;, rss_kib());

    munmap(p, len);
    return 0;
}

</code></pre>` },
  { name: `47. Mmap / Mremap`, path: `05_mmap/07_mremap.c`, dir: `05_mmap`, words: 220, mins: 1, body: `<h1 id="07_mremapc">07_mremap.c</h1>
<pre><code class="language-c">/*
 * 07_mremap.c
 * ------------
 * mremap() can grow, shrink, or move a mapping without copying data --
 * the kernel just re-wires page tables.
 *
 *   step 1: mmap 1 MiB.  store a marker.
 *   step 2: mremap to 16 MiB (MAYMOVE).  marker preserved at the new VA.
 *   step 3: mremap back to 64 KiB.  marker still there.
 *   step 4: munmap.
 */
#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;sys/mman.h&gt;
#include &lt;string.h&gt;

int main(void)
{
    size_t a = 1UL &lt;&lt; 20;        /* 1 MiB */
    char *p = mmap(NULL, a, PROT_READ | PROT_WRITE,
                   MAP_PRIVATE | MAP_ANONYMOUS, -1, 0);
    if (p == MAP_FAILED) { perror(&quot;mmap&quot;); return 1; }
    strcpy(p, &quot;marker&quot;);
    printf(&quot;mmap'd %zu bytes @ %p; first 6 bytes = \\&quot;%s\\&quot;\\n&quot;, a, p, p);

    /* Grow to 16 MiB; may move */
    size_t b = 16UL &lt;&lt; 20;
    char *q = mremap(p, a, b, MREMAP_MAYMOVE);
    if (q == MAP_FAILED) { perror(&quot;mremap up&quot;); return 1; }
    printf(&quot;mremap %zu -&gt; %zu  new=%p (%s)  marker=\\&quot;%s\\&quot;\\n&quot;,
           a, b, q, (q == p ? &quot;in-place&quot; : &quot;moved&quot;), q);

    /* Shrink back to 64 KiB */
    size_t c = 64 &lt;&lt; 10;
    char *r = mremap(q, b, c, MREMAP_MAYMOVE);
    if (r == MAP_FAILED) { perror(&quot;mremap down&quot;); return 1; }
    printf(&quot;mremap %zu -&gt; %zu  new=%p marker=\\&quot;%s\\&quot;\\n&quot;, b, c, r, r);

    munmap(r, c);
    return 0;
}

</code></pre>` },
  { name: `48. Mmap / Map Populate`, path: `05_mmap/08_map_populate.c`, dir: `05_mmap`, words: 201, mins: 1, body: `<h1 id="08_map_populatec">08_map_populate.c</h1>
<pre><code class="language-c">/*
 * 08_map_populate.c
 * ------------------
 * MAP_POPULATE: prefault the entire mapping so there are no on-demand
 * faults later.  Trades startup latency for predictable runtime.
 *
 *   Time two scenarios:
 *     A: mmap WITHOUT POPULATE  -&gt; first sweep faults each page
 *     B: mmap WITH    POPULATE  -&gt; mmap already faulted them in
 */
#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;sys/mman.h&gt;
#include &lt;unistd.h&gt;
#include &lt;time.h&gt;

static double now(void)
{
    struct timespec ts; clock_gettime(CLOCK_MONOTONIC, &amp;ts);
    return ts.tv_sec + ts.tv_nsec * 1e-9;
}

static double sweep(char *p, size_t len)
{
    long pg = sysconf(_SC_PAGESIZE);
    double t0 = now();
    for (size_t i = 0; i &lt; len; i += pg) p[i] = 1;
    return now() - t0;
}

int main(void)
{
    size_t len = 256UL &lt;&lt; 20;

    char *p = mmap(NULL, len, PROT_READ | PROT_WRITE,
                   MAP_PRIVATE | MAP_ANONYMOUS, -1, 0);
    double t1 = sweep(p, len);
    printf(&quot;no POPULATE: first sweep took %.3f s\\n&quot;, t1);
    double t1b = sweep(p, len);
    printf(&quot;no POPULATE: second sweep     %.3f s (already resident)\\n&quot;, t1b);
    munmap(p, len);

    p = mmap(NULL, len, PROT_READ | PROT_WRITE,
             MAP_PRIVATE | MAP_ANONYMOUS | MAP_POPULATE, -1, 0);
    double t2 = sweep(p, len);
    printf(&quot;POPULATE   : first sweep took %.3f s (already faulted)\\n&quot;, t2);
    munmap(p, len);
    return 0;
}

</code></pre>` },
  { name: `49. Mmap / Map Fixed Noreplace`, path: `05_mmap/09_map_fixed_noreplace.c`, dir: `05_mmap`, words: 235, mins: 1, body: `<h1 id="09_map_fixed_noreplacec">09_map_fixed_noreplace.c</h1>
<pre><code class="language-c">/*
 * 09_map_fixed_noreplace.c
 * -------------------------
 * MAP_FIXED      -- place at the requested address; if anything is there,
 *                   CLOBBER it (unmap and replace).  Footgun.
 * MAP_FIXED_NOREPLACE -- place at the requested address; if anything is
 *                   there, fail with EEXIST.  Safer.
 *
 * Use cases: shared libraries / runtime linkers / language runtimes that
 * want a specific layout, sandboxes, debuggers.
 */
#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;sys/mman.h&gt;
#include &lt;errno.h&gt;
#include &lt;unistd.h&gt;

int main(void)
{
    /* 1) pick a known-free address by mmap'ing then unmapping */
    void *p = mmap(NULL, 4096, PROT_READ | PROT_WRITE,
                   MAP_PRIVATE | MAP_ANONYMOUS, -1, 0);
    munmap(p, 4096);
    printf(&quot;scratch addr = %p\\n&quot;, p);

    /* 2) place at exactly that address with FIXED_NOREPLACE */
    void *q = mmap(p, 4096, PROT_READ | PROT_WRITE,
                   MAP_PRIVATE | MAP_ANONYMOUS | MAP_FIXED_NOREPLACE, -1, 0);
    if (q == MAP_FAILED) { perror(&quot;mmap NOREPLACE&quot;); return 1; }
    printf(&quot;first NOREPLACE at %p: %s\\n&quot;, q, (q == p) ? &quot;OK&quot; : &quot;moved (shouldn't happen)&quot;);

    /* 3) try again at the SAME address; this time it should fail */
    void *r = mmap(p, 4096, PROT_READ | PROT_WRITE,
                   MAP_PRIVATE | MAP_ANONYMOUS | MAP_FIXED_NOREPLACE, -1, 0);
    if (r == MAP_FAILED &amp;&amp; errno == EEXIST)
        printf(&quot;second NOREPLACE at %p: EEXIST  (good)\\n&quot;, p);
    else
        printf(&quot;second NOREPLACE: surprise! r=%p errno=%d\\n&quot;, r, errno);

    /* 4) MAP_FIXED would have clobbered it.  DON'T use unless you know
     * exactly what's at that address. */
    munmap(q, 4096);
    return 0;
}

</code></pre>` },
  { name: `50. Mmap`, path: `05_mmap/README.md`, dir: `05_mmap`, words: 1074, mins: 5, body: `<h1 id="05--mmap--the-swiss-army-knife-of-memory">05 — <code>mmap</code> — the swiss army knife of memory</h1>
<p><code>mmap(2)</code> is the single most powerful memory syscall on Linux. With it you can:</p>
<ul>
<li>get raw zero-filled pages (the basis of <code>malloc</code>&rsquo;s big allocations),</li>
<li>map files into your address space (so reading is just pointer arithmetic),</li>
<li>share memory between processes,</li>
<li>request huge pages,</li>
<li>enforce strict permissions,</li>
<li>and grow / shrink / move regions.</li>
</ul>
<pre><code>   mmap is to memory what open() is to files.
</code></pre>
<h2 id="1-the-signature">1. The signature</h2>
<pre><code class="language-c">#include &lt;sys/mman.h&gt;
void *mmap(void *addr, size_t length, int prot, int flags, int fd, off_t off);
int   munmap(void *addr, size_t length);
</code></pre>
<table>
<thead>
<tr>
<th>arg</th>
<th>meaning</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>addr</code></td>
<td>hint (<code>NULL</code> lets kernel pick). With <code>MAP_FIXED</code> it&rsquo;s mandatory.</td>
</tr>
<tr>
<td><code>length</code></td>
<td>bytes; <strong>rounded up to a page</strong> (4 KiB).</td>
</tr>
<tr>
<td><code>prot</code></td>
<td><code>PROT_READ</code>, <code>PROT_WRITE</code>, <code>PROT_EXEC</code>, <code>PROT_NONE</code> (bitwise OR).</td>
</tr>
<tr>
<td><code>flags</code></td>
<td>see below. Pick exactly one of <code>MAP_PRIVATE</code> / <code>MAP_SHARED</code>.</td>
</tr>
<tr>
<td><code>fd</code></td>
<td>file descriptor; <code>-1</code> for anonymous.</td>
</tr>
<tr>
<td><code>off</code></td>
<td>must be a page multiple.</td>
</tr>
</tbody>
</table>
<h2 id="2-four-basic-combinations">2. Four basic combinations</h2>
<pre><code>                     anonymous (fd=-1, MAP_ANONYMOUS)     file-backed (fd&gt;=0)
                    +----------------------------------+ +-----------------------------+
   MAP_PRIVATE      |  zero pages, CoW                 | |  read file contents lazily; |
                    |  good for malloc-style memory    | |  writes invisible to others |
                    |  freed on munmap; never on disk  | |  and discarded at munmap    |
                    +----------------------------------+ +-----------------------------+
   MAP_SHARED       |  shared between fork'd processes | |  writes go back to the file |
                    |  (legacy MAP_SHARED|ANONYMOUS)   | |  shared with everyone who   |
                    |                                  | |  mmaps the same inode       |
                    +----------------------------------+ +-----------------------------+
</code></pre>
<ul>
<li>
<p><strong>MAP_PRIVATE | MAP_ANONYMOUS</strong> = &ldquo;give me N bytes of zero&rdquo;. Used by <code>malloc</code>
  for big allocs, and by everyone for arbitrary memory.</p>
</li>
<li>
<p><strong>MAP_SHARED | file</strong> = &ldquo;let me read/write this file through a pointer&rdquo;.
  Used by <code>mmap I/O</code>, databases (SQLite, LMDB), shared libraries (<code>r-xp</code>).</p>
</li>
<li>
<p><strong>MAP_PRIVATE | file</strong> = &ldquo;show me the file, but my writes are mine alone.&rdquo;
  Used to load executables: the loader maps <code>.text</code> with <code>r-xp</code> and <code>.data</code>
  with <code>rw-p</code> MAP_PRIVATE so each process gets its own copy on first write.</p>
</li>
<li>
<p><strong>MAP_SHARED | MAP_ANONYMOUS</strong> = shareable memory after <code>fork()</code>. Older
  pattern; modern code prefers <code>memfd_create</code> or <code>shm_open</code>.</p>
</li>
</ul>
<h2 id="3-the-flags-zoo">3. The flags zoo</h2>
<table>
<thead>
<tr>
<th>Flag</th>
<th>Effect</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>MAP_PRIVATE</code></td>
<td>CoW; private to this mapping</td>
</tr>
<tr>
<td><code>MAP_SHARED</code></td>
<td>writes are visible to everyone mapping the same object</td>
</tr>
<tr>
<td><code>MAP_SHARED_VALIDATE</code></td>
<td>like SHARED but error if any flag is unknown</td>
</tr>
<tr>
<td><code>MAP_ANONYMOUS</code></td>
<td>not backed by a file; zero-filled; <code>fd</code> must be -1</td>
</tr>
<tr>
<td><code>MAP_FIXED</code></td>
<td>place exactly at <code>addr</code> (clobbers existing mappings; dangerous)</td>
</tr>
<tr>
<td><code>MAP_FIXED_NOREPLACE</code></td>
<td>like FIXED but fail instead of clobber (Linux 4.17+)</td>
</tr>
<tr>
<td><code>MAP_POPULATE</code></td>
<td>pre-fault all pages so they&rsquo;re already resident</td>
</tr>
<tr>
<td><code>MAP_NORESERVE</code></td>
<td>don&rsquo;t reserve swap; allows over-commit on private mappings</td>
</tr>
<tr>
<td><code>MAP_LOCKED</code></td>
<td>call <code>mlock</code> after mapping</td>
</tr>
<tr>
<td><code>MAP_HUGETLB</code></td>
<td>use huge pages (need <code>huge_page_count &gt;0</code>)</td>
</tr>
<tr>
<td><code>MAP_HUGE_2MB</code> / <code>MAP_HUGE_1GB</code></td>
<td>pick page size with HUGETLB</td>
</tr>
<tr>
<td><code>MAP_STACK</code></td>
<td>mark as suitable for a stack (some arches align)</td>
</tr>
<tr>
<td><code>MAP_GROWSDOWN</code></td>
<td>legacy stack flag</td>
</tr>
<tr>
<td><code>MAP_UNINITIALIZED</code></td>
<td>embedded only; skip zero-fill</td>
</tr>
<tr>
<td><code>MAP_SYNC</code></td>
<td>(DAX) writes guaranteed durable on return</td>
</tr>
</tbody>
</table>
<h2 id="4-the-lifecycle">4. The lifecycle</h2>
<pre><code>   void *p = mmap(NULL, len, PROT_READ|PROT_WRITE, MAP_PRIVATE|MAP_ANONYMOUS, -1, 0);
                |
                |  kernel: create VMA at chosen address, no PTEs yet
                v
   touch p[i]
                |  page fault, kernel allocates frame (or maps zero page on read),
                |  installs PTE
                v
   madvise(p, len, MADV_DONTNEED)
                |  kernel drops the frames; VMA stays
                v
   mprotect(p, len, PROT_READ)
                |  PTEs marked RO; writes now fault SIGSEGV
                v
   munmap(p, len)
                |  VMA destroyed; PTEs cleared
</code></pre>
<h2 id="5-file-mapping-demystified">5. File mapping demystified</h2>
<pre><code>   open(&quot;img.bmp&quot;, O_RDONLY)         -- get an fd
   stat(... &amp;st)                     -- learn size
   p = mmap(NULL, st.st_size, PROT_READ, MAP_PRIVATE, fd, 0);
   close(fd);                        -- safe; mapping holds its own ref
   ...
   uint32_t pixel = ((uint32_t *)p)[42];
   munmap(p, st.st_size);
</code></pre>
<p>Visual:</p>
<pre><code>   disk file img.bmp
   +-----------------+-----------------+-----------------+
   | page 0 (4 KiB)  | page 1          | page 2          |
   +--------+--------+--------+--------+--------+--------+
            |                 |                 |
            v                 v                 v
   process A virtual address space:
   p -&gt;  +---+    p+4K -&gt; +---+   p+8K -&gt; +---+
         |   |             |   |          |   |
         +---+             +---+          +---+
</code></pre>
<ul>
<li>
<p>The kernel does <em>not</em> read every page on <code>mmap</code>. Pages are pulled in on
  demand from the page cache (a major fault, then probably hits cache and is
  free).</p>
</li>
<li>
<p>If the file is also being read by another process via <code>read()</code>, you share
  the same page cache pages.</p>
</li>
</ul>
<h3 id="modifying-a-file-via-mmap">Modifying a file via mmap</h3>
<pre><code class="language-c">fd = open(&quot;data&quot;, O_RDWR);
p  = mmap(NULL, sz, PROT_READ|PROT_WRITE, MAP_SHARED, fd, 0);
((char *)p)[100] = 'X';        // dirty the page
msync(p, sz, MS_SYNC);         // optional: flush now
munmap(p, sz);
</code></pre>
<p><code>MAP_SHARED</code> writes mark the page dirty. <code>pdflush</code>/<code>kworker</code> will eventually
write them back; <code>msync</code> forces it.</p>
<h2 id="6-mprotect--change-permissions">6. <code>mprotect</code> — change permissions</h2>
<pre><code class="language-c">mprotect(p, len, PROT_READ);                  // make RO
mprotect(p, len, PROT_NONE);                  // unmap-but-keep-VMA, for guard pages
mprotect(p, len, PROT_READ|PROT_EXEC);        // RX for JIT
</code></pre>
<p>Requires page-aligned <code>p</code> and <code>len</code>. Useful for:</p>
<ul>
<li>Guard pages around buffers (<a href="05_mprotect_guard.c"><code>05_mprotect_guard.c</code></a>).</li>
<li>JIT compilers: write code as RW, flip to RX before executing.</li>
</ul>
<h2 id="7-madvise--hints">7. <code>madvise</code> — hints</h2>
<pre><code class="language-c">madvise(p, len, MADV_WILLNEED);     // prefault, please read ahead
madvise(p, len, MADV_DONTNEED);     // drop frames, future reads zero
madvise(p, len, MADV_SEQUENTIAL);   // aggressive readahead
madvise(p, len, MADV_RANDOM);       // disable readahead
madvise(p, len, MADV_FREE);         // lazy free; kernel may reclaim
madvise(p, len, MADV_HUGEPAGE);     // try to promote to THP
madvise(p, len, MADV_DONTFORK);     // child doesn't inherit this region
madvise(p, len, MADV_WIPEONFORK);   // child sees zeroed copy
</code></pre>
<p><code>MADV_DONTNEED</code> is the <strong>immediate</strong> version of <code>MADV_FREE</code>: pages are gone
right now and counts decrement.</p>
<h2 id="8-mremap--grow--move">8. <code>mremap</code> — grow / move</h2>
<pre><code class="language-c">void *q = mremap(p, old_len, new_len, MREMAP_MAYMOVE);
</code></pre>
<ul>
<li>Grows or shrinks in place if possible.</li>
<li>
<p>With <code>MREMAP_MAYMOVE</code>, kernel may pick a new VA and move the VMA cheaply
  (it doesn&rsquo;t copy pages — it relinks page tables).</p>
</li>
<li>
<p>With <code>MREMAP_FIXED|MREMAP_MAYMOVE</code>, places at a specific address.</p>
</li>
</ul>
<p>This is faster than <code>mmap</code> + <code>memcpy</code> + <code>munmap</code> because no data is copied;
the kernel just rewires the page tables.</p>
<h2 id="9-huge-pages-via-mmap">9. Huge pages via mmap</h2>
<pre><code class="language-c">void *p = mmap(NULL, 2UL*1024*1024,
               PROT_READ|PROT_WRITE,
               MAP_PRIVATE|MAP_ANONYMOUS|MAP_HUGETLB|MAP_HUGE_2MB, -1, 0);
</code></pre>
<p>Need <code>sudo sh -c 'echo 64 &gt; /proc/sys/vm/nr_hugepages'</code> first (reserves 64
huge pages × 2 MiB = 128 MiB).</p>
<p>Why? 1 TLB entry covers 2 MiB (or 1 GiB) instead of 4 KiB. For workloads with
huge working sets (databases, ML), TLB pressure dominates.</p>
<p>See <a href="../13_advanced/02_huge_tlb.c"><code>../13_advanced/02_huge_tlb.c</code></a>.</p>

  { name: `51. Brk Sbrk / Program Break`, path: `06_brk_sbrk/01_program_break.c`, dir: `06_brk_sbrk`, words: 103, mins: 1, body: `<h1 id="01_program_breakc">01_program_break.c</h1>
<pre><code class="language-c">/*
 * 01_program_break.c
 * -------------------
 * Show the program break before and after a series of malloc() calls.
 *
 *   Small mallocs   -&gt; heap grown with sbrk; break advances.
 *   Large malloc    -&gt; mmap'd; break unchanged.
 */

#include &lt;stdlib.h&gt;
#include &lt;unistd.h&gt;

{
    printf(&quot;[%-20s] sbrk(0) = %p\\n&quot;, t, sbrk(0));
}

int main(void)
{
    show(&quot;start&quot;);

    void *p = malloc(64);
    show(&quot;after malloc(64)&quot;);

    void *p2 = malloc(64 * 1024);  /* still small enough for brk */
    show(&quot;after malloc(64K)&quot;);

    void *p3 = malloc(200 * 1024); /* triggers mmap path */
    show(&quot;after malloc(200K)&quot;);

    free(p); free(p2); free(p3);
    show(&quot;after frees&quot;);

}

  { name: `52. Brk Sbrk / Brk Directly`, path: `06_brk_sbrk/02_brk_directly.c`, dir: `06_brk_sbrk`, words: 165, mins: 1, body: `<h1 id="02_brk_directlyc">02_brk_directly.c</h1>
<pre><code class="language-c">/*
 * 02_brk_directly.c
 * ------------------
 * Allocate memory WITHOUT malloc by calling sbrk() directly.
 *
 *   step 1: remember the current break (= start of our &quot;arena&quot;).
 *   step 2: grow by 16 KiB.
 *   step 3: use the new 16 KiB.
 *   step 4: shrink back.
 *
 * This is essentially what early-day malloc implementations did.
 * Not recommended in production -- use mmap() for one-off slabs.
 */
#include &lt;stdio.h&gt;
#include &lt;unistd.h&gt;
#include &lt;string.h&gt;

int main(void)
{
    void *base = sbrk(0);
    printf(&quot;initial break = %p\\n&quot;, base);

    void *got = sbrk(16 * 1024);
    if (got == (void *)-1) { perror(&quot;sbrk grow&quot;); return 1; }
    printf(&quot;got 16 KiB from sbrk; old break = %p, new break = %p\\n&quot;,
           got, sbrk(0));

    /* use it */
    char *p = got;
    memset(p, 'A', 16 * 1024);
    printf(&quot;wrote 16 KiB starting at %p\\n&quot;, p);

    /* give it back */
    if (sbrk(-16 * 1024) == (void *)-1) perror(&quot;sbrk shrink&quot;);
    printf(&quot;new break = %p (should equal initial)\\n&quot;, sbrk(0));
    return 0;
}

</code></pre>` },
  { name: `53. Brk Sbrk`, path: `06_brk_sbrk/README.md`, dir: `06_brk_sbrk`, words: 376, mins: 2, body: `<h1 id="06--brk-and-sbrk--the-program-break">06 — <code>brk</code> and <code>sbrk</code> — the program break</h1>
<p><code>brk(2)</code> and <code>sbrk(2)</code> are the two oldest memory syscalls in UNIX. They set
the <strong>program break</strong> — the highest virtual address used by the data segment
(heap). <code>malloc</code> was originally just a thin wrapper around them. Modern
glibc still uses <code>brk</code> for the main arena.</p>
<h2 id="1-the-picture">1. The picture</h2>
<pre><code>   process VA (excerpt around heap)
        ...
        +-------------------------+   &lt;- start_brk  (top of .bss/.data)
        |       in-use heap       |
        |                         |
        |                         |
        +-------------------------+   &lt;- brk(0) / sbrk(0) -- current break
        |                         |
        |                         |
        +-------------------------+   &lt;- never used yet (still virtual hole)
        ...
</code></pre>
<ul>
<li><code>brk(addr)</code>: set the break to <code>addr</code>. Return 0 on success, -1 on error.</li>
<li><code>sbrk(incr)</code>: increase break by <code>incr</code> bytes, return the <strong>old</strong> break.
  <code>sbrk(0)</code> returns the current break without changing it.</li>
</ul>
<p>In <code>/proc/self/maps</code>:</p>
<pre><code>   555a3b9b1000-555a3b9d2000 rw-p 00000000 00:00 0      [heap]
                  ^                                       ^
                  start_brk                              current break
</code></pre>
<h2 id="2-why-is-sbrk-deprecated">2. Why is <code>sbrk</code> &ldquo;deprecated&rdquo;?</h2>
<p>It isn&rsquo;t <em>technically</em> deprecated, but:</p>
<ul>
<li>
<p>It&rsquo;s not thread-safe. Two threads calling <code>sbrk</code> simultaneously could
  collide. glibc takes the malloc arena lock around it.</p>
</li>
<li>
<p>It only grows in one direction (up). You can shrink with <code>brk(smaller)</code>,
  but only if everything above the new break is unused.</p>
</li>
<li>
<p>It only grows one <strong>contiguous</strong> region. If something (<code>mmap</code>&lsquo;d library
  segment, thread arena) ends up directly above the heap, <code>brk</code> can&rsquo;t grow
  further — <code>malloc</code> will fall back to <code>mmap</code>.</p>
</li>
</ul>
<p>For these reasons, modern allocators (jemalloc, mimalloc, tcmalloc) avoid
<code>brk</code> entirely. glibc keeps using it for the main arena only.</p>
<h2 id="3-worked-example">3. Worked example</h2>
<pre><code class="language-c">void *base = sbrk(0);
sbrk(4096);                   // grow break by one page
*(char *)base = 'A';          // valid: that page belongs to us
sbrk(-4096);                  // shrink back
*(char *)base = 'A';          // !!! UB: page no longer owned
</code></pre>
<p>The kernel doesn&rsquo;t necessarily unmap on <code>brk(smaller)</code> — it may keep the
pages mapped until pressure forces a reclaim — but reading from them is UB.</p>
<h2 id="4-sequence-diagram">4. Sequence diagram</h2>
<pre><code>   user             glibc                     kernel
   ----             -----                     ------
   malloc(N)
     |---&gt;          ptmalloc lock
                    no chunk fits
                    -- need to grow main arena --
                    sbrk(M)   ----------------&gt; set break += M
                    &lt;----------------- old break (= chunk addr)
                    initialise chunk header
                    unlock
   &lt;----------------  payload
</code></pre>
<h2 id="5-files">5. Files</h2>
<table>
<thead>
<tr>
<th>File</th>
<th>Demonstrates</th>
</tr>
</thead>
<tbody>
<tr>
<td><a href="01_program_break.c"><code>01_program_break.c</code></a></td>
<td>Print <code>sbrk(0)</code> before/after small/large <code>malloc</code></td>
</tr>
<tr>
<td><a href="02_brk_directly.c"><code>02_brk_directly.c</code></a></td>
<td>Allocate memory by calling <code>brk</code> directly (no malloc)</td>
</tr>
</tbody>
</table>` },
  { name: `54. Paging Swapping / Meminfo`, path: `07_paging_swapping/01_meminfo.c`, dir: `07_paging_swapping`, words: 247, mins: 1, body: `<h1 id="01_meminfoc">01_meminfo.c</h1>
<pre><code class="language-c">/*
 * 01_meminfo.c
 * -------------
 * Read /proc/meminfo and print only the interesting lines, with brief
 * explanations.
 */
#include &lt;stdio.h&gt;
#include &lt;string.h&gt;

struct e { const char *prefix; const char *desc; };

static struct e wanted[] = {
    { &quot;MemTotal:&quot;,      &quot;total usable RAM&quot;                              },
    { &quot;MemFree:&quot;,       &quot;untouched RAM (on buddy free lists)&quot;           },
    { &quot;MemAvailable:&quot;,  &quot;what userspace could allocate without swap&quot;    },
    { &quot;Buffers:&quot;,       &quot;page cache for raw block devices&quot;              },
    { &quot;Cached:&quot;,        &quot;page cache for files (mmap + read)&quot;            },
    { &quot;SwapTotal:&quot;,     &quot;size of swap&quot;                                  },
    { &quot;SwapFree:&quot;,      &quot;unused swap&quot;                                   },
    { &quot;Dirty:&quot;,         &quot;dirty pages (not yet written back)&quot;            },
    { &quot;Writeback:&quot;,     &quot;pages being written back now&quot;                  },
    { &quot;AnonPages:&quot;,     &quot;non-file backed (heap/stack/anon mmap)&quot;        },
    { &quot;Mapped:&quot;,        &quot;mapped via mmap&quot;                               },
    { &quot;Shmem:&quot;,         &quot;tmpfs + shared anon&quot;                           },
    { &quot;KReclaimable:&quot;,  &quot;slab/etc that could be reclaimed&quot;              },
    { &quot;Slab:&quot;,          &quot;kernel slab (kmalloc internals)&quot;               },
    { &quot;PageTables:&quot;,    &quot;memory used by page tables themselves&quot;         },
    { &quot;CommitLimit:&quot;,   &quot;max committable bytes (overcommit_memory=2)&quot;   },
    { &quot;Committed_AS:&quot;,  &quot;current committed memory&quot;                      },
    { &quot;HugePages_Total:&quot;, &quot;huge pages reserved&quot;                         },
    { &quot;HugePages_Free:&quot;,  &quot;huge pages free&quot;                             },
    { &quot;Hugepagesize:&quot;,  &quot;huge page size&quot;                                },
};

int main(void)
{
    FILE *f = fopen(&quot;/proc/meminfo&quot;, &quot;r&quot;);
    if (!f) return 1;
    char line[256];
    while (fgets(line, sizeof line, f)) {
        for (size_t i = 0; i &lt; sizeof wanted / sizeof *wanted; ++i) {
            size_t L = strlen(wanted[i].prefix);
            if (!strncmp(line, wanted[i].prefix, L)) {
                line[strcspn(line, &quot;\\n&quot;)] = 0;
                printf(&quot;  %-50s  -- %s\\n&quot;, line, wanted[i].desc);
            }
        }
    }
    fclose(f);
    return 0;
}

</code></pre>` },
  { name: `55. Paging Swapping / Mlock`, path: `07_paging_swapping/02_mlock.c`, dir: `07_paging_swapping`, words: 168, mins: 1, body: `<h1 id="02_mlockc">02_mlock.c</h1>
<pre><code class="language-c">/*
 * 02_mlock.c
 * -----------
 * Pin pages with mlock(); inspect /proc/self/status to see VmLck increase.
 * Non-root processes are limited by RLIMIT_MEMLOCK (typically 64 KiB).
 *
 *   typical use:  protect cryptographic key material from swap-out.
 */
#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;sys/mman.h&gt;
#include &lt;unistd.h&gt;
#include &lt;string.h&gt;
#include &lt;sys/resource.h&gt;

static void show(const char *t)
{
    FILE *f = fopen(&quot;/proc/self/status&quot;, &quot;r&quot;);
    char l[256]; long lck = 0, rss = 0;
    while (fgets(l, sizeof l, f)) {
        if (!strncmp(l, &quot;VmLck:&quot;, 6)) sscanf(l + 6, &quot;%ld&quot;, &amp;lck);
        if (!strncmp(l, &quot;VmRSS:&quot;, 6)) sscanf(l + 6, &quot;%ld&quot;, &amp;rss);
    }
    fclose(f);
    printf(&quot;[%-20s] VmLck=%ld KiB  VmRSS=%ld KiB\\n&quot;, t, lck, rss);
}

int main(void)
{
    struct rlimit rl; getrlimit(RLIMIT_MEMLOCK, &amp;rl);
    printf(&quot;RLIMIT_MEMLOCK soft=%lu hard=%lu (bytes)\\n&quot;,
           (unsigned long)rl.rlim_cur, (unsigned long)rl.rlim_max);

    show(&quot;start&quot;);
    size_t n = 32 * 1024;       /* well within default 64 KiB limit */
    void *p = malloc(n);
    memset(p, 1, n);
    show(&quot;after malloc+touch&quot;);

    if (mlock(p, n) &lt; 0) { perror(&quot;mlock&quot;); free(p); return 1; }
    show(&quot;after mlock&quot;);

    munlock(p, n);
    show(&quot;after munlock&quot;);

    free(p);
    return 0;
}

</code></pre>` },
  { name: `56. Paging Swapping / Madvise Pageout`, path: `07_paging_swapping/03_madvise_pageout.c`, dir: `07_paging_swapping`, words: 188, mins: 1, body: `<h1 id="03_madvise_pageoutc">03_madvise_pageout.c</h1>
<pre><code class="language-c">/*
 * 03_madvise_pageout.c
 * ---------------------
 * MADV_PAGEOUT (Linux 5.4+) hints &quot;you can write these pages to swap now,
 * but don't unmap them&quot;.  Compare to MADV_DONTNEED which throws away
 * anonymous pages entirely (next read = zeros).
 *
 * Requires actual swap; if there's none, the hint is silently ignored.
 */
#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;unistd.h&gt;
#include &lt;sys/mman.h&gt;
#include &lt;string.h&gt;

#ifndef MADV_PAGEOUT
#define MADV_PAGEOUT 21
#endif

static long rss(void) {
    FILE *f = fopen(&quot;/proc/self/status&quot;, &quot;r&quot;); char l[256]; long r = 0;
    while (fgets(l, sizeof l, f))
        if (!strncmp(l, &quot;VmRSS:&quot;, 6)) sscanf(l + 6, &quot;%ld&quot;, &amp;r);
    fclose(f); return r;
}

int main(void)
{
    size_t n = 64UL &lt;&lt; 20;  /* 64 MiB */
    char *p = mmap(NULL, n, PROT_READ | PROT_WRITE,
                   MAP_PRIVATE | MAP_ANONYMOUS, -1, 0);
    memset(p, 0xAA, n);
    printf(&quot;touched: RSS=%ld KiB\\n&quot;, rss());

    if (madvise(p, n, MADV_PAGEOUT) &lt; 0)
        perror(&quot;madvise(PAGEOUT) -- need swap and Linux 5.4+&quot;);
    printf(&quot;after MADV_PAGEOUT: RSS=%ld KiB (may take a moment)\\n&quot;, rss());

    /* On next access, kernel reads back from swap (major fault). */
    volatile int x = p[1024 * 1024];
    (void)x;
    printf(&quot;after touch: RSS=%ld KiB\\n&quot;, rss());

    munmap(p, n);
    return 0;
}

</code></pre>` },
  { name: `57. Paging Swapping / Oom Score`, path: `07_paging_swapping/04_oom_score.c`, dir: `07_paging_swapping`, words: 167, mins: 1, body: `<h1 id="04_oom_scorec">04_oom_score.c</h1>
<pre><code class="language-c">/*
 * 04_oom_score.c
 * ---------------
 * Read the OOM score and adjust it.
 *
 *   /proc/self/oom_score      -- kernel's current &quot;badness&quot; rating
 *   /proc/self/oom_score_adj  -- user adjustment, -1000..1000
 *                                -1000  = never kill (if any other victim)
 *                                +1000  = kill me first
 */
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;unistd.h&gt;
#include &lt;fcntl.h&gt;
#include &lt;string.h&gt;

static int read_int(const char *path)
{
    FILE *f = fopen(path, &quot;r&quot;);
    if (!f) { perror(path); return -1; }
    int v; if (fscanf(f, &quot;%d&quot;, &amp;v) != 1) v = -1;
    fclose(f);
    return v;
}

static int write_int(const char *path, int v)
{
    int fd = open(path, O_WRONLY);
    if (fd &lt; 0) return -1;
    char buf[16];
    int n = snprintf(buf, sizeof buf, &quot;%d&quot;, v);
    int w = write(fd, buf, n);
    close(fd);
    return w == n ? 0 : -1;
}

int main(void)
{
    printf(&quot;oom_score      = %d\\n&quot;, read_int(&quot;/proc/self/oom_score&quot;));
    printf(&quot;oom_score_adj  = %d\\n&quot;, read_int(&quot;/proc/self/oom_score_adj&quot;));

    if (write_int(&quot;/proc/self/oom_score_adj&quot;, -500) == 0)
        printf(&quot;set oom_score_adj = -500\\n&quot;);
    else
        perror(&quot;write oom_score_adj&quot;);

    printf(&quot;oom_score now  = %d\\n&quot;, read_int(&quot;/proc/self/oom_score&quot;));
    printf(&quot;oom_score_adj  = %d\\n&quot;, read_int(&quot;/proc/self/oom_score_adj&quot;));
    return 0;
}

</code></pre>` },
  { name: `58. Paging Swapping / Overcommit`, path: `07_paging_swapping/05_overcommit.c`, dir: `07_paging_swapping`, words: 193, mins: 1, body: `<h1 id="05_overcommitc">05_overcommit.c</h1>
<pre><code class="language-c">/*
 * 05_overcommit.c
 * ----------------
 * Allocate way more virtual address space than the system has physical
 * memory.  With MAP_NORESERVE (and default vm.overcommit_memory=0/1) it
 * usually succeeds; with vm.overcommit_memory=2 it can fail.
 *
 *   You only get into trouble when you TOUCH more pages than fit.  At
 *   that point the OOM killer steps in.
 */
#define _GNU_SOURCE
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;
#include &lt;unistd.h&gt;
#include &lt;sys/mman.h&gt;
#include &lt;string.h&gt;

int main(void)
{
    /* try 256 GiB virtual */
    size_t n = 256UL * 1024 * 1024 * 1024;
    char *p = mmap(NULL, n, PROT_READ | PROT_WRITE,
                   MAP_PRIVATE | MAP_ANONYMOUS | MAP_NORESERVE, -1, 0);
    if (p == MAP_FAILED) { perror(&quot;mmap&quot;); return 1; }
    printf(&quot;mmap'd 256 GiB virtual at %p (no physical RAM used yet)\\n&quot;, p);

    /* Read /proc/self/status to confirm VSZ */
    FILE *f = fopen(&quot;/proc/self/status&quot;, &quot;r&quot;);
    char l[256];
    while (fgets(l, sizeof l, f))
        if (!strncmp(l, &quot;VmSize:&quot;, 7) || !strncmp(l, &quot;VmRSS:&quot;, 6)
            || !strncmp(l, &quot;VmData:&quot;, 7))
            fputs(l, stdout);
    fclose(f);

    printf(&quot;\\nNow touching just 64 MiB (not 256 GiB)...\\n&quot;);
    memset(p, 0x42, 64UL &lt;&lt; 20);
    f = fopen(&quot;/proc/self/status&quot;, &quot;r&quot;);
    while (fgets(l, sizeof l, f))
        if (!strncmp(l, &quot;VmRSS:&quot;, 6)) fputs(l, stdout);
    fclose(f);

    munmap(p, n);
    return 0;
}

</code></pre>` },
  { name: `59. Paging Swapping`, path: `07_paging_swapping/README.md`, dir: `07_paging_swapping`, words: 961, mins: 5, body: `<h1 id="07--paging-page-cache-swap-and-the-oom-killer">07 — Paging, Page Cache, Swap, and the OOM Killer</h1>
<p>So far we&rsquo;ve talked about memory from the <em>process&rsquo;s</em> viewpoint. This section
looks at the system level: how the kernel rations RAM, what the <strong>page
cache</strong> is, how <strong>swap</strong> works, and why your program just got killed by the
OOM killer at 3am.</p>
<h2 id="1-where-do-physical-frames-live">1. Where do physical frames live?</h2>
<pre><code>                            +------- PHYSICAL RAM -------+
                            |                            |
                            |  free pages                |
                            |    (kept on per-NUMA       |
                            |     buddy free lists)      |
                            |                            |
                            |  anonymous pages           | &lt;- your malloc,
                            |    (process private RAM)   |    stacks, bss
                            |                            |
                            |  file-backed (page cache)  | &lt;- mmap'd files,
                            |    clean / dirty           |    read() buffers
                            |                            |
                            |  slab / kernel             | &lt;- inode caches,
                            |                            |    network buffers
                            |  reserved / kernel text    |
                            +----------------------------+
</code></pre>
<p><code>cat /proc/meminfo</code> shows the breakdown:</p>
<pre><code>   MemTotal:       16252160 kB     total RAM the kernel sees
   MemFree:         1234567 kB     unused, on buddy free lists
   MemAvailable:    8000000 kB     &quot;you can probably allocate this much&quot;
   Buffers:           45000 kB     page cache for block devices (raw)
   Cached:          6800000 kB     page cache for files (incl. tmpfs)
   SwapTotal:       4194304 kB
   SwapFree:        4150000 kB
   Dirty:               500 kB     dirty (not yet written to disk) page cache
   Writeback:             0 kB     currently being written
   AnonPages:       4500000 kB     non-file-backed (heap/stack/anon mmap)
   Mapped:           700000 kB     mapped via mmap somewhere
   Slab:             400000 kB     kernel slab (kmalloc internals)
   ...
</code></pre>
<h2 id="2-the-page-cache">2. The page cache</h2>
<p>Every read or write to a regular file goes through the <strong>page cache</strong>:</p>
<pre><code>   write(fd, buf, n)
        |
        v
   kernel copies buf -&gt; page cache pages (RAM); marks them dirty
        |
        v
   returns immediately (no disk I/O yet)
        |
        v
   later: pdflush / kworker writes dirty pages to disk
   (sync() / fsync() forces it now)
</code></pre>
<p><code>mmap(file, MAP_SHARED)</code> lets you skip the copy entirely — you read and write
the cache pages directly via your mapping.</p>
<h3 id="why-is-free-showing-little-free-ram">Why is <code>free</code> showing little free RAM?</h3>
<p>Because Linux uses every byte it has. Cached file pages are not &ldquo;in use&rdquo; in
any meaningful sense — they will be evicted instantly when something else
needs memory. Look at <code>MemAvailable</code>, not <code>MemFree</code>.</p>
<h3 id="dropping-the-page-cache-debug-only">Dropping the page cache (debug only)</h3>
<pre><code class="language-bash">sync &amp;&amp; echo 3 | sudo tee /proc/sys/vm/drop_caches
# 1 = clean page cache, 2 = slab, 3 = both
</code></pre>
<h2 id="3-the-buddy-allocator">3. The buddy allocator</h2>
<p>The kernel&rsquo;s physical-frame allocator is a <strong>buddy system</strong>.</p>
<pre><code>   memory split into orders:
     order 0 = 1 page    = 4 KiB
     order 1 = 2 pages   = 8 KiB
     order 2 = 4 pages   = 16 KiB
     ...
     order 10 = 1024 pages = 4 MiB

   free list per (zone, order):
   +--------+--------+--------+ ...
   | order0 | order1 | order2 |
   +--------+--------+--------+
   | head | | head | | head | |
   |  v   | |  v   | |  v   | |
   | pg-&gt; | | pg-&gt; | | pg-&gt; | |
   | pg   | | pg   | | pg   | |
   +------+ +------+ +------+
</code></pre>
<p><code>cat /proc/buddyinfo</code>:</p>
<pre><code>   Node 0, zone DMA32  1234  567  89  10  ...
                       ^     ^     ^   ^
                       order 0 (4K), 1 (8K), 2 (16K), 3 (32K), ...
</code></pre>
<p>When the kernel needs N contiguous pages, it asks for <code>2^ceil(log2(N))</code> and
splits a buddy bigger than that. Releases coalesce buddies recursively.</p>
<p>External fragmentation can be a problem: lots of free 4 KiB pages, no
contiguous 2 MiB block for THP. Hence <strong>memory compaction</strong>.</p>
<h2 id="4-swap">4. Swap</h2>
<p>When RAM is exhausted (more precisely: when the kernel&rsquo;s LRU lists need to
evict pages), it picks <strong>inactive anonymous</strong> pages and writes them out to
the <strong>swap device</strong> (a swap partition or swapfile).</p>
<pre><code>   anonymous page lifecycle:

     created (e.g. malloc + first touch)
           |
     +-----v-----+
     | active    |  recently used
     +-----------+
           |
           v
     +-----------+
     | inactive  |  not used in a while
     +-----------+
           |
           v
     written to swap; page reclaimed; PTE points to swap slot
           |
           v
     next access -&gt; #PF (major); kernel reads from swap; re-resident
</code></pre>
<p>Two important sysctls:</p>
<ul>
<li><code>vm.swappiness</code> (0..200, default 60). Higher = swap more eagerly.</li>
<li><code>vm.overcommit_memory</code>:</li>
<li><code>0</code> (default): heuristic — refuses really obviously impossible allocations.</li>
<li>
<p><code>1</code>: always say yes. <code>malloc</code> of 1 PiB succeeds; you OOM-kill when you
    touch it.</p>
</li>
<li>
<p><code>2</code>: strict — <code>CommitLimit = swap + RAM × overcommit_ratio/100</code>.</p>
</li>
</ul>
<h3 id="why-isnt-file-backed-memory-swapped">Why isn&rsquo;t <em>file-backed</em> memory swapped?</h3>
<p>Because we can just throw it away and read it again from the file on next
access. Only anonymous (non-file) pages need to go through swap.</p>
<h2 id="5-the-oom-killer">5. The OOM killer</h2>
<p>When the kernel is <strong>truly</strong> out of memory and can&rsquo;t reclaim any more pages,
it invokes <code>oom_kill_process</code>. Each process has an OOM <strong>score</strong> (visible at
<code>/proc/PID/oom_score</code>):</p>
<pre><code>   higher score = killed first.
   score = badness(memory_use, runtime, oom_score_adj, ...)
</code></pre>
<p>You can bias your process:</p>
<pre><code class="language-c">int fd = open(&quot;/proc/self/oom_score_adj&quot;, O_WRONLY);
write(fd, &quot;-1000&quot;, 5);   // never killed if any other option exists
close(fd);
</code></pre>
<p>Or with <code>choom -p PID -n N</code>.</p>
<p>When a process is killed, you see in <code>dmesg</code>:</p>
<pre><code>   Out of memory: Killed process 1234 (foo) total-vm:8GB,
       anon-rss:7GB, file-rss:0kB, shmem-rss:0kB
</code></pre>
<h2 id="6-mlock--pin-pages-in-ram">6. <code>mlock</code> — pin pages in RAM</h2>
<p>For real-time / security-sensitive code (cryptographic keys must not be
swapped to disk), use <code>mlock</code>:</p>
<pre><code class="language-c">char *secret = malloc(64);
mlock(secret, 64);          // pin in RAM
// ... use secret ...
explicit_bzero(secret, 64);
munlock(secret, 64);
free(secret);
</code></pre>
<p>Or pin the entire process:</p>
<pre><code class="language-c">mlockall(MCL_CURRENT | MCL_FUTURE);
</code></pre>
<p>Limited by <code>RLIMIT_MEMLOCK</code> for non-root.</p>
<h2 id="7-watching-swap--faults--rss">7. Watching swap / faults / RSS</h2>
<pre><code class="language-bash">vmstat 1                # si/so columns = swap in/out per sec
free -h                 # human totals
sar -B 1                # paging stats
cat /proc/PID/status | grep -E 'Vm|Hugepages'
cat /proc/PID/smaps_rollup
/usr/bin/time -v ./prog # majfaults, minor faults, maxrss
perf stat -e page-faults,minor-faults,major-faults ./prog
</code></pre>
